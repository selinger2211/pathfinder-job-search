<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Post-Interview Debrief</title>
  <meta name="description" content="Structured interview feedback capture and synthesis with Claude AI">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js"></script>

  <style>
    /* ================================================================
       DEBRIEF MODULE — LAYOUT & COMPONENTS
       ================================================================ */

    .debrief-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      background: var(--bg-secondary);
      overflow: hidden;
    }

    .debrief-sidebar {
      width: 320px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .debrief-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .debrief-header {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .debrief-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
    }

    .tab-nav {
      display: flex;
      gap: var(--space-3);
      background: var(--bg-secondary);
      padding: 0 var(--space-6);
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      padding: var(--space-3) var(--space-4);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: var(--text-sm);
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 200ms ease;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    .debrief-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }

    /* SIDEBAR COMPONENTS */
    .sidebar-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .sidebar-label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
      display: block;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      transition: border-color 200ms;
    }

    .form-select:focus,
    .form-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .company-card,
    .role-card {
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      margin-top: var(--space-2);
    }

    .company-header {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .company-logo {
      width: 48px;
      height: 48px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--accent-primary);
    }

    .company-info {
      flex: 1;
    }

    .company-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .company-domain {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .role-title {
      font-weight: 600;
      color: var(--text-primary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-1);
    }

    .role-meta {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    /* FORM STYLES */
    .wizard-progress {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }

    .progress-step {
      flex: 1;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: 2px;
      transition: background 300ms ease;
    }

    .progress-step.active {
      background: var(--accent-primary);
    }

    .progress-step.completed {
      background: var(--success-color);
    }

    .progress-text {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-left: var(--space-2);
      min-width: 50px;
    }

    .wizard-section {
      display: none;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .wizard-section.active {
      display: block;
      opacity: 1;
    }

    .wizard-section-title {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .wizard-section-prompt {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-4);
    }

    /* RADIO BUTTONS */
    .radio-group {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .radio-item input[type="radio"] {
      cursor: pointer;
    }

    .radio-item label {
      cursor: pointer;
      font-size: var(--text-sm);
    }

    /* TEXTAREA */
    .form-textarea {
      width: 100%;
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: var(--text-sm);
      min-height: 120px;
      resize: vertical;
      transition: border-color 200ms;
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* TAG INPUT */
    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin: var(--space-3) 0;
      padding: var(--space-2);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      min-height: 40px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      background: var(--accent-primary);
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
    }

    .tag button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0;
      font-size: var(--text-xs);
    }

    .tag-input {
      flex: 1;
      min-width: 100px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .tag-input:focus {
      outline: none;
    }

    /* BUTTONS */
    .btn-primary,
    .btn-secondary {
      padding: var(--space-3) var(--space-4);
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-tertiary);
    }

    .wizard-nav {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
      justify-content: space-between;
    }

    /* SYNTHESIS PANEL */
    .synthesis-panel {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-top: var(--space-6);
    }

    .synthesis-panel h3 {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
    }

    .synthesis-content {
      font-size: var(--text-sm);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .synthesis-content h4 {
      font-weight: 600;
      margin-top: var(--space-4);
      margin-bottom: var(--space-2);
    }

    .synthesis-content ul {
      margin-left: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .synthesis-content li {
      margin-bottom: var(--space-2);
    }

    /* HISTORY */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .history-item {
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 200ms;
    }

    .history-item:hover {
      border-color: var(--accent-primary);
      background: var(--bg-secondary);
    }

    .history-company {
      font-weight: 600;
      color: var(--text-primary);
    }

    .history-details {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-1);
    }

    .history-rating {
      font-size: var(--text-lg);
      color: var(--accent-primary);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-6);
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: var(--space-3);
      opacity: 0.5;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .debrief-container {
        flex-direction: column;
      }

      .debrief-sidebar {
        width: 100%;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav">
    <div class="nav-brand"><span>P</span>athfinder</div>
    <div class="nav-links">
      <a href="../dashboard/index.html">Dashboard</a>
      <a href="../pipeline/index.html">Pipeline</a>
      <a href="../research-brief/index.html">Research</a>
      <a href="../resume-tailor/index.html">Resume</a>
      <a href="../job-feed-listener/index.html">Feed</a>
      <a href="../outreach/index.html">Outreach</a>
      <a href="../mock-interview/index.html">Mock</a>
      <a href="index.html" class="active">Debrief</a>
      <a href="../comp-intel/index.html">Comp</a>
      <a href="../calendar/index.html">Calendar</a>
    </div>

      <span class="nav-kbd">⌘K</span>
    </div>
  </nav>

  <div class="debrief-container" style="margin-top: var(--nav-height);">
    <!-- LEFT SIDEBAR -->
    <div class="debrief-sidebar">
      <div>
        <label class="sidebar-label">Select Role</label>
        <select class="form-select" id="roleSelect">
          <option value="">Choose a role...</option>
        </select>
      </div>

      <div id="companyCardContainer"></div>
      <div id="roleCardContainer"></div>
      <div id="previousDebriefsList"></div>
    </div>

    <!-- RIGHT MAIN PANEL -->
    <div class="debrief-main">
      <div class="debrief-header">
        <h1 class="debrief-title">Post-Interview Debrief</h1>
      </div>

      <div class="tab-nav">
        <button class="tab-btn active" data-tab="form">New Debrief</button>
        <button class="tab-btn" data-tab="history">History</button>
        <button class="tab-btn" data-tab="timeline">Timeline</button>
        <button class="tab-btn" data-tab="patterns">Patterns</button>
      </div>

      <div class="debrief-content">
        <!-- NEW DEBRIEF FORM TAB -->
        <div id="formTab" class="tab-pane active">
          <div id="formContainer"></div>
        </div>

        <!-- HISTORY TAB -->
        <div id="historyTab" class="tab-pane hidden">
          <div id="historyContainer"></div>
        </div>

        <!-- TIMELINE TAB -->
        <div id="timelineTab" class="tab-pane hidden">
          <div id="timelineContainer"></div>
        </div>

        <!-- PATTERNS TAB -->
        <div id="patternsTab" class="tab-pane hidden">
          <div id="patternsContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * PATHFINDER DEBRIEF MODULE
     * Structured interview feedback capture and Claude-powered synthesis
     */

    const DebriefApp = {
      state: {
        currentRoleId: null,
        debriefs: [],
        roles: [],
        companies: [],
        storyBank: [],
        currentTab: 'form',
        formData: {}
      },

      // INITIALIZATION
      init() {
        this.loadData();
        this.renderRoleSelector();
        this.attachTabListeners();
        this.renderNewDebriefForm();
        this.renderHistoryTab();
      },

      loadData() {
        // Load from localStorage
        this.state.debriefs = JSON.parse(localStorage.getItem('pf_debriefs')) || [];
        this.state.roles = JSON.parse(localStorage.getItem('pf_roles')) || [];
        this.state.companies = JSON.parse(localStorage.getItem('pf_companies')) || [];
        this.state.storyBank = JSON.parse(localStorage.getItem('pf_story_bank')) || [];
      },

      saveData() {
        localStorage.setItem('pf_debriefs', JSON.stringify(this.state.debriefs));
        localStorage.setItem('pf_story_bank', JSON.stringify(this.state.storyBank));
      },

      // ROLE SELECTOR
      renderRoleSelector() {
        const select = document.getElementById('roleSelect');
        select.innerHTML = '<option value="">Choose a role...</option>';

        // Filter roles by stage: screen, interviewing, offer, or closed
        const validStages = ['screen', 'interviewing', 'offer', 'closed'];
        const roles = this.state.roles.filter(r =>
          validStages.includes(r.stage?.toLowerCase())
        );

        roles.forEach(role => {
          const company = this.getCompanyName(role);
          const option = document.createElement('option');
          option.value = role.id;
          option.textContent = `${company} - ${role.title}`;
          select.appendChild(option);
        });

        select.addEventListener('change', (e) => {
          this.state.currentRoleId = e.target.value;
          this.updateSidebar();
        });
      },

      getCompanyName(role) {
        if (role.company) return role.company;
        const company = this.state.companies.find(c => c.id === role.companyId);
        return company?.name || 'Unknown';
      },

      updateSidebar() {
        if (!this.state.currentRoleId) {
          document.getElementById('companyCardContainer').innerHTML = '';
          document.getElementById('roleCardContainer').innerHTML = '';
          document.getElementById('previousDebriefsList').innerHTML = '';
          return;
        }

        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        this.renderCompanyCard(role);
        this.renderRoleCard(role);
        this.renderPreviousDebriefs(role);
      },

      renderCompanyCard(role) {
        const container = document.getElementById('companyCardContainer');
        const companyName = this.getCompanyName(role);
        const company = this.state.companies.find(c => c.id === role.companyId || c.name === companyName);
        const logo = company?.logo || companyName.charAt(0).toUpperCase();

        container.innerHTML = `
          <div class="sidebar-card">
            <label class="sidebar-label">Company</label>
            <div class="company-card">
              <div class="company-header">
                <div class="company-logo">${logo}</div>
                <div class="company-info">
                  <div class="company-name">${companyName}</div>
                  ${company?.domain ? `<div class="company-domain">${company.domain}</div>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      },

      renderRoleCard(role) {
        const container = document.getElementById('roleCardContainer');
        container.innerHTML = `
          <div class="sidebar-card">
            <label class="sidebar-label">Role Details</label>
            <div class="role-card">
              <div class="role-title">${role.title}</div>
              <div class="role-meta">Level: ${role.level || 'N/A'}</div>
              <div class="role-meta">Stage: ${role.stage || 'N/A'}</div>
            </div>
          </div>
        `;
      },

      renderPreviousDebriefs(role) {
        const container = document.getElementById('previousDebriefsList');
        const debriefs = this.state.debriefs.filter(d => d.roleId === role.id);

        if (debriefs.length === 0) {
          container.innerHTML = '';
          return;
        }

        const sorted = debriefs.sort((a, b) => new Date(b.date) - new Date(a.date));
        let html = '<div class="sidebar-card"><label class="sidebar-label">Previous Debriefs</label>';

        sorted.slice(0, 3).forEach(d => {
          const stars = '★'.repeat(Math.round(d.overallRating)) + '☆'.repeat(5 - Math.round(d.overallRating));
          html += `<div style="padding: var(--space-2); font-size: var(--text-xs); border-bottom: 1px solid var(--border-color);">
            <div><strong>${d.company}</strong> ${stars}</div>
            <div style="color: var(--text-secondary);">${new Date(d.date).toLocaleDateString()}</div>
          </div>`;
        });

        html += '</div>';
        container.innerHTML = html;
      },

      // TABS
      attachTabListeners() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const tab = e.target.dataset.tab;
            this.switchTab(tab);
          });
        });
      },

      switchTab(tab) {
        this.state.currentTab = tab;

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));

        event.target.classList.add('active');
        document.getElementById(tab + 'Tab').classList.remove('hidden');

        if (tab === 'history') {
          this.renderHistoryTab();
        } else if (tab === 'timeline') {
          this.renderTimelineTab();
        } else if (tab === 'patterns') {
          this.renderPatternsTab();
        }
      },

      // NEW DEBRIEF FORM
      renderNewDebriefForm() {
        const container = document.getElementById('formContainer');

        if (!this.state.currentRoleId) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Select a role to start a debrief</p></div>';
          return;
        }

        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        const company = this.getCompanyName(role);

        container.innerHTML = `
          <form id="debriefForm" style="max-width: 800px;">
            <div class="wizard-progress">
              ${Array.from({ length: 8 }, (_, i) => `<div class="progress-step" id="step${i+1}"></div>`).join('')}
              <div class="progress-text" id="progressText">1 / 8</div>
            </div>

            ${this.renderSection(1, 'Overall Impression', 'How do you feel the interview went?', 'impression')}
            ${this.renderSection(2, 'What Landed', 'Which stories or answers resonated?', 'landed')}
            ${this.renderSection(3, 'What Didn\'t Land', 'What moments felt weak?', 'notlanded')}
            ${this.renderSection(4, 'Questions Asked', 'List the key questions you remember', 'questions')}
            ${this.renderSection(5, 'Their Priorities', 'What mattered most to them?', 'priorities')}
            ${this.renderSection(6, 'Red Flags & Concerns', 'Any concerns about the role?', 'redflags')}
            ${this.renderSection(7, 'Follow-up Items', 'Next steps and timeline', 'followup')}
            ${this.renderSection(8, 'Additional Notes', 'Anything else?', 'notes')}

            <div class="wizard-nav">
              <button type="button" class="btn-secondary" id="prevBtn" disabled>← Previous</button>
              <button type="button" class="btn-primary" id="nextBtn">Next →</button>
            </div>
          </form>

          <div id="synthesisContainer"></div>
        `;

        this.attachFormListeners();
      },

      renderSection(num, title, prompt, fieldId) {
        let fieldHtml = '';

        if (num === 1) {
          fieldHtml = `
            <label class="sidebar-label">Rating</label>
            <div class="radio-group">
              <div class="radio-item"><input type="radio" name="impression" value="1" id="r1"><label for="r1">Rough</label></div>
              <div class="radio-item"><input type="radio" name="impression" value="2" id="r2"><label for="r2">Mixed</label></div>
              <div class="radio-item"><input type="radio" name="impression" value="3" id="r3"><label for="r3">Good</label></div>
              <div class="radio-item"><input type="radio" name="impression" value="4" id="r4"><label for="r4">Great</label></div>
            </div>
            <label class="sidebar-label">Summary</label>
            <textarea class="form-textarea" name="impressionDetails" placeholder="Brief summary..."></textarea>
          `;
        } else if (num === 4) {
          fieldHtml = `
            <label class="sidebar-label">Questions (one per line)</label>
            <textarea class="form-textarea" name="questions" placeholder="Question 1&#10;Question 2&#10;Question 3..." style="min-height: 180px;"></textarea>
          `;
        } else if (num === 7) {
          fieldHtml = `
            <label class="sidebar-label">Follow-up Actions</label>
            <textarea class="form-textarea" name="followup" placeholder="Next steps, timeline..."></textarea>
            <label class="sidebar-label" style="margin-top: var(--space-4);">Expected Next Steps Date</label>
            <input type="date" class="form-input" name="nextStepsDate">
          `;
        } else {
          fieldHtml = `
            <textarea class="form-textarea" name="${fieldId}" placeholder="Your response..."></textarea>
          `;
        }

        return `
          <div class="wizard-section" id="section${num}">
            <h2 class="wizard-section-title">${num}. ${title}</h2>
            <p class="wizard-section-prompt">${prompt}</p>
            ${fieldHtml}
          </div>
        `;
      },

      attachFormListeners() {
        let currentStep = 1;
        const form = document.getElementById('debriefForm');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        const updateUI = () => {
          document.querySelectorAll('.wizard-section').forEach((s, i) => {
            s.classList.toggle('active', i + 1 === currentStep);
          });

          document.querySelectorAll('.progress-step').forEach((s, i) => {
            s.classList.remove('active', 'completed');
            if (i + 1 < currentStep) s.classList.add('completed');
            if (i + 1 === currentStep) s.classList.add('active');
          });

          document.getElementById('progressText').textContent = `${currentStep} / 8`;
          prevBtn.disabled = currentStep === 1;
          nextBtn.textContent = currentStep === 8 ? 'Generate Insights →' : 'Next →';
        };

        prevBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (currentStep > 1) currentStep--;
          updateUI();
        });

        nextBtn.addEventListener('click', async (e) => {
          e.preventDefault();

          if (currentStep < 8) {
            currentStep++;
            updateUI();
          } else {
            // Final step: collect data and generate synthesis
            await this.generateSynthesis(form);
          }
        });

        updateUI();
      },

      collectFormData(form) {
        const data = new FormData(form);
        const formObj = {
          overallRating: data.get('impression') ? parseFloat(data.get('impression')) : 0,
          overall: data.get('impressionDetails') || '',
          landed: data.get('landed') || '',
          didntLand: data.get('notlanded') || '',
          questions: data.get('questions')?.split('\n').filter(q => q.trim()) || [],
          priorities: data.get('priorities') || '',
          redFlags: data.get('redflags') || '',
          followUps: data.get('followup')?.split('\n').filter(f => f.trim()) || [],
          nextStepsDate: data.get('nextStepsDate') || '',
          notes: data.get('notes') || ''
        };
        return formObj;
      },

      async generateSynthesis(form) {
        const formData = this.collectFormData(form);
        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        const company = this.getCompanyName(role);

        if (!formData.overall || !formData.landed) {
          alert('Please fill in at least "Overall Impression" and "What Landed" sections');
          return;
        }

        // Show loading state
        const container = document.getElementById('synthesisContainer');
        container.innerHTML = '<div style="padding: var(--space-6); text-align: center;"><div class="loading-spinner"></div><p>Generating insights...</p></div>';

        try {
          const systemPrompt = `You are a career coach helping a senior PM process an interview debrief. Analyze their responses and provide:
1. Key themes across their answers
2. Strength patterns (what they consistently do well)
3. Gap patterns (recurring weaknesses to address)
4. Specific prep recommendations for the next round
5. Whether the role seems like a good fit based on red flags and priorities

Output in clean HTML. Use <h3> for section headings, <p> for paragraphs, <ul>/<li> for lists. Be direct and actionable.`;

          const userPrompt = `
Interview Debrief for ${role.title} at ${company}

Overall Impression: ${formData.overall}

What Landed: ${formData.landed}

What Didn't Land: ${formData.didntLand}

Questions They Asked:
${formData.questions.map(q => `- ${q}`).join('\n')}

Their Priorities: ${formData.priorities}

Red Flags & Concerns: ${formData.redFlags || 'None'}

Follow-up Items: ${formData.followUps.join(', ') || 'None mentioned'}

Additional Notes: ${formData.notes}`;

          const result = await PF.claude.generateHTML(systemPrompt, userPrompt);

          // Display synthesis
          container.innerHTML = `
            <div class="synthesis-panel">
              <h3>Claude AI Synthesis</h3>
              <div class="synthesis-content">${result}</div>
              <div style="display: flex; gap: var(--space-3); margin-top: var(--space-6);">
                <button type="button" class="btn-primary" id="saveDebriefBtn">Save Debrief</button>
                <button type="button" class="btn-secondary" id="startNewBtn">Start New</button>
              </div>
            </div>
          `;

          document.getElementById('saveDebriefBtn').addEventListener('click', () => {
            this.saveDebrief(formData, result);
          });

          document.getElementById('startNewBtn').addEventListener('click', () => {
            form.reset();
            let step = 1;
            document.querySelectorAll('.wizard-section').forEach((s, i) => {
              s.classList.toggle('active', i === 0);
            });
            container.innerHTML = '';
          });

        } catch (error) {
          container.innerHTML = `<div class="empty-state"><p>Error: ${error.message}</p></div>`;
        }
      },

      saveDebrief(formData, synthesis) {
        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        const company = this.getCompanyName(role);

        const debrief = {
          id: 'debrief_' + Date.now(),
          roleId: this.state.currentRoleId,
          company,
          title: role.title,
          date: new Date().toISOString().split('T')[0],
          overallRating: formData.overallRating,
          sections: {
            overall: formData.overall,
            landed: formData.landed,
            didntLand: formData.didntLand,
            questions: formData.questions,
            priorities: formData.priorities,
            redFlags: formData.redFlags,
            followUps: formData.followUps,
            notes: formData.notes
          },
          synthesis: synthesis,
          nextStepsDate: formData.nextStepsDate
        };

        this.state.debriefs.push(debrief);
        this.saveData();

        alert('Debrief saved successfully!');
        this.renderNewDebriefForm();
        this.updateSidebar();
      },

      // HISTORY TAB
      renderHistoryTab() {
        const container = document.getElementById('historyContainer');

        if (this.state.debriefs.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><p>No debriefs yet. Start by selecting a role and filling out the form.</p></div>';
          return;
        }

        const sorted = this.state.debriefs.sort((a, b) => new Date(b.date) - new Date(a.date));

        let html = '<div class="history-list">';
        sorted.forEach(debrief => {
          const stars = '★'.repeat(Math.round(debrief.overallRating)) + '☆'.repeat(5 - Math.round(debrief.overallRating));
          html += `
            <div class="history-item" onclick="DebriefApp.viewDebrief('${debrief.id}')">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <div class="history-company">${debrief.company} - ${debrief.title}</div>
                  <div class="history-details">${new Date(debrief.date).toLocaleDateString()}</div>
                </div>
                <div class="history-rating">${stars}</div>
              </div>
            </div>
          `;
        });
        html += '</div>';

        container.innerHTML = html;
      },

      viewDebrief(debriefId) {
        const debrief = this.state.debriefs.find(d => d.id === debriefId);
        if (!debrief) return;

        const container = document.getElementById('historyContainer');
        container.innerHTML = `
          <div style="margin-bottom: var(--space-4);">
            <button class="btn-secondary" onclick="DebriefApp.renderHistoryTab()">← Back to List</button>
          </div>

          <div style="background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-6);">
            <h2 style="font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-2);">${debrief.company} - ${debrief.title}</h2>
            <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">${new Date(debrief.date).toLocaleDateString()}</p>

            <h3 style="font-weight: 600; margin-top: var(--space-6); margin-bottom: var(--space-2);">Overall Impression</h3>
            <p>${debrief.sections.overall}</p>

            <h3 style="font-weight: 600; margin-top: var(--space-4); margin-bottom: var(--space-2);">What Landed</h3>
            <p>${debrief.sections.landed}</p>

            <h3 style="font-weight: 600; margin-top: var(--space-4); margin-bottom: var(--space-2);">What Didn't Land</h3>
            <p>${debrief.sections.didntLand || '—'}</p>

            ${debrief.sections.questions.length > 0 ? `
              <h3 style="font-weight: 600; margin-top: var(--space-4); margin-bottom: var(--space-2);">Questions Asked</h3>
              <ul style="margin-left: var(--space-4);">
                ${debrief.sections.questions.map(q => `<li>${q}</li>`).join('')}
              </ul>
            ` : ''}

            <h3 style="font-weight: 600; margin-top: var(--space-4); margin-bottom: var(--space-2);">Their Priorities</h3>
            <p>${debrief.sections.priorities}</p>

            ${debrief.sections.redFlags ? `
              <h3 style="font-weight: 600; margin-top: var(--space-4); margin-bottom: var(--space-2);">Red Flags</h3>
              <p>${debrief.sections.redFlags}</p>
            ` : ''}

            ${debrief.synthesis ? `
              <h3 style="font-weight: 600; margin-top: var(--space-6); margin-bottom: var(--space-2);">Claude Synthesis</h3>
              <div style="background: var(--bg-secondary); padding: var(--space-4); border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                <div>${debrief.synthesis}</div>
              </div>
            ` : ''}

            <div style="margin-top: var(--space-6); display: flex; gap: var(--space-3);">
              <button class="btn-secondary" onclick="DebriefApp.exportDebrief('${debriefId}', 'text')">📥 Export as Text</button>
              <button class="btn-secondary" onclick="DebriefApp.copyDebriefToClipboard('${debriefId}')">📋 Copy to Clipboard</button>
            </div>
          </div>
        `;
      }

      /**
       * Debrief Timeline - visualize all debriefs for a role chronologically
       */
      renderTimelineTab() {
        const container = document.getElementById('timelineContainer');

        if (!this.state.currentRoleId) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>Select a role to see debrief timeline</p></div>';
          return;
        }

        const roleDebriefs = this.state.debriefs
          .filter(d => d.roleId === this.state.currentRoleId)
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (roleDebriefs.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>No debriefs for this role yet</p></div>';
          return;
        }

        let html = '<div style="padding: var(--space-4);">';
        html += '<h3 style="font-weight: 600; margin-bottom: var(--space-4); color: var(--text-primary);">Interview Progression</h3>';
        html += '<div style="border-left: 2px solid var(--border-color); padding-left: var(--space-6); position: relative;">';

        roleDebriefs.forEach((debrief, idx) => {
          const sentiment = debrief.overallRating >= 3 ? 'positive' : debrief.overallRating >= 2 ? 'neutral' : 'negative';
          const sentimentColor = sentiment === 'positive' ? 'var(--success-color)' : sentiment === 'neutral' ? 'var(--info)' : 'var(--danger)';
          const sentimentLabel = sentiment === 'positive' ? '✓ Positive' : sentiment === 'neutral' ? '• Neutral' : '✗ Negative';
          const stars = '★'.repeat(Math.round(debrief.overallRating)) + '☆'.repeat(5 - Math.round(debrief.overallRating));

          html += `
            <div style="margin-bottom: var(--space-6); position: relative;">
              <div style="position: absolute; left: -42px; width: 24px; height: 24px; background: ${sentimentColor}; border: 2px solid var(--bg-primary); border-radius: 50%; top: 0;"></div>
              <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); cursor: pointer;" onclick="DebriefApp.viewDebrief('${debrief.id}')">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-2);">
                  <div>
                    <div style="font-weight: 600; color: var(--text-primary);">${new Date(debrief.date).toLocaleDateString()}</div>
                    <div style="font-size: var(--text-xs); color: var(--text-secondary); margin-top: var(--space-1);">${sentimentLabel}</div>
                  </div>
                  <div style="color: var(--accent-primary);">${stars}</div>
                </div>
                <div style="font-size: var(--text-sm); color: var(--text-primary);">${debrief.sections.overall.slice(0, 100)}...</div>
              </div>
            </div>
          `;
        });

        html += '</div></div>';
        container.innerHTML = html;
      }

      /**
       * Pattern Analysis - identify recurring themes from 5+ debriefs
       */
      renderPatternsTab() {
        const container = document.getElementById('patternsContainer');

        if (this.state.debriefs.length < 5) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>Complete 5+ debriefs to see pattern analysis</p></div>';
          return;
        }

        const patterns = this.analyzeDebriefPatterns();

        let html = '<div style="padding: var(--space-4);">';
        html += '<h3 style="font-weight: 600; margin-bottom: var(--space-4); color: var(--text-primary);">Interview Patterns</h3>';

        // Common questions
        if (patterns.commonQuestions.length > 0) {
          html += `<div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); margin-bottom: var(--space-4);">
            <h4 style="font-weight: 600; margin-bottom: var(--space-3); color: var(--text-primary);">Frequently Asked Questions</h4>
            <ul style="margin: 0; padding-left: var(--space-4); list-style: none;">
              ${patterns.commonQuestions.slice(0, 5).map(q => `
                <li style="margin-bottom: var(--space-2); color: var(--text-secondary); font-size: var(--text-sm);">
                  <strong>${q.count} times:</strong> ${q.question.slice(0, 80)}...
                </li>
              `).join('')}
            </ul>
          </div>`;
        }

        // Red flags
        if (patterns.redFlags.length > 0) {
          html += `<div style="background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.3); border-radius: var(--radius-md); padding: var(--space-4); margin-bottom: var(--space-4);">
            <h4 style="font-weight: 600; margin-bottom: var(--space-3); color: var(--danger);">Common Red Flags</h4>
            <ul style="margin: 0; padding-left: var(--space-4); list-style: none;">
              ${patterns.redFlags.slice(0, 5).map(rf => `
                <li style="margin-bottom: var(--space-2); color: var(--text-secondary); font-size: var(--text-sm);">
                  <strong>${rf.count} mentions:</strong> ${rf.flag.slice(0, 80)}...
                </li>
              `).join('')}
            </ul>
          </div>`;
        }

        // Skills mentioned
        if (patterns.skillsMentioned.length > 0) {
          html += `<div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-4); margin-bottom: var(--space-4);">
            <h4 style="font-weight: 600; margin-bottom: var(--space-3); color: var(--text-primary);">Most Valued Skills</h4>
            <div style="display: flex; flex-wrap: wrap; gap: var(--space-2);">
              ${patterns.skillsMentioned.slice(0, 8).map(s => `
                <div style="background: var(--accent); color: white; padding: var(--space-1) var(--space-2); border-radius: var(--radius-full); font-size: var(--text-xs);">
                  ${s.skill} (${s.count}x)
                </div>
              `).join('')}
            </div>
          </div>`;
        }

        html += '</div>';
        container.innerHTML = html;
      }

      /**
       * Analyze all debriefs to extract patterns
       */
      analyzeDebriefPatterns() {
        const patterns = {
          commonQuestions: [],
          redFlags: [],
          skillsMentioned: []
        };

        // Extract questions
        const questionCounts = {};
        this.state.debriefs.forEach(d => {
          (d.sections.questions || []).forEach(q => {
            questionCounts[q] = (questionCounts[q] || 0) + 1;
          });
        });

        patterns.commonQuestions = Object.entries(questionCounts)
          .filter(([q, count]) => count >= 2)
          .map(([question, count]) => ({ question, count }))
          .sort((a, b) => b.count - a.count);

        // Extract red flags
        const redFlagCounts = {};
        this.state.debriefs.forEach(d => {
          if (d.sections.redFlags) {
            const flags = d.sections.redFlags.split(',').map(f => f.trim()).filter(f => f);
            flags.forEach(flag => {
              redFlagCounts[flag] = (redFlagCounts[flag] || 0) + 1;
            });
          }
        });

        patterns.redFlags = Object.entries(redFlagCounts)
          .filter(([rf, count]) => count >= 2)
          .map(([flag, count]) => ({ flag, count }))
          .sort((a, b) => b.count - a.count);

        // Extract skills mentioned in priorities
        const skillCounts = {};
        const skillKeywords = ['technical', 'leadership', 'strategy', 'execution', 'communication', 'cross-functional', 'analytics', 'design', 'product', 'scale', 'system', 'data'];
        this.state.debriefs.forEach(d => {
          const text = (d.sections.priorities + ' ' + d.sections.overall).toLowerCase();
          skillKeywords.forEach(skill => {
            if (text.includes(skill)) {
              skillCounts[skill] = (skillCounts[skill] || 0) + 1;
            }
          });
        });

        patterns.skillsMentioned = Object.entries(skillCounts)
          .map(([skill, count]) => ({ skill, count }))
          .sort((a, b) => b.count - a.count);

        return patterns;
      }

      /**
       * Export debrief as text file
       */
      exportDebrief(debriefId, format) {
        const debrief = this.state.debriefs.find(d => d.id === debriefId);
        if (!debrief) return;

        let text = `INTERVIEW DEBRIEF\n`;
        text += `${'='.repeat(50)}\n\n`;
        text += `Company: ${debrief.company}\n`;
        text += `Position: ${debrief.title}\n`;
        text += `Date: ${new Date(debrief.date).toLocaleDateString()}\n`;
        text += `Overall Rating: ${'★'.repeat(Math.round(debrief.overallRating))}${'☆'.repeat(5 - Math.round(debrief.overallRating))}\n\n`;

        text += `OVERALL IMPRESSION\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.overall}\n\n`;

        text += `WHAT LANDED\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.landed}\n\n`;

        text += `WHAT DIDN'T LAND\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.didntLand || 'None noted'}\n\n`;

        if (debrief.sections.questions.length > 0) {
          text += `QUESTIONS ASKED\n`;
          text += `${'-'.repeat(50)}\n`;
          debrief.sections.questions.forEach(q => {
            text += `• ${q}\n`;
          });
          text += '\n';
        }

        text += `THEIR PRIORITIES\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.priorities}\n\n`;

        if (debrief.sections.redFlags) {
          text += `RED FLAGS\n`;
          text += `${'-'.repeat(50)}\n${debrief.sections.redFlags}\n\n`;
        }

        text += `FOLLOW-UP ITEMS\n`;
        text += `${'-'.repeat(50)}\n`;
        debrief.sections.followUps.forEach(f => {
          text += `• ${f}\n`;
        });
        text += '\n';

        if (debrief.sections.notes) {
          text += `ADDITIONAL NOTES\n`;
          text += `${'-'.repeat(50)}\n${debrief.sections.notes}\n\n`;
        }

        if (debrief.synthesis) {
          text += `AI SYNTHESIS\n`;
          text += `${'-'.repeat(50)}\n`;
          // Strip HTML tags
          text += debrief.synthesis.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ') + '\n';
        }

        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `debrief-${debrief.company}-${new Date(debrief.date).toLocaleDateString().replace(/\//g, '-')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      /**
       * Copy debrief to clipboard
       */
      copyDebriefToClipboard(debriefId) {
        const debrief = this.state.debriefs.find(d => d.id === debriefId);
        if (!debrief) return;

        let text = `INTERVIEW DEBRIEF\n`;
        text += `${'='.repeat(50)}\n\n`;
        text += `Company: ${debrief.company}\n`;
        text += `Position: ${debrief.title}\n`;
        text += `Date: ${new Date(debrief.date).toLocaleDateString()}\n\n`;

        text += `OVERALL IMPRESSION\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.overall}\n\n`;

        text += `WHAT LANDED\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.landed}\n\n`;

        text += `WHAT DIDN'T LAND\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.didntLand || 'None noted'}\n\n`;

        navigator.clipboard.writeText(text).then(() => {
          alert('Debrief copied to clipboard!');
        });
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', () => DebriefApp.init());
  </script>
</body>
