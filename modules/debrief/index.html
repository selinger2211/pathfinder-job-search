<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Post-Interview Debrief</title>
  <meta name="description" content="Structured interview feedback capture and synthesis with Claude AI">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css?v=3.5.1">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js?v=3.5.1"></script>

  <style>
    /* ================================================================
       DEBRIEF MODULE — LAYOUT & COMPONENTS
       ================================================================ */

    .debrief-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      background: var(--bg-secondary);
      overflow: hidden;
    }

    .debrief-sidebar {
      width: 320px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .debrief-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .debrief-header {
      padding: var(--space-6);
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .debrief-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
    }

    .tab-nav {
      display: flex;
      gap: var(--space-3);
      background: var(--bg-secondary);
      padding: 0 var(--space-6);
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      padding: var(--space-3) var(--space-4);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: var(--text-sm);
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 200ms ease;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    .debrief-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }

    /* SIDEBAR COMPONENTS */
    .sidebar-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .sidebar-label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
      display: block;
    }

    .form-select,
    .form-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      transition: border-color 200ms;
    }

    .form-select:focus,
    .form-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .company-card,
    .role-card {
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      margin-top: var(--space-2);
    }

    .company-header {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .company-logo {
      width: 48px;
      height: 48px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--accent-primary);
    }

    .company-info {
      flex: 1;
    }

    .company-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .company-domain {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .role-title {
      font-weight: 600;
      color: var(--text-primary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-1);
    }

    .role-meta {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    /* FORM STYLES */
    .wizard-progress {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }

    .progress-step {
      flex: 1;
      height: 4px;
      background: var(--bg-secondary);
      border-radius: 2px;
      transition: background 300ms ease;
    }

    .progress-step.active {
      background: var(--accent-primary);
    }

    .progress-step.completed {
      background: var(--success-color);
    }

    .progress-text {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-left: var(--space-2);
      min-width: 50px;
    }

    .wizard-section {
      display: none;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .wizard-section.active {
      display: block;
      opacity: 1;
    }

    .wizard-section-title {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .wizard-section-prompt {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-4);
    }

    /* RADIO BUTTONS */
    .radio-group {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .radio-item input[type="radio"] {
      cursor: pointer;
    }

    .radio-item label {
      cursor: pointer;
      font-size: var(--text-sm);
    }

    /* TEXTAREA */
    .form-textarea {
      width: 100%;
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: var(--text-sm);
      min-height: 120px;
      resize: vertical;
      transition: border-color 200ms;
    }

    .form-textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* TAG INPUT */
    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin: var(--space-3) 0;
      padding: var(--space-2);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      min-height: 40px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      background: var(--accent-primary);
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
    }

    .tag button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0;
      font-size: var(--text-xs);
    }

    .tag-input {
      flex: 1;
      min-width: 100px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .tag-input:focus {
      outline: none;
    }

    /* BUTTONS */
    .btn-primary,
    .btn-secondary {
      padding: var(--space-3) var(--space-4);
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:focus {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      transition: all var(--duration-fast, 200ms) ease;
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-tertiary);
      border-color: var(--accent-primary);
    }

    .btn-secondary:focus {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }

    .wizard-nav {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
      justify-content: space-between;
    }

    /* SYNTHESIS PANEL */
    .synthesis-panel {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-top: var(--space-6);
    }

    .synthesis-panel h3 {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
    }

    .synthesis-content {
      font-size: var(--text-sm);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .synthesis-content h4 {
      font-weight: 600;
      margin-top: var(--space-4);
      margin-bottom: var(--space-2);
    }

    .synthesis-content ul {
      margin-left: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .synthesis-content li {
      margin-bottom: var(--space-2);
    }

    /* HISTORY */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .history-item {
      padding: var(--space-3);
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 200ms;
    }

    .history-item:hover {
      border-color: var(--accent-primary);
      background: var(--bg-secondary);
    }

    .history-company {
      font-weight: 600;
      color: var(--text-primary);
    }

    .history-details {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-1);
    }

    .history-rating {
      font-size: var(--text-lg);
      color: var(--accent-primary);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-6);
      color: var(--text-secondary);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: var(--space-3);
      opacity: 0.5;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    /* ====== FEATURE 19: Next Steps Panel ====== */
    .next-steps-panel {
      margin-top: var(--space-8);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border-color);
    }

    .next-steps-title {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
      font-size: var(--text-lg);
    }

    .next-steps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    .action-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      transition: all var(--duration-fast) ease;
      cursor: pointer;
    }

    .action-card:hover {
      border-color: var(--accent-primary);
      background: var(--bg-tertiary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
    }

    .action-card-icon {
      font-size: var(--text-xl);
      margin-bottom: var(--space-2);
    }

    .action-card-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
      font-size: var(--text-sm);
    }

    .action-card-description {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      .next-steps-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ================================================================
       CALENDAR DEBRIEF INTEGRATION
       ================================================================ */
    .pending-debrief-banner {
      background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
      color: white;
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .pending-debrief-banner .banner-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .pending-debrief-banner .banner-content {
      flex: 1;
    }

    .pending-debrief-banner .banner-title {
      font-weight: 700;
      font-size: var(--text-sm);
      margin-bottom: 4px;
    }

    .pending-debrief-banner .banner-text {
      font-size: var(--text-xs);
      opacity: 0.95;
    }

    .pending-debrief-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      transition: background 200ms;
      flex-shrink: 0;
    }

    .pending-debrief-close:hover {
      background: rgba(255,255,255,0.3);
    }

    .pending-events-section {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .pending-events-title {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      font-size: var(--text-sm);
    }

    .pending-event-item {
      padding: var(--space-3);
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .pending-event-info {
      flex: 1;
    }

    .pending-event-company {
      font-weight: 600;
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .pending-event-details {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .quick-start-btn {
      background: var(--accent-primary);
      color: white;
      border: none;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: var(--text-xs);
      font-weight: 600;
      white-space: nowrap;
      transition: background 200ms;
    }

    .quick-start-btn:hover {
      background: var(--accent-hover, #7c3aed);
    }

    /* ================================================================
       FEATURE 48: PATTERN ANALYSIS & INTELLIGENCE DASHBOARD
       ================================================================ */
    .patterns-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .patterns-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .patterns-progress {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .patterns-progress-bar {
      flex: 1;
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
    }

    .patterns-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), #7c3aed);
      border-radius: 4px;
      transition: width 300ms ease;
    }

    .patterns-progress-text {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      min-width: 100px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-4);
    }

    .stat-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      transition: all 200ms;
    }

    .stat-card:hover {
      border-color: var(--accent-primary);
      background: var(--bg-secondary);
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.1);
    }

    .stat-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: var(--space-2);
    }

    .stat-detail {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      line-height: 1.4;
    }

    .chart-container {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .chart-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
      font-size: var(--text-sm);
    }

    .horizontal-bar-chart {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .chart-bar-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .chart-bar-label {
      min-width: 140px;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      font-weight: 500;
    }

    .chart-bar-track {
      flex: 1;
      height: 24px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .chart-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), #7c3aed);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: var(--space-2);
      color: white;
      font-size: var(--text-xs);
      font-weight: 600;
      transition: all 300ms ease;
    }

    .chart-bar-fill:hover {
      filter: brightness(1.1);
    }

    .trend-line-container {
      display: flex;
      align-items: flex-end;
      gap: var(--space-2);
      height: 150px;
      padding: var(--space-4) 0;
    }

    .trend-point {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-2);
    }

    .trend-bar {
      width: 100%;
      max-width: 40px;
      background: linear-gradient(180deg, var(--accent-primary), var(--accent-primary));
      border-radius: 4px 4px 0 0;
      transition: all 200ms;
      cursor: pointer;
      opacity: 0.8;
    }

    .trend-bar:hover {
      opacity: 1;
      filter: brightness(1.2);
    }

    .trend-date {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      text-align: center;
      white-space: nowrap;
    }

    .insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-4);
    }

    .insight-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      display: flex;
      gap: var(--space-3);
      transition: all 200ms;
    }

    .insight-card:hover {
      border-color: var(--accent-primary);
      background: var(--bg-secondary);
    }

    .insight-card.positive {
      border-left: 4px solid #10b981;
    }

    .insight-card.improvement {
      border-left: 4px solid #f59e0b;
    }

    .insight-icon {
      font-size: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .insight-content {
      flex: 1;
    }

    .insight-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
      font-size: var(--text-sm);
    }

    .insight-text {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .themes-container {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .theme-badge {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-primary);
      transition: all 200ms;
    }

    .theme-badge:hover {
      border-color: var(--accent-primary);
      background: var(--bg-tertiary);
    }

    .theme-count {
      font-weight: 700;
      color: var(--accent-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      background: var(--accent-primary);
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
    }

    .company-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }

    .company-table thead {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .company-table th {
      padding: var(--space-3) var(--space-4);
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .company-table td {
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .company-table tbody tr:hover {
      background: var(--bg-secondary);
    }

    .company-rating {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .company-rating-stars {
      color: var(--accent-primary);
      font-size: var(--text-sm);
    }

    .working-well-section,
    .needs-work-section {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .working-well-section {
      border-left: 4px solid #10b981;
    }

    .needs-work-section {
      border-left: 4px solid #f59e0b;
    }

    .section-title {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      font-size: var(--text-sm);
    }

    .insight-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .insight-list li {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      padding-left: var(--space-3);
      position: relative;
      line-height: 1.5;
    }

    .insight-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent-primary);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .debrief-container {
        flex-direction: column;
      }

      .debrief-sidebar {
        width: 100%;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }

      .stats-row {
        grid-template-columns: 1fr;
      }

      .insights-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <!-- Navigation Bar -->

  <div class="debrief-container" style="margin-top: var(--nav-height);">
    <!-- LEFT SIDEBAR -->
    <div class="debrief-sidebar">
      <div>
        <label for="roleSelect" class="sidebar-label">Select Role</label>
        <select class="form-select" id="roleSelect" aria-label="Choose a role to debrief">
          <option value="">Choose a role...</option>
        </select>
      </div>

      <div id="companyCardContainer"></div>
      <div id="roleCardContainer"></div>
      <div id="previousDebriefsList"></div>
    </div>

    <!-- RIGHT MAIN PANEL -->
    <div class="debrief-main">
      <div class="debrief-header">
        <h1 class="debrief-title">Post-Interview Debrief</h1>
      </div>

      <div class="tab-nav">
        <button class="tab-btn active" data-tab="form" aria-label="Create a new interview debrief">New Debrief</button>
        <button class="tab-btn" data-tab="history" aria-label="View all past debriefs">History</button>
        <button class="tab-btn" data-tab="timeline" aria-label="See your debriefs on a timeline">Timeline</button>
        <button class="tab-btn" data-tab="patterns" aria-label="Analyze patterns across all debriefs">Patterns</button>
      </div>

      <div class="debrief-content">
        <!-- NEW DEBRIEF FORM TAB -->
        <div id="formTab" class="tab-pane active">
          <div id="formContainer"></div>
        </div>

        <!-- HISTORY TAB -->
        <div id="historyTab" class="tab-pane hidden">
          <div id="historyContainer"></div>
        </div>

        <!-- TIMELINE TAB -->
        <div id="timelineTab" class="tab-pane hidden">
          <div id="timelineContainer"></div>
        </div>

        <!-- PATTERNS TAB -->
        <div id="patternsTab" class="tab-pane hidden">
          <div id="patternsContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * PATHFINDER DEBRIEF MODULE
     * Structured interview feedback capture and Claude-powered synthesis
     */

    const DebriefApp = {
      state: {
        currentRoleId: null,
        debriefs: [],
        roles: [],
        companies: [],
        storyBank: [],
        currentTab: 'form',
        formData: {}
      },

      // INITIALIZATION
      init() {
        this.loadData();
        this.renderRoleSelector();
        this.attachTabListeners();

        // Check for pending debrief from Calendar module
        this.checkPendingDebrief();

        this.renderNewDebriefForm();
        this.renderHistoryTab();
      },

      /**
       * Load all app data from localStorage with error handling
       * Gracefully handles corrupted data with fallback to empty arrays
       */
      loadData() {
        try {
          this.state.debriefs = JSON.parse(localStorage.getItem('pf_debriefs')) || [];
        } catch (e) {
          console.warn('Failed to load debriefs. Starting fresh.');
          this.state.debriefs = [];
        }

        try {
          this.state.roles = JSON.parse(localStorage.getItem('pf_roles')) || [];
        } catch (e) {
          console.warn('Failed to load roles. Starting fresh.');
          this.state.roles = [];
        }

        try {
          this.state.companies = JSON.parse(localStorage.getItem('pf_companies')) || [];
        } catch (e) {
          console.warn('Failed to load companies. Starting fresh.');
          this.state.companies = [];
        }

        try {
          this.state.storyBank = JSON.parse(localStorage.getItem('pf_story_bank')) || [];
        } catch (e) {
          console.warn('Failed to load story bank. Starting fresh.');
          this.state.storyBank = [];
        }
      },

      /* ====== CALENDAR INTEGRATION: PENDING DEBRIEF ====== */

      /**
       * Check if there's a pending debrief from Calendar module.
       * INPUT: none (checks localStorage)
       * OUTPUT: auto-populates form if found, clears pending data
       */
      checkPendingDebrief() {
        try {
          const pendingDebrief = JSON.parse(localStorage.getItem('pf_pending_debrief'));
          if (!pendingDebrief) return;
        } catch (e) {
          console.warn('Could not parse pending debrief data');
          return;
        }

        const pendingDebrief = JSON.parse(localStorage.getItem('pf_pending_debrief'));

        // Store for later use when saving
        this.state.pendingDebriefEvent = pendingDebrief;

        // Auto-select the role if available
        if (pendingDebrief.roleId) {
          this.state.currentRoleId = pendingDebrief.roleId;
          document.getElementById('roleSelect').value = pendingDebrief.roleId;
          this.updateSidebar();
        }
      },

      /**
       * Render the pending debrief banner at the top of the form.
       * INPUT: pending debrief event data
       * OUTPUT: renders banner HTML in form container
       */
      renderPendingDebriefBanner() {
        if (!this.state.pendingDebriefEvent) return;

        const evt = this.state.pendingDebriefEvent;
        const eventDate = new Date(evt.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        return `
          <div class="pending-debrief-banner">
            <div class="banner-icon">📋</div>
            <div class="banner-content">
              <div class="banner-title">Debriefing: ${evt.company} ${evt.type.replace(/_/g, ' ')}</div>
              <div class="banner-text">Interview on ${eventDate}</div>
            </div>
            <button class="pending-debrief-close" onclick="DebriefApp.clearPendingDebrief()" title="Dismiss">×</button>
          </div>
        `;
      },

      /**
       * Clear pending debrief from localStorage and state.
       * INPUT: none
       * OUTPUT: clears pf_pending_debrief and re-renders form
       */
      clearPendingDebrief() {
        localStorage.removeItem('pf_pending_debrief');
        this.state.pendingDebriefEvent = null;
        this.renderNewDebriefForm();
      },

      /**
       * Get pending calendar events that need debriefs.
       * INPUT: none (reads from localStorage)
       * OUTPUT: array of past interview events without debriefs
       */
      getPendingCalendarEvents() {
        try {
          const calendarEvents = JSON.parse(localStorage.getItem('pf_calendar_events')) || [];
          const debriefs = this.state.debriefs;
          const now = new Date();

          return calendarEvents.filter(evt => {
            // Must be interview type
            const interviewTypes = ['phone_screen', 'technical', 'behavioral', 'panel', 'hiring_manager'];
            if (!interviewTypes.includes(evt.type)) return false;

            // Must be in the past
            const eventEnd = new Date(evt.date);
            if (evt.duration) {
              eventEnd.setMinutes(eventEnd.getMinutes() + evt.duration);
            } else {
              eventEnd.setHours(eventEnd.getHours() + 1);
            }
            if (eventEnd > now) return false;

            // Must not have a debrief yet
            const hasDebrief = debriefs.some(d => d.eventId === evt.id);
            return !hasDebrief;
          });
        } catch (e) {
          console.warn('Could not fetch pending calendar events');
          return [];
        }
      },

      /**
       * Render "Recent Events Needing Debrief" section above the form.
       * INPUT: none
       * OUTPUT: renders section with quick-start buttons
       */
      renderPendingEventsSection() {
        const pendingEvents = this.getPendingCalendarEvents();
        if (pendingEvents.length === 0) return '';

        let html = '<div class="pending-events-section"><div class="pending-events-title">Recent Events Needing Debrief</div>';

        pendingEvents.slice(0, 3).forEach(evt => {
          const eventDate = new Date(evt.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          const eventTime = new Date(evt.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

          html += `
            <div class="pending-event-item">
              <div class="pending-event-info">
                <div class="pending-event-company">${evt.company}</div>
                <div class="pending-event-details">${evt.type.replace(/_/g, ' ')} • ${eventDate} at ${eventTime}</div>
              </div>
              <button class="quick-start-btn" onclick="DebriefApp.startDebriefForEvent('${evt.id}')">Debrief</button>
            </div>
          `;
        });

        html += '</div>';
        return html;
      },

      /**
       * Start a debrief for a specific calendar event.
       * INPUT: eventId (string)
       * OUTPUT: auto-populates form from event data, handles missing/invalid data gracefully
       */
      startDebriefForEvent(eventId) {
        try {
          const calendarEvents = JSON.parse(localStorage.getItem('pf_calendar_events')) || [];
          const evt = calendarEvents.find(e => e.id === eventId);
          if (!evt) {
            console.warn('Calendar event not found:', eventId);
            return;
          }

          // Set pending debrief and reload (with safe defaults)
          this.state.pendingDebriefEvent = {
            eventId: evt.id,
            company: evt.company || 'Unknown Company',
            title: evt.title || 'Interview',
            type: evt.type || 'phone_screen',
            date: evt.date || new Date().toISOString(),
            interviewers: evt.interviewers || [],
            roleId: evt.roleId || null
          };

          // Auto-select role if available
          if (evt.roleId) {
            this.state.currentRoleId = evt.roleId;
            const roleSelect = document.getElementById('roleSelect');
            if (roleSelect) {
              roleSelect.value = evt.roleId;
              this.updateSidebar();
            }
          }

          this.renderNewDebriefForm();
        } catch (e) {
          console.warn('Error starting debrief for event:', e);
        }
      },

      saveData() {
        localStorage.setItem('pf_debriefs', JSON.stringify(this.state.debriefs));
        localStorage.setItem('pf_story_bank', JSON.stringify(this.state.storyBank));
      },

      // ROLE SELECTOR
      renderRoleSelector() {
        const select = document.getElementById('roleSelect');
        select.innerHTML = '<option value="">Choose a role...</option>';

        // Filter roles by stage: screen, interviewing, offer, or closed
        const validStages = ['screen', 'interviewing', 'offer', 'closed'];
        const roles = this.state.roles.filter(r =>
          validStages.includes(r.stage?.toLowerCase())
        );

        roles.forEach(role => {
          const company = this.getCompanyName(role);
          const option = document.createElement('option');
          option.value = role.id;
          option.textContent = `${company} - ${role.title}`;
          select.appendChild(option);
        });

        select.addEventListener('change', (e) => {
          this.state.currentRoleId = e.target.value;
          this.updateSidebar();
        });
      },

      getCompanyName(role) {
        /* Roles store company name directly as role.company (string) */
        return role.company || 'Unknown';
      },

      updateSidebar() {
        if (!this.state.currentRoleId) {
          document.getElementById('companyCardContainer').innerHTML = '';
          document.getElementById('roleCardContainer').innerHTML = '';
          document.getElementById('previousDebriefsList').innerHTML = '';
          return;
        }

        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        this.renderCompanyCard(role);
        this.renderRoleCard(role);
        this.renderPreviousDebriefs(role);
      },

      renderCompanyCard(role) {
        const container = document.getElementById('companyCardContainer');
        const companyName = this.getCompanyName(role);
        /* pf_companies objects use 'name' not 'id' — match by name */
        const company = this.state.companies.find(c => c.name === companyName);
        const logo = company?.logo || companyName.charAt(0).toUpperCase();

        container.innerHTML = `
          <div class="sidebar-card">
            <label class="sidebar-label">Company</label>
            <div class="company-card">
              <div class="company-header">
                <div class="company-logo">${logo}</div>
                <div class="company-info">
                  <div class="company-name">${companyName}</div>
                  ${company?.domain ? `<div class="company-domain">${company.domain}</div>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      },

      renderRoleCard(role) {
        const container = document.getElementById('roleCardContainer');
        container.innerHTML = `
          <div class="sidebar-card">
            <label class="sidebar-label">Role Details</label>
            <div class="role-card">
              <div class="role-title">${role.title}</div>
              <div class="role-meta">Level: ${role.level || 'N/A'}</div>
              <div class="role-meta">Stage: ${role.stage || 'N/A'}</div>
            </div>
          </div>
        `;
      },

      renderPreviousDebriefs(role) {
        const container = document.getElementById('previousDebriefsList');
        const debriefs = this.state.debriefs.filter(d => d.roleId === role.id);

        if (debriefs.length === 0) {
          container.innerHTML = '';
          return;
        }

        const sorted = debriefs.sort((a, b) => new Date(b.date) - new Date(a.date));
        let html = '<div class="sidebar-card"><label class="sidebar-label">Previous Debriefs</label>';

        sorted.slice(0, 3).forEach(d => {
          const stars = '★'.repeat(Math.round(d.overallRating)) + '☆'.repeat(5 - Math.round(d.overallRating));
          html += `<div style="padding: var(--space-2); font-size: var(--text-xs); border-bottom: 1px solid var(--border-color);">
            <div><strong>${d.company}</strong> ${stars}</div>
            <div style="color: var(--text-secondary);">${new Date(d.date).toLocaleDateString()}</div>
          </div>`;
        });

        html += '</div>';
        container.innerHTML = html;
      },

      // TABS
      /**
       * Attach click and keyboard listeners to tab buttons
       * Supports keyboard navigation with arrow keys
       */
      attachTabListeners() {
        const tabButtons = document.querySelectorAll('.tab-btn');

        tabButtons.forEach((btn, index) => {
          btn.addEventListener('click', (e) => {
            const tab = e.target.dataset.tab;
            this.switchTab(tab);
          });

          // Keyboard navigation: arrow keys to switch tabs
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
              e.preventDefault();
              const nextIndex = e.key === 'ArrowRight'
                ? (index + 1) % tabButtons.length
                : (index - 1 + tabButtons.length) % tabButtons.length;
              tabButtons[nextIndex].click();
              tabButtons[nextIndex].focus();
            }
          });
        });
      },

      /**
       * Switch to a different tab and update UI
       * INPUT: tab name ('form', 'history', 'timeline', 'patterns')
       * OUTPUT: hides other tabs, shows selected tab with animations
       */
      switchTab(tab) {
        this.state.currentTab = tab;

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));

        // Find and activate the button that triggered this tab
        const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
        if (activeBtn) {
          activeBtn.classList.add('active');
          activeBtn.focus();
        }

        const tabPane = document.getElementById(tab + 'Tab');
        if (tabPane) {
          tabPane.classList.remove('hidden');
        }

        if (tab === 'history') {
          this.renderHistoryTab();
        } else if (tab === 'timeline') {
          this.renderTimelineTab();
        } else if (tab === 'patterns') {
          this.renderPatternsTab();
        }
      },

      // NEW DEBRIEF FORM
      renderNewDebriefForm() {
        const container = document.getElementById('formContainer');

        if (!this.state.currentRoleId) {
          // Show pending events section even without role selected
          let html = this.renderPendingEventsSection();

          // Show pending debrief banner if any
          const bannerHtml = this.renderPendingDebriefBanner();
          if (bannerHtml) {
            html = bannerHtml + html;
          }

          if (html) {
            container.innerHTML = html;
          } else {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Select a role to start a debrief</p></div>';
          }
          return;
        }

        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        const company = this.getCompanyName(role);

        // Build the form HTML
        let formHtml = `
          <form id="debriefForm" style="max-width: 800px;">
            <div class="wizard-progress">
              ${Array.from({ length: 8 }, (_, i) => `<div class="progress-step" id="step${i+1}"></div>`).join('')}
              <div class="progress-text" id="progressText">1 / 8</div>
            </div>

            ${this.renderSection(1, 'Overall Impression', 'How do you feel the interview went?', 'impression')}
            ${this.renderSection(2, 'What Landed', 'Which stories or answers resonated?', 'landed')}
            ${this.renderSection(3, 'What Didn\'t Land', 'What moments felt weak?', 'notlanded')}
            ${this.renderSection(4, 'Questions Asked', 'List the key questions you remember', 'questions')}
            ${this.renderSection(5, 'Their Priorities', 'What mattered most to them?', 'priorities')}
            ${this.renderSection(6, 'Red Flags & Concerns', 'Any concerns about the role?', 'redflags')}
            ${this.renderSection(7, 'Follow-up Items', 'Next steps and timeline', 'followup')}
            ${this.renderSection(8, 'Additional Notes', 'Anything else?', 'notes')}

            <div class="wizard-nav">
              <button type="button" class="btn-secondary" id="prevBtn" disabled>← Previous</button>
              <button type="button" class="btn-primary" id="nextBtn">Next →</button>
            </div>
          </form>

          <div id="synthesisContainer"></div>
        `;

        // Add pending debrief banner if any
        const bannerHtml = this.renderPendingDebriefBanner();
        if (bannerHtml) {
          formHtml = bannerHtml + formHtml;
        }

        // Add pending events section
        const pendingHtml = this.renderPendingEventsSection();
        if (pendingHtml) {
          formHtml = pendingHtml + formHtml;
        }

        container.innerHTML = formHtml;

        this.attachFormListeners();
      },

      renderSection(num, title, prompt, fieldId) {
        let fieldHtml = '';

        if (num === 1) {
          fieldHtml = `
            <label class="sidebar-label">Rating</label>
            <div class="radio-group">
              <div class="radio-item"><input type="radio" name="impression" value="1" id="r1"><label for="r1">Rough</label></div>
              <div class="radio-item"><input type="radio" name="impression" value="2" id="r2"><label for="r2">Mixed</label></div>
              <div class="radio-item"><input type="radio" name="impression" value="3" id="r3"><label for="r3">Good</label></div>
              <div class="radio-item"><input type="radio" name="impression" value="4" id="r4"><label for="r4">Great</label></div>
            </div>
            <label class="sidebar-label">Summary</label>
            <textarea class="form-textarea" name="impressionDetails" placeholder="Brief summary..."></textarea>
          `;
        } else if (num === 4) {
          fieldHtml = `
            <label class="sidebar-label">Questions (one per line)</label>
            <textarea class="form-textarea" name="questions" placeholder="Question 1&#10;Question 2&#10;Question 3..." style="min-height: 180px;"></textarea>
          `;
        } else if (num === 7) {
          fieldHtml = `
            <label class="sidebar-label">Follow-up Actions</label>
            <textarea class="form-textarea" name="followup" placeholder="Next steps, timeline..."></textarea>
            <label class="sidebar-label" style="margin-top: var(--space-4);">Expected Next Steps Date</label>
            <input type="date" class="form-input" name="nextStepsDate">
          `;
        } else {
          fieldHtml = `
            <textarea class="form-textarea" name="${fieldId}" placeholder="Your response..."></textarea>
          `;
        }

        return `
          <div class="wizard-section" id="section${num}">
            <h2 class="wizard-section-title">${num}. ${title}</h2>
            <p class="wizard-section-prompt">${prompt}</p>
            ${fieldHtml}
          </div>
        `;
      },

      attachFormListeners() {
        let currentStep = 1;
        const form = document.getElementById('debriefForm');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        const updateUI = () => {
          document.querySelectorAll('.wizard-section').forEach((s, i) => {
            s.classList.toggle('active', i + 1 === currentStep);
          });

          document.querySelectorAll('.progress-step').forEach((s, i) => {
            s.classList.remove('active', 'completed');
            if (i + 1 < currentStep) s.classList.add('completed');
            if (i + 1 === currentStep) s.classList.add('active');
          });

          document.getElementById('progressText').textContent = `${currentStep} / 8`;
          prevBtn.disabled = currentStep === 1;
          nextBtn.textContent = currentStep === 8 ? 'Generate Insights →' : 'Next →';
        };

        prevBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (currentStep > 1) currentStep--;
          updateUI();
        });

        nextBtn.addEventListener('click', async (e) => {
          e.preventDefault();

          if (currentStep < 8) {
            // Validate current step before moving forward
            const currentSection = form.querySelector(`#section${currentStep}`);
            const currentSectionInputs = currentSection.querySelectorAll('textarea, input[type="radio"]:checked');

            // For step 1 (impression), require rating to be selected
            if (currentStep === 1) {
              const ratingSelected = form.querySelector('input[name="impression"]:checked');
              if (!ratingSelected) {
                alert('Please select an overall impression rating before proceeding');
                return;
              }
            }

            currentStep++;
            updateUI();
          } else {
            // Final step: collect data and generate synthesis
            await this.generateSynthesis(form);
          }
        });

        updateUI();
      },

      /**
       * Collect all form data from debrief form with validation
       * INPUT: form element
       * OUTPUT: validated object with all debrief sections
       */
      collectFormData(form) {
        const data = new FormData(form);
        const formObj = {
          overallRating: data.get('impression') ? parseFloat(data.get('impression')) : 0,
          overall: (data.get('impressionDetails') || '').trim(),
          landed: (data.get('landed') || '').trim(),
          didntLand: (data.get('notlanded') || '').trim(),
          questions: (data.get('questions') || '').split('\n').filter(q => q.trim()),
          priorities: (data.get('priorities') || '').trim(),
          redFlags: (data.get('redflags') || '').trim(),
          followUps: (data.get('followup') || '').split('\n').filter(f => f.trim()),
          nextStepsDate: data.get('nextStepsDate') || '',
          notes: (data.get('notes') || '').trim()
        };
        return formObj;
      },

      async generateSynthesis(form) {
        const formData = this.collectFormData(form);
        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        const company = this.getCompanyName(role);

        // Validate required fields
        if (!formData.overall || !formData.landed) {
          alert('Please fill in at least "Overall Impression" and "What Landed" sections');
          return;
        }

        // Validate API key before synthesis
        if (!PF.claude.hasApiKey()) {
          alert('API key required. Please add your Claude API key to generate AI insights.');
          return;
        }

        // Show loading state
        const container = document.getElementById('synthesisContainer');
        container.innerHTML = '<div style="padding: var(--space-6); text-align: center;"><div class="loading-spinner"></div><p role="status" aria-live="polite">Generating insights with Claude AI...</p></div>';

        try {
          const systemPrompt = `You are a career coach helping a senior PM process an interview debrief. Analyze their responses and provide:
1. Key themes across their answers
2. Strength patterns (what they consistently do well)
3. Gap patterns (recurring weaknesses to address)
4. Specific prep recommendations for the next round
5. Whether the role seems like a good fit based on red flags and priorities

Output in clean HTML. Use <h3> for section headings, <p> for paragraphs, <ul>/<li> for lists. Be direct and actionable.`;

          const userPrompt = `
Interview Debrief for ${role.title} at ${company}

Overall Impression: ${formData.overall}

What Landed: ${formData.landed}

What Didn't Land: ${formData.didntLand}

Questions They Asked:
${formData.questions.map(q => `- ${q}`).join('\n')}

Their Priorities: ${formData.priorities}

Red Flags & Concerns: ${formData.redFlags || 'None'}

Follow-up Items: ${formData.followUps.join(', ') || 'None mentioned'}

Additional Notes: ${formData.notes}`;

          const result = await PF.claude.generateHTML(systemPrompt, userPrompt);

          // Display synthesis
          container.innerHTML = `
            <div class="synthesis-panel">
              <h3>Claude AI Synthesis</h3>
              <div class="synthesis-content">${result}</div>
              <div style="display: flex; gap: var(--space-3); margin-top: var(--space-6);">

              <div id="nextStepsPanel" style="display: none;"></div>
            </div>

          document.getElementById('saveDebriefBtn').addEventListener('click', () => {

              const nextStepsPanel = document.getElementById('nextStepsPanel');
              if (nextStepsPanel) {
                nextStepsPanel.innerHTML = this.renderNextStepsPanel(this.state.currentRoleId);
                nextStepsPanel.style.display = 'block';
              }
            }, 500);
          });

          document.getElementById('startNewBtn').addEventListener('click', () => {
            form.reset();
            let step = 1;
            document.querySelectorAll('.wizard-section').forEach((s, i) => {
              s.classList.toggle('active', i === 0);
            });
            container.innerHTML = '';
          });

        } catch (error) {
          let errorMsg = error.message;
          if (!PF.claude.hasApiKey()) {
            errorMsg = 'Claude API key is required. Please add your API key to generate insights.';
          }
          container.innerHTML = `<div class="empty-state"><p style="color: var(--danger);">Error: ${errorMsg}</p></div>`;

      /**
       * Save debrief to localStorage with calendar event linking
       * INPUT: formData (validated), synthesis (HTML string)
       * OUTPUT: persisted debrief, clears pending state
       */
      saveDebrief(formData, synthesis) {
        const role = this.state.roles.find(r => r.id === this.state.currentRoleId);
        const company = this.getCompanyName(role);

        const debrief = {
          id: 'debrief_' + Date.now(),
          roleId: this.state.currentRoleId,
          company,
          title: role.title,
          date: new Date().toISOString().split('T')[0],
          overallRating: formData.overallRating,
          sections: {
            overall: formData.overall,
            landed: formData.landed,
            didntLand: formData.didntLand,
            questions: formData.questions,
            priorities: formData.priorities,
            redFlags: formData.redFlags,
            followUps: formData.followUps,
            notes: formData.notes
          },
          synthesis: synthesis,
          nextStepsDate: formData.nextStepsDate
        };

        /* ====== CALENDAR INTEGRATION: Link debrief to event ====== */
        // If this debrief came from a calendar event, link them together
        if (this.state.pendingDebriefEvent && this.state.pendingDebriefEvent.eventId) {
          debrief.eventId = this.state.pendingDebriefEvent.eventId;

          // Update the calendar event with this debrief ID
          try {
            const calendarEvents = JSON.parse(localStorage.getItem('pf_calendar_events')) || [];
            const eventIndex = calendarEvents.findIndex(e => e.id === this.state.pendingDebriefEvent.eventId);
            if (eventIndex !== -1) {
              calendarEvents[eventIndex].debriefId = debrief.id;
              localStorage.setItem('pf_calendar_events', JSON.stringify(calendarEvents));
            }
          } catch (e) {
            console.warn('Could not link debrief to calendar event');
          }

          // Clear the pending debrief flag
          localStorage.removeItem('pf_pending_debrief');
          this.state.pendingDebriefEvent = null;
        }

        this.state.debriefs.push(debrief);

        /* ====== FEATURE 19: Update Role with lastDebriefAt & Cache Invalidation ====== */
        // Update the role with lastDebriefAt timestamp
        const roleIndex = this.state.roles.findIndex(r => r.id === this.state.currentRoleId);
        if (roleIndex !== -1) {
          this.state.roles[roleIndex].lastDebriefAt = new Date().toISOString();
          localStorage.setItem('pf_roles', JSON.stringify(this.state.roles));
        }

        // Write brief invalidation signal for Research Brief module to pick up
        const briefInvalidation = {
          roleId: this.state.currentRoleId,
          reason: 'debrief_completed',
          timestamp: new Date().toISOString()
        };
        localStorage.setItem('pf_brief_invalidation', JSON.stringify(briefInvalidation));

        this.saveData();

        alert('Debrief saved successfully!');
        this.renderNewDebriefForm();
        this.updateSidebar();
      },

            </div>

            <!-- WORKING WELL / NEEDS WORK SECTIONS -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-4);">
              <div class="working-well-section">
                <div class="section-title">✓ What's Working Well</div>
                <ul class="insight-list">
                  ${patterns.workingWell.map(item => `<li>${item}</li>`).join('')}
                </ul>
              </div>

              <div class="needs-work-section">
                <div class="section-title">⚡ Areas to Improve</div>
                <ul class="insight-list">
                  ${patterns.needsWork.map(item => `<li>${item}</li>`).join('')}
                </ul>
              </div>
            </div>
          </div>
        `;

        container.innerHTML = html;

        // Persist patterns data to localStorage for cross-module access
        this.persistPatternsSummary(patterns, insights);
      },

      /**
       * Analyze all debriefs to extract comprehensive patterns
       * INPUT: none (uses this.state.debriefs)
       * OUTPUT: comprehensive analysis object with 7+ different pattern categories
       */
      analyzeDebriefPatterns() {
        const debriefs = this.state.debriefs || [];
        if (debriefs.length === 0) return {};

        // ===== 1. QUESTION TYPE FREQUENCY =====
        // Categorize questions by type (behavioral, technical, system design, case study, culture fit)
        const questionTypeFreq = {
          'Behavioral': 0,
          'Technical': 0,
          'System Design': 0,
          'Case Study': 0,
          'Culture Fit': 0
        };

        const questionKeywords = {
          'Behavioral': ['tell me about', 'describe a time', 'how did you', 'example of', 'walk me through', 'situation'],
          'Technical': ['implement', 'design', 'code', 'algorithm', 'data structure', 'debug', 'technical', 'coding'],
          'System Design': ['design', 'architecture', 'system', 'scale', 'distributed'],
          'Case Study': ['market', 'growth', 'business', 'metrics', 'case'],
          'Culture Fit': ['culture', 'team', 'conflict', 'values', 'personality']
        };

        debriefs.forEach(d => {
          (d.sections.questions || []).forEach(q => {
            const qLower = q.toLowerCase();
            let categorized = false;
            for (const [type, keywords] of Object.entries(questionKeywords)) {
              if (keywords.some(kw => qLower.includes(kw))) {
                questionTypeFreq[type]++;
                categorized = true;
                break;
              }
            }
            if (!categorized) questionTypeFreq['Behavioral']++;
          });
        });

        const questionTypeDistribution = Object.entries(questionTypeFreq)
          .map(([type, count]) => ({ type, count }))
          .filter(item => item.count > 0)
          .sort((a, b) => b.count - a.count);

        // ===== 2. RECURRING THEMES =====
        // Extract common keywords/phrases from debrief notes using word frequency
        const stopWords = new Set([
          'the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by',
          'from', 'is', 'are', 'was', 'were', 'been', 'be', 'have', 'has', 'had', 'do', 'does',
          'did', 'will', 'would', 'could', 'should', 'may', 'might', 'must', 'can', 'that', 'this',
          'it', 'they', 'them', 'their', 'what', 'which', 'who', 'when', 'where', 'why', 'how',
          'as', 'if', 'not', 'no', 'yes', 'so', 'just', 'only', 'my', 'your', 'our', 'his', 'her'
        ]);

        const wordFreq = {};
        debriefs.forEach(d => {
          const text = (
            (d.sections.overall || '') + ' ' +
            (d.sections.landed || '') + ' ' +
            (d.sections.didntLand || '') + ' ' +
            (d.sections.priorities || '') + ' ' +
            (d.sections.notes || '')
          ).toLowerCase();

          const words = text.match(/\b\w{3,}\b/g) || [];
          words.forEach(word => {
            if (!stopWords.has(word)) {
              wordFreq[word] = (wordFreq[word] || 0) + 1;
            }
          });
        });

        const topThemes = Object.entries(wordFreq)
          .filter(([word, count]) => count >= 2 && word.length > 3)
          .map(([word, count]) => ({ word, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 10);

        // ===== 3. SENTIMENT TRAJECTORY =====
        // Track overall sentiment per debrief over time
        const sorted = [...debriefs].sort((a, b) => new Date(a.date) - new Date(b.date));
        const sentimentTrajectory = sorted.map((d, idx) => {
          const dateObj = new Date(d.date);
          const dateShort = (dateObj.getMonth() + 1) + '/' + dateObj.getDate();
          return {
            date: d.date,
            dateShort,
            avgRating: d.overallRating || 0,
            sentiment: d.overallRating >= 3.5 ? 'positive' : d.overallRating >= 2.5 ? 'neutral' : 'negative'
          };
        });

        // ===== 4. COMPANY PATTERNS =====
        // Group debriefs by company and calculate average ratings
        const companyStats = {};
        debriefs.forEach(d => {
          if (!companyStats[d.company]) {
            companyStats[d.company] = { ratings: [], count: 0 };
          }
          companyStats[d.company].ratings.push(d.overallRating);
          companyStats[d.company].count++;
        });

        const companyPatterns = Object.entries(companyStats)
          .map(([company, stats]) => ({
            company,
            avgRating: stats.ratings.reduce((a, b) => a + b, 0) / stats.count,
            count: stats.count
          }))
          .sort((a, b) => b.avgRating - a.avgRating);

        // ===== 5. STAGE PATTERNS =====
        // Determine interview stage from synthesis or other signals
        // For now, assume all debriefs are interview debriefs and count by outcome
        let strongStages = 0;
        let weakStages = 0;
        sentimentTrajectory.forEach(s => {
          if (s.avgRating >= 3.5) strongStages++;
          else if (s.avgRating < 2.5) weakStages++;
        });

        // ===== 6. AVERAGE RATING & STATS =====
        const ratings = debriefs.map(d => d.overallRating);
        const avgRating = ratings.reduce((a, b) => a + b, 0) / debriefs.length;

        // ===== 7. LONGEST POSITIVE STREAK =====
        let longestPositiveStreak = 0;
        let currentStreak = 0;
        sentimentTrajectory.forEach(item => {
          if (item.avgRating >= 3.5) {
            currentStreak++;
            longestPositiveStreak = Math.max(longestPositiveStreak, currentStreak);
          } else {
            currentStreak = 0;
          }
        });

        // ===== 8. INSIGHTS FOR WORKING WELL / NEEDS WORK =====
        const workingWell = [];
        const needsWork = [];

        if (questionTypeDistribution[0]) {
          const topQuestionType = questionTypeDistribution[0].type;
          const topQuestionPerf = debriefs
            .filter(d => {
              const hasTopType = (d.sections.questions || []).some(q => {
                const qLower = q.toLowerCase();
                const keywords = questionKeywords[topQuestionType] || [];
                return keywords.some(kw => qLower.includes(kw));
              });
              return hasTopType;
            })
            .reduce((sum, d) => sum + (d.overallRating || 0), 0) / Math.max(1, debriefs.filter(d => {
              const hasTopType = (d.sections.questions || []).some(q => {
                const qLower = q.toLowerCase();
                const keywords = questionKeywords[topQuestionType] || [];
                return keywords.some(kw => qLower.includes(kw));
              });
              return hasTopType;
            }).length);

          if (topQuestionPerf >= 3.5) {
            workingWell.push(`Strong performance on ${topQuestionType} questions (avg ${topQuestionPerf.toFixed(1)}/5)`);
          } else {
            needsWork.push(`${topQuestionType} questions need preparation (avg ${topQuestionPerf.toFixed(1)}/5)`);
          }
        }

        const companyBest = companyPatterns[0];
        if (companyBest && companyBest.avgRating >= 4) {
          workingWell.push(`Consistently strong at ${companyBest.company} (${companyBest.avgRating.toFixed(1)}/5)`);
        }

        if (avgRating >= 3.5) {
          workingWell.push(`Overall performance trending positive (avg ${avgRating.toFixed(1)}/5)`);
        } else if (avgRating < 3) {
          needsWork.push(`Overall performance below target (avg ${avgRating.toFixed(1)}/5) - consider mock prep`);
        }

        if (longestPositiveStreak >= 3) {
          workingWell.push(`Demonstrated ${longestPositiveStreak}-interview winning streak`);
        }

        if (topThemes.length > 0) {
          needsWork.push(`Focus preparation on: ${topThemes.slice(0, 3).map(t => t.word).join(', ')}`);
        }

        // Ensure we have content in both sections
        if (workingWell.length === 0) {
          workingWell.push('Continue maintaining current interview preparation routine');
        }
        if (needsWork.length === 0) {
          needsWork.push('Review past debriefs for common patterns to address');
        }

        return {
          questionTypeDistribution,
          topThemes,
          sentimentTrajectory,
          companyPatterns,
          avgRating,
          longestPositiveStreak,
          workingWell,
          needsWork
        };
      },

      /**
       * Generate actionable insights from pattern analysis
       * INPUT: patterns object from analyzeDebriefPatterns()
       * OUTPUT: array of insight objects with title, text, type, icon
       */
      generateDebriefInsights(patterns) {
        const insights = [];
        const avgRating = patterns.avgRating || 0;
        const debriefCount = this.state.debriefs?.length || 0;

        // Insight 1: Overall performance level
        if (avgRating >= 4.2) {
          insights.push({
            type: 'positive',
            icon: '🎯',
            title: 'Exceptional Interview Performance',
            text: `Your technical interviews average ${avgRating.toFixed(1)}/5 — this is your strongest area. Continue this momentum!`
          });
        } else if (avgRating >= 3.5) {
          insights.push({
            type: 'positive',
            icon: '👍',
            title: 'Strong Overall Performance',
            text: `Averaging ${avgRating.toFixed(1)}/5 across ${debriefCount} interviews. Maintain current prep routine.`
          });
        } else {
          insights.push({
            type: 'improvement',
            icon: '📈',
            title: 'Performance Improvement Opportunity',
            text: `Current average: ${avgRating.toFixed(1)}/5. Consider 30-min mock interviews 48 hours before real interviews.`
          });
        }

        // Insight 2: Question type patterns
        if (patterns.questionTypeDistribution && patterns.questionTypeDistribution.length > 0) {
          const topType = patterns.questionTypeDistribution[0];
          const percentage = Math.round((topType.count / debriefCount) * 100);
          if (percentage >= 70) {
            insights.push({
              type: 'positive',
              icon: '🎓',
              title: 'Prepare for Recurring Questions',
              text: `${topType.type} questions appear in ${percentage}% of interviews. Master the STAR format for behavioral, or deepen technical depth.`
            });
          }
        }

        // Insight 3: Company pattern
        if (patterns.companyPatterns && patterns.companyPatterns.length > 0) {
          const topCompany = patterns.companyPatterns[0];
          if (topCompany.avgRating >= 4.3) {
            insights.push({
              type: 'positive',
              icon: '⭐',
              title: 'You Excel at Specific Companies',
              text: `Best performance at ${topCompany.company} (${topCompany.avgRating.toFixed(1)}/5). Identify what's different and apply it elsewhere.`
            });
          }
        }

        // Insight 4: Streak insight
        if (patterns.longestPositiveStreak >= 3) {
          insights.push({
            type: 'positive',
            icon: '🔥',
            title: 'Demonstrated Consistency',
            text: `You achieved a ${patterns.longestPositiveStreak}-interview winning streak. This shows you can perform well under pressure consistently.`
          });
        }

        // Insight 5: Recurring themes
        if (patterns.topThemes && patterns.topThemes.length > 0) {
          const topTheme = patterns.topThemes[0];
          if (topTheme.count >= 4) {
            insights.push({
              type: 'improvement',
              icon: '🎯',
              title: 'Focus Preparation Area',
              text: `The topic "${topTheme.word}" appears in ${topTheme.count} debriefs. Deepen expertise here before next round.`
            });
          }
        }

        // Ensure we have at least 3 insights
        while (insights.length < 3) {
          insights.push({
            type: 'positive',
            icon: '💡',
            title: 'Continue Momentum',
            text: 'Keep conducting debriefs after each interview to track patterns and refine your approach.'
          });
        }

        return insights.slice(0, 5); // Return max 5 insights
      },

      /**
       * Helper: Render star rating display
       * INPUT: rating (1-5)
       * OUTPUT: star string (★★★☆☆)
       */
      renderStars(rating) {
        const rounded = Math.round(rating);
        return '★'.repeat(rounded) + '☆'.repeat(5 - rounded);
      },

      /**
       * Persist patterns summary to localStorage for cross-module access
       * INPUT: patterns, insights objects
       * OUTPUT: writes pf_debrief_patterns to localStorage
       */
      persistPatternsSummary(patterns, insights) {
        const summary = {
          lastUpdated: new Date().toISOString(),
          questionTypeDistribution: patterns.questionTypeDistribution || [],
          topThemes: patterns.topThemes || [],
          avgRating: patterns.avgRating || 0,
          longestPositiveStreak: patterns.longestPositiveStreak || 0,
          insights: insights.map(i => ({
            type: i.type,
            icon: i.icon,
            title: i.title,
            text: i.text
          })),
          companyPatterns: patterns.companyPatterns || [],
          sentimentTrajectory: patterns.sentimentTrajectory || []
        };

        try {
          localStorage.setItem('pf_debrief_patterns', JSON.stringify(summary));
        } catch (e) {
          console.warn('Could not persist patterns summary to localStorage');
        }
      },

      /**
       * Export debrief as text file with proper formatting
       * INPUT: debriefId, format (currently 'text')
       * OUTPUT: triggers download of formatted debrief text
       */
      exportDebrief(debriefId, format) {
        const debrief = this.state.debriefs.find(d => d.id === debriefId);
        if (!debrief) {
          alert('Debrief not found');
          return;
        }

        let text = `INTERVIEW DEBRIEF\n`;
        text += `${'='.repeat(50)}\n\n`;
        text += `Company: ${debrief.company}\n`;
        text += `Position: ${debrief.title}\n`;
        text += `Date: ${new Date(debrief.date).toLocaleDateString()}\n`;
        text += `Overall Rating: ${'★'.repeat(Math.round(debrief.overallRating))}${'☆'.repeat(5 - Math.round(debrief.overallRating))}\n\n`;

        text += `OVERALL IMPRESSION\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.overall}\n\n`;

        text += `WHAT LANDED\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.landed}\n\n`;

        text += `WHAT DIDN'T LAND\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.didntLand || 'None noted'}\n\n`;

        if (debrief.sections.questions.length > 0) {
          text += `QUESTIONS ASKED\n`;
          text += `${'-'.repeat(50)}\n`;
          debrief.sections.questions.forEach(q => {
            text += `• ${q}\n`;
          });
          text += '\n';
        }

        text += `THEIR PRIORITIES\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.priorities}\n\n`;

        if (debrief.sections.redFlags) {
          text += `RED FLAGS\n`;
          text += `${'-'.repeat(50)}\n${debrief.sections.redFlags}\n\n`;
        }

        text += `FOLLOW-UP ITEMS\n`;
        text += `${'-'.repeat(50)}\n`;
        debrief.sections.followUps.forEach(f => {
          text += `• ${f}\n`;
        });
        text += '\n';

        if (debrief.sections.notes) {
          text += `ADDITIONAL NOTES\n`;
          text += `${'-'.repeat(50)}\n${debrief.sections.notes}\n\n`;
        }

        if (debrief.synthesis) {
          text += `AI SYNTHESIS\n`;
          text += `${'-'.repeat(50)}\n`;
          // Strip HTML tags
          text += debrief.synthesis.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ') + '\n';
        }

        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `debrief-${debrief.company}-${new Date(debrief.date).toLocaleDateString().replace(/\//g, '-')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      },

      /**
       * Copy debrief to clipboard for sharing or pasting
       * INPUT: debriefId (string)
       * OUTPUT: copies formatted text to clipboard, shows confirmation
       */
      copyDebriefToClipboard(debriefId) {
        const debrief = this.state.debriefs.find(d => d.id === debriefId);
        if (!debrief) {
          alert('Debrief not found');
          return;
        }

        let text = `INTERVIEW DEBRIEF\n`;
        text += `${'='.repeat(50)}\n\n`;
        text += `Company: ${debrief.company}\n`;
        text += `Position: ${debrief.title}\n`;
        text += `Date: ${new Date(debrief.date).toLocaleDateString()}\n\n`;

        text += `OVERALL IMPRESSION\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.overall}\n\n`;

        text += `WHAT LANDED\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.landed}\n\n`;

        text += `WHAT DIDN'T LAND\n`;
        text += `${'-'.repeat(50)}\n${debrief.sections.didntLand || 'None noted'}\n\n`;

        navigator.clipboard.writeText(text).then(() => {
          alert('Debrief copied to clipboard!');
        });
      }
    };

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', () => DebriefApp.init());
  </script>
