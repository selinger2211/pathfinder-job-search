    /* ================================================================
       CSV EXPORT FUNCTIONS
       ================================================================ */

    /**
     * Exports roles array to CSV file
     */
    function exportRolesToCSV(roles) {
      const headers = ['Company', 'Title', 'Stage', 'Tier', 'Date Added', 'Salary', 'URL'];
      const rows = roles.map(r => [
        r.company,
        r.title,
        r.stage,
        r.tier,
        new Date(r.dateAdded).toLocaleDateString(),
        r.salary || '',
        r.url || ''
      ]);

      const csv = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');

      downloadCSV(csv, 'pipeline-roles.csv');
    }

    /**
     * Exports companies array to CSV file
     */
    function exportCompaniesToCSV() {
      const companies = getCompanies();
      const headers = ['Company', 'Tier', 'Domain', 'Funding', 'Headcount', 'Last Activity'];
      const rows = companies.map(c => [
        c.name,
        c.tier,
        c.domain || '',
        c.funding || '',
        c.headcount || '',
        c.lastActivity ? new Date(c.lastActivity).toLocaleDateString() : ''
      ]);

      const csv = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');

      downloadCSV(csv, 'pipeline-companies.csv');
    }

    /**
     * Helper to trigger CSV file download
     */
    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(`Exported to ${filename}`, 'success');
    }

    /**
     * Opens export menu
     */
    function openExportMenu() {
      const menu = document.createElement('div');
      menu.style.cssText = 'position: fixed; top: 80px; right: 20px; background: var(--bg-elevated); border: 1px solid var(--bg-subtle); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); z-index: 300; min-width: 180px;';
      menu.innerHTML = `
        <button onclick="exportRolesToCSV(getRoles()); this.closest('div').remove();" style="display: block; width: 100%; text-align: left; padding: var(--space-3); background: none; border: none; cursor: pointer; color: var(--text-primary); font-size: var(--text-sm);">Export All Roles</button>
        <button onclick="exportCompaniesToCSV(); this.closest('div').remove();" style="display: block; width: 100%; text-align: left; padding: var(--space-3); background: none; border: none; cursor: pointer; color: var(--text-primary); font-size: var(--text-sm);">Export Companies</button>
        <button onclick="this.closest('div').remove();" style="display: block; width: 100%; text-align: left; padding: var(--space-3); background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: var(--text-sm);">Cancel</button>
      `;
      document.body.appendChild(menu);
      // Close when clicking outside
      const close = () => {
        menu.remove();
        document.removeEventListener('click', handler);
      };
      const handler = (e) => {
        if (!menu.contains(e.target) && e.target.id !== 'export-btn') close();
      };
      setTimeout(() => document.addEventListener('click', handler), 0);
    }

    /* ================================================================
       COMPANIES VIEW
       ================================================================ */

    /**
     * Renders the companies grid view
     */
    function renderCompaniesView() {
      const companies = getCompanies();
      const grid = document.getElementById('companies-grid');
      grid.innerHTML = companies.map(company => {
        const roles = getRoles().filter(r => r.company === company.name);
        const lastActivity = company.lastActivity ? new Date(company.lastActivity).toLocaleDateString() : 'N/A';

        // Check if Clay-sourced enrichment data exists
        const hasClayData = !!(company.funding || company.headcount || company.techStack || company.investors || company.recentNews);

        return `
          <div class="company-card" onclick="openCompanyView('${company.name.replace(/'/g, "\\'")}')">
            <div class="company-card-header">
              ${companyLogoHtml(company.name, 'company-card-logo', company.url)}
            </div>
            <div style="margin-bottom: var(--space-2);">
              <div class="company-card-name">${company.name}</div>
              <span class="company-card-tier ${company.tier}">${company.tier}</span>
              <div class="enrichment-badge ${hasClayData ? 'enriched' : 'pending'}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0;">
                  ${hasClayData ? '<path d="M20 6L9 17l-5-5"></path>' : '<circle cx="12" cy="12" r="10"></circle>'}
                </svg>
                <span>${hasClayData ? 'Enriched' : 'Data pending'}</span>
              </div>
            </div>
            <div class="company-card-info">
              <div class="company-card-info-row">
                <span>Roles:</span>
                <strong>${roles.length}</strong>
              </div>
              <div class="company-card-info-row">
                <span>Last Activity:</span>
                <span>${lastActivity}</span>
              </div>
              ${company.domain ? `<div class="company-card-info-row"><span>Domain:</span> <span>${company.domain}</span></div>` : ''}
              ${company.glassdoorRating ? `<div class="company-card-info-row"><span>Glassdoor:</span> <span>${company.glassdoorRating}/5</span></div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    /**
     * Opens company detail view showing enrichment data and roles
     * INPUT: companyName = name of the company to view
     * OUTPUT: renders a modal with company intelligence and role list
     */
    function openCompanyView(companyName) {
      const roles = getRoles().filter(r => r.company === companyName);
      const companies = getCompanies();
      const company = companies.find(c => c.name === companyName);

      if (!company) {
        showToast('Company not found', 'error');
        return;
      }

      // Check if Clay-sourced enrichment data exists
      const hasClayData = !!(company.funding || company.headcount || company.techStack || company.investors || company.recentNews);

      // Build the intelligence section HTML
      let intelligenceHtml = '';
      if (hasClayData) {
        const clayFields = [];
        if (company.funding) clayFields.push({ label: 'Funding', value: company.funding });
        if (company.headcount) clayFields.push({ label: 'Headcount', value: company.headcount });
        if (company.techStack) clayFields.push({ label: 'Tech Stack', value: company.techStack });
        if (company.investors) clayFields.push({ label: 'Investors', value: company.investors });
        if (company.recentNews) clayFields.push({ label: 'Recent News', value: company.recentNews });

        intelligenceHtml = `
          <div class="company-intelligence">
            <div class="company-intelligence-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
              </svg>
              Company Intelligence
            </div>
            <div class="company-intelligence-grid">
              ${clayFields.map(field => `
                <div class="intelligence-field">
                  <div class="intelligence-label">${field.label}</div>
                  <div class="intelligence-value">${field.value}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } else {
        intelligenceHtml = `
          <div class="company-intelligence">
            <div class="company-intelligence-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              Company Intelligence
            </div>
            <p style="color: var(--text-tertiary); font-size: var(--text-sm); margin-bottom: var(--space-3);">
              No enrichment data available yet. Use Sync Hub to fetch Clay company data.
            </p>
            <a href="../sync-hub/index.html" class="enrich-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              Enrich via Sync Hub
            </a>
          </div>
        `;
      }

      // Create and show modal with company details
      const modalHtml = `
        <div class="modal-overlay open" style="display: flex;" id="company-detail-modal">
          <div class="modal" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
              <h2 class="modal-title">${company.name}</h2>
              <button class="modal-close" onclick="document.getElementById('company-detail-modal').remove();" aria-label="Close dialog">&times;</button>
            </div>
            <div class="modal-body">
              <div style="display: flex; gap: var(--space-4); margin-bottom: var(--space-4);">
                <img src="${company.logoUrl || getCompanyLogoUrl(company.name, company.url)}"
                     alt="${company.name}" style="width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: contain; background: var(--bg-elevated);" onerror="this.style.display='none'">
                <div>
                  <div style="display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-2);">
                    <span class="company-card-tier ${company.tier}">${company.tier}</span>
                    <span style="font-size: var(--text-xs); color: var(--text-tertiary);">${roles.length} role${roles.length !== 1 ? 's' : ''}</span>
                  </div>
                  <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-2);">
                    ${company.domain ? `Domain: <strong>${company.domain}</strong>` : 'Domain: Not available'}
                  </div>
                  <div style="font-size: var(--text-sm); color: var(--text-secondary);">
                    ${company.missionStatement || 'No mission statement available'}
                  </div>
                </div>
              </div>

              ${intelligenceHtml}

              <div style="margin-top: var(--space-4);">
                <h3 style="font-size: var(--text-sm); font-weight: 700; margin-bottom: var(--space-3);">Open Positions</h3>
                ${roles.length > 0 ? `
                  <div style="display: flex; flex-direction: column; gap: var(--space-2);">
                    ${roles.map(role => `
                      <div style="padding: var(--space-3); background: var(--bg-elevated); border-radius: var(--radius-md); border: 1px solid var(--bg-subtle); cursor: pointer;" onclick="openRoleDetail('${role.id}'); document.getElementById('company-detail-modal').remove();">
                        <div style="font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-1);">${role.title}</div>
                        <div style="font-size: var(--text-xs); color: var(--text-tertiary); display: flex; gap: var(--space-2);">
                          <span>Stage: ${role.stage}</span>
                          <span>Tier: ${role.tier}</span>
                        </div>
                      </div>
                    `).join('')}
                  </div>
                ` : `
                  <div style="padding: var(--space-4); background: var(--bg-elevated); border-radius: var(--radius-md); text-align: center; color: var(--text-tertiary); font-size: var(--text-sm);">
                    No open positions yet
                  </div>
                `}
              </div>
            </div>
          </div>
        </div>
      `;

      // Remove any existing company detail modal
      const existing = document.getElementById('company-detail-modal');
      if (existing) existing.remove();

      // Insert and show the modal
      document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    /* ================================================================
       VIEW SWITCHING & KEYBOARD SHORTCUTS
       ================================================================ */

    /**
     * Switches between different views
     */
    function switchView(viewType) {
      const page = document.querySelector('.page');
      currentViewMode = viewType;
      localStorage.setItem('pf_view_mode', viewType);

      page.classList.remove('kanban-view', 'table-view', 'companies-view');
      page.classList.add(`${viewType}-view`);

      // Update button states
      document.getElementById('view-toggle-kanban').classList.toggle('active', viewType === 'kanban');
      document.getElementById('view-toggle-table').classList.toggle('active', viewType === 'table');
      document.getElementById('view-toggle-companies').classList.toggle('active', viewType === 'companies');

      if (viewType === 'table') {
        renderTable();
      } else if (viewType === 'companies') {
        renderCompaniesView();
      } else {
        render();
      }
    }

    /**
     * Handles keyboard shortcuts
     */
    document.addEventListener('keydown', (e) => {
      // Don't trigger if typing in input
      if (document.activeElement.tagName === 'INPUT' ||
          document.activeElement.tagName === 'TEXTAREA') {
        if (e.key === 'Escape') {
          document.activeElement.blur();
        }
        return;
      }

      // n = New role
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        document.getElementById('add-role-btn').click();
      }

      // f or / = Focus search
      if ((e.key === 'f' || e.key === '/') && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }

      // Ctrl/Cmd+K = Command palette
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('cmd-palette').classList.toggle('open');
        if (document.getElementById('cmd-palette').classList.contains('open')) {
          document.getElementById('cmd-input').focus();
        }
      }
    });

    /* ================================================================
       TABLE VIEW ENHANCEMENTS
       ================================================================ */

    /**
     * Renders the table view with sorting support
     */
    function renderTable() {
      const roles = getRoles();
      const tbody = document.getElementById('table-body');

      // Sort roles
      let sorted = [...roles];
      if (sortColumn) {
        sorted.sort((a, b) => {
          let aVal, bVal;
          if (sortColumn === 'company') {
            aVal = a.company.toLowerCase();
            bVal = b.company.toLowerCase();
          } else if (sortColumn === 'title') {
            aVal = a.title.toLowerCase();
            bVal = b.title.toLowerCase();
          } else if (sortColumn === 'positioning') {
            aVal = a.positioning || '';
            bVal = b.positioning || '';
          } else if (sortColumn === 'stage') {
            aVal = STAGES.indexOf(a.stage);
            bVal = STAGES.indexOf(b.stage);
          } else if (sortColumn === 'tier') {
            aVal = TIERS.indexOf(a.tier);
            bVal = TIERS.indexOf(b.tier);
          } else if (sortColumn === 'days') {
            const now = Date.now();
            const lastUpdate = a.lastActivity || a.dateAdded;
            const daysSinceA = Math.floor((now - lastUpdate) / (1000 * 60 * 60 * 24));
            const daysSinceB = Math.floor((now - (b.lastActivity || b.dateAdded)) / (1000 * 60 * 60 * 24));
            aVal = daysSinceA;
            bVal = daysSinceB;
          }

          if (aVal < bVal) return sortAsc ? -1 : 1;
          if (aVal > bVal) return sortAsc ? 1 : -1;
          return 0;
        });
      }

      // Apply search and tier filters (same as kanban view)
      const filtered = filterRoles(sorted);

      // Render rows
      tbody.innerHTML = filtered.map(role => {
        const company = getCompanies().find(c => c.name === role.company);
        const days = Math.floor((Date.now() - (role.lastActivity || role.dateAdded)) / (1000 * 60 * 60 * 24));
        return `
          <tr onclick="openRoleDetail('${role.id}'); closeRoleDetail();">
            <td>
              <div class="table-company">
                ${companyLogoHtml(role.company, 'table-company-logo', role.url)}
                <div class="table-company-info">
                  <div class="table-company-name">${role.company}</div>
                  <div class="table-role-title">${role.title}</div>
                </div>
              </div>
            </td>
            <td>${role.title}</td>
            <td>${role.positioning === 'management' ? '👔 Mgmt' : '💻 IC'}</td>
            <td><span style="text-transform: capitalize;">${role.stage}</span></td>
            <td><span style="text-transform: capitalize; font-weight: 600; color: ${TIER_COLORS[role.tier]};">${role.tier}</span></td>
            <td>${days}d</td>
          </tr>
        `;
      }).join('');
    }

    /**
     * Sets up table column sorting
     */
    document.querySelectorAll('.table th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortColumn === col) {
          sortAsc = !sortAsc;
        } else {
          sortColumn = col;
          sortAsc = true;
        }

        // Update visual indicators
        document.querySelectorAll('.table th').forEach(h => {
          h.classList.remove('sorted-asc', 'sorted-desc');
        });
        if (sortAsc) {
          th.classList.add('sorted-asc');
        } else {
          th.classList.add('sorted-desc');
        }

        // Save preference
        localStorage.setItem('pf_sort_column', sortColumn);
        localStorage.setItem('pf_sort_asc', sortAsc);

        renderTable();
      });
    });

    // Restore sort preference
    const savedSortColumn = localStorage.getItem('pf_sort_column');
    const savedSortAsc = localStorage.getItem('pf_sort_asc') !== 'false';
    if (savedSortColumn) {
      sortColumn = savedSortColumn;
      sortAsc = savedSortAsc;
    }

    /* ================================================================
       APP INITIALIZATION: Start Everything Up
       ================================================================ */

    // Set up view mode class
    const page = document.querySelector('.page');
    page.classList.add(`${currentViewMode}-view`);

    // Wire up view toggle buttons
    document.getElementById('view-toggle-kanban').addEventListener('click', () => switchView('kanban'));
    document.getElementById('view-toggle-table').addEventListener('click', () => switchView('table'));
    document.getElementById('view-toggle-companies').addEventListener('click', () => switchView('companies'));

    // Wire up export button
    document.getElementById('export-btn').addEventListener('click', openExportMenu);

    initializeData();

    /* One-time migration: replace dead Clearbit logo URLs with Google Favicon API.
     * Clearbit was acquired by HubSpot and their free logo API was shut down.
     * This patches any existing company data that still references logo.clearbit.com.
     */
    try {
      const existingCompanies = JSON.parse(localStorage.getItem('pf_companies') || '[]');
      let migrated = false;
      existingCompanies.forEach(c => {
        if (c.logoUrl && c.logoUrl.includes('logo.clearbit.com')) {
          const domain = c.domain || c.logoUrl.replace('https://logo.clearbit.com/', '');
          c.logoUrl = `https://logo.clearbit.com/${domain}`;
          migrated = true;
        }
      });
      if (migrated) {
        localStorage.setItem('pf_companies', JSON.stringify(existingCompanies));
      }
    } catch (e) {
      console.warn('Logo URL migration failed:', e.message);
    }

    /* Initialize the view using switchView() — NOT render() — so that:
     * 1. The correct CSS class is added to .page (controls visibility)
     * 2. Button active states are set correctly
     * 3. The appropriate render function is called (renderTable/renderKanban)
     * Previously, calling render() directly caused selector conflicts because
     * .kanban-view could match .page instead of #kanban. */
    switchView(currentViewMode);

    // Render icons from Lucide icon library
    lucide.createIcons();
  </script>
  <!-- data-switcher removed in v2.6.0 — single-user mode -->
</body>
</html>
