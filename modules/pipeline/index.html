    /* ====== ANALYTICS HELPER ====== */
    /**
     * Calculates conversion rates and average days per stage
     * INPUT: roles = array of role objects
     * OUTPUT: object with conversion data and stage timing info
     */
    function calculatePipelineAnalytics(roles) {
      const analytics = {
        conversions: {},  // stage transitions
        avgDaysPerStage: {},  // average time in each stage
        stageCounts: {}  // how many roles in each stage
      };

      // Count roles per stage
      STAGES.forEach(stage => {
        const stageRoles = roles.filter(r => r.stage === stage);
        analytics.stageCounts[stage] = stageRoles.length;

        // Calculate average days in this stage
        if (stageRoles.length > 0) {
          const totalDays = stageRoles.reduce((sum, role) => {
            return sum + getDaysInStage(role);
          }, 0);
          analytics.avgDaysPerStage[stage] = Math.round(totalDays / stageRoles.length);
        }
      });

      // Calculate conversion rates between adjacent stages
      const transitions = [
        { from: 'discovered', to: 'researching' },
        { from: 'researching', to: 'outreach' },
        { from: 'outreach', to: 'applied' },
        { from: 'applied', to: 'screen' },
        { from: 'screen', to: 'interviewing' },
        { from: 'interviewing', to: 'offer' }
      ];

      transitions.forEach(t => {
        const fromCount = analytics.stageCounts[t.from] || 0;
        const toCount = analytics.stageCounts[t.to] || 0;
        const previousCount = roles.filter(r => {
          const history = r.stageHistory || [];
          return history.some(h => h.stage === t.from);
        }).length;

        // Conversion rate: roles that moved to next stage / roles that were in current stage
        const totalTouchedByStage = (previousCount > 0 ? previousCount : 0) + fromCount;
        const rate = totalTouchedByStage > 0
          ? Math.round((toCount / totalTouchedByStage) * 100)
          : 0;

        analytics.conversions[`${t.from} → ${t.to}`] = {
          rate: rate,
          from: fromCount,
          to: toCount
        };
      });

      return analytics;
    }

    /**
     * Renders the kanban board view with all columns and cards
     * INPUT: none
     * OUTPUT: updates the DOM with kanban HTML and attaches event handlers
     */
    function renderKanban() {
      const kanban = document.getElementById('kanban');
      const roles = getRoles();
      const companies = getCompanies();

      // Apply any active filters (search, tier)
      let filteredRoles = filterRoles(roles);

      let html = '';
      // Create a column for each stage
      STAGES.forEach(stage => {
        const stageRoles = filteredRoles.filter(r => r.stage === stage);
        const stageColor = getColorForStage(stage);
        const isClosedStage = stage === 'closed';

        html += `
          <div class="kanban-column ${isClosedStage ? 'collapsed' : ''}" data-stage="${stage}">
            <div class="kanban-header">
              <div style="width: 3px; height: 20px; border-radius: 2px; background: ${stageColor};"></div>
              <h3>${stage.replace('_', ' ')}</h3>
              <span class="kanban-count">${stageRoles.length}</span>
              ${isClosedStage ? `<button class="kanban-column-toggle" title="Toggle column" aria-label="Expand or collapse the Closed column">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>` : ''}
            </div>
            <div class="kanban-cards" data-stage="${stage}">
              ${stageRoles.length === 0 ? '<div class="empty-column">No roles</div>' : stageRoles.map(renderRoleCard).join('')}
            </div>
          </div>
        `;
      });

      // ====== ADD ANALYTICS SECTION ======
      // Calculate and render analytics data at the bottom
      const analytics = calculatePipelineAnalytics(filteredRoles);

      // Build funnel chart showing conversion between stages
      let funnelHtml = '';
      const funnelStages = ['discovered', 'researching', 'outreach', 'applied', 'screen', 'interviewing', 'offer'];
      const maxCount = Math.max(...funnelStages.map(s => analytics.stageCounts[s] || 0), 1);

      funnelStages.forEach(stage => {
        const count = analytics.stageCounts[stage] || 0;
        const percentage = maxCount > 0 ? (count / maxCount) * 100 : 0;
        funnelHtml += `
          <div class="funnel-item">
            <span class="funnel-label">${stage.charAt(0).toUpperCase() + stage.slice(1)}</span>
            <div class="funnel-bar">
              <div class="funnel-bar-fill" style="width: ${percentage}%;">
                ${count > 0 ? count : ''}
              </div>
            </div>
          </div>
        `;
      });

      // Build conversion rate cards
      let conversionCardsHtml = '';
      Object.entries(analytics.conversions).forEach(([transition, data]) => {
        conversionCardsHtml += `
          <div class="analytics-card">
            <div class="analytics-label">${transition}</div>
            <div class="analytics-value">${data.rate}%</div>
            <div class="analytics-secondary">${data.to} roles advanced</div>
          </div>
        `;
      });

      html += `
        <div class="analytics-section">
          <div class="analytics-title">Pipeline Analytics</div>

          <div class="analytics-grid">
            ${conversionCardsHtml}
          </div>

          <div class="funnel-container">
            <h4 style="font-size: var(--text-xs); font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-3);">Funnel Overview</h4>
            ${funnelHtml}
          </div>
        </div>
      `;

      kanban.innerHTML = html;

      /* Attach event listeners to job cards */
      document.querySelectorAll('.role-card').forEach(card => {
        // Click to open detail panel for this role
        card.addEventListener('click', (e) => {
          openRoleDetail(card.dataset.roleId);
        });

        // Drag start: mark this card as being dragged
        card.addEventListener('dragstart', (e) => {
          draggedCard = card.dataset.roleId;
          card.classList.add('dragging');
        });

        // Drag end: stop dragging
        card.addEventListener('dragend', () => {
          draggedCard = null;
          card.classList.remove('dragging');
        });
      });

      /* Attach drop zone handlers to kanban columns */
      document.querySelectorAll('.kanban-cards').forEach(container => {
        // Drag over: highlight the drop zone
        container.addEventListener('dragover', (e) => {
          e.preventDefault();
          container.style.backgroundColor = 'rgba(99, 102, 241, 0.05)';
        });

        // Drag leave: unhighlight the drop zone
        container.addEventListener('dragleave', () => {
          container.style.backgroundColor = '';
        });

        // Drop: move the card to the new stage
        container.addEventListener('drop', (e) => {
          e.preventDefault();
          container.style.backgroundColor = '';
          if (draggedCard) {
            const newStage = container.dataset.stage;
            updateRole(draggedCard, { stage: newStage });
            showToast(`Moved to ${newStage}`, 'success');
            renderKanban();
          }
        });
      });

      /* Attach toggle listeners to collapse/expand the "Closed" column */
      document.querySelectorAll('.kanban-column-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const column = btn.closest('.kanban-column');
          column.classList.toggle('collapsed');
        });
      });
    }

    /**
     * Renders the table view with sortable columns
     * INPUT: none
     * OUTPUT: updates the DOM with table HTML and attaches sort handlers
     */
    function renderTable() {
      const tbody = document.getElementById('table-body');
      const roles = getRoles();
      const companies = getCompanies();

      let filteredRoles = filterRoles(roles);

      /* Apply sorting if a column is selected */
      if (sortColumn) {
        filteredRoles.sort((a, b) => {
          let aVal = a[sortColumn];
          let bVal = b[sortColumn];

          if (sortColumn === 'company') {
            aVal = a.company;
            bVal = b.company;
          } else if (sortColumn === 'title') {
            aVal = a.title;
            bVal = b.title;
          } else if (sortColumn === 'days') {
            aVal = getDaysInStage(a);
            bVal = getDaysInStage(b);
          }

          // Sort strings alphabetically, numbers numerically
          if (typeof aVal === 'string') {
            aVal = aVal.toLowerCase();
            bVal = bVal.toLowerCase();
            return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
          } else {
            return sortAsc ? aVal - bVal : bVal - aVal;
          }
        });
      }

      // Build table rows from filtered and sorted jobs
      tbody.innerHTML = filteredRoles.map(role => {
        const company = companies.find(c => c.name === role.company);
        return `
          <tr>
            <td>
              <div class="table-company">
                ${companyLogoHtml(role.company, 'table-company-logo', role.url)}
                <div class="table-company-info">
                  <div class="table-company-name">${role.company}</div>

        `;
      }).join('');

      /* Attach click handlers to sortable column headers */
      document.querySelectorAll('.table th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.sort;
          // Toggle sort order if clicking same column, else start new sort
          if (sortColumn === col) {
            sortAsc = !sortAsc;
          } else {
            sortColumn = col;
            sortAsc = true;
          }

          // Update UI to show which column is sorted
          document.querySelectorAll('.table th.sortable').forEach(h => {
            h.classList.remove('sorted-asc', 'sorted-desc');
          });
          if (sortColumn === col) {
            th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
          }

          renderTable();
        });
      });
    }

    /**
     * Filters the job list based on search term and tier filter
     * INPUT: roles = array of all jobs
     * RETURNS: filtered array of jobs matching search and tier criteria
     */
    function filterRoles(roles) {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const tierFilter = document.getElementById('tier-filter').value;

      return roles.filter(role => {
        // Check if job matches search term (searches company name, title, stage, and positioning)
        const matchesSearch = !searchTerm ||
          role.title.toLowerCase().includes(searchTerm) ||
          role.company.toLowerCase().includes(searchTerm) ||
          (role.stage || '').toLowerCase().includes(searchTerm) ||
          (role.positioning || '').toLowerCase().includes(searchTerm);
        // Check if job matches tier filter (if one is selected)
        const matchesTier = !tierFilter || role.tier === tierFilter;
        return matchesSearch && matchesTier;
      });
    }

    /**
     * Parses raw page text from a job posting and extracts structured fields.
     * Uses heuristics to identify title, company, location, salary, and JD body.
     * INPUT: rawText (string from fetched page), pageUrl (for domain hints)
     * RETURNS: { company, title, location, salary, jdText, positioning }
     */
    function parseJobPosting(rawText, pageUrl) {
      const result = {
        company: '',
        title: '',
        location: '',
        salary: '',
        jdText: '',
        positioning: 'ic'
      };

      // --- Company name extraction ---
      // Try to extract from URL domain (e.g., "liveramp.wd5.myworkdayjobs.com" → "LiveRamp")
      try {
        const hostname = new URL(pageUrl).hostname;
        // Workday pattern: {company}.wd{n}.myworkdayjobs.com
        const wdMatch = hostname.match(/^([^.]+)\.wd\d+\.myworkdayjobs\.com/);
        if (wdMatch) {
          result.company = wdMatch[1].charAt(0).toUpperCase() + wdMatch[1].slice(1);
        }
        // Greenhouse pattern: boards.greenhouse.io/{company}
        const ghPath = new URL(pageUrl).pathname;
        if (hostname === 'boards.greenhouse.io') {
          result.company = ghPath.split('/')[1] || '';
        }
        // Lever pattern: jobs.lever.co/{company}
        if (hostname === 'jobs.lever.co') {
          result.company = ghPath.split('/')[1] || '';
        }
        // Ashby pattern: jobs.ashbyhq.com/{company}
        if (hostname === 'jobs.ashbyhq.com') {
          result.company = ghPath.split('/')[1] || '';
        }
      } catch (e) { /* ignore URL parse errors */ }

      // --- Title extraction ---
      // Look for common patterns: title is usually the first prominent heading
      // Workday: "Sr. Director Product Management: Addressability"
      // The title often appears near the top, before "Apply" or location info
      const lines = rawText.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);

      // Strategy: find the first line that looks like a job title
      // (contains PM/Director/Manager/Engineer etc., 3-15 words, near the top)
      const titlePatterns = /\b(product\s*manager|director|vp|vice\s*president|head\s+of|engineer|designer|analyst|scientist|lead|principal|staff|senior|sr\.|manager|coordinator)\b/i;
      for (let i = 0; i < Math.min(lines.length, 30); i++) {
        const line = lines[i];
        if (titlePatterns.test(line) && line.length > 10 && line.length < 120 && !line.includes('cookie') && !line.includes('privacy')) {
          // Skip lines that are clearly navigation or boilerplate
          if (line.includes('Search for Jobs') || line.includes('Sign In') || line.includes('Skip to')) continue;
          result.title = line.replace(/\s*page is loaded\s*/i, '').trim();
          break;
        }
      }

      // --- Location extraction ---
      // Look for common location patterns
      const locationMatch = rawText.match(/(?:location[s]?)\s*[:]*\s*((?:(?:San Francisco|New York|Seattle|Austin|Remote|Los Angeles|Chicago|Boston|Denver|Portland|Miami|Atlanta|Dallas|Washington|London|Toronto|Berlin|Singapore|Hybrid)[,\s]*)+)/i);
      if (locationMatch) {
        result.location = locationMatch[1].trim().replace(/\s+/g, ' ');
      }

      // --- Salary extraction ---
      const salaryMatch = rawText.match(/\$[\d,]+(?:\.\d+)?\s*(?:to|-|–)\s*\$[\d,]+(?:\.\d+)?/);
      if (salaryMatch) {
        result.salary = salaryMatch[0];
      }

      // --- Positioning inference ---
      const titleLower = result.title.toLowerCase();
      if (titleLower.includes('director') || titleLower.includes('vp') || titleLower.includes('head of') || titleLower.includes('vice president')) {
        result.positioning = 'management';
      }

      // --- JD body extraction ---
      // Take everything from the first substantial paragraph to the benefits/legal section
      // Strip out navigation, headers, and footer boilerplate
      const boilerplateEnd = /\b(benefits|equal opportunity|privacy policy|cookie|©|all rights reserved|#LI-|about us|follow us|read more)\b/i;
      const navBoilerplate = /\b(skip to main|sign in|search for jobs|introduce yourself|page is loaded)\b/i;

      let jdLines = [];
      let foundStart = false;

      for (const line of lines) {
        // Skip navigation boilerplate at the top
        if (!foundStart && navBoilerplate.test(line)) continue;
        if (!foundStart && line === result.title) continue;
        if (!foundStart && line === 'Apply') continue;

        // Start capturing when we hit a meaty paragraph (>60 chars)
        if (!foundStart && line.length > 60) {
          foundStart = true;
        }

        if (foundStart) {
          // Stop at benefits/legal/footer
          if (boilerplateEnd.test(line)) break;
          jdLines.push(line);
        }
      }

      result.jdText = jdLines.join('\n\n');

      return result;
    }

    /**
     * Fetches a job posting URL via CORS proxy, parses the content,
     * and auto-fills the form fields.
     * Uses allorigins.win as CORS proxy (works for most job sites).
     * Falls back to corsproxy.io if allorigins fails.
     * INPUT: triggered by clicking Import button
     * OUTPUT: form fields populated with extracted data
     */
    async function importFromUrl() {
      const url = document.getElementById('form-url').value.trim();
      if (!url) {
        showImportStatus('Please paste a job posting URL first', 'error');
        return;
      }

      // Basic URL validation
      try { new URL(url); } catch (e) {
        showImportStatus('That doesn\'t look like a valid URL', 'error');
        return;
      }

      showImportStatus('Fetching job posting...', 'loading');
      importBtn.disabled = true;
      importBtn.textContent = 'Importing...';

      // Try multiple CORS proxies in order
      const proxies = [
        (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
      ];

      let html = null;
      for (const proxyFn of proxies) {
        try {
          const proxyUrl = proxyFn(url);
          const response = await fetch(proxyUrl, {
            signal: AbortSignal.timeout(10000)  // 10s timeout per proxy
          });
          if (response.ok) {
            html = await response.text();
            if (html && html.length > 500) break; // Got real content
          }
        } catch (e) {
          // Try next proxy
          continue;
        }
      }

      importBtn.disabled = false;
      importBtn.textContent = 'Import';

      if (!html || html.length < 500) {
        showImportStatus(
          'Could not fetch the page (CORS blocked). Tip: open the job posting, press Ctrl+A then Ctrl+C, and paste into the Job Description field below.',
          'info'
        );
        return;
      }

      // Convert HTML to plain text
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Remove script, style, and hidden elements
      doc.querySelectorAll('script, style, noscript, [hidden], [aria-hidden="true"]').forEach(el => el.remove());
      const plainText = doc.body.innerText || doc.body.textContent || '';

      if (plainText.length < 100) {
        showImportStatus(
          'Page fetched but couldn\'t extract text. The page may require JavaScript. Try pasting the page text manually below.',
          'info'
        );
        return;
      }

      // Parse the extracted text
      const parsed = parseJobPosting(plainText, url);

      // Auto-fill form fields (only fill if we found a value and field is empty)
      if (parsed.company) {
        const companyField = document.getElementById('form-company');
        if (!companyField.value) companyField.value = parsed.company;
      }
      if (parsed.title) {
        const titleField = document.getElementById('form-title');
        if (!titleField.value) titleField.value = parsed.title;
      }
      if (parsed.positioning) {
        document.getElementById('form-positioning').value = parsed.positioning;
      }
      if (parsed.jdText) {
        document.getElementById('form-jd').value = parsed.jdText;
      }

      // Store the salary in the JD if found (append to top)
      if (parsed.salary) {
        const jdField = document.getElementById('form-jd');
        jdField.value = `Compensation: ${parsed.salary}\n\n${jdField.value}`;
      }

      // Store location in the JD if found (append to top)
      if (parsed.location) {
        const jdField = document.getElementById('form-jd');
        jdField.value = `Location: ${parsed.location}\n${jdField.value}`;
      }

      const filledFields = [
        parsed.company && 'company',
        parsed.title && 'title',
        parsed.location && 'location',
        parsed.salary && 'salary',
        parsed.jdText && 'JD'
      ].filter(Boolean);

      showImportStatus(
        `Extracted ${filledFields.length} fields: ${filledFields.join(', ')}. Review and edit as needed.`,
        'success'
      );
    }

    /**

    document.getElementById('form-url').addEventListener('keydown', (e) => {

    /**

    modalSubmit.addEventListener('click', () => {

      const effectiveStage = (!title && contactName) ? 'outreach' : stage;

      // Build the role object with optional outreach metadata
      const roleData = {

        // Outreach tracking fields (PRD v1.3.8 — opaque recruiter outreach)

      // Reset all form fields for next entry

      document.getElementById('form-stage').value = 'discovered';
      document.getElementById('form-jd').value = '';
      document.getElementById('form-contact-name').value = '';
      document.getElementById('form-contact-title').value = '';
      document.getElementById('form-contact-email').value = '';
      document.getElementById('form-contact-linkedin').value = '';
      document.getElementById('form-contact-source').value = 'linkedin';
      document.getElementById('form-contact-relationship').value = 'new';
      document.getElementById('form-contact-context').value = '';
      importStatus.style.display = 'none';
      // Collapse contact section

      contactFields.style.display = 'none';
      contactArrow.innerHTML = '&#9660;';

      addRoleModal.classList.remove('open');
      const toastLabel = title ? `"${title}" at ${company}` : `Exploratory at ${company}`;
      showToast(`Added ${toastLabel}${contactName ? ` (contact: ${contactName})` : ''}`, 'success');
      render();
    });

    /* ================================================================

    /* View toggle buttons (Kanban/Table/Companies) are handled by

    /* ================================================================

    /* ================================================================
       KEYBOARD SHORTCUTS
       These allow power users to navigate without clicking buttons
       ================================================================ */

    document.addEventListener('keydown', (e) => {
      // Cmd/Ctrl + K: Open command palette (quick search)
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        const cmdPalette = document.getElementById('cmd-palette');
        cmdPalette.classList.toggle('open');
        if (cmdPalette.classList.contains('open')) {
          document.getElementById('cmd-input').focus();
        }
      }

      // N: Open the "Add New Role" dialog
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
        const target = e.target;
        if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA') {
          addRoleBtn.click();
        }
      }

      // Forward slash: Focus the search input
      if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
        const target = e.target;
        if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          searchInput.focus();
        }
      }

      // Number keys 1-8: Jump to corresponding stage column
      const stageNum = parseInt(e.key);
      if (stageNum >= 1 && stageNum <= 8) {
        const stage = STAGES[stageNum - 1];
        const column = document.querySelector(`[data-stage="${stage}"]`);
        if (column) {
          column.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }
    });

    /* ================================================================
       COMMAND PALETTE: Quick Search with Keyboard (Cmd/Ctrl+K)
       ================================================================ */

    const cmdPalette = document.getElementById('cmd-palette');
    const cmdInput = document.getElementById('cmd-input');
    const cmdResults = document.getElementById('cmd-results');
    let cmdSelectedIndex = 0;

    /**
     * Updates search results as user types in command palette
     */
    cmdInput.addEventListener('input', () => {
      const query = cmdInput.value.toLowerCase();
      const roles = getRoles();
      const companies = getCompanies();

      let results = [];
      if (query) {
        // Search for matching jobs
        results = roles.filter(r =>
          r.title.toLowerCase().includes(query) || r.company.toLowerCase().includes(query)
        ).map(r => ({
          type: 'role',
          title: r.title,
          subtitle: r.company,
          id: r.id
        }));

        // Always include matching companies in results
        const companyResults = companies.filter(c =>
          c.name.toLowerCase().includes(query)
        ).map(c => ({
          type: 'company',
          title: c.name,
          subtitle: c.missionStatement || c.domain || '',
          name: c.name
        }));
        results = [...results, ...companyResults].slice(0, 10);
      }

      // Display results with first item selected by default
      cmdResults.innerHTML = results.map((r, idx) => `
        <div class="cmd-palette-item ${idx === 0 ? 'selected' : ''}" data-index="${idx}">
          <div>
            <div>${r.title}</div>
            <div style="font-size: var(--text-xs); color: var(--text-tertiary);">${r.subtitle}</div>
          </div>
          <span class="cmd-palette-item-type">${r.type}</span>
        </div>
      `).join('');

      cmdSelectedIndex = 0;
      updateCmdSelection();
    });

    /**
     * Updates which result is highlighted in the command palette
     */
    function updateCmdSelection() {
      document.querySelectorAll('.cmd-palette-item').forEach((item, idx) => {
        item.classList.toggle('selected', idx === cmdSelectedIndex);
      });
    }

    /**
     * Handles keyboard navigation in command palette (up/down arrows, enter, escape)
     */
    cmdInput.addEventListener('keydown', (e) => {
      const items = document.querySelectorAll('.cmd-palette-item');
      if (e.key === 'ArrowDown') {
        // Move selection down
        e.preventDefault();
        cmdSelectedIndex = (cmdSelectedIndex + 1) % items.length;
        updateCmdSelection();
      } else if (e.key === 'ArrowUp') {
        // Move selection up
        e.preventDefault();
        cmdSelectedIndex = (cmdSelectedIndex - 1 + items.length) % items.length;
        updateCmdSelection();
      } else if (e.key === 'Enter') {
        // Select the highlighted result
        e.preventDefault();
        const selected = items[cmdSelectedIndex];
        if (selected) {
          cmdPalette.classList.remove('open');
          cmdInput.value = '';
        }
      } else if (e.key === 'Escape') {
        // Close command palette
        e.preventDefault();
        cmdPalette.classList.remove('open');
      }
    });

    /**
     * Shows a temporary notification message in the bottom right corner
     * INPUT: message = text to display, type = 'info' | 'success' | 'error'
     * SIDE EFFECTS: creates and displays a toast, auto-removes after 4 seconds
     */
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <div>${message}</div>
        <button style="background: none; border: none; color: inherit; cursor: pointer; padding: 0;" aria-label="Close notification">×</button>
      `;

      container.appendChild(toast);

      // Allow manual dismissal by clicking the X
      const closeBtn = toast.querySelector('button');
      closeBtn.addEventListener('click', () => {
        toast.remove();
      });

      // Auto-remove after 4 seconds
      setTimeout(() => {
        if (toast.parentElement) {
          toast.remove();
        }
      }, 4000);
    }

                  Show ${remaining} more connections
                </button>
              ` : ''}
            </div>
          </div>`;
        })()}

        <!-- Other roles at the same company — helps you see sibling roles without leaving the detail panel -->
        ${(() => {
          const siblingRoles = getRoles().filter(r => r.company === role.company && r.id !== role.id);
          if (siblingRoles.length === 0) return '';
          return `
          <div class="detail-section">
            <div class="detail-section-title">Other Roles at ${escapeHtml(role.company)} (${siblingRoles.length})</div>
            <div style="display: flex; flex-direction: column; gap: var(--space-2);">
              ${siblingRoles.map(sr => `
                <div class="sibling-role-card" onclick="openRoleDetail('${sr.id}')" title="Click to view this role">

                  </div>
                  <div style="font-size: var(--text-xs); color: var(--text-tertiary); margin-top: var(--space-1); display: flex; gap: var(--space-3);">
                    <span>Tier: ${sr.tier || '—'}</span>
                    <span>Level: ${escapeHtml(sr.targetLevel || '—')}</span>
                    ${sr.lastActivity ? `<span>Last: ${new Date(sr.lastActivity).toLocaleDateString()}</span>` : ''}
                  </div>

        })()}

        <!-- Outreach context section (visible when knownContext exists or role is exploratory) -->
        ${(role.knownContext && role.knownContext.length > 0) || role.recruiterSource || role.title === 'Exploratory' ? `
        <div class="detail-section">
          <div class="detail-section-title">Outreach Context ${role.recruiterSource ? `<span style="font-size: var(--text-xs); color: var(--text-tertiary); font-weight: 400; margin-left: var(--space-2);">via ${role.recruiterSource}</span>` : ''}</div>
          ${role.knownContext && role.knownContext.length > 0 ? role.knownContext.map(ctx => `
            <div style="background: var(--bg-elevated); border-radius: var(--radius-sm); padding: var(--space-3); margin-bottom: var(--space-2); font-size: var(--text-sm); line-height: 1.5;">
              <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-1);">
                <span style="font-weight: 600; color: var(--text-secondary);">${escapeHtml(ctx.addedBy || 'Unknown')}</span>

            </div>
          `).join('') : '<div style="color: var(--text-tertiary); font-size: var(--text-sm);">No outreach context logged yet.</div>'}
          <textarea class="detail-jd-textarea" id="detail-ed-context" placeholder="Add new context, notes from calls, follow-up details..." style="min-height: 60px; margin-top: var(--space-2);"></textarea>
          <button class="btn btn-ghost" onclick="addContextToRole('${role.id}')" style="font-size: var(--text-xs); margin-top: var(--space-1);">+ Log Context</button>
        </div>
        ` : ''}

        <!-- Role Artifacts section — resumes, research briefs, and other associated files -->
        <div class="detail-section">
          <div class="detail-section-title">Artifacts (${getRoleArtifactCount(role)})</div>
          <div id="detail-artifacts-list">
            ${buildArtifactsList(role)}
          </div>
          <!-- Generate Research Brief button — opens Research Brief module with this role pre-selected -->
          <button class="btn btn-ghost" onclick="openResearchBrief('${role.id}')"
                  style="width: 100%; display: flex; align-items: center; justify-content: center; gap: var(--space-2); font-size: var(--text-sm); padding: var(--space-2) var(--space-3); margin-bottom: var(--space-2); border: 1px dashed var(--accent); color: var(--accent);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Generate Research Brief
          </button>
          <!-- Resume upload drop zone (always available) -->
          <div class="resume-upload-zone" id="resume-upload-zone"
               ondragover="event.preventDefault(); this.classList.add('dragover');"
               ondragleave="this.classList.remove('dragover');"
               ondrop="event.preventDefault(); this.classList.remove('dragover'); handleResumeDrop(event, '${role.id}');">

            <div class="resume-upload-zone-text">

              <div style="font-size: var(--text-xs); margin-top: var(--space-1);">PDF or DOCX — resumes, cover letters, or other role documents</div>
            </div>

          <div id="resume-notes-form" style="display: none; margin-top: var(--space-2);">

        <div class="detail-section">
          <div class="detail-section-title collapsible collapsed" onclick="toggleCollapsible(this)">
            <span>
              Comms Log (${(role.commsLog || []).length})
              ${(() => {
                const entries = role.commsLog || [];
                if (entries.length === 0) return '';
                const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
                const latest = new Date(sorted[0].date).toLocaleDateString();
                return `<span class="collapsed-summary">latest: ${latest}</span>`;
              })()}
            </span>
            <svg class="collapse-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
          </div>
          <div class="collapsible-content collapsed" id="detail-comms-log-wrapper">
            <div id="detail-comms-log" style="margin-top: var(--space-2);">
              ${buildCommsLog(role)}
            </div>
          </div>
          <!-- Add new entry form — always visible so you can log without expanding -->
          <div style="margin-top: var(--space-2);">
            <div style="display: flex; gap: var(--space-2); margin-bottom: var(--space-1);">
              <select class="form-select" id="comms-connection-select" style="font-size: var(--text-xs); flex: 1;">
                <option value="">General (no contact)</option>
                ${getConnectionsForCompany(role.company).map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('')}
              </select>
              <select class="form-select" id="comms-channel-select" style="font-size: var(--text-xs); width: 120px;">

              <button class="btn btn-primary" onclick="addCommsEntry('${role.id}')" style="font-size: var(--text-xs); padding: var(--space-1) var(--space-3); white-space: nowrap;">+ Log</button>

        <!-- Fit & Notes section -->
        <div class="detail-section">

          ${role.fitAssessment ? `

              <div style="font-weight: 600; font-size: var(--text-sm); margin-bottom: var(--space-2);">Fit Assessment</div>
              <div style="display: flex; flex-wrap: wrap; gap: var(--space-2); font-size: var(--text-xs);">
                ${role.fitAssessment.strong ? '<span style="background: #d1fae5; color: #047857; padding: 2px 8px; border-radius: var(--radius-pill);">✓ Strong Fit</span>' : ''}
                ${role.fitAssessment.borderline ? '<span style="background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: var(--radius-pill);">~ Borderline Fit</span>' : ''}
                ${role.fitAssessment.gaps ? '<span style="background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: var(--radius-pill);">⚠ Resume Gaps</span>' : ''}
              </div>
              ${role.fitAssessment.notes ? `<div style="margin-top: var(--space-2); padding-top: var(--space-2); border-top: 1px solid var(--bg-subtle); font-size: var(--text-xs); line-height: 1.5; color: var(--text-secondary);">${escapeHtml(role.fitAssessment.notes)}</div>` : ''}
            </div>
          ` : ''}

          <div class="form-group" style="margin-bottom: var(--space-3);">
            <label class="form-label">Personal Notes</label>
            <textarea class="form-textarea" id="detail-ed-notes" placeholder="Your thoughts on this role..." style="min-height: 80px;">${escapeHtml(role.personalNotes || '')}</textarea>
          </div>

          ${role.stage === 'closed' ? `
            <div class="form-group">
              <label class="form-label">Close Reason</label>
              <select class="detail-select" id="detail-ed-close-reason">
                <option value="">Select a reason...</option>
                <option value="accepted" ${role.closeReason === 'accepted' ? 'selected' : ''}>Accepted</option>
                <option value="declined" ${role.closeReason === 'declined' ? 'selected' : ''}>Declined</option>
                <option value="rejected" ${role.closeReason === 'rejected' ? 'selected' : ''}>Rejected</option>
                <option value="ghosted" ${role.closeReason === 'ghosted' ? 'selected' : ''}>Ghosted</option>
                <option value="on_hold" ${role.closeReason === 'on_hold' ? 'selected' : ''}>On Hold</option>
                <option value="role_frozen" ${role.closeReason === 'role_frozen' ? 'selected' : ''}>Role Frozen</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Closure Notes</label>
              <textarea class="form-textarea" id="detail-ed-closure-notes" placeholder="Why closed? Rejection feedback? Counter offer details?..." style="min-height: 60px;">${escapeHtml(role.closureNotes || '')}</textarea>
            </div>
          ` : ''}
        </div>

        <!-- Job description section -->
        <div class="detail-section">
          <div class="detail-section-title">Job Description</div>
          <textarea class="detail-jd-textarea" id="detail-ed-jd" placeholder="Paste or edit job description...">${escapeHtml(role.jdText || '')}</textarea>
        </div>

        <!-- Metadata -->
        <div class="detail-meta">
          ID: ${role.id}
        </div>
      `;

      // Wire up stage buttons
      document.querySelectorAll('#detail-stage-buttons .stage-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          // Update visual state
          document.querySelectorAll('#detail-stage-buttons .stage-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      // Wire up stage history date edits
      document.querySelectorAll('.stage-history-date').forEach(input => {
        input.addEventListener('change', (e) => {
          const idx = parseInt(e.target.dataset.historyIndex);
          const roles = getRoles();
          const r = roles.find(r => r.id === activeDetailRoleId);
          if (r && r.stageHistory && r.stageHistory[idx]) {
            r.stageHistory[idx].date = new Date(e.target.value).getTime();
            saveRoles(roles);
            showToast('Date updated', 'success');
          }
        });
      });

      // Open the panel
      detailOverlay.classList.add('open');
      detailPanel.classList.add('open');
    }

    /**
     * Builds the stage history timeline HTML
     * INPUT: role object with stageHistory array
     * RETURNS: HTML string for the timeline
     */
    function buildStageTimeline(role) {
      const history = role.stageHistory || [];
      if (history.length === 0 && role.stage) {
        // No history recorded yet — show at least the current stage with dateAdded
        return `
          <div class="stage-timeline-item current">
            <span class="stage-timeline-stage">${role.stage}</span>
            <span class="stage-timeline-date">
              <input type="date" class="stage-history-date" data-history-index="-1"
                     value="${role.dateAdded ? new Date(role.dateAdded).toISOString().split('T')[0] : ''}"
                     title="Date entered this stage">
              (current)
            </span>
          </div>
        `;
      }

      let html = '';

      // Show each historical stage with editable date
      history.forEach((entry, idx) => {
        const date = entry.date ? new Date(entry.date).toISOString().split('T')[0] : '';
        html += `
          <div class="stage-timeline-item">
            <span class="stage-timeline-stage">${entry.stage}</span>
            <span class="stage-timeline-date">
              <input type="date" class="stage-history-date" data-history-index="${idx}"
                     value="${date}" title="Edit date for this stage">
            </span>
          </div>
        `;
      });

      // Current stage at the bottom
      const currentDate = role.lastActivity ? new Date(role.lastActivity).toISOString().split('T')[0] : '';
      html += `
        <div class="stage-timeline-item current">
          <span class="stage-timeline-stage">${role.stage}</span>
          <span class="stage-timeline-date">
            <input type="date" class="stage-history-date" data-history-index="-1"
                   value="${currentDate}" title="Date entered current stage">
            (current)
          </span>
        </div>
      `;

      return html;
    }

    /**
     * Builds the connections list HTML for a company in the detail panel.
     * Reads from pf_connections in localStorage and filters by company name.
     * Each connection shows name (linked to LinkedIn if available), title,
     * relationship badge, and LinkedIn link.
     * INPUT: companyName = string
     * RETURNS: HTML string
     */
    function buildConnectionsList(companyName) {
      const connections = getConnectionsForCompany(companyName);
      if (connections.length === 0) {
        return '<div style="color: var(--text-tertiary); font-size: var(--text-xs); padding: var(--space-2) 0;">No connections at this company yet.</div>';
      }

      return connections.map((conn, idx) => {
        const initials = (conn.name || '??').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        const relLabels = {
          'former_colleague': 'Former Colleague',
          'linkedin_1st': '1st-degree',
          'linkedin_2nd': '2nd-degree',
          'cold_outreach': 'Cold Outreach',
          'recruiter': 'Recruiter',
          'hiring_manager': 'Hiring Manager'
        };
        const relLabel = relLabels[conn.relationship] || conn.relationship || '';
        const linkedinUrl = conn.linkedinUrl || '';
        const nameHtml = linkedinUrl
          ? `<a href="${escapeHtml(linkedinUrl)}" target="_blank" title="View on LinkedIn">${escapeHtml(conn.name)}</a>`
          : escapeHtml(conn.name);

        return `
          <div class="connection-card">
            <div class="connection-avatar">${initials}</div>
            <div class="connection-info">
              <div class="connection-name">${nameHtml}</div>
              <div class="connection-title">${escapeHtml(conn.title || '')}</div>
            </div>
            ${relLabel ? `<span class="connection-relationship">${relLabel}</span>` : ''}
            ${linkedinUrl ? `
              <a href="${escapeHtml(linkedinUrl)}" target="_blank" class="connection-linkedin" title="LinkedIn Profile">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
              </a>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    /**
     * Adds a new connection from the detail panel form.
     * Creates a connection record in pf_connections and refreshes the UI.
     * INPUT: companyName = string (the company to associate with)
     */
    function addConnectionFromDetail(companyName) {
      const name = document.getElementById('conn-name').value.trim();
      const title = document.getElementById('conn-title').value.trim();
      const linkedinUrl = document.getElementById('conn-linkedin').value.trim();
      const relationship = document.getElementById('conn-relationship').value;
      const notes = document.getElementById('conn-notes').value.trim();

      if (!name) {
        showToast('Connection name is required', 'error');
        return;
      }

      const connections = getConnections();
      const newConn = {
        id: `conn-${Date.now()}`,
        name: name,
        company: companyName,
        title: title,
        linkedinUrl: linkedinUrl,
        relationship: relationship,
        notes: notes,
        linkedRoles: [],
        outreachLog: [],
        referralStatus: 'none',
        source: 'manual',
        dateAdded: Date.now()
      };

      connections.push(newConn);
      saveConnections(connections);

      // Refresh the connections list in the detail panel
      const listEl = document.getElementById('detail-connections-list');
      if (listEl) listEl.innerHTML = buildConnectionsList(companyName);

      // Hide the form and show the add button again
      document.getElementById('detail-add-connection-form').style.display = 'none';
      const addBtn = document.querySelector('.add-connection-btn');
      if (addBtn) addBtn.style.display = '';

      // Update the section title with new count
      const connCount = getConnectionsForCompany(companyName).length;
      const sectionTitle = listEl?.closest('.detail-section')?.querySelector('.detail-section-title');
      if (sectionTitle) sectionTitle.textContent = `Connections (${connCount})`;

      // Re-render kanban to update card connection counts
      renderKanban();

      showToast(`Added ${name} as connection at ${companyName}`, 'success');
    }

    /**
     * Appends new context to a role's knownContext array.
     * Used in the detail panel to log follow-up notes, call summaries, etc.
     * INPUT: roleId (string) — the role to update
     * SIDE EFFECTS: saves to localStorage, refreshes detail panel
     */
    function addContextToRole(roleId) {
      const textarea = document.getElementById('detail-ed-context');
      if (!textarea || !textarea.value.trim()) {
        showToast('Please enter some context first', 'error');
        return;
      }

      const roles = getRoles();
      const role = roles.find(r => r.id === roleId);
      if (!role) return;

      if (!role.knownContext) role.knownContext = [];
      role.knownContext.push({
        date: new Date().toISOString(),
        source: 'manual',
        content: textarea.value.trim(),
        addedBy: 'manual'
      });
      role.lastActivity = Date.now();
      saveRoles(roles);

      // Refresh the detail panel to show the new context
      openRoleDetail(roleId);
      showToast('Context logged', 'success');
    }

    // ================================================================
    // RESUME UPLOAD: Attach externally-created resumes to roles
    // ================================================================

    // Temporary storage for file pending confirmation
    let pendingResumeFile = null;
    let pendingResumeRoleId = null;

    /**
     * Builds the HTML list of attached resumes for a role.
     * Each resume shows file icon, name, date, notes, and action buttons.
     * INPUT: role object
     * RETURNS: HTML string
     */
    /**
     * Gets the total count of all artifacts for a role.
     * Combines legacy resumesSent + new artifacts array.
     * INPUT: role object
     * RETURNS: number — total artifact count
     */
    function getRoleArtifactCount(role) {
      const legacyResumes = (role.resumesSent || []).length;
      const newArtifacts = (role.artifacts || []).length;
      return legacyResumes + newArtifacts;
    }

    /**
     * Builds the unified artifacts list HTML — renders resumes (legacy + new)
     * and any other artifacts (research briefs, documents) in one section.
     * INPUT: role object
     * RETURNS: HTML string showing all artifacts with type badges
     */
    function buildArtifactsList(role) {
      // Merge legacy resumesSent and new artifacts array into one display list
      const allArtifacts = [];

      // Legacy resumes from resumesSent (backwards compatibility)
      (role.resumesSent || []).forEach((r, idx) => {
        allArtifacts.push({
          type: 'resume',
          filename: r.filename || 'Unknown file',
          size: r.size,
          date: r.date,
          notes: r.notes,
          indexedDbKey: r.indexedDbKey || `resume-${role.id}-${idx}`,
          legacyIndex: idx, // Used for remove operations on legacy array
          isLegacy: true
        });
      });

      // New artifacts array (research briefs, documents, etc.)
      (role.artifacts || []).forEach((a, idx) => {
        allArtifacts.push({
          type: a.type || 'document',
          filename: a.filename || 'Unknown file',
          size: a.size,
          date: a.date,
          notes: a.notes,
          url: a.url, // For MCP-stored artifacts (e.g., research brief path)
          indexedDbKey: a.indexedDbKey,
          artifactIndex: idx,
          isLegacy: false
        });
      });

      if (allArtifacts.length === 0) {
        return '<div style="color: var(--text-tertiary); font-size: var(--text-sm);">No artifacts yet. Upload a resume or generate a research brief.</div>';
      }

      // Sort by date, newest first
      allArtifacts.sort((a, b) => (b.date || 0) - (a.date || 0));

      return allArtifacts.map(a => {
        const ext = (a.filename || '').split('.').pop().toLowerCase();
        const typeIcons = { resume: '📄', research_brief: '🔬', document: '📎' };
        const icon = typeIcons[a.type] || '📎';
        const typeBadge = a.type === 'resume' ? 'resume' : a.type === 'research_brief' ? 'research' : 'document';
        const typeLabel = a.type === 'resume' ? 'Resume' : a.type === 'research_brief' ? 'Research' : 'Doc';
        const sizeStr = a.size ? (a.size < 1024 * 1024 ? Math.round(a.size / 1024) + ' KB' : (a.size / (1024 * 1024)).toFixed(1) + ' MB') : '';
        const dateStr = a.date ? new Date(a.date).toLocaleDateString() : '';

        // Build action buttons based on artifact type
        let actions = '';
        if (a.indexedDbKey) {
          // IndexedDB-stored file (resume, etc.) — can preview + download
          actions = `
            <button onclick="previewResume('${a.indexedDbKey}')" title="Preview">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button onclick="downloadResume('${a.indexedDbKey}')" title="Download">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>`;
        } else if (a.url) {
          // URL-based artifact (MCP-stored research brief, etc.)
          actions = `
            <button onclick="window.open('${escapeHtml(a.url)}', '_blank')" title="Open">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </button>`;
        }

        // Remove button — different handler for legacy vs new artifacts
        const removeHandler = a.isLegacy
          ? `removeResume('${role.id}', ${a.legacyIndex}, '${a.indexedDbKey}')`
          : `removeArtifact('${role.id}', ${a.artifactIndex})`;

        return `
          <div class="resume-card">
            <div class="resume-card-icon ${ext === 'pdf' ? 'pdf' : (ext === 'docx' || ext === 'doc') ? 'docx' : 'other'}">${icon}</div>
            <div class="resume-card-info">
              <div style="display: flex; align-items: center; gap: var(--space-2);">
                <span class="artifact-type-badge ${typeBadge}">${typeLabel}</span>
                <span class="resume-card-name">${escapeHtml(a.filename)}</span>
              </div>
              <div class="resume-card-meta">${dateStr}${sizeStr ? ' · ' + sizeStr : ''}</div>
              ${a.notes ? `<div class="resume-card-notes">${escapeHtml(a.notes)}</div>` : ''}
            </div>
            <div class="resume-card-actions">
              ${actions}
              <button onclick="${removeHandler}" title="Remove">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    /**
     * Legacy wrapper — kept for backwards compatibility.
     * New code should use buildArtifactsList() instead.
     */
    function buildResumesList(role) {
      return buildArtifactsList(role);
    }

    /**
     * Handles file selection from the file input.
     * Shows the notes form for user to add context before confirming.
     */
    function handleResumeSelect(event, roleId) {
      const file = event.target.files[0];
      if (!file) return;
      pendingResumeFile = file;
      pendingResumeRoleId = roleId;
      // Show notes form
      document.getElementById('resume-notes-form').style.display = 'block';
      document.getElementById('resume-upload-zone').style.display = 'none';
      // Wire up confirm button
      document.getElementById('resume-confirm-btn').onclick = () => confirmResumeUpload();
    }

    /**
     * Handles drag-and-drop of a resume file.
     */
    function handleResumeDrop(event, roleId) {
      const file = event.dataTransfer.files[0];
      if (!file) return;
      // Validate file type
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['pdf', 'docx', 'doc'].includes(ext)) {
        showToast('Please upload a PDF or DOCX file', 'error');
        return;
      }
      pendingResumeFile = file;
      pendingResumeRoleId = roleId;
      document.getElementById('resume-notes-form').style.display = 'block';
      document.getElementById('resume-upload-zone').style.display = 'none';
      document.getElementById('resume-confirm-btn').onclick = () => confirmResumeUpload();
    }

    /**
     * Confirms the resume upload: saves to IndexedDB and updates role metadata.
     */
    async function confirmResumeUpload() {
      if (!pendingResumeFile || !pendingResumeRoleId) return;

      const notes = document.getElementById('resume-notes-input').value.trim();
      const roles = getRoles();
      const role = roles.find(r => r.id === pendingResumeRoleId);
      if (!role) return;

      // Initialize resumesSent array if it doesn't exist
      if (!role.resumesSent) role.resumesSent = [];

      const idx = role.resumesSent.length;
      const dbKey = `resume-${role.id}-${idx}`;

      // Save file to IndexedDB
      try {
        await saveResumeFile(dbKey, pendingResumeFile);
      } catch (err) {
        showToast('Failed to save resume: ' + err.message, 'error');
        return;
      }

      // Save metadata on the role
      role.resumesSent.push({
        filename: pendingResumeFile.name,
        size: pendingResumeFile.size,
        type: pendingResumeFile.type,
        date: Date.now(),
        notes: notes,
        indexedDbKey: dbKey
      });
      role.lastActivity = Date.now();
      saveRoles(roles);

      // Clean up and refresh
      pendingResumeFile = null;
      pendingResumeRoleId = null;
      openRoleDetail(role.id);
      showToast(`Attached "${role.resumesSent[idx].filename}"`, 'success');
    }

    /**
     * Cancels a pending resume upload.
     */
    function cancelResumeUpload() {
      pendingResumeFile = null;
      pendingResumeRoleId = null;
      document.getElementById('resume-notes-form').style.display = 'none';
      document.getElementById('resume-upload-zone').style.display = '';
      document.getElementById('resume-notes-input').value = '';
      document.getElementById('resume-file-input').value = '';
    }

    /**
     * Removes a resume attachment from a role and deletes from IndexedDB.
     */
    async function removeResume(roleId, idx, dbKey) {
      const roles = getRoles();
      const role = roles.find(r => r.id === roleId);
      if (!role || !role.resumesSent) return;

      role.resumesSent.splice(idx, 1);
      saveRoles(roles);

      try {
        await deleteResumeFile(dbKey);
      } catch (e) { /* IndexedDB cleanup best-effort */ }

      openRoleDetail(roleId);
      showToast('Resume removed', 'success');
    }

    /**
     * Removes a non-legacy artifact from the role.artifacts array.
     * INPUT: roleId (string), artifactIndex (number) — index in role.artifacts
     */
    function removeArtifact(roleId, artifactIndex) {
      const roles = getRoles();
      const role = roles.find(r => r.id === roleId);
      if (!role || !role.artifacts) return;

      const removed = role.artifacts.splice(artifactIndex, 1);
      saveRoles(roles);

      // If the artifact had an IndexedDB key, clean it up (best-effort)
      if (removed[0] && removed[0].indexedDbKey) {
        deleteResumeFile(removed[0].indexedDbKey).catch(() => {});
      }

      openRoleDetail(roleId);
      showToast('Artifact removed', 'success');
    }

    // ================================================================
    // COMMS LOG: Timestamped notes tied to connections
    // ================================================================

    /**
     * Builds the HTML for the comms log — a timeline of interactions
     * tied to specific connections (or general). Each entry has a timestamp,
     * channel indicator, optional link, and the note text.
     * INPUT: role object
     * RETURNS: HTML string
     */
    function buildCommsLog(role) {
      const entries = role.commsLog || [];
      if (entries.length === 0) {
        return '<div style="color: var(--text-tertiary); font-size: var(--text-sm);">No comms logged yet. Track your interactions below.</div>';
      }
      // Sort newest first
      const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
      return sorted.map(entry => {
        const dateStr = new Date(entry.date).toLocaleString();
        const channelIcons = {
          email: '✉️', linkedin: '💼', phone: '📞',
          'video': '🎥', 'in-person': '🤝', other: '💬'
        };
        const icon = channelIcons[entry.channel] || '💬';
        const contactName = entry.contactName || 'General';
        return `
          <div style="display: flex; gap: var(--space-2); padding: var(--space-2) 0; border-bottom: 1px solid var(--bg-subtle);">
            <div style="font-size: 16px; flex-shrink: 0; margin-top: 2px;">${icon}</div>
            <div style="flex: 1; min-width: 0;">
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <span style="font-size: var(--text-xs); font-weight: 600; color: var(--text-secondary);">${escapeHtml(contactName)}</span>
                <span style="font-size: var(--text-xs); color: var(--text-tertiary); flex-shrink: 0;">${dateStr}</span>
              </div>
              <div style="font-size: var(--text-sm); color: var(--text-primary); margin-top: 2px; white-space: pre-wrap;">${escapeHtml(entry.note)}</div>
              ${entry.link ? `<a href="${escapeHtml(entry.link)}" target="_blank" style="font-size: var(--text-xs); color: var(--accent); display: inline-flex; align-items: center; gap: 4px; margin-top: 4px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                ${escapeHtml(entry.link.length > 40 ? entry.link.substring(0, 40) + '...' : entry.link)}
              </a>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    /**
     * Adds a new entry to the comms log for a role.
     * Reads from the form fields, saves to the role's commsLog array,
     * and refreshes the detail panel.
     * INPUT: roleId (string)
     */
    function addCommsEntry(roleId) {
      const noteInput = document.getElementById('comms-note-input');
      const linkInput = document.getElementById('comms-link-input');
      const connSelect = document.getElementById('comms-connection-select');
      const channelSelect = document.getElementById('comms-channel-select');

      const note = noteInput.value.trim();
      if (!note) {
        showToast('Please enter a note', 'error');
        return;
      }

      const roles = getRoles();
      const role = roles.find(r => r.id === roleId);
      if (!role) return;

      if (!role.commsLog) role.commsLog = [];

      /* Resolve contact name from selected connection (value = connection name) */
      let contactName = '';
      const connId = connSelect.value;
      if (connId) {
        const conn = getConnections().find(c => c.name === connId);
        if (conn) contactName = conn.name;
      }

      role.commsLog.push({
        date: new Date().toISOString(),
        note: note,
        link: linkInput.value.trim() || '',
        channel: channelSelect.value,
        contactId: connId || '',
        contactName: contactName
      });
      role.lastActivity = Date.now();
      saveRoles(roles);

      openRoleDetail(roleId);
      showToast('Comms entry logged', 'success');
    }

    /**
     * Utility: escape HTML entities to prevent XSS
     * INPUT: raw string
     * RETURNS: escaped string safe for insertion into HTML
     */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

     * The Research Brief module reads the roleId from URL params and auto-selects it.

    // ================================================================

    /**
     * Toggles a collapsible section open/closed.
     * The title element gets the .collapsed class toggled,
     * and the next sibling .collapsible-content gets the same.
     * INPUT: titleElement — the .detail-section-title.collapsible that was clicked
     */
    function toggleCollapsible(titleElement) {
      titleElement.classList.toggle('collapsed');
      const content = titleElement.nextElementSibling;
      if (content && content.classList.contains('collapsible-content')) {
        content.classList.toggle('collapsed');
      }
    }

    /**
     * Closes the detail panel without saving
     */
    function closeRoleDetail() {
      activeDetailRoleId = null;
      selectedCardId = null;
      detailOverlay.classList.remove('open');
      detailPanel.classList.remove('open');
      renderKanban();
    }

    /**
     * Saves all edits from the detail panel back to localStorage
     * Reads every field from the panel, compares with stored data,
     * and applies changes via updateRole()
     */
    function saveRoleDetail() {
      if (!activeDetailRoleId) return;

      const roles = getRoles();
      const role = roles.find(r => r.id === activeDetailRoleId);
      if (!role) return;

      // Gather edited values from the panel
      const newCompany = document.getElementById('detail-ed-company').value.trim();
      const newTitle = document.getElementById('detail-ed-title').value.trim();
      const newPositioning = document.getElementById('detail-ed-positioning').value;
      const newTier = document.getElementById('detail-ed-tier').value;
      const newUrl = document.getElementById('detail-ed-url').value.trim();
      const newJd = document.getElementById('detail-ed-jd').value;
      const newDateAdded = document.getElementById('detail-ed-dateAdded').value;
      const newLastActivity = document.getElementById('detail-ed-lastActivity').value;
      const newNotes = document.getElementById('detail-ed-notes') ? document.getElementById('detail-ed-notes').value : '';

      // Figure out which stage button is active
      const activeStageBtn = document.querySelector('#detail-stage-buttons .stage-btn.active');
      const newStage = activeStageBtn ? activeStageBtn.dataset.stage : role.stage;

      // Validate required fields
      if (!newCompany || !newTitle) {
        showToast('Company and title are required', 'error');
        return;
      }

      // Build updates object — updateRole() handles stage history automatically
      const updates = {
        company: newCompany,
        title: newTitle,
        positioning: newPositioning,
        tier: newTier,
        url: newUrl,
        jdText: newJd,
        stage: newStage,
        personalNotes: newNotes
      };

      // Handle date overrides
      if (newDateAdded) {
        updates.dateAdded = new Date(newDateAdded).getTime();
      }
      if (newLastActivity) {
        updates.lastActivity = new Date(newLastActivity).getTime();
      }

      // Save close reason and closure notes if stage is closed
      if (newStage === 'closed') {
        const closeReasonEl = document.getElementById('detail-ed-close-reason');
        const closureNotesEl = document.getElementById('detail-ed-closure-notes');
        if (closeReasonEl) updates.closeReason = closeReasonEl.value;
        if (closureNotesEl) updates.closureNotes = closureNotesEl.value;
        updates.closedAt = Date.now();
      }

      updateRole(activeDetailRoleId, updates);
      showToast(`Updated "${newTitle}" at ${newCompany}`, 'success');
      closeRoleDetail();
      render();
    }

    /**
     * Deletes the role after confirmation
     */
    function deleteRoleFromDetail() {
      if (!activeDetailRoleId) return;
      const roles = getRoles();
      const role = roles.find(r => r.id === activeDetailRoleId);
      if (!role) return;

      if (!confirm(`Delete "${role.title}" at ${role.company}? This cannot be undone.`)) {
        return;
      }

      deleteRole(activeDetailRoleId);
      showToast(`Deleted "${role.title}"`, 'success');
      closeRoleDetail();
      render();
    }

    // Wire up detail panel buttons
    detailCloseBtn.addEventListener('click', closeRoleDetail);
    detailCancelBtn.addEventListener('click', closeRoleDetail);
    detailSaveBtn.addEventListener('click', saveRoleDetail);
    detailDeleteBtn.addEventListener('click', deleteRoleFromDetail);

    // Close panel when clicking overlay
    detailOverlay.addEventListener('click', closeRoleDetail);

    // Escape key closes the detail panel
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && detailPanel.classList.contains('open')) {
        closeRoleDetail();
      }
    });
