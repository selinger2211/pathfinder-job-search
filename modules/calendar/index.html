        /**
         * Update the upcoming events list in the sidebar based on active filter.
         * Includes debrief buttons for past interview events.
         */
        function updateUpcomingEventList() {
            const eventList = document.getElementById('upcomingEventList');
            eventList.innerHTML = '';

            const allEvents = getStorageData('pf_calendar_events') || [];
            const debriefs = getStorageData('pf_debriefs') || [];
            const now = new Date();

            // Filter events from next 7 days
            let filteredEvents = allEvents.filter(evt => {
                const eventDate = new Date(evt.date);
                const daysAway = Math.floor((eventDate - now) / (1000 * 60 * 60 * 24));
                if (daysAway < 0 || daysAway > 7) return false;

                if (activeFilter === 'all') return true;
                if (activeFilter === 'interview') return ['phone_screen', 'technical', 'behavioral', 'panel', 'hiring_manager'].includes(evt.type);
                if (activeFilter === 'followup') return evt.type === 'follow_up';
                if (activeFilter === 'unlinked') return !evt.roleId;

                return true;
            });

            // Sort by date
            filteredEvents.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filteredEvents.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'empty-state' ;
                emptyMsg.style.padding = '24px 12px';
                emptyMsg.textContent = 'No events';
                eventList.appendChild(emptyMsg);
                return;
            }

            filteredEvents.forEach(evt => {
                const item = document.createElement('div');
                item.className = `event-item ${!evt.roleId ? 'unlinked' : ''}`;

                // Add debrief class if event needs debrief
                if (eventNeedsDebrief(evt, debriefs)) {
                    item.classList.add('needs-debrief');
                }

                // Add debriefed class if event has debrief
                if (evt.debriefId) {
                    item.classList.add('event-has-debrief');
                }

                item.onclick = () => openEventDetail(evt);

                const time = document.createElement('div');
                time.className = 'event-item-time';
                time.textContent = formatTime(new Date(evt.date));
                item.appendChild(time);

                const title = document.createElement('div');
                title.className = 'event-item-title';
                title.textContent = evt.title;
                item.appendChild(title);

                const company = document.createElement('div');
                company.className = 'event-item-company';
                if (evt.company !== 'Unknown') {
                    // Try to find domain from company name
                    const companies = getStorageData('pf_companies') || [];
                    const comp = companies.find(c => c.name === evt.company);
                    const domain = comp ? comp.domain : evt.company.toLowerCase().replace(/\s+/g, '') + '.com';

                    const logo = document.createElement('img');
                    logo.className = 'event-item-company-logo';
                    logo.src = `https://logo.clearbit.com/${domain}`;
                    logo.onerror = function() { this.style.display = 'none'; };
                    company.appendChild(logo);
                }
                const companyName = document.createElement('span');
                companyName.textContent = evt.company;
                company.appendChild(companyName);
                item.appendChild(company);

                const meta = document.createElement('div');
                meta.className = 'event-item-meta';
                const statusDot = document.createElement('span');
                statusDot.className = `event-item-status ${evt.roleId ? 'linked' : 'unlinked'}`;
                meta.appendChild(statusDot);
                const metaText = document.createElement('span');
                metaText.textContent = evt.roleId ? 'Linked' : 'Unlinked';
                meta.appendChild(metaText);
                item.appendChild(meta);

                // Add debrief button for past interview events without debriefs
                if (eventNeedsDebrief(evt, debriefs)) {
                    const debriefBtn = document.createElement('button');
                    debriefBtn.className = 'debrief-btn';
                    debriefBtn.innerHTML = '<i data-lucide="clipboard" width="14" height="14"></i> Debrief';
                    debriefBtn.onclick = (e) => {
                        e.stopPropagation();
                        triggerDebrief(evt);
                    };
                    item.appendChild(debriefBtn);
                }

                eventList.appendChild(item);
            });

            // Update debrief badge
            updateDebriefBadge();

            // Render lucide icons for debrief buttons
            lucide.createIcons();
        }

        /**
         * Update badge counts for filters and debrief status.
         */
        function updateFilterBadges() {
            const allEvents = getStorageData('pf_calendar_events') || [];
            const debriefs = getStorageData('pf_debriefs') || [];

            const allCount = allEvents.length;
            const interviewCount = allEvents.filter(e => ['phone_screen', 'technical', 'behavioral', 'panel', 'hiring_manager'].includes(e.type)).length;
            const followupCount = allEvents.filter(e => e.type === 'follow_up').length;
            const unlinkedCount = allEvents.filter(e => !e.roleId).length;

            document.getElementById('badgeAll').textContent = allCount;
            document.getElementById('badgeInterview').textContent = interviewCount;
            document.getElementById('badgeFollowup').textContent = followupCount;
            document.getElementById('badgeUnlinked').textContent = unlinkedCount;

            // Update debrief badge
            updateDebriefBadge();
        }

        // ============================================================================
        // EVENT DETECTION & SCANNING
        // ============================================================================

        let isScanning = false;

        /**
         * Simulate a calendar scan that detects potential event-to-role matches.
         * Shows detection confidence and matching signals.
         */
        async function scanCalendar() {
            if (isScanning) return;

            isScanning = true;
            const scanBtn = document.getElementById('scanBtn');
            const scanStatus = document.getElementById('scanStatus');

            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span style="width: 16px; height: 16px; border: 2px solid var(--bg-base); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block;"></span> <span>Scanning...</span>';
            scanStatus.textContent = 'Initializing scan...';

            // Simulate scan delay
            await new Promise(resolve => setTimeout(resolve, 1500));

            scanStatus.textContent = 'Matching events...';

            // Simulate more delay
            await new Promise(resolve => setTimeout(resolve, 1000));

            // Render detected events
            renderDetectionCards();

            scanBtn.disabled = false;
            scanBtn.innerHTML = '<i data-lucide="radio" width="16" height="16"></i> <span>Scan Calendar</span>';
            scanStatus.textContent = '✓ Scan complete';
            lucide.createIcons();

            // Log scan to sync log
            logSync('scan', 'completed', {
                eventsScanned: getStorageData('calendar_events').length,
                linkedCount: getStorageData('calendar_events').filter(e => e.linkedRoleId).length
            });

            isScanning = false;

            // Clear status after 3 seconds
            setTimeout(() => {
                scanStatus.textContent = '';
            }, 3000);
        }

        /**
         * Render detection cards showing unlinked events with matching signals and confidence.
         */
        function renderDetectionCards() {
            const detectionGrid = document.getElementById('detectionGrid');
            detectionGrid.innerHTML = '';

            const allEvents = getStorageData('calendar_events') || [];
            const roles = getStorageData('pf_roles') || [];
            const companies = getStorageData('pf_companies') || [];

            // Only show events that are not yet linked or have low confidence
            const detectableEvents = allEvents.filter(evt => !evt.linkedRoleId);

            if (detectableEvents.length === 0) {
                const msg = document.createElement('div');
                msg.className = 'empty-state';
                msg.textContent = 'All events are linked!';
                detectionGrid.appendChild(msg);
                return;
            }

            detectableEvents.forEach(evt => {
                const card = document.createElement('div');
                card.className = 'detection-card fade-in';

                // Header with logo and title
                const header = document.createElement('div');
                header.className = 'detection-header';

                const logo = document.createElement('img');
                logo.className = 'detection-logo';
                logo.src = `https://logo.clearbit.com/${evt.companyDomain}`;
                logo.onerror = function() { this.style.display = 'none'; };
                header.appendChild(logo);

                const info = document.createElement('div');
                info.className = 'detection-info';

                const title = document.createElement('div');
                title.className = 'detection-title';
                title.textContent = evt.title;
                info.appendChild(title);

                const meta = document.createElement('div');
                meta.className = 'detection-meta';

                const timeEl = document.createElement('div');
                timeEl.className = 'detection-meta-item';
                timeEl.innerHTML = `<i data-lucide="clock" width="14" height="14"></i> ${formatTime(new Date(evt.start))}`;
                meta.appendChild(timeEl);

                const dateEl = document.createElement('div');
                dateEl.className = 'detection-meta-item';
                dateEl.innerHTML = `<i data-lucide="calendar" width="14" height="14"></i> ${formatDateShort(new Date(evt.start))}`;
                meta.appendChild(dateEl);

                info.appendChild(meta);
                header.appendChild(info);
                card.appendChild(header);

                // Detection signals
                const signals = document.createElement('div');
                signals.className = 'detection-signals';

                evt.detectionSignals.forEach(sig => {
                    const signal = document.createElement('div');
                    signal.className = `signal ${sig.confidence.toLowerCase()}`;

                    const sigText = document.createElement('div');
                    sigText.className = 'signal-text';
                    sigText.textContent = sig.signal;
                    signal.appendChild(sigText);

                    const badge = document.createElement('div');
                    badge.className = 'signal-badge';
                    badge.textContent = sig.confidence;
                    signal.appendChild(badge);

                    signals.appendChild(signal);
                });

                card.appendChild(signals);

                // Suggested match
                // Find matching role if company match exists
                const matchedRole = roles.find(role => {
                    const roleCompany = companies.find(c => c.id === role.companyId);
                    return roleCompany && roleCompany.name === evt.company;
                });

                if (matchedRole) {
                    const match = document.createElement('div');
                    match.className = 'detection-match';

                    const matchIcon = document.createElement('div');
                    matchIcon.className = 'detection-match-icon';
                    matchIcon.innerHTML = '<i data-lucide="check-circle" width="18" height="18"></i>';
                    match.appendChild(matchIcon);

                    const matchText = document.createElement('div');
                    matchText.className = 'detection-match-text';
                    const matchRole = document.createElement('span');
                    matchRole.className = 'detection-match-role';
                    matchRole.textContent = matchedRole.title;
                    matchText.appendChild(matchRole);
                    matchText.appendChild(document.createTextNode(' at ' + evt.company));
                    match.appendChild(matchText);

                    card.appendChild(match);
                }

                // Actions
                const actions = document.createElement('div');
                actions.className = 'detection-actions';

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'detection-action-btn confirm';
                confirmBtn.textContent = matchedRole ? 'Link Event' : 'Create Role';
                confirmBtn.onclick = () => linkEventToRole(evt, matchedRole);
                actions.appendChild(confirmBtn);

                const dismissBtn = document.createElement('button');
                dismissBtn.className = 'detection-action-btn';
                dismissBtn.textContent = 'Dismiss';
                dismissBtn.onclick = () => dismissDetection(evt.id);
                actions.appendChild(dismissBtn);

                card.appendChild(actions);
                detectionGrid.appendChild(card);
            });

            lucide.createIcons();
        }

        /**
         * Link an event to a role and update localStorage.
         */
        function linkEventToRole(event, role) {
            const allEvents = getStorageData('calendar_events') || [];
            const eventIndex = allEvents.findIndex(e => e.id === event.id);

            if (eventIndex !== -1 && role) {
                allEvents[eventIndex].linkedRoleId = role.id;
                saveStorageData('calendar_events', allEvents);

                // Log this action
                logSync('link', 'completed', {
                    event: event.title,
                    role: role.title,
                    confidence: event.detectionConfidence
                });

                // Refresh UI
                renderDetectionCards();
                renderWeekView();
                updateUpcomingEventList();
                updateFilterBadges();
                generateNudges();
                renderNudgeTimeline();

                // Show confirmation
                showNotification(`Linked "${event.title}" to "${role.title}"`);
            }
        }

        /**
         * Remove an event from detection list (mark as dismissed).
         */
        function dismissDetection(eventId) {
            // Just re-render without this event
            const detectionGrid = document.getElementById('detectionGrid');
            const cards = detectionGrid.querySelectorAll('.detection-card');
            cards.forEach(card => {
                if (card.dataset.eventId === eventId) {
                    card.remove();
                }
            });
        }

        // NUDGES & REMINDERS
        // ============================================================================

        /**
         * Generate nudges based on upcoming events and their timing.
         * Nudges are pre-interview, morning-of, and post-interview prompts.
         */
        function generateNudges() {
            const nudges = [];
            const allEvents = getStorageData('pf_calendar_events') || [];
            const roles = getStorageData('pf_roles') || [];
            const now = new Date();

            allEvents.forEach(evt => {
                const eventDate = new Date(evt.date);
                const msUntilEvent = eventDate - now;
                const hoursUntil = msUntilEvent / (1000 * 60 * 60);
                const daysUntil = msUntilEvent / (1000 * 60 * 60 * 24);

                // Get role info if linked
                let roleInfo = '';
                let roleId = evt.roleId;
                if (roleId) {
                    const role = roles.find(r => r.id === roleId);
                    if (role) {
                        roleInfo = ` - ${role.title}`;
                    }
                }

                // Within 24 hours: prep nudge
                if (hoursUntil > 0 && hoursUntil <= 24) {
                    if (daysUntil < 1 && daysUntil > 0.5) { // 12-24 hours
                        nudges.push({
                            id: `nudge-24h-${evt.id}`,
                            eventId: evt.id,
                            roleId: roleId,
                            timing: '24h',
                            title: `Interview at ${evt.company} tomorrow${roleInfo}`,
                            description: `Start your prep. Review the company research brief and prepare questions for the interviewer.`,
                            action: 'Research Brief',
                            actionUrl: roleId ? `../research-brief/?role=${roleId}` : '../research-brief/',
                            timestamp: now
                        });
                    }
                }

                // Morning of: review nudge
                if (isToday(eventDate)) {
                    nudges.push({
                        id: `nudge-morning-${evt.id}`,
                        eventId: evt.id,
                        roleId: roleId,
                        timing: 'morning',
                        title: `${evt.company} interview today at ${formatTime(eventDate)}${roleInfo}`,
                        description: `Take a few minutes to review your prep notes and practice your TMAY (Tell Me About Yourself) script.`,
                        action: 'Review Notes',
                        actionUrl: roleId ? `../research-brief/?role=${roleId}` : '../research-brief/',
                        timestamp: now
                    });
                }

                // After event: debrief nudge
                if (eventDate < now && evt.status === 'upcoming') {
                    nudges.push({
                        id: `nudge-debrief-${evt.id}`,
                        eventId: evt.id,
                        roleId: roleId,
                        timing: 'post',
                        title: `Debrief: ${evt.company} interview${roleInfo}`,
                        description: `While the interview is fresh in your mind, capture key moments and feedback.`,
                        action: 'Start Debrief',
                        actionUrl: roleId ? `../debrief/?role=${roleId}` : '../debrief/',
                        timestamp: now
                    });
                }
            });

            saveStorageData('pf_calendar_nudges', nudges);
        }

        /**
         * Render the nudge timeline showing upcoming nudges in chronological order.
         */
        function renderNudgeTimeline() {
            const nudgeList = document.getElementById('nudgeList');
            nudgeList.innerHTML = '';

            const nudges = getStorageData('pf_calendar_nudges') || [];
            const now = new Date();

            if (nudges.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'empty-state';
                emptyMsg.textContent = 'No upcoming nudges';
                nudgeList.appendChild(emptyMsg);
                return;
            }

            // Group nudges by timing
            const grouped = {
                '24h': [],
                'morning': [],
                'post': []
            };

            nudges.forEach(nudge => {
                if (nudge.timing === '24h') grouped['24h'].push(nudge);
                else if (nudge.timing === 'morning') grouped['morning'].push(nudge);
                else if (nudge.timing === 'post') grouped['post'].push(nudge);
            });

            // Render each group
            Object.entries(grouped).forEach(([groupKey, groupNudges]) => {
                if (groupNudges.length === 0) return;

                const group = document.createElement('div');
                group.className = 'nudge-group';

                const groupTitle = document.createElement('div');
                groupTitle.className = 'nudge-group-title';
                const labels = {
                    '24h': 'Prep Soon',
                    'morning': 'Today',
                    'post': 'Post-Interview'
                };
                groupTitle.textContent = labels[groupKey];
                group.appendChild(groupTitle);

                groupNudges.forEach(nudge => {
                    const card = document.createElement('div');
                    card.className = 'nudge-card slide-in';

                    const header = document.createElement('div');
                    header.className = 'nudge-header';

                    const timing = document.createElement('div');
                    timing.className = 'nudge-timing';
                    const timingLabels = {
                        '24h': '24h',
                        'morning': 'Now',
                        'post': 'Done'
                    };
                    timing.textContent = timingLabels[nudge.timing] || nudge.timing;
                    header.appendChild(timing);

                    const content = document.createElement('div');
                    content.className = 'nudge-content';

                    const title = document.createElement('div');
                    title.className = 'nudge-title';
                    title.textContent = nudge.title;
                    content.appendChild(title);

                    const desc = document.createElement('div');
                    desc.className = 'nudge-description';
                    desc.textContent = nudge.description;
                    content.appendChild(desc);

                    const metadata = document.createElement('div');
                    metadata.className = 'nudge-metadata';
                    metadata.textContent = `Created ${new Date(nudge.timestamp).toLocaleDateString()}`;
                    content.appendChild(metadata);

                    header.appendChild(content);
                    card.appendChild(header);

                    const actionBtn = document.createElement('button');
                    actionBtn.className = 'nudge-action';
                    actionBtn.textContent = nudge.action;
                    actionBtn.onclick = () => window.location.href = nudge.actionUrl;
                    card.appendChild(actionBtn);

                    const dismissBtn = document.createElement('button');
                    dismissBtn.className = 'nudge-action-secondary';
                    dismissBtn.textContent = 'Dismiss';
                    dismissBtn.onclick = () => dismissNudge(nudge.id);
                    card.appendChild(dismissBtn);

                    group.appendChild(card);
                });

                nudgeList.appendChild(group);
            });
        }

        /**
         * Dismiss a nudge from the timeline.
         */
        function dismissNudge(nudgeId) {
            const nudges = getStorageData('calendar_nudges') || [];
            const filtered = nudges.filter(n => n.id !== nudgeId);
            saveStorageData('calendar_nudges', filtered);
            renderNudgeTimeline();
        }

        // SYNC LOG
        // ============================================================================

        /**
         * Log a sync action to the sync log.
         */
        function logSync(action, status, details) {
            const syncLog = getStorageData('sync_log') || [];
            syncLog.unshift({
                id: `log-${Date.now()}`,
                timestamp: new Date(),
                action: action,
                status: status,
                details: details
            });

            // Keep only last 20 entries
            if (syncLog.length > 20) syncLog.pop();

            saveStorageData('sync_log', syncLog);
        }

        /**
         * Load and render the sync log.
         */
        function loadSyncLog() {
            const syncLog = getStorageData('sync_log') || [];
            const container = document.getElementById('syncLogEntries');
            container.innerHTML = '';

            if (syncLog.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'empty-state';
                emptyMsg.textContent = 'No sync history yet';
                container.appendChild(emptyMsg);
                return;
            }

            syncLog.forEach(entry => {
                const entryEl = document.createElement('div');
                entryEl.className = `sync-log-entry ${entry.status}`;

                const header = document.createElement('div');
                header.className = 'sync-log-entry-header';

                const time = document.createElement('div');
                time.className = 'sync-log-time';
                time.textContent = new Date(entry.timestamp).toLocaleTimeString();
                header.appendChild(time);

                const statusBadge = document.createElement('div');
                statusBadge.className = `sync-log-status ${entry.status}`;
                const statusIcon = entry.status === 'success' ? '✓' : '⚠';
                statusBadge.textContent = `${statusIcon} ${entry.action}`;
                header.appendChild(statusBadge);

                entryEl.appendChild(header);

                if (entry.details) {
                    const details = document.createElement('div');
                    details.className = 'sync-log-details';

                    Object.entries(entry.details).forEach(([key, value]) => {
                        const item = document.createElement('div');
                        item.className = 'sync-log-detail-item';

                        const label = document.createElement('span');

                        label.textContent = key + ':';
                        item.appendChild(label);

                        const val = document.createElement('span');
                        val.className = 'sync-log-detail-value';
                        val.textContent = value;
                        item.appendChild(val);

                        details.appendChild(item);
                    });

                    entryEl.appendChild(details);
                }

                container.appendChild(entryEl);
            });
        }

        // ============================================================================
        // MONTH VIEW
        // ============================================================================

        let currentMonthDate = new Date();

        /**
         * Render the month view calendar grid
         */
        function renderMonthView() {
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();

            // Update month label
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                              'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthLabel').textContent = `${monthNames[month]} ${year}`;

            // Get first day of month and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';

            // Add day name headers
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.style.fontWeight = '600';
                header.style.textAlign = 'center';
                header.style.color = 'var(--text-secondary)';
                header.style.padding = '8px';
                header.style.fontSize = '12px';
                header.textContent = day;
                grid.appendChild(header);
            });

            // Add previous month's days (grayed out)
            for (let i = firstDay - 1; i >= 0; i--) {
                const cell = createMonthDayCell(daysInPrevMonth - i, true);
                grid.appendChild(cell);
            }

            // Add current month's days
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = createMonthDayCell(day, false, year, month);
                const cellDate = new Date(year, month, day);
                if (cellDate.toDateString() === today.toDateString()) {
                    cell.classList.add('today');
                }
                grid.appendChild(cell);
            }

            // Add next month's days (grayed out)
            const totalCells = grid.children.length - 7; // Subtract day headers
            for (let day = 1; totalCells + day <= 35; day++) {
                const cell = createMonthDayCell(day, true);
                grid.appendChild(cell);
            }
        }

        /**
         * Create a single day cell for month view
         */
        function createMonthDayCell(day, isOtherMonth = false, year = currentMonthDate.getFullYear(), month = currentMonthDate.getMonth()) {
            const cell = document.createElement('div');
            cell.className = 'month-day-cell';
            if (isOtherMonth) cell.classList.add('other-month');

            const number = document.createElement('div');
            number.className = 'month-day-number';
            number.textContent = day;
            cell.appendChild(number);

            const eventsDiv = document.createElement('div');
            eventsDiv.className = 'month-day-events';

            // Add events for this day if not from another month
            if (!isOtherMonth) {
                const events = getStorageData('pf_calendar_events') || [];
                const cellDate = new Date(year, month, day);
                const dayStart = new Date(cellDate.getFullYear(), cellDate.getMonth(), cellDate.getDate());
                const dayEnd = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);

                const dayEvents = events.filter(e => {
                    const eventDate = new Date(e.date || e.startTime);
                    return eventDate >= dayStart && eventDate < dayEnd;
                });

                dayEvents.slice(0, 3).forEach(event => {
                    const dot = document.createElement('div');
                    dot.className = 'month-day-event-dot';
                    dot.style.backgroundColor = event.type === 'interview' ? 'var(--accent)' : 'var(--info)';
                    eventsDiv.appendChild(dot);
                });
            }

            cell.appendChild(eventsDiv);

            // Click to show day's events
            if (!isOtherMonth) {
                cell.addEventListener('click', () => {
                    const cellDate = new Date(year, month, day);
                    showSelectedDayEvents(cellDate);
                });
            }

            return cell;
        }

        /**
         * Show events for selected day in month view
         */
        function showSelectedDayEvents(date) {
            const container = document.getElementById('selectedDayEvents');
            const events = getStorageData('pf_calendar_events') || [];

            const dayStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const dayEnd = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);

            const dayEvents = events.filter(e => {
                const eventDate = new Date(e.date || e.startTime);
                return eventDate >= dayStart && eventDate < dayEnd;
            });

            const dateStr = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

            if (dayEvents.length === 0) {
                container.innerHTML = `<p style="color: var(--text-tertiary);">No events on ${dateStr}</p>`;
                return;
            }

            container.innerHTML = `<h3 style="margin-bottom: 12px; color: var(--text-primary);">Events on ${dateStr}</h3>`;
            const list = document.createElement('div');
            list.style.display = 'flex';
            list.style.flexDirection = 'column';
            list.style.gap = '8px';

            dayEvents.forEach(event => {
                const item = document.createElement('div');
                item.className = 'event-item';
                item.style.padding = '12px';
                item.style.background = 'var(--bg-secondary)';
                item.style.borderLeft = '3px solid var(--accent)';
                item.style.borderRadius = 'var(--radius-sm)';
                item.style.cursor = 'pointer';

                const time = event.startTime ? formatTime(new Date(event.startTime)) : 'All day';
                item.innerHTML = `
                    <div style="font-weight: 600; color: var(--text-primary);">${event.title || 'Untitled'}</div>
                    <div style="font-size: 12px; color: var(--text-secondary);">${time}</div>
                    ${event.company ? `<div style="font-size: 11px; color: var(--text-tertiary);">${event.company}</div>` : ''}
                `;
                item.addEventListener('click', () => openEventDetail(event));
                list.appendChild(item);
            });

            container.appendChild(list);
        }

        /**
         * Navigate to previous month
         */
        function previousMonth() {
            currentMonthDate.setMonth(currentMonthDate.getMonth() - 1);
            renderMonthView();
        }

        /**
         * Navigate to next month
         */
        function nextMonth() {
            currentMonthDate.setMonth(currentMonthDate.getMonth() + 1);
            renderMonthView();
        }

        // ============================================================================
        // DAY VIEW
        // ============================================================================

        let currentDayDate = new Date();

        /**
         * Render the day view with hourly time slots
         */
        function renderDayView() {
            const dateStr = currentDayDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            document.getElementById('dayLabel').textContent = dateStr;

            const grid = document.getElementById('dayViewGrid');
            grid.innerHTML = '';

            const events = getStorageData('pf_calendar_events') || [];

            // Create 24 hourly slots (8am to 10pm)
            for (let hour = 8; hour < 22; hour++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot';

                const label = document.createElement('div');
                label.className = 'time-slot-label';
                const ampm = hour >= 12 ? 'PM' : 'AM';
                const displayHour = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
                label.textContent = `${displayHour}:00 ${ampm}`;
                slot.appendChild(label);

                const content = document.createElement('div');
                content.className = 'time-slot-content';

                // Find events for this hour
                const dayStart = new Date(currentDayDate.getFullYear(), currentDayDate.getMonth(), currentDayDate.getDate());
                const slotStart = new Date(dayStart.getTime() + hour * 60 * 60 * 1000);
                const slotEnd = new Date(slotStart.getTime() + 60 * 60 * 1000);

                const slotEvents = events.filter(e => {
                    const eventDate = new Date(e.startTime || e.date);
                    return eventDate >= slotStart && eventDate < slotEnd;
                });

                if (slotEvents.length === 0) {
                    const empty = document.createElement('div');
                    empty.style.color = 'var(--text-tertiary)';
                    empty.style.fontSize = '11px';
                    empty.textContent = 'No events';
                    content.appendChild(empty);
                } else {
                    slotEvents.forEach(event => {
                        const eventEl = document.createElement('div');
                        eventEl.className = 'time-slot-event';
                        eventEl.textContent = event.title || 'Untitled';
                        eventEl.addEventListener('click', () => openEventDetail(event));
                        content.appendChild(eventEl);
                    });
                }

                slot.appendChild(content);
                grid.appendChild(slot);
            }
        }

        /**
         * Navigate to previous day
         */
        function previousDay() {
            currentDayDate.setDate(currentDayDate.getDate() - 1);
            renderDayView();
        }

        /**
         * Navigate to next day
         */
        function nextDay() {
            currentDayDate.setDate(currentDayDate.getDate() + 1);
            renderDayView();
        }

        /**
         * Open add event modal with pre-filled date
         */
        function openAddEventModal(selectedDate = null) {
            const modal = document.getElementById('addEventModal');
            if (selectedDate) {
                document.getElementById('eventDate').valueAsDate = selectedDate;
            }
            modal.style.display = 'flex';
        }

        // ============================================================================
        // TAB NAVIGATION
        // ============================================================================

        /**
         * Switch active tab in the workspace.
         */
        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Show selected tab
            const tabEl = document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`);
            if (tabEl) {
                tabEl.classList.add('active');

                // Refresh data for specific tabs
                if (tabName === 'month') {
                    renderMonthView();
                } else if (tabName === 'day') {
                    renderDayView();
                } else if (tabName === 'detection') {
                    renderDetectionCards();
                } else if (tabName === 'nudges') {
                    renderNudgeTimeline();
                } else if (tabName === 'log') {
                    loadSyncLog();
                }
            }

            lucide.createIcons();
        }

        // ============================================================================
        // MODALS & DIALOGS
        // ============================================================================

        /**
         * Open event detail modal.
         */
        function openEventDetail(event) {
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('eventModalTitle');
            const content = document.getElementById('eventModalContent');

            title.textContent = event.title;

            content.innerHTML = `
                <div style="display: grid; gap: 16px;">
                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Company</label>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <img src="https://logo.clearbit.com/${event.companyDomain}" style="width: 24px; height: 24px; border-radius: 4px; background: var(--bg-tertiary);" onerror="this.style.display='none'">
                            <span style="font-size: 14px; color: var(--text-primary); font-weight: 500;">${event.company}</span>
                        </div>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Date & Time</label>
                        <div style="font-size: 14px; color: var(--text-primary);">
                            ${formatDateShort(new Date(event.start))} at ${formatTime(new Date(event.start))}
                        </div>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Type</label>
                        <span class="badge">${event.type}</span>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Status</label>
                        <div style="font-size: 14px; color: var(--text-primary);">
                            ${event.linkedRoleId ? '<span class="badge success">✓ Linked</span>' : '<span class="badge warning">Unlinked</span>'}
                        </div>
                    </div>

                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Attendees</label>
                        <div style="font-size: 13px; color: var(--text-secondary);">
                            ${event.attendees.join(', ')}
                        </div>
                    </div>

                    ${event.description ? `
                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Description</label>
                        <div style="font-size: 13px; color: var(--text-secondary);">
                            ${event.description}
                        </div>
                    </div>
                    ` : ''}

                    <div>
                        <label style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); display: block; margin-bottom: 8px;">Detection Confidence</label>
                        <div style="font-size: 14px; color: var(--text-primary); font-weight: 600;">
                            ${Math.round(event.detectionConfidence * 100)}%
                        </div>
                    </div>
                </div>
            `;

            modal.classList.add('active');
        }

        /**
         * Close a modal.
         */
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        /**
         * Handle clicks outside modal to close it.
         */
        function handleOutsideClick(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('active');
            }
        }

        // ============================================================================
        // COMMAND PALETTE
        // ============================================================================

        /**
         * Open the command palette for keyboard navigation.
         */
        function openCommandPalette() {
            const modal = document.getElementById('commandModal');
            const input = document.getElementById('commandInput');
            const list = document.getElementById('commandList');

            modal.classList.add('active');
            input.focus();
            input.value = '';
            renderCommandList('');
        }

        /**
         * Render command suggestions based on input.
         */
        function renderCommandList(query) {
            const list = document.getElementById('commandList');
            list.innerHTML = '';

            const commands = [
                { label: 'Scan Calendar', action: () => { scanCalendar(); closeModal('commandModal'); } },
                { label: 'Go to Week View', action: () => { switchTab('week'); closeModal('commandModal'); } },
                { label: 'Go to Event Manager', action: () => { switchTab('detection'); closeModal('commandModal'); } },
                { label: 'Go to Nudges', action: () => { switchTab('nudges'); closeModal('commandModal'); } },
                { label: 'Go to Sync Log', action: () => { switchTab('log'); closeModal('commandModal'); } },
                { label: 'Next Week', action: () => { nextWeek(); } },
                { label: 'Previous Week', action: () => { previousWeek(); } },
                { label: 'Toggle Sidebar', action: () => { toggleSidebarCollapse(); } }
            ];

            const filtered = query
                ? commands.filter(cmd => cmd.label.toLowerCase().includes(query.toLowerCase()))
                : commands;

            filtered.forEach(cmd => {
                const item = document.createElement('div');
                item.style.padding = '12px 16px';
                item.style.cursor = 'pointer';
                item.style.borderBottom = '1px solid var(--border)';
                item.style.fontSize = '13px';
                item.style.color = 'var(--text-primary)';
                item.onmouseover = () => {
                    item.style.background = 'var(--bg-tertiary)';
                };
                item.onmouseout = () => {
                    item.style.background = 'transparent';
                };
                item.textContent = cmd.label;
                item.onclick = cmd.action;
                list.appendChild(item);
            });

            if (filtered.length === 0) {
                const msg = document.createElement('div');
                msg.style.padding = '24px 16px';
                msg.style.textAlign = 'center';
                msg.style.color = 'var(--text-tertiary)';
                msg.textContent = 'No commands found';
                list.appendChild(msg);
            }
        }

        /**
         * Toggle sidebar collapse state.
         */
        function toggleSidebarCollapse() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // ============================================================================
        // THEME MANAGEMENT
        // ============================================================================

        /**
         * Toggle between light and dark themes.
         */
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            html.setAttribute('data-theme', newTheme);
            saveStorageData('pf_theme', newTheme);
            updateThemeIcon(newTheme);
            lucide.createIcons();
        }

        /**
         * Update theme icon.
         */
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'light') {
                icon.setAttribute('data-lucide', 'sun');
            } else {
                icon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        // ============================================================================
        // KEYBOARD SHORTCUTS
        // ============================================================================

        /**
         * Handle global keyboard shortcuts.
         */
        function handleKeyboardShortcuts(e) {
            // Cmd/Ctrl + K: Open command palette
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                openCommandPalette();
            }

            // Escape: Close modals
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(modal => {
                    if (modal.classList.contains('active')) {
                        modal.classList.remove('active');
                    }
                });
            }

            // Command palette filtering
            const commandInput = document.getElementById('commandInput');
            if (commandInput && document.getElementById('commandModal').classList.contains('active')) {
                if (e.key !== 'Escape') {
                    renderCommandList(commandInput.value);
                }
            }
        }

        // Add event listener for command input
        document.addEventListener('DOMContentLoaded', () => {
            const commandInput = document.getElementById('commandInput');
            if (commandInput) {
                commandInput.addEventListener('input', (e) => {
                    renderCommandList(e.target.value);
                });
            }
        });

        // ============================================================================
        // MODAL MANAGEMENT
        // ============================================================================

        /**
         * Open a modal by ID
         */
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
            }
        }

        /**
         * Close a modal by ID
         */
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
            }
        }

        /**
         * Open event detail modal
         */
        function openEventDetail(event) {
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('eventModalTitle');
            const content = document.getElementById('eventModalContent');

            title.textContent = event.title;

            let html = `
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Date & Time</div>
                        <div style="font-size: 14px; color: var(--text-primary);">${formatDateShort(new Date(event.date))} at ${formatTime(new Date(event.date))}</div>
                        <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">Duration: ${event.duration} minutes</div>
                    </div>

                    <div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Company</div>
                        <div style="font-size: 14px; color: var(--text-primary);">${event.company}</div>
                    </div>

                    <div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Interview Type</div>
                        <div style="font-size: 14px; color: var(--text-primary); text-transform: capitalize;">${event.type.replace(/_/g, ' ')}</div>
                    </div>

                    <div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Interviewers</div>
                        <div style="font-size: 14px; color: var(--text-primary);">${event.interviewers.length > 0 ? event.interviewers.join(', ') : 'Not specified'}</div>
                    </div>
            `;

            if (event.roleId) {
                const roles = getStorageData('pf_roles') || [];
                const role = roles.find(r => r.id === event.roleId);
                if (role) {
                    html += `
                        <div>
                            <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Linked Role</div>
                            <div style="font-size: 14px; color: var(--text-primary);">${role.title}</div>
                        </div>
                    `;
                }
            }

            if (event.meetingLink) {
                html += `
                    <div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Meeting Link</div>
                        <a href="${event.meetingLink}" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 14px;">Join Meeting</a>
                    </div>
                `;
            }

            if (event.prepNotes) {
                html += `
                    <div>
                        <div style="font-size: 12px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px;">Preparation Notes</div>
                        <div style="font-size: 14px; color: var(--text-primary); white-space: pre-wrap;">${event.prepNotes}</div>
                    </div>
                `;
            }

            // Check if this is a past interview event that needs debrief
            const debriefs = getStorageData('pf_debriefs') || [];
            if (eventNeedsDebrief(event, debriefs)) {
                html += `
                    <div style="padding: 12px; background: var(--warning); border-radius: var(--radius-sm); color: var(--bg-base);">
                        <div style="font-weight: 600; margin-bottom: 8px;">Debrief Pending</div>
                        <div style="font-size: 13px; margin-bottom: 10px;">Please share your feedback from this interview to improve future performance.</div>
                        <button onclick="triggerDebrief({id: '${event.id}', company: '${event.company}', title: '${event.title}', type: '${event.type}', date: '${event.date}', interviewers: ${JSON.stringify(event.interviewers)}, roleId: '${event.roleId || ''}'});" style="background: var(--bg-base); color: var(--warning); border: none; padding: 6px 12px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 12px;">Start Debrief →</button>
                    </div>
                `;
            } else if (event.debriefId) {
                html += `
                    <div style="padding: 12px; background: var(--success); border-radius: var(--radius-sm); color: var(--bg-base); display: flex; align-items: center; gap: 8px;">
                        <span style="font-weight: 700;">✓</span>
                        <span>Debrief completed</span>
                    </div>
                `;
            }

            html += `
                </div>
            `;

            content.innerHTML = html;
            openModal('eventModal');
        }

        // ============================================================================
        // NOTIFICATIONS
        // ============================================================================

        /**
         * Show a temporary notification message.
         */
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.position = 'fixed';
            notification.style.bottom = '24px';
            notification.style.right = '24px';
            notification.style.padding = '12px 16px';
            notification.style.background = 'var(--success)';
            notification.style.color = 'var(--bg-base)';
            notification.style.borderRadius = 'var(--radius-sm)';
            notification.style.fontSize = '13px';
            notification.style.fontWeight = '500';
            notification.style.boxShadow = 'var(--shadow-lg)';
            notification.style.zIndex = '2000';
            notification.style.animation = 'slideIn 0.3s ease-out';
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'fadeIn 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        // Run initialization when DOM is ready
        document.addEventListener('DOMContentLoaded', initializeModule);
    </script>
  <script src="../shared/data-switcher.js"></script>
</body>
</html>
