<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder - Calendar Integration</title>
    <link rel="stylesheet" href="../shared/pathfinder.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ============================================================================
           THEME & DESIGN TOKENS
           ============================================================================ */
        :root {
            --bg-base: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #252d3d;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-tertiary: #5f6368;
            --accent: #8ab4f8;
            --accent-hover: #aecbfa;
            --accent-dark: #5f97f7;
            --border: #3c4453;
            --success: #81c995;
            --warning: #fcc934;
            --error: #f28482;
            --info: #5f97f7;
            --radius: 8px;
            --radius-sm: 4px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            --bg-base: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #eeeeee;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --text-tertiary: #9aa0a6;
            --border: #dadce0;
            --accent: #1f71d8;
            --accent-hover: #2b7de9;
            --accent-dark: #1a5cb8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* ============================================================================
           NAVIGATION BAR
           ============================================================================ */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 24px;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            min-width: fit-content;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            overflow-x: auto;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-links a.active {
            color: var(--accent);
            background: var(--bg-tertiary);
            font-weight: 500;
        }

        #themeToggle {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #themeToggle:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        /* ============================================================================
           MAIN LAYOUT
           ============================================================================ */
        .container {
            display: flex;
            height: calc(100vh - 53px);
            gap: 0;
        }

        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .workspace-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .workspace-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .workspace-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .workspace-content {
            flex: 1;
            overflow: hidden;
            display: flex;
        }

        /* ============================================================================
           WEEK SELECTOR
           ============================================================================ */
        .week-selector {
            margin-bottom: 16px;
        }

        .week-selector-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .week-selector-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .week-selector-controls button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .week-selector-controls button:hover {
            background: var(--bg-base);
            color: var(--accent);
        }

        .week-selector-label {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        /* ============================================================================
           FILTERS
           ============================================================================ */
        .filters {
            margin-bottom: 20px;
        }

        .filters-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-btn {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .filter-btn:hover {
            background: var(--bg-base);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        .filter-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ============================================================================
           EVENT LIST
           ============================================================================ */
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .event-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .event-item:hover {
            background: var(--bg-base);
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .event-item.unlinked {
            border-color: var(--warning);
        }

        .event-item-time {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .event-item-title {
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .event-item-company {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .event-item-company-logo {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            object-fit: cover;
            background: var(--bg-base);
        }

        .event-item-meta {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .event-item-status {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .event-item-status.linked {
            background: var(--success);
        }

        .event-item-status.unlinked {
            background: var(--warning);
        }

        /* ============================================================================
           TABS
           ============================================================================ */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .tab-btn {
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* ============================================================================
           WEEK VIEW
           ============================================================================ */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            height: 100%;
        }

        .day-column {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .day-header {
            padding: 12px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .day-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .day-date {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .day-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .day-event-card {
            padding: 8px;
            border-radius: var(--radius-sm);
            border-left: 3px solid;
            background: var(--bg-base);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
        }

        .day-event-card:hover {
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }

        .day-event-card.interview {
            border-left-color: var(--accent);
        }

        .day-event-card.screen {
            border-left-color: var(--info);
        }

        .day-event-card.offer {
            border-left-color: var(--success);
        }

        .day-event-card.followup {
            border-left-color: var(--warning);
        }

        .day-event-card.unlinked {
            border-left-color: var(--error);
        }

        .day-event-time {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-bottom: 2px;
        }

        .day-event-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .day-event-company {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ============================================================================
           MONTH VIEW
           ============================================================================ */
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .month-day-cell {
            aspect-ratio: 1;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .month-day-cell:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .month-day-cell.other-month {
            opacity: 0.4;
        }

        .month-day-cell.today {
            border: 2px solid var(--accent);
            background: var(--bg-base);
        }

        .month-day-number {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 12px;
            margin-bottom: 2px;
        }

        .month-day-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        .month-day-event-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* ============================================================================
           DAY VIEW
           ============================================================================ */
        .day-view-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .time-slot {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-left: 2px solid var(--border);
            min-height: 60px;
        }

        .time-slot-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 50px;
            text-align: right;
        }

        .time-slot-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .time-slot-event {
            padding: 8px;
            background: var(--accent);
            color: white;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .time-slot-event:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-sm);
        }

        /* ============================================================================
           EVENT MANAGER / DETECTION
           ============================================================================ */
        .detection-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .scan-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .scan-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: var(--bg-base);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .scan-btn:hover {
            background: var(--accent-hover);
        }

        .scan-btn:active {
            transform: scale(0.98);
        }

        .scan-status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scan-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .detection-grid {
            display: grid;
            gap: 16px;
        }

        .detection-card {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detection-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .detection-logo {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-tertiary);
        }

        .detection-info {
            flex: 1;
        }

        .detection-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .detection-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .detection-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .detection-signals {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .signal {
            padding: 8px 12px;
            background: var(--bg-base);
            border-left: 3px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .signal.high {
            border-left-color: var(--success);
        }

        .signal.medium {
            border-left-color: var(--warning);
        }

        .signal.low {
            border-left-color: var(--text-tertiary);
        }

        .signal-text {
            color: var(--text-secondary);
            flex: 1;
        }

        .signal-badge {
            padding: 2px 8px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .signal.high .signal-badge {
            background: rgba(129, 201, 149, 0.2);
            color: var(--success);
        }

        .signal.medium .signal-badge {
            background: rgba(252, 201, 52, 0.2);
            color: var(--warning);
        }

        .detection-match {
            padding: 12px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detection-match-icon {
            color: var(--success);
        }

        .detection-match-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-primary);
        }

        .detection-match-role {
            font-weight: 600;
        }

        .detection-actions {
            display: flex;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .detection-action-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-base);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .detection-action-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .detection-action-btn.confirm {
            background: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        .detection-action-btn.confirm:hover {
            background: var(--accent-hover);
        }

        /* ============================================================================
           NUDGE TIMELINE
           ============================================================================ */
        .nudge-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nudge-group {
            margin-bottom: 24px;
        }

        .nudge-group-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            padding-left: 12px;
            border-left: 3px solid var(--text-tertiary);
        }

        .nudge-card {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.2s;
        }

        .nudge-card:hover {
            background: var(--bg-tertiary);
            box-shadow: var(--shadow-sm);
        }

        .nudge-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .nudge-timing {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            height: 48px;
            background: var(--accent);
            color: var(--bg-base);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 11px;
            text-align: center;
            padding: 4px;
        }

        .nudge-content {
            flex: 1;
        }

        .nudge-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .nudge-description {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .nudge-metadata {
            font-size: 12px;
            color: var(--text-tertiary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nudge-action {
            padding: 8px 16px;
            background: var(--accent);
            color: var(--bg-base);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nudge-action:hover {
            background: var(--accent-hover);
        }

        .nudge-action-secondary {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .nudge-action-secondary:hover {
            background: var(--bg-base);
            border-color: var(--accent);
        }

        /* ============================================================================
           SYNC LOG
           ============================================================================ */
        .sync-log-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sync-log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .sync-refresh-btn {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-refresh-btn:hover {
            background: var(--bg-base);
            border-color: var(--accent);
        }

        .sync-log-entries {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sync-log-entry {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sync-log-entry.success {
            border-left: 3px solid var(--success);
        }

        .sync-log-entry.warning {
            border-left: 3px solid var(--warning);
        }

        .sync-log-entry-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .sync-log-time {
            font-size: 12px;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .sync-log-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .sync-log-status.success {
            background: rgba(129, 201, 149, 0.2);
            color: var(--success);
        }

        .sync-log-status.warning {
            background: rgba(252, 201, 52, 0.2);
            color: var(--warning);
        }

        .sync-log-details {
            font-size: 13px;
            color: var(--text-secondary);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }

        .sync-log-detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-log-detail-label {
            color: var(--text-tertiary);
        }

        .sync-log-detail-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ============================================================================
           MODALS & OVERLAYS
           ============================================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .modal-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            background: var(--bg-base);
        }

        .modal-btn.primary {
            background: var(--accent);
            color: var(--bg-base);
            border-color: var(--accent);
        }

        .modal-btn.primary:hover {
            background: var(--accent-hover);
        }

        /* ============================================================================
           UTILITY CLASSES
           ============================================================================ */
        .empty-state {
            padding: 48px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            color: var(--text-tertiary);
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .badge.success {
            background: rgba(129, 201, 149, 0.2);
            color: var(--success);
        }

        .badge.warning {
            background: rgba(252, 201, 52, 0.2);
            color: var(--warning);
        }

        .badge.error {
            background: rgba(242, 132, 130, 0.2);
            color: var(--error);
        }

        .badge.info {
            background: rgba(95, 151, 247, 0.2);
            color: var(--info);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }

        /* ============================================================================
           DEBRIEF INTEGRATION
           ============================================================================ */
        .debrief-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            background: var(--warning);
            color: var(--bg-base);
            border-radius: 50%;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }

        .debrief-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--warning);
            color: var(--bg-base);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            margin-top: 6px;
        }

        .debrief-btn:hover {
            background: #ffd700;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .event-has-debrief {
            position: relative;
        }

        .event-has-debrief::after {
            content: '✓';
            position: absolute;
            top: 2px;
            right: 2px;
            color: var(--success);
            font-weight: 700;
            font-size: 12px;
        }

        .day-event-card.needs-debrief {
            border-left-color: var(--warning) !important;
        }

    </style>
</head>

    <!-- Main Container -->

                        </button>
                        <button class="filter-btn" onclick="filterEvents('interview')" id="filterInterview">
                            <span>Interviews</span>
                            <span class="filter-badge" id="badgeInterview">0</span>
                        </button>
                        <button class="filter-btn" onclick="filterEvents('followup')" id="filterFollowup">
                            <span>Follow-ups</span>
                            <span class="filter-badge" id="badgeFollowup">0</span>
                        </button>
                        <button class="filter-btn" onclick="filterEvents('unlinked')" id="filterUnlinked">
                            <span>Unlinked</span>
                            <span class="filter-badge" id="badgeUnlinked">0</span>
                        </button>
                    </div>
                </div>

                <!-- Debrief Status Badge -->
                <div style="margin-top: 20px; padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius-sm); border: 1px solid var(--border);">
                    <div style="font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px;">Pending Debriefs</div>
                    <div style="font-size: 20px; font-weight: 700; color: var(--warning);" id="debriefBadgeCount">0</div>
                </div>

                <!-- Upcoming Events List -->
                <div style="margin-top: 20px;">
                    <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px;">Next 7 Days</div>
                    <div class="event-list" id="upcomingEventList"></div>
                </div>
            </div>

        <!-- Right Workspace -->
        <div class="workspace">
            <div class="workspace-header">
                <div style="display: flex; align-items: center; gap: 16px; flex: 1;">
                    <h1 class="workspace-title">Calendar Integration</h1>
                </div>
                <div class="workspace-controls">
                    <button style="padding: 10px 16px; background: var(--accent); color: var(--bg-base); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="openModal('addEventModal')" title="Add a new interview event">
                        <i data-lucide="plus" width="16" height="16"></i>
                        <span>Add Event</span>
                    </button>
                    <button style="background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm);" onclick="openCommandPalette()" title="Command Palette (Cmd+K)">
                        <i data-lucide="command" width="18" height="18"></i>
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('week')">Week View</button>
                <button class="tab-btn" onclick="switchTab('month')">Month View</button>
                <button class="tab-btn" onclick="switchTab('day')">Day View</button>
                <button class="tab-btn" onclick="switchTab('detection')">Event Manager</button>
                <button class="tab-btn" onclick="switchTab('nudges')">Nudges</button>
                <button class="tab-btn" onclick="switchTab('log')">Sync Log</button>
            </div>

            <!-- Tab Content -->
            <div class="workspace-content">
                <!-- Tab 1: Week View -->
                <div class="tab-content active" id="tabWeek">
                    <div class="week-grid" id="weekGrid"></div>
                </div>

                <!-- Tab 2: Month View -->
                <div class="tab-content" id="tabMonth">
                    <div style="padding: 24px;">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                            <button onclick="previousMonth()" style="background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer;">← Prev Month</button>
                            <div style="font-size: 18px; font-weight: 600; color: var(--text-primary);" id="monthLabel">March 2026</div>
                            <button onclick="nextMonth()" style="background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer;">Next Month →</button>
                        </div>
                        <div class="month-grid" id="monthGrid"></div>
                        <div id="selectedDayEvents" style="margin-top: 24px;"></div>
                    </div>
                </div>

                <!-- Tab 3: Day View -->
                <div class="tab-content" id="tabDay">
                    <div style="padding: 24px;">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                            <button onclick="previousDay()" style="background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer;">← Prev Day</button>
                            <div style="font-size: 18px; font-weight: 600; color: var(--text-primary);" id="dayLabel">Today</div>
                            <button onclick="nextDay()" style="background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer;">Next Day →</button>
                        </div>
                        <button onclick="openAddEventModal()" style="background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 20px;">+ Add Event</button>
                        <div class="day-view-grid" id="dayViewGrid"></div>
                    </div>
                </div>

                <!-- Tab 4: Event Manager / Detection -->
                <div class="tab-content" id="tabDetection">
                    <div class="detection-container">
                        <div class="scan-controls">
                            <button class="scan-btn" id="scanBtn" onclick="scanCalendar()">
                                <i data-lucide="radio" width="16" height="16"></i>
                                <span>Scan Calendar</span>
                            </button>
                            <div class="scan-status" id="scanStatus"></div>
                        </div>
                        <div class="detection-grid" id="detectionGrid"></div>
                    </div>

                    <h2 class="modal-title" id="eventModalTitle">Event Details</h2>
                </div>
                <button class="modal-close" onclick="closeModal('eventModal')">
                    <i data-lucide="x" width="18" height="18"></i>
                </button>
            </div>
            <div class="modal-content" id="eventModalContent"></div>
            <div class="modal-footer">
                <div class="modal-actions">
                    <button class="modal-btn" onclick="closeModal('eventModal')">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div class="modal-overlay" id="addEventModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Add Interview Event</h2>
                <button class="modal-close" onclick="closeModal('addEventModal')">
                    <i data-lucide="x" width="18" height="18"></i>
                </button>
            </div>
            <div class="modal-content">
                <form id="addEventForm" onsubmit="handleAddEvent(event)">
                    <div style="display: flex; flex-direction: column; gap: 16px;">
                        <!-- Event Title -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Event Title</label>
                            <input type="text" id="eventTitle" placeholder="e.g., Phone Screen with John" required style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                        </div>

                        <!-- Company Field for Smart Role Suggestion -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Company</label>
                            <input type="text" id="eventCompany" placeholder="e.g., Google, Stripe" style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;" oninput="suggestRoles(this.value)">
                            <div id="roleSuggestions" style="margin-top: 8px; display: none; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); max-height: 200px; overflow-y: auto;">
                                <!-- Suggestions render here -->
                            </div>
                        </div>

                        <!-- Date -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Date</label>
                            <input type="date" id="eventDate" required style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                        </div>

                        <!-- Time -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Time</label>
                            <input type="time" id="eventTime" required style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                        </div>

                        <!-- Duration -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Duration</label>
                            <select id="eventDuration" style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                                <option value="30">30 minutes</option>
                                <option value="45">45 minutes</option>
                                <option value="60" selected>60 minutes</option>
                                <option value="90">90 minutes</option>
                            </select>
                        </div>

                        <!-- Event Type -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Interview Type</label>
                            <select id="eventType" style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                                <option value="phone_screen">Phone Screen</option>
                                <option value="technical">Technical</option>
                                <option value="behavioral">Behavioral</option>
                                <option value="panel">Panel</option>
                                <option value="hiring_manager">Hiring Manager</option>
                                <option value="take_home_due">Take-Home Due</option>
                                <option value="follow_up">Follow-Up</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <!-- Role Link -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Link to Role (Optional)</label>
                            <select id="eventRoleId" style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                                <option value="">-- No role --</option>
                            </select>
                        </div>

                        <!-- Interviewer Names -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Interviewer Names</label>
                            <input type="text" id="eventInterviewers" placeholder="e.g., John Smith, Jane Doe" style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                        </div>

                        <!-- Meeting Link -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Meeting Link (Optional)</label>
                            <input type="url" id="eventMeetingLink" placeholder="https://zoom.us/..." style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;">
                        </div>

                        <!-- Preparation Notes -->
                        <div>
                            <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">Preparation Notes</label>
                            <textarea id="eventPrepNotes" placeholder="Add notes on what to prepare..." style="width: 100%; padding: 10px; background: var(--bg-base); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px; resize: vertical; min-height: 80px;"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <div class="modal-actions">
                    <button class="modal-btn" onclick="closeModal('addEventModal')">Cancel</button>
                    <button class="modal-btn primary" onclick="document.getElementById('addEventForm').dispatchEvent(new Event('submit'))">Add Event</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Command Palette Modal -->
    <div class="modal-overlay" id="commandModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <input type="text" id="commandInput" placeholder="Type a command..." style="background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); padding: 10px 12px; border-radius: var(--radius-sm); flex: 1; font-size: 14px;">
                <button class="modal-close" onclick="closeModal('commandModal')">
                    <i data-lucide="x" width="18" height="18"></i>
                </button>
            </div>

        /**

         * This runs once when the page loads.
         */

            loadOrCreateDemoData();

            // Set up event listeners

            document.addEventListener('click', handleOutsideClick);

            // Populate role dropdown in add event modal

        /**
         * Populate the role dropdown in the "Add Event" modal with current roles from pf_roles
         */
        function populateRoleDropdown() {
            const roleSelect = document.getElementById('eventRoleId');
            if (!roleSelect) return;

            const roles = getStorageData('pf_roles') || [];
            const companies = getStorageData('pf_companies') || [];

            // Keep the default "-- No role --" option
            roleSelect.innerHTML = '<option value="">-- No role --</option>';

            roles.forEach(role => {
                const company = companies.find(c => c.id === role.companyId);
                const companyName = company ? company.name : 'Unknown';
                const option = document.createElement('option');
                option.value = role.id;
                option.textContent = `${role.title} at ${companyName}`;
                roleSelect.appendChild(option);
            });
        }

        /**
         * Handle the "Add Event" form submission
         */
        /**
         * Smart role suggestion based on company name match
         */
        function suggestRoles(companyInput) {
            if (!companyInput || companyInput.length < 1) {
                document.getElementById('roleSuggestions').style.display = 'none';
                return;
            }

            const roles = getStorageData('roles') || [];
            const companies = getStorageData('companies') || [];

            const matchedCompany = companies.find(c =>
                c.name && c.name.toLowerCase().includes(companyInput.toLowerCase())
            );

            if (!matchedCompany) {
                document.getElementById('roleSuggestions').style.display = 'none';
                return;
            }

            const rolesAtCompany = roles.filter(r => r.companyId === matchedCompany.id);

            if (rolesAtCompany.length === 0) {
                document.getElementById('roleSuggestions').style.display = 'none';
                return;
            }

            // If only 1 role at company, auto-link it
            if (rolesAtCompany.length === 1) {
                document.getElementById('eventRoleId').value = rolesAtCompany[0].id;
                document.getElementById('roleSuggestions').style.display = 'none';
                return;
            }

            // Show suggestions
            const suggestionsDiv = document.getElementById('roleSuggestions');
            suggestionsDiv.innerHTML = '';
            rolesAtCompany.forEach(role => {
                const suggestion = document.createElement('div');
                suggestion.style.padding = '8px 12px';
                suggestion.style.cursor = 'pointer';
                suggestion.style.borderBottom = '1px solid var(--border)';
                suggestion.style.fontSize = '13px';
                suggestion.textContent = `${role.title} (${role.stage})`;
                suggestion.addEventListener('click', () => {
                    document.getElementById('eventRoleId').value = role.id;
                    document.getElementById('roleSuggestions').style.display = 'none';
                });
                suggestion.addEventListener('mouseover', () => {
                    suggestion.style.background = 'var(--bg-tertiary)';
                });
                suggestion.addEventListener('mouseout', () => {
                    suggestion.style.background = 'transparent';
                });
                suggestionsDiv.appendChild(suggestion);
            });

            suggestionsDiv.style.display = 'block';
        }

        function handleAddEvent(event) {
            event.preventDefault();

            const title = document.getElementById('eventTitle').value;
            const companyInput = document.getElementById('eventCompany').value;
            const dateStr = document.getElementById('eventDate').value;
            const timeStr = document.getElementById('eventTime').value;
            const duration = parseInt(document.getElementById('eventDuration').value);
            const type = document.getElementById('eventType').value;
            const roleId = document.getElementById('eventRoleId').value || null;
            const interviewers = document.getElementById('eventInterviewers').value
                .split(',')
                .map(n => n.trim())
                .filter(n => n.length > 0);
            const meetingLink = document.getElementById('eventMeetingLink').value;
            const prepNotes = document.getElementById('eventPrepNotes').value;

            // Validate and create date
            if (!dateStr || !timeStr) {
                showNotification('Please select date and time');
                return;
            }

            const [year, month, day] = dateStr.split('-');
            const [hours, minutes] = timeStr.split(':');
            const eventDate = new Date(year, month - 1, day, hours, minutes);

            // Get company from input or role if linked
            let company = companyInput || 'Unknown';
            if (roleId) {
                const roles = getStorageData('roles') || [];
                const role = roles.find(r => r.id === roleId);
                if (role) {
                    const companies = getStorageData('companies') || [];
                    const comp = companies.find(c => c.id === role.companyId);
                    if (comp) company = comp.name;
                }
            }

            // Create event object
            const newEvent = {
                id: `evt-${Date.now()}`,
                title,
                date: eventDate.toISOString(),
                duration,
                type,
                roleId: roleId || null,
                company,
                interviewers,
                prepNotes,
                meetingLink,
                status: 'upcoming',
                createdAt: new Date().toISOString()
            };

            // Save to localStorage
            const allEvents = getStorageData('pf_calendar_events') || [];
            allEvents.push(newEvent);
            saveStorageData('pf_calendar_events', allEvents);

            // Clear form and close modal
            document.getElementById('addEventForm').reset();
            closeModal('addEventModal');

            // Refresh views
            renderWeekView();
            updateUpcomingEventList();
            updateFilterBadges();
            generateNudges();
            renderNudgeTimeline();

            showNotification(`Added "${title}" to calendar`);
        }

                saveStorageData('pf_calendar_events', calendarEvents);

            // Ensure nudges exist
            let nudges = getStorageData('pf_calendar_nudges');
            if (!nudges) {
                nudges = [];
                saveStorageData('pf_calendar_nudges', nudges);
            }

            // Ensure sync log exists
            let syncLog = getStorageData('pf_sync_log');
            if (!syncLog) {
                syncLog = [];
                saveStorageData('pf_sync_log', syncLog);
            }

            // Load or create demo roles if they don't exist
            let roles = getStorageData('pf_roles');
            if (!roles || roles.length === 0) {
                roles = generateDemoRoles();
                saveStorageData('pf_roles', roles);

            // Load or create demo companies if they don't exist
            let companies = getStorageData('pf_companies');
            if (!companies || companies.length === 0) {
                companies = generateDemoCompanies();
                saveStorageData('pf_companies', companies);
            }

            // Load theme preference
            const theme = getStorageData('pf_theme');
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
                updateThemeIcon(theme);
            }
        }

        /**
         * Get data from localStorage with pf_ prefix.
         */
        function getStorageData(key) {
            try {
                const data = localStorage.getItem(`pf_${key}`);
                return data ? JSON.parse(data) : null;
            } catch (e) {
                console.error(`Error reading storage key ${key}:`, e);
                return null;
            }
        }

        /**
         * Save data to localStorage with pf_ prefix.
         */
        function saveStorageData(key, data) {
            try {
                localStorage.setItem(`pf_${key}`, JSON.stringify(data));
            } catch (e) {
                console.error(`Error saving storage key ${key}:`, e);
            }
        }

        // ============================================================================
        // DATE & TIME UTILITIES
        // ============================================================================

        /**
         * Get start of week (Monday) for a given date.
         */
        function getWeekStart(date = new Date()) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        /**
         * Format date as "Mon, Mar 9".
         */
        function formatDateShort(date) {
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            return new Intl.DateTimeFormat('en-US', options).format(date);
        }

        /**
         * Format time as "2:30 PM".
         */
        function formatTime(date) {
            const options = { hour: 'numeric', minute: '2-digit', hour12: true };
            return new Intl.DateTimeFormat('en-US', options).format(date);
        }

        /**
         * Check if event is today.
         */
        function isToday(date) {
            const today = new Date();
            return date.toDateString() === today.toDateString();
        }

        /**
         * Get human-readable time difference (e.g., "in 2 days").
         */
        function getTimeUntil(date) {
            const now = new Date();
            const diff = date - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            if (days > 0) return `in ${days} day${days > 1 ? 's' : ''}`;
            if (hours > 0) return `in ${hours} hour${hours > 1 ? 's' : ''}`;
            if (diff > 0) return 'soon';
            return 'now';
        }

        /* ====== DEBRIEF INTEGRATION FUNCTIONS ====== */

        /**
         * Check if an event needs a debrief.
         * INPUT: event object, debriefs array
         * OUTPUT: boolean - true if event is past, is interview type, and has no matching debrief
         */
        function eventNeedsDebrief(event, debriefs) {
            // Event must be interview type
            const interviewTypes = ['phone_screen', 'technical', 'behavioral', 'panel', 'hiring_manager'];
            if (!interviewTypes.includes(event.type)) return false;

            // Event end time must have passed
            const eventEnd = new Date(event.date);
            if (event.duration) {
                eventEnd.setMinutes(eventEnd.getMinutes() + event.duration);
            } else {
                eventEnd.setHours(eventEnd.getHours() + 1); // Default 1 hour duration
            }
            if (eventEnd > new Date()) return false;

            // No debrief should exist for this event
            const hasDebrief = debriefs.some(d => d.eventId === event.id);
            return !hasDebrief;
        }

        /**
         * Count how many events need debriefs.
         * INPUT: none (uses localStorage)
         * OUTPUT: number of pending debriefs
         */
        function countPendingDebriefs() {
            const events = getStorageData('pf_calendar_events') || [];
            const debriefs = getStorageData('pf_debriefs') || [];
            return events.filter(evt => eventNeedsDebrief(evt, debriefs)).length;
        }

        /**
         * Update the debrief badge in the sidebar.
         * INPUT: none (reads from localStorage)
         * OUTPUT: updates DOM with count
         */
        function updateDebriefBadge() {
            const count = countPendingDebriefs();
            const badge = document.getElementById('debriefBadgeCount');
            if (badge) {
                badge.textContent = count;
                badge.style.color = count > 0 ? 'var(--warning)' : 'var(--text-secondary)';
            }
        }

        /**
         * Trigger debrief for an event: save event context to localStorage and navigate.
         * INPUT: event object (eventId, company, title, type, date, interviewers, roleId)
         * OUTPUT: navigates to debrief module
         */
        function triggerDebrief(event) {
            const pendingDebrief = {
                eventId: event.id,
                company: event.company,
                title: event.title,
                type: event.type,
                date: event.date,
                interviewers: event.interviewers || [],
                roleId: event.roleId || null
            };

            // Save to localStorage for debrief module to pick up
            localStorage.setItem('pf_pending_debrief', JSON.stringify(pendingDebrief));

            // Navigate to debrief module
            window.location.href = '../debrief/';
        }

        /**
         * Mark an event as debriefed by storing the debrief ID in the calendar event.
         * INPUT: eventId (string), debriefId (string)
         * OUTPUT: updates pf_calendar_events in localStorage
         */
        function linkDebriefToEvent(eventId, debriefId) {
            const events = getStorageData('pf_calendar_events') || [];
            const event = events.find(e => e.id === eventId);
            if (event) {
                event.debriefId = debriefId;
                saveStorageData('pf_calendar_events', events);
            }
        }

        // ============================================================================
        // WEEK VIEW RENDERING
        // ============================================================================

        let currentWeekStart = getWeekStart();

        function nextWeek() {
            currentWeekStart = new Date(currentWeekStart);
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            renderWeekView();
            updateUpcomingEventList();
        }

        function previousWeek() {
            currentWeekStart = new Date(currentWeekStart);
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            renderWeekView();
            updateUpcomingEventList();
        }

        /**
         * Render the 7-day week grid with events.
         */
        function renderWeekView() {
            const weekGrid = document.getElementById('weekGrid');
            weekGrid.innerHTML = '';

            const calendarEvents = getStorageData('pf_calendar_events') || [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Create 7 day columns
            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(currentWeekStart);
                dayDate.setDate(dayDate.getDate() + i);

                const dayColumn = document.createElement('div');
                dayColumn.className = 'day-column';

                // Day header
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                if (dayDate.toDateString() === today.toDateString()) {
                    dayHeader.style.backgroundColor = 'var(--accent)';
                    dayHeader.style.color = 'var(--bg-base)';
                }

                const dayName = document.createElement('div');
                dayName.className = 'day-name';
                dayName.textContent = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][dayDate.getDay()];
                const dayDateEl = document.createElement('div');
                dayDateEl.className = 'day-date';
                dayDateEl.textContent = dayDate.getDate();
                dayHeader.appendChild(dayName);
                dayHeader.appendChild(dayDateEl);
                dayColumn.appendChild(dayHeader);

                // Day content with events
                const dayContent = document.createElement('div');
                dayContent.className = 'day-content';

                // Filter events for this day
                const dayEvents = calendarEvents.filter(evt => {
                    const eventDate = new Date(evt.date);
                    eventDate.setHours(0, 0, 0, 0);
                    return eventDate.toDateString() === dayDate.toDateString();
                });

                if (dayEvents.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.style.fontSize = '11px';
                    emptyMsg.style.color = 'var(--text-tertiary)';
                    emptyMsg.style.textAlign = 'center';
                    emptyMsg.style.padding = '12px 4px';
                    emptyMsg.textContent = 'No events';
                    dayContent.appendChild(emptyMsg);
                } else {
                    dayEvents.forEach(evt => {
                        const eventCard = document.createElement('div');
                        eventCard.className = `day-event-card ${evt.type} ${!evt.roleId ? 'unlinked' : ''}`;
                        eventCard.style.cursor = 'pointer';
                        eventCard.onclick = () => openEventDetail(evt);

                        const timeEl = document.createElement('div');
                        timeEl.className = 'day-event-time';
                        timeEl.textContent = formatTime(new Date(evt.date));
                        eventCard.appendChild(timeEl);

                        const titleEl = document.createElement('div');
                        titleEl.className = 'day-event-title';
                        titleEl.textContent = evt.title;
                        eventCard.appendChild(titleEl);

                        const companyEl = document.createElement('div');
                        companyEl.className = 'day-event-company';
                        companyEl.textContent = evt.company;
                        eventCard.appendChild(companyEl);

                        dayContent.appendChild(eventCard);
                    });
                }

                dayColumn.appendChild(dayContent);
                weekGrid.appendChild(dayColumn);
            }

            // Update week label
            const weekEnd = new Date(currentWeekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            const weekLabel = document.getElementById('weekLabel');
            weekLabel.textContent = `${currentWeekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
        }

        let activeFilter = 'all';

        function filterEvents(type) {
            activeFilter = type;

            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');

            document.getElementById(`filter${type.charAt(0).toUpperCase() + type.slice(1)}`).classList.add('active');
