<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Outreach Generator</title>
  <meta name="description" content="Generate personalized networking and outreach messages with Claude AI">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css?v=3.5.1">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js?v=3.5.1"></script>

  <style>
    /* Main container */
    .outreach-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Left sidebar: selectors and context */
    .sidebar {
      width: 320px;
      background: var(--bg-surface);
      border-right: 1px solid var(--bg-subtle);
      overflow-y: auto;
      padding: var(--space-4);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .sidebar-section-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: var(--space-2);
    }

    .selector-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .selector-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .selector-input:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .selector-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Context card */
    .context-card {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .context-card-empty {
      text-align: center;
      padding: var(--space-4);
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }

    .context-card h3 {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      font-size: var(--text-xs);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--bg-surface);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .detail-value {
      color: var(--text-primary);
      word-break: break-word;
    }

    /* Right workspace */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Message type tabs */
    .message-tabs {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      background: var(--bg-surface);
      overflow-x: auto;
      overflow-y: hidden;
    }

    .message-tab {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .message-tab:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .message-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Editor panel */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-6);
      overflow-y: auto;
      gap: var(--space-4);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
    }

    .editor-meta {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      display: flex;
      gap: var(--space-3);
    }

    /* Message content area */
    .message-content {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-size: var(--text-sm);
      line-height: 1.6;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      text-align: center;
    }

    /* Message textarea */
    .message-textarea {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
      max-height: 400px;
      font-size: var(--text-sm);
      font-family: var(--font-mono);
      color: var(--text-primary);
      line-height: 1.6;
      resize: vertical;
    }

    .message-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Character count */
    .char-count {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-2);
    }

    .char-count.warning {
      color: var(--warning);
    }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid var(--bg-subtle);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .btn:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ====== Gmail Integration Buttons ====== */
    .btn.gmail-open {
      background: #EA4335;
      color: white;
      border-color: #EA4335;
    }

    .btn.gmail-open:hover {
      opacity: 0.9;
      background: #d33426;
    }

    .btn.gmail-queue {
      background: var(--accent-subtle);
      color: var(--accent);
      border-color: var(--accent);
    }

    .btn.gmail-queue:hover {
      background: var(--accent);
      color: white;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* API key setup */
    .api-key-setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-6);
    }

    .api-key-setup h2 {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--text-primary);
    }

    .api-key-setup p {
      color: var(--text-secondary);
      text-align: center;
      max-width: 400px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-6);
      color: var(--text-secondary);
      text-align: center;
    }

    .empty-state-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    /* Message tracking and response status */
    .response-status {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      margin-top: var(--space-2);
    }

    .response-status.sent {
      background: var(--info-subtle);
      color: var(--info);
    }

    .response-status.responded {
      background: var(--success-subtle);
      color: var(--success);
    }

    .response-status.no_response {
      background: var(--warning-subtle);
      color: var(--warning);
    }

    .response-status.opened {
      background: var(--info-subtle);
      color: var(--info);
    }

    /* Templates section */
    .templates-section {
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--bg-subtle);
    }

    .templates-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .template-item {
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: var(--text-xs);
      margin-bottom: var(--space-2);
      transition: all var(--duration-fast) var(--ease-default);
    }

    .template-item:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    /* Outreach history */
    .outreach-history-panel {
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--bg-subtle);
    }

    .history-entry {
      padding: var(--space-3);
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-3);
    }

    .history-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-2);
    }

    .history-entry-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .history-entry-date {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    .history-entry-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      margin-top: var(--space-2);
    }

    .status-sent {
      background: var(--info-subtle);
      color: var(--info);
    }

    .status-responded {
      background: var(--success-subtle);
      color: var(--success);
    }

    .status-no-response {
      background: var(--warning-subtle);
      color: var(--warning);
    }

    /* Schedule follow-up dialog */
    .schedule-dialog {
      padding: var(--space-4);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      margin-top: var(--space-3);
    }

    .schedule-dialog input {
      width: 100%;
      padding: var(--space-2);
      margin: var(--space-2) 0;
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
    }

    /* ====== FEATURE 18: InMail Preview & Character Counter ====== */
    .inmail-preview {
      background: linear-gradient(135deg, #f0f4f8 0%, #fafbfc 100%);
      border: 1px solid #ccc;
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin: var(--space-4) 0;
      max-width: 500px;
    }

    .inmail-preview-header {
      background: white;
      padding: var(--space-3);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-3);
      border: 1px solid #e5e7eb;
    }

    .inmail-preview-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      font-weight: 600;
      margin-right: var(--space-2);
    }

    .inmail-preview-sender {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }

    .inmail-preview-message {
      background: white;
      padding: var(--space-3);
      border-radius: var(--radius-sm);
      border: 1px solid #e5e7eb;
      font-size: var(--text-sm);
      line-height: 1.5;
      color: var(--text-primary);
    }

    /* Character count warning for InMail */
    .char-count.danger {
      color: var(--danger);
      font-weight: 600;
    }

    /* ====== FEATURE 44: Quality Score Badge & Edit Sidebar ====== */
    .quality-score-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      margin-left: var(--space-2);
    }

    .quality-score-badge.excellent {
      background: var(--success-subtle);
      color: var(--success);
    }

    .quality-score-badge.good {
      background: #fef3c7;
      color: #92400e;
    }

    .quality-score-badge.needs-work {
      background: var(--error-subtle);
      color: var(--error);
    }

    /* Edit sidebar from the right */
    .edit-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: var(--bg-surface);
      border-left: 1px solid var(--bg-subtle);
      padding: var(--space-4);
      overflow-y: auto;
      z-index: 100;
      box-shadow: -4px 0 12px rgba(0, 0, 0, 0.1);
      transform: translateX(0);
      transition: transform var(--duration-normal) var(--ease-default);
    }

    .edit-sidebar.hidden {
      transform: translateX(100%);
      pointer-events: none;
    }

    .edit-sidebar-close {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: var(--space-1);
      font-size: var(--text-lg);
      transition: color var(--duration-fast) var(--ease-default);
    }

    .edit-sidebar-close:hover {
      color: var(--text-primary);
    }

    .quality-breakdown {
      background: var(--bg-elevated);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
      font-size: var(--text-xs);
    }

    .quality-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--bg-subtle);
    }

    .quality-item:last-child {
      border-bottom: none;
    }

    .quality-item-label {
      color: var(--text-secondary);
      flex: 1;
    }

    .quality-item-score {
      font-weight: 600;
      color: var(--accent);
    }

    .edit-option-group {
      margin-bottom: var(--space-4);
    }

    .edit-option-title {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: var(--space-2);
      letter-spacing: 0.05em;
    }

    .tone-selector, .length-selector {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .tone-btn, .length-btn {
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--bg-subtle);
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      transition: all var(--duration-fast) var(--ease-default);
    }

    .tone-btn:hover, .length-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .tone-btn.active, .length-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .manual-edit-textarea {
      width: 100%;
      padding: var(--space-2);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      resize: vertical;
      min-height: 100px;
    }

    .manual-edit-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* ====== FEATURE 45: Analytics & Smart Timing ====== */
    .analytics-panel {
      background: var(--bg-elevated);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin-top: var(--space-4);
    }

    .analytics-header {
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-3);
      color: var(--text-primary);
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .analytics-card {
      background: var(--bg-surface);
      padding: var(--space-3);
      border-radius: var(--radius-sm);
      text-align: center;
    }

    .analytics-value {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--accent);
    }

    .analytics-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-1);
    }

    .timing-suggestion {
      background: var(--accent-subtle);
      padding: var(--space-3);
      border-radius: var(--radius-sm);
      margin-top: var(--space-3);
      border-left: 3px solid var(--accent);
    }

    .timing-suggestion-title {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: var(--space-1);
    }

    .timing-suggestion-text {
      font-size: var(--text-sm);
      color: var(--text-primary);
    }

    .insights-section {
      background: var(--bg-elevated);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      margin-top: var(--space-4);
    }

    .insight-item {
      padding: var(--space-2);
      background: var(--bg-surface);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
      font-size: var(--text-xs);
      color: var(--text-primary);
      line-height: 1.5;
    }

    .insight-item:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 768px) {
      .outreach-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--bg-subtle);
        max-height: 200px;
      }

      .editor-panel {
        padding: var(--space-3);
      }

      .message-tabs {
        padding: var(--space-3);
        gap: var(--space-1);
      }

      .message-tab {
        padding: var(--space-1) var(--space-2);
        font-size: var(--text-xs);
      }

      .inmail-preview {
        max-width: 100%;
      }
    }
  </style>
</head>

    <!-- LEFT SIDEBAR: Context Panel -->
    <div class="sidebar">
      <div>
        <div class="sidebar-section-title">Company & Role</div>

  <script src="../shared/data-layer.js?v=3.5.1"></script> <!-- v3.0.0: MCP-backed data persistence -->
  <script>
    /** Safely parse JSON from localStorage with fallback */
    function safeJsonParse(key, fallback = null) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        console.warn(`[Pathfinder] Corrupt localStorage key "${key}", using fallback`, e);
        return fallback;
      }
    }

    /**
     * ============================================================
     * PATHFINDER OUTREACH MODULE — Real Claude API Integration
     * + Gmail Integration (March 2026)
     * Version: 2.1
     * ============================================================
     *
     * GMAIL INTEGRATION FEATURES:
     * 1. "Open in Gmail" button — Opens Gmail compose tab with message pre-filled
     * 2. "Queue as Draft" button — Saves messages to localStorage for batch sending
     * 3. Draft Queue Display — Shows queued drafts with their details
     *
     * Only email-type messages (cold-email, thank-you, recruiter-response, etc.)
     * show these buttons. LinkedIn types keep their original behavior.
     *
     * Queue format: localStorage key 'pf_outreach_gmail_queue' stores array of:
     *   { id, to, subject, body, messageType, company, role, queuedAt, status }
     *
     * Requirements: Connection objects MUST have an 'email' field for Gmail features.
     *
     * This module generates personalized outreach messages using
     * real Claude API calls, never templates or generics.
     *
     * Features:
     * - 8 message types with Claude-generated content
     * - Real company, role, and connection data from localStorage
     * - Anti-template system prompts (no generic openers)
     * - Character limits and formatting per message type
     * - Full message editing and history tracking
     */

    const AppState = {
      selectedCompanyId: null,
      selectedRoleId: null,
      selectedConnectionId: null,
      selectedMessageType: 'linkedin-connect',
      currentMessage: '',
      isGenerating: false,
      editSidebarOpen: false,
      selectedTone: 'professional',
      selectedLength: 'standard',
      qualityScore: null,
    };

    const MESSAGE_TYPES = [
      {
        id: 'linkedin-connect',
        name: 'LinkedIn Connection',
        description: 'Request to connect',
        charLimit: 300,
        isEmail: false,
      },
      {
        id: 'cold-email',
        name: 'Cold Email',
        description: 'Initial outreach',
        charLimit: 800,
        isEmail: true,
      },
      {
        id: 'cold-email-followup',
        name: 'Follow-Up Email',
        description: 'Gentle reminder after 7+ days',
        charLimit: 500,
        isEmail: true,
      },
      {
        id: 'referral-request',
        name: 'Referral Request',
        description: 'Ask someone to refer you',
        charLimit: 600,
        isEmail: true,
      },
      {
        id: 'thank-you-call',
        name: 'Thank You (Call)',
        description: 'After a networking call',
        charLimit: 400,
        isEmail: true,
      },
      {
        id: 'thank-you-interview',
        name: 'Thank You (Interview)',
        description: 'Post-interview follow-up',
        charLimit: 700,
        isEmail: true,
      },
      {
        id: 'inmail-linkedin',
        name: 'InMail (LinkedIn)',
        description: 'LinkedIn message with research',
        charLimit: 1900,
        isEmail: false,
        subjectLimit: 200,
      },
      {
        id: 'recruiter-response',
        name: 'Recruiter Response',
        description: 'Reply to inbound recruiter',
        charLimit: 600,
        isEmail: true,
      },
      {
        id: 'networking-intro',
        name: 'Networking Intro',
        description: 'Warm introduction request',
        charLimit: 500,
        isEmail: true,
      },
    ];

    // ════════════════════════════════════════════════════════
    // GMAIL INTEGRATION: Helper functions
    // ════════════════════════════════════════════════════════

    /**
     * Checks if a message type is email-based
     * INPUT: messageType string (e.g., 'cold-email')
     * OUTPUT: boolean, true if the message type should have Gmail buttons
     */
    function isEmailType(messageType) {
      const msgType = MESSAGE_TYPES.find(t => t.id === messageType);
      return msgType && msgType.isEmail === true;
    }

    /**
     * Extracts email subject from the generated message
     * Many messages start with "Subject: ..." line, this extracts that
     * INPUT: messageBody string
     * OUTPUT: subject string or empty string if not found
     */
    function extractSubjectFromMessage(messageBody) {
      const lines = messageBody.split('\n');
      const subjectLine = lines.find(line => line.trim().toLowerCase().startsWith('subject:'));
      if (subjectLine) {
        return subjectLine.replace(/^subject:\s*/i, '').trim();
      }
      // Fallback: use first line as subject if it's short enough
      const firstLine = lines[0]?.trim() || '';
      if (firstLine.length < 100) {
        return firstLine;
      }
      return '';
    }

    /**
     * Extracts clean email body (removes "Subject:" line if present)
     * INPUT: messageBody string
     * OUTPUT: cleaned body string
     */
    function extractBodyFromMessage(messageBody) {
      const lines = messageBody.split('\n');
      const subjectLineIndex = lines.findIndex(line => line.trim().toLowerCase().startsWith('subject:'));
      if (subjectLineIndex !== -1) {
        return lines.slice(subjectLineIndex + 1).join('\n').trim();
      }
      return messageBody.trim();
    }

    /**
     * URL encodes a string for use in mailto/Gmail URLs
     * INPUT: text string to encode
     * OUTPUT: properly encoded string safe for URLs
     */
    function encodeForUrl(text) {
      return encodeURIComponent(text || '');
    }

    /**
     * Validates if email address is in proper format
     * INPUT: email string
     * OUTPUT: boolean, true if email looks valid
     */
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    /**
     * Opens Gmail compose with pre-filled message
     * This opens a new tab to Gmail with the message body, subject, and recipient pre-filled
     * INPUT: recipient email, message body text, message type
     * OUTPUT: opens new Gmail tab, returns undefined
     */
    function openInGmail() {
      const messageType = MESSAGE_TYPES.find(t => t.id === AppState.selectedMessageType);
      if (!messageType || !messageType.isEmail) {
        showToast('Only email-type messages can be sent via Gmail', 'error');
        return;
      }

      const connections = getConnections();
      const connection = connections.find(c => c.name === AppState.selectedConnectionId);

      if (!connection || !connection.email) {
        showToast('This connection does not have an email address', 'error');
        return;
      }

      if (!isValidEmail(connection.email)) {
        showToast('Invalid email address: ' + connection.email, 'error');
        return;
      }

      const subject = extractSubjectFromMessage(AppState.currentMessage);
      const body = extractBodyFromMessage(AppState.currentMessage);

      // Build Gmail compose URL: https://mail.google.com/mail/?view=cm&su=SUBJECT&body=BODY&to=EMAIL
      const gmailUrl = `https://mail.google.com/mail/?view=cm&su=${encodeForUrl(subject)}&body=${encodeForUrl(body)}&to=${encodeForUrl(connection.email)}`;

      // Open in new tab
      window.open(gmailUrl, '_blank');
      showToast('Opening Gmail... complete the email and send from there', 'success');
    }

    /**
     * Gets the current Gmail draft queue from localStorage
     * INPUT: none
     * OUTPUT: array of draft objects, each with { id, to, subject, body, messageType, company, role, queuedAt, status }
     */
    function getGmailQueue() {
      try {
        const data = localStorage.getItem('pf_outreach_gmail_queue');
        return data ? JSON.parse(data) : [];
      } catch (error) {
        console.warn('Failed to parse Gmail queue from localStorage:', error);
        return [];
      }
    }

    /**
     * Saves the Gmail draft queue to localStorage
     * INPUT: queue array
     * OUTPUT: saves to localStorage, returns undefined
     */
    function saveGmailQueue(queue) {
      try {
        localStorage.setItem('pf_outreach_gmail_queue', JSON.stringify(queue));
      } catch (error) {
        console.warn('Failed to save Gmail queue to localStorage:', error);
      }
    }

    /**
     * Adds current message to the Gmail draft queue
     * Creates a queue item with all needed data: recipient, subject, body, context
     * INPUT: none (uses current AppState)
     * OUTPUT: shows toast, adds to queue, updates UI
     */
    function queueAsGmailDraft() {
      const messageType = MESSAGE_TYPES.find(t => t.id === AppState.selectedMessageType);
      if (!messageType || !messageType.isEmail) {
        showToast('Only email-type messages can be queued', 'error');
        return;
      }

      const connections = getConnections();
      const connection = connections.find(c => c.name === AppState.selectedConnectionId);
      const companies = getCompanies();
      const company = companies.find(c => c.name === AppState.selectedCompanyId);
      const roles = getRoles();
      const role = roles.find(r => r.id === AppState.selectedRoleId);

      if (!connection || !connection.email) {
        showToast('This connection does not have an email address', 'error');
        return;
      }

      if (!isValidEmail(connection.email)) {
        showToast('Invalid email address: ' + connection.email, 'error');
        return;
      }

      const subject = extractSubjectFromMessage(AppState.currentMessage);
      const body = extractBodyFromMessage(AppState.currentMessage);

      // Get existing queue and add new item
      const queue = getGmailQueue();
      const draftItem = {
        id: 'draft_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        to: connection.email,
        subject: subject || messageType.name,
        body: body,
        messageType: AppState.selectedMessageType,
        company: company?.name || 'Unknown',
        role: role?.title || 'Unknown',
        connectionName: connection.name,
        queuedAt: new Date().toISOString(),
        status: 'pending', // pending, synced, sent
      };

      queue.push(draftItem);
      saveGmailQueue(queue);

      showToast(`✓ Queued: "${draftItem.subject}" → ${connection.email}`, 'success');
      updateGmailQueueDisplay();
    }

    /**
     * Removes a draft from the Gmail queue
     * INPUT: draftId string
     * OUTPUT: removes from queue, updates UI
     */
    function removeGmailDraft(draftId) {
      let queue = getGmailQueue();
      queue = queue.filter(d => d.id !== draftId);
      saveGmailQueue(queue);
      updateGmailQueueDisplay();
      showToast('Removed from queue', 'info');
    }

    /**
     * Updates the Gmail queue display section
     * Shows how many drafts are queued and lists them
     * INPUT: none
     * OUTPUT: renders the queue display HTML with accessibility attributes
     */
    function updateGmailQueueDisplay() {
      const queueContainer = document.getElementById('gmail-queue-display');
      if (!queueContainer) return;

      const queue = getGmailQueue();

      if (queue.length === 0) {
        queueContainer.innerHTML = '';
        return;
      }

      queueContainer.innerHTML = `
        <div style="margin-top: var(--space-6); padding-top: var(--space-6); border-top: 1px solid var(--bg-subtle);" aria-live="polite" aria-label="Gmail drafts queue">
          <div style="display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-3);">
            <span style="font-size: var(--text-sm); font-weight: 600; color: var(--text-primary);">
              Gmail Drafts Queued
            </span>
            <span style="display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; background: var(--accent); color: white; border-radius: 50%; font-size: var(--text-xs); font-weight: 700;" aria-label="${queue.length} draft(s) queued">
              ${queue.length}
            </span>
          </div>

          <div style="display: flex; flex-direction: column; gap: var(--space-2);">
            ${queue.map(draft => `
              <div style="padding: var(--space-3); background: var(--bg-elevated); border-left: 3px solid var(--accent); border-radius: var(--radius-sm);">
                <div style="display: flex; justify-content: space-between; align-items: start; gap: var(--space-2);">
                  <div style="flex: 1; min-width: 0;">
                    <div style="font-size: var(--text-sm); font-weight: 500; color: var(--text-primary); word-break: break-word; margin-bottom: var(--space-1);">
                      ${draft.subject || '(no subject)'}
                    </div>
                    <div style="font-size: var(--text-xs); color: var(--text-secondary);">
                      To: ${draft.to}
                    </div>
                    <div style="font-size: var(--text-xs); color: var(--text-tertiary); margin-top: var(--space-1);">
                      ${draft.company} • ${draft.role} • ${new Date(draft.queuedAt).toLocaleDateString()}
                    </div>
                  </div>
                  <button class="btn" style="padding: var(--space-1) var(--space-2); font-size: var(--text-xs);" aria-label="Remove draft to ${draft.to}" onclick="removeGmailDraft('${draft.id}')">
                    Remove
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════
    // FEATURE 44: DEBRIEF INTEGRATION & QUALITY SCORER
    // ════════════════════════════════════════════════════════

    /**
     * Injects debrief context into Claude prompt for personalization
     * INPUT: debrief object with topics, takeaways, interviewer info
     * OUTPUT: formatted context string to add to prompt
     */
    function buildDebreifContext(debrief) {
      if (!debrief) return '';

      let context = '\n\n--- INTERVIEW DEBRIEF CONTEXT ---\n';

      if (debrief.interviewers && debrief.interviewers.length > 0) {
        context += `Interviewers: ${debrief.interviewers.map(i => i.name).join(', ')}\n`;
      }

      if (debrief.topics && debrief.topics.length > 0) {
        context += `Topics Discussed: ${debrief.topics.join(', ')}\n`;
      }

      if (debrief.keyTakeaways) {
        context += `Key Takeaways: ${debrief.keyTakeaways}\n`;
      }

      if (debrief.nextSteps) {
        context += `Next Steps: ${debrief.nextSteps}\n`;
      }

      return context;
    }

    /**
     * Scores outreach message quality on a 1-10 scale
     * Evaluates personalization, tone, call-to-action, length, and debrief integration
     * INPUT: messageText (string), context object with role, company, debrief
     * OUTPUT: { score, breakdown, suggestions, rating }
     */
    function scoreOutreachQuality(messageText, context) {
      let score = 0;
      const breakdown = {};

      // 1. PERSONALIZATION (0-3 points)
      let personalizationScore = 0;
      const companyMatches = context.company?.name && messageText.includes(context.company.name);
      const roleMatches = context.role?.title && messageText.includes(context.role.title);
      const specificDetails = /specific|unique|particular|notably|impressive|recently|noticed/.test(messageText.toLowerCase());

      if (companyMatches) personalizationScore += 1;
      if (roleMatches) personalizationScore += 1;
      if (specificDetails) personalizationScore += 1;

      breakdown.personalization = { score: personalizationScore, max: 3 };
      score += personalizationScore;

      // 2. PROFESSIONAL TONE (0-2 points)
      let toneScore = 0;
      const hasGrammaticalErrors = /\b(ur|u're|thru|tho|gonna|wanna)\b/i.test(messageText);
      const appropriateLength = messageText.length > 100 && messageText.length < 1500;

      if (!hasGrammaticalErrors) toneScore += 1;
      if (appropriateLength) toneScore += 1;

      breakdown.tone = { score: toneScore, max: 2 };
      score += toneScore;

      // 3. CLEAR CALL-TO-ACTION (0-2 points)
      let ctaScore = 0;
      const hasCTA = /\b(let me know|looking forward|next step|available|schedule|connect|reach out|interested|discuss)\b/i.test(messageText);
      const hasTimeline = /\b(this week|next week|soon|day|time|when|thursday|friday|monday)\b/i.test(messageText);

      if (hasCTA) ctaScore += 1;
      if (hasTimeline) ctaScore += 1;

      breakdown.cta = { score: ctaScore, max: 2 };
      score += ctaScore;

      // 4. APPROPRIATE LENGTH (0-1 point)
      let lengthScore = 0;
      const lines = messageText.split('\n').length;
      const isAppropriateLength = lines > 3 && lines < 25;
      if (isAppropriateLength) lengthScore = 1;

      breakdown.length = { score: lengthScore, max: 1 };
      score += lengthScore;

      // 5. DEBRIEF INTEGRATION (0-2 bonus points, if applicable)
      let debriefScore = 0;
      if (context.debrief) {
        const debriefMentions = (context.debrief.topics || []).some(topic =>
          messageText.toLowerCase().includes(topic.toLowerCase())
        );
        const takeawaysMentioned = context.debrief.keyTakeaways &&
          messageText.toLowerCase().includes(context.debrief.keyTakeaways.toLowerCase().substring(0, 20));

        if (debriefMentions) debriefScore += 1;
        if (takeawaysMentioned) debriefScore += 1;
      }

      breakdown.debrief = { score: debriefScore, max: 2, applicable: !!context.debrief };
      score += debriefScore;

      // Calculate total and rating
      const maxScore = 10;
      const percentage = (score / maxScore) * 100;
      let rating = 'needs-work';
      if (percentage >= 80) rating = 'excellent';
      else if (percentage >= 50) rating = 'good';

      // Generate suggestions
      const suggestions = [];
      if (breakdown.personalization.score < 2) {
        suggestions.push('Add specific details about the company or role');
      }
      if (breakdown.tone.score < 1) {
        suggestions.push('Review for tone and grammatical accuracy');
      }
      if (breakdown.cta.score < 1) {
        suggestions.push('Add a clear call-to-action');
      }
      if (context.debrief && breakdown.debrief.score === 0) {
        suggestions.push('Reference specific topics from your interview debrief');
      }

      return {
        score,
        maxScore,
        percentage: Math.round(percentage),
        rating,
        breakdown,
        suggestions,
      };
    }

    /**
     * Opens/closes the edit sidebar with tone, length, and manual edit options
     * INPUT: messageText (string), context object
     * OUTPUT: renders sidebar, persists state
     */
    function toggleEditSidebar() {
      AppState.editSidebarOpen = !AppState.editSidebarOpen;
      renderEditSidebar();
      persistEditState();
    }

    /**
     * Renders the edit sidebar with quality breakdown, tone/length selectors
     * INPUT: none (uses AppState)
     * OUTPUT: HTML rendered to sidebar element
     */
    function renderEditSidebar() {
      let sidebar = document.getElementById('edit-sidebar');

      if (!AppState.editSidebarOpen || !AppState.currentMessage) {
        if (sidebar) {
          sidebar.classList.add('hidden');
        }
        return;
      }

      if (!sidebar) {
        sidebar = document.createElement('div');
        sidebar.id = 'edit-sidebar';
        sidebar.className = 'edit-sidebar';
        document.body.appendChild(sidebar);
      } else {
        sidebar.classList.remove('hidden');
      }

      const context = {
        company: getCompanies().find(c => c.name === AppState.selectedCompanyId),
        role: getRoles().find(r => r.id === AppState.selectedRoleId),
        debrief: getLatestDebriefForRole(AppState.selectedRoleId),
      };

      const qualityData = scoreOutreachQuality(AppState.currentMessage, context);
      AppState.qualityScore = qualityData;

      const qualityClass = qualityData.rating === 'excellent' ? 'excellent' : qualityData.rating === 'good' ? 'good' : 'needs-work';
      const qualityEmoji = qualityData.rating === 'excellent' ? '✓' : qualityData.rating === 'good' ? '◐' : '⚠';

      sidebar.innerHTML = `
        <button class="edit-sidebar-close" onclick="toggleEditSidebar()" aria-label="Close edit sidebar">
          ×
        </button>

        <div style="margin-top: var(--space-6); display: flex; flex-direction: column; gap: var(--space-4);">
          <!-- Quality Score -->
          <div>
            <div style="font-size: var(--text-xs); font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: var(--space-2); letter-spacing: 0.05em;">
              Quality Score
            </div>
            <div style="display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-3);">
              <div style="font-size: var(--text-2xl); font-weight: 700; color: var(--accent);">
                ${qualityData.score}/${qualityData.maxScore}
              </div>
              <span class="quality-score-badge ${qualityClass}">
                ${qualityEmoji} ${qualityData.percentage}%
              </span>
            </div>

            <div class="quality-breakdown">
              ${Object.entries(qualityData.breakdown).map(([key, item]) => {
                if (!item.applicable && item.applicable === false) return '';
                return `
                  <div class="quality-item">
                    <span class="quality-item-label">${key.charAt(0).toUpperCase() + key.slice(1)}</span>
                    <span class="quality-item-score">${item.score}/${item.max}</span>
                  </div>
                `;
              }).join('')}
            </div>

            ${qualityData.suggestions.length > 0 ? `
              <div style="background: var(--warning-subtle); padding: var(--space-2); border-radius: var(--radius-sm); font-size: var(--text-xs); color: var(--text-primary); margin-top: var(--space-2);">
                <div style="font-weight: 600; margin-bottom: var(--space-1);">Suggestions:</div>
                ${qualityData.suggestions.map(s => `<div style="margin-bottom: var(--space-1);">• ${s}</div>`).join('')}
              </div>
            ` : ''}
          </div>

          <!-- Tone Selector -->
          <div class="edit-option-group">
            <div class="edit-option-title">Tone</div>
            <div class="tone-selector">
              <button class="tone-btn ${AppState.selectedTone === 'professional' ? 'active' : ''}" onclick="setTone('professional')">Professional</button>
              <button class="tone-btn ${AppState.selectedTone === 'casual' ? 'active' : ''}" onclick="setTone('casual')">Casual</button>
              <button class="tone-btn ${AppState.selectedTone === 'enthusiastic' ? 'active' : ''}" onclick="setTone('enthusiastic')">Enthusiastic</button>
            </div>
          </div>

          <!-- Length Selector -->
          <div class="edit-option-group">
            <div class="edit-option-title">Length</div>
            <div class="length-selector">
              <button class="length-btn ${AppState.selectedLength === 'brief' ? 'active' : ''}" onclick="setLength('brief')">Brief</button>
              <button class="length-btn ${AppState.selectedLength === 'standard' ? 'active' : ''}" onclick="setLength('standard')">Standard</button>
              <button class="length-btn ${AppState.selectedLength === 'detailed' ? 'active' : ''}" onclick="setLength('detailed')">Detailed</button>
            </div>
          </div>

          <!-- Regenerate Button -->
          <button class="btn primary" style="width: 100%;" onclick="regenerateWithChanges()">
            Regenerate with Changes
          </button>

          <!-- Manual Edit -->
          <div class="edit-option-group">
            <div class="edit-option-title">Manual Edit</div>
            <textarea id="manual-edit-area" class="manual-edit-textarea" placeholder="Edit message directly here...">${AppState.currentMessage}</textarea>
            <button class="btn" style="width: 100%; margin-top: var(--space-2);" onclick="applyManualEdit()">
              Apply Edit
            </button>
          </div>
        </div>
      `;
    }

    /**
     * Sets the tone preference and saves to state
     * INPUT: tone string ('professional', 'casual', 'enthusiastic')
     * OUTPUT: updates AppState, re-renders sidebar
     */
    function setTone(tone) {
      AppState.selectedTone = tone;
      persistEditState();
      renderEditSidebar();
    }

    /**
     * Sets the length preference and saves to state
     * INPUT: length string ('brief', 'standard', 'detailed')
     * OUTPUT: updates AppState, re-renders sidebar
     */
    function setLength(length) {
      AppState.selectedLength = length;
      persistEditState();
      renderEditSidebar();
    }

    /**
     * Applies manual edits from the textarea in the sidebar
     * INPUT: none (reads from manual-edit-area textarea)
     * OUTPUT: updates AppState.currentMessage, closes sidebar, updates UI
     */
    function applyManualEdit() {
      const textarea = document.getElementById('manual-edit-area');
      if (textarea) {
        AppState.currentMessage = textarea.value;
        persistEditState();
        toggleEditSidebar();
        updateUI();
        showToast('Message updated', 'success');
      }
    }

    /**
     * Regenerates message with new tone and length preferences
     * INPUT: none (uses AppState selected tone and length)
     * OUTPUT: calls generateOutreachMessage with enhanced prompt
     */
    async function regenerateWithChanges() {
      if (!AppState.selectedTone || !AppState.selectedLength) {
        showToast('Please select tone and length', 'error');
        return;
      }

      AppState.isGenerating = true;
      renderEditSidebar();
      updateUI();

      try {
        const companies = getCompanies();
        const roles = getRoles();
        const connections = getConnections();
        const bullets = getBulletBank();

        const company = companies.find(c => c.name === AppState.selectedCompanyId);
        const role = roles.find(r => r.id === AppState.selectedRoleId);
        const connection = connections.find(c => c.name === AppState.selectedConnectionId);

        if (!company || !role || !connection) {
          throw new Error('Invalid selection');
        }

    /**
     * Calculates comprehensive outreach analytics from communications log
     * INPUT: none (reads from localStorage)
     * OUTPUT: { overallRate, byType, byChannel, bestPerformers }
     */
    function calculateOutreachAnalytics() {
      const connections = getConnections();
      const roles = getRoles();

      let allEntries = [];
      connections.forEach(conn => {
        if (conn.outreachLog) {
          conn.outreachLog.forEach(entry => {
            const role = roles.find(r => r.id === entry.roleId);
            allEntries.push({
              ...entry,
              connectionName: conn.name,
              connectionId: conn.id,
              roleTitle: role?.title || 'Unknown Role',
              company: role?.company || 'Unknown Company',
            });
          });
        }
      });

      const totalSent = allEntries.length;
      const responded = allEntries.filter(e => e.responseStatus === 'responded').length;
      const overallRate = totalSent > 0 ? (responded / totalSent) * 100 : 0;

      // By message type
      const byType = {};
      MESSAGE_TYPES.forEach(type => {
        const sent = allEntries.filter(e => e.messageType === type.id);
        const resp = sent.filter(e => e.responseStatus === 'responded');
        byType[type.id] = {
          name: type.name,
          sent: sent.length,
          responded: resp.length,
          rate: sent.length > 0 ? (resp.length / sent.length) * 100 : 0,
        };
      });

      // By channel (email vs LinkedIn)
      const byChannel = {
        email: { sent: 0, responded: 0 },
        linkedin: { sent: 0, responded: 0 },
      };

      allEntries.forEach(entry => {
        const msgType = MESSAGE_TYPES.find(t => t.id === entry.messageType);
        const channel = msgType?.isEmail ? 'email' : 'linkedin';
        byChannel[channel].sent += 1;
        if (entry.responseStatus === 'responded') {
          byChannel[channel].responded += 1;
        }
      });

      Object.keys(byChannel).forEach(ch => {
        const data = byChannel[ch];
        data.rate = data.sent > 0 ? (data.responded / data.sent) * 100 : 0;
      });

      // Best performing approaches
      const typesSorted = Object.values(byType)
        .filter(t => t.sent >= 3)
        .sort((a, b) => b.rate - a.rate);

      return {
        overallRate,
        totalSent,
        totalResponded: responded,
        byType,
        byChannel,
        bestPerformers: typesSorted.slice(0, 3),
      };
    }

    /**
     * Analyzes patterns in outreach history to find what works
     * INPUT: none (reads from localStorage)
     * OUTPUT: array of insight strings (e.g., "Professional tone gets 2x more responses")
     */
    function analyzeOutreachPatterns() {
      const analytics = calculateOutreachAnalytics();
      const insights = [];

      if (analytics.totalSent < 10) {
        insights.push('Send at least 10 messages to see meaningful patterns');
        return insights;
      }

      // Compare message type effectiveness
      if (analytics.bestPerformers.length > 0) {
        const best = analytics.bestPerformers[0];
        const avg = analytics.overallRate;
        if (best.rate > avg * 1.5) {
          insights.push(`${best.name} gets ${Math.round(best.rate / avg)}x more responses than average (${Math.round(best.rate)}% vs ${Math.round(avg)}%)`);
        }
      }

      // Channel comparison
      if (analytics.byChannel.email.sent > 0 && analytics.byChannel.linkedin.sent > 0) {
        const emailRate = analytics.byChannel.email.rate;
        const linkedinRate = analytics.byChannel.linkedin.rate;
        if (emailRate > linkedinRate * 1.3) {
          insights.push(`Email outreach is more effective (${Math.round(emailRate)}% response rate vs ${Math.round(linkedinRate)}% on LinkedIn)`);
        } else if (linkedinRate > emailRate * 1.3) {
          insights.push(`LinkedIn gets faster responses (${Math.round(linkedinRate)}% vs ${Math.round(emailRate)}% via email)`);
        }
      }

      // Response time patterns
      const responseEntries = Object.values(analytics.byType)
        .filter(t => t.responded > 0)
        .sort((a, b) => b.responded - a.responded);

      if (responseEntries.length > 0) {
        insights.push(`${responseEntries[0].name} generates the most responses (${responseEntries[0].responded} replies)`);
      }

      if (insights.length === 0) {
        insights.push('Keep sending! More data will reveal patterns.');
      }

      return insights;
    }

    /**
     * Safely retrieve companies with error handling.
     * v3.34.5: Also derives companies from pf_roles so that roles added
     * via the pipeline or feed always appear even if pf_companies is sparse.
     * Deduplicates by company name (case-insensitive).
     */
    function getCompanies() {
      let companies = [];
      try {
        const data = localStorage.getItem('pf_companies');
        companies = data ? JSON.parse(data) : [];
      } catch (error) {
        console.warn('Failed to parse companies:', error);
      }

      /* Merge companies from pf_roles that aren't in pf_companies */
      try {
        const roles = JSON.parse(localStorage.getItem('pf_roles') || '[]');
        const existingNames = new Set(companies.map(c => (c.name || '').toLowerCase()));
        roles.forEach(r => {
          const name = r.company || '';
          if (name && !existingNames.has(name.toLowerCase())) {
            existingNames.add(name.toLowerCase());
            companies.push({
              name: name,
              domain: r.domain || '',
              stage: '',
              headcount: '',
              _derivedFromRole: true
            });
          }
        });
      } catch (e) {
        console.warn('Failed to derive companies from roles:', e);
      }

      /* Sort alphabetically */
      return companies.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    }

    async function generateOutreachMessage(messageType) {
      const companyId = AppState.selectedCompanyId;
      const roleId = AppState.selectedRoleId;
      const connectionId = AppState.selectedConnectionId;

      if (!companyId || !roleId || !connectionId) {
        showToast('Please select a company, role, and connection first', 'error');
        return;
      }

      const companies = getCompanies();
      const roles = getRoles();
      const connections = getConnections();
      const bullets = getBulletBank();

      const company = companies.find(c => c.name === companyId);
      const role = roles.find(r => r.id === roleId);
      const connection = connections.find(c => c.name === connectionId);

      if (!company || !role || !connection) {
        showToast('Invalid selection', 'error');
        return;
      }

      AppState.isGenerating = true;
      updateUI();

      try {
        /* ====== FEATURE 17 & 18: Gather Debrief and LinkedIn Network Data ====== */
        let debrief = null;
        let linkedinNetwork = [];

        if (messageType === 'thank-you-interview') {
          debrief = getLatestDebriefForRole(roleId);
          if (!debrief) {
            showToast('No debrief found — complete a debrief first for a personalized thank-you', 'warning');
            AppState.isGenerating = false;
            updateUI();
            return;
          }
        }

        if (messageType === 'inmail-linkedin') {
          try {
            const network = safeJsonParse('pf_linkedin_network', []);
            linkedinNetwork = network.filter(n => n.companiesInCommon && n.companiesInCommon.includes(company.name));
          } catch (e) {
            console.warn('Could not load LinkedIn network data');
            linkedinNetwork = [];
          }
        }

        const context = {
          company,
          role,
          connection,
          userBackground: { bullets: bullets.map(b => b.text).slice(0, 5) },
          debrief,
          linkedinNetwork,
        };

        const { systemPrompt, userPrompt } = buildOutreachPrompt(messageType, context);

        const result = await PF.claude.generate(systemPrompt, userPrompt, {
          maxTokens: 1500,
          temperature: 0.7,
        });

        AppState.currentMessage = result.content;
        showToast('Message generated successfully!', 'success');
      } catch (error) {
        console.error('Generation error:', error);
        showToast(`Error: ${error.message}`, 'error');
      } finally {
        AppState.isGenerating = false;
        updateUI();
      }
    }

    /* ================================================================
       FEATURE 1: MESSAGE SEQUENCE SCHEDULING
       Schedule follow-ups with automatic timing
       ================================================================ */

    /**
     * Creates or updates an outreach sequence for a connection-role pair
     * INPUT: connectionId, roleId, currentMessageType
     * RETURNS: sequence object with follow-up dates
     */
    function createOutreachSequence(connectionId, roleId, currentMessageType) {
      let sequences = safeJsonParse('pf_outreach_sequences', []);

      let sequence = sequences.find(s => s.connectionId === connectionId && s.roleId === roleId);
      if (!sequence) {
        sequence = {
          id: `seq-${Date.now()}`,
          connectionId,
          roleId,
          currentStep: currentMessageType,
          completedSteps: [],
          sentMessages: [],
          nextFollowUpDate: null,
          createdAt: new Date().toISOString(),
        };
        sequences.push(sequence);
      }

      // Mark current step as completed and set next follow-up
      if (!sequence.completedSteps.includes(currentMessageType)) {
        sequence.completedSteps.push(currentMessageType);
        sequence.sentMessages.push({
          type: currentMessageType,
          sentDate: new Date().toISOString(),
          messageSnapshot: AppState.currentMessage,
        });

        // Calculate follow-up dates based on message type
        const followUpDates = {
          'cold-email': 7, // 7 days
          'cold-email-followup': 10, // 10 days
          'thank-you-call': 1, // 1 day
          'thank-you-interview': 1, // 1 day
          'recruiter-response': 2, // 2 days
        };

        const daysUntilFollowUp = followUpDates[currentMessageType] || 7;
        const nextDate = new Date();
        nextDate.setDate(nextDate.getDate() + daysUntilFollowUp);
        sequence.nextFollowUpDate = nextDate.toISOString();
      }

      localStorage.setItem('pf_outreach_sequences', JSON.stringify(sequences));
      return sequence;
    }

    /**
     * Shows schedule follow-up dialog
     * INPUT: none
     * OUTPUT: displays date picker and saves schedule
     */
    function scheduleFollowUp() {
      if (!AppState.selectedConnectionId || !AppState.selectedRoleId) {

          <label style="font-size: var(--text-xs); color: var(--text-secondary);">Follow-up date:</label>
          <input type="date" id="followup-date" value="${today}" min="${today}" onchange="scheduledDate = this.value">
          <button class="btn primary" style="width: 100%; margin-top: var(--space-2);" onclick="confirmScheduleFollowUp('${AppState.selectedConnectionId}', '${AppState.selectedRoleId}', document.getElementById('followup-date').value)">
            Schedule Follow-Up

      `;

    /**
     * Confirms and saves the scheduled follow-up
     * INPUT: connectionId, roleId, dateString
     * OUTPUT: sequence updated with follow-up scheduled
     */
    function confirmScheduleFollowUp(connectionId, roleId, dateString) {
      const sequence = createOutreachSequence(connectionId, roleId, AppState.selectedMessageType);

      const followUpDate = new Date(dateString);
      sequence.nextFollowUpDate = followUpDate.toISOString();
      sequence.followUpScheduled = true;

      const sequences = safeJsonParse('pf_outreach_sequences', []);
      const idx = sequences.findIndex(s => s.id === sequence.id);
      if (idx >= 0) sequences[idx] = sequence;
      localStorage.setItem('pf_outreach_sequences', JSON.stringify(sequences));

      showToast(`Follow-up scheduled for ${followUpDate.toLocaleDateString()}`, 'success');

      // Remove dialog
      const dialog = document.querySelector('.schedule-dialog');
      if (dialog) dialog.remove();
    }

    /* ================================================================
       FEATURE 2: RESPONSE TRACKING
       Track message opens, responses, and response times
       ================================================================ */

    /**
     * Marks a message as responded and tracks response status
     * INPUT: messageId = ID of the message to mark
     * OUTPUT: updates connection outreach log with response status
     */
    function markAsResponded(messageId) {
      const connections = getConnections();
      let found = false;

      connections.forEach(conn => {
        if (conn.outreachLog) {
          const entry = conn.outreachLog.find(e => e.id === messageId);
          if (entry) {
            entry.responseStatus = 'responded';
            entry.responseDate = new Date().toISOString();
            found = true;
          }
        }
      });

      if (found) {
        localStorage.setItem('pf_connections', JSON.stringify(connections));
        showToast('Message marked as responded', 'success');
        renderOutreachHistory();
      }
    }

    /**
     * Marks a message as opened (tracking)
     * INPUT: messageId = ID of message
     * OUTPUT: updates message status
     */
    function markAsOpened(messageId) {
      const connections = getConnections();
      let found = false;

      connections.forEach(conn => {
        if (conn.outreachLog) {
          const entry = conn.outreachLog.find(e => e.id === messageId);
          if (entry && entry.responseStatus !== 'responded') {
            entry.responseStatus = 'opened';
            entry.openedDate = new Date().toISOString();
            found = true;
          }
        }
      });

      if (found) {
        localStorage.setItem('pf_connections', JSON.stringify(connections));
        showToast('Message marked as opened', 'info');
      }
    }

    /**
     * Marks a message as no response received
     * INPUT: messageId = ID of message
     * OUTPUT: updates response status
     */
    function markAsNoResponse(messageId) {
      const connections = getConnections();
      let found = false;

      connections.forEach(conn => {
        if (conn.outreachLog) {
          const entry = conn.outreachLog.find(e => e.id === messageId);
          if (entry) {
            entry.responseStatus = 'no_response';
            entry.noResponseMarkedAt = new Date().toISOString();
            found = true;
          }
        }
      });

      if (found) {
        localStorage.setItem('pf_connections', JSON.stringify(connections));
        showToast('Message marked as no response', 'info');
        renderOutreachHistory();
      }
    }

    /* ================================================================
       FEATURE 4: OUTREACH HISTORY & ANALYTICS
       View all messages, timeline, and response rates
       ================================================================ */

    /**
     * Renders complete outreach history with timeline and stats
     * INPUT: none
     * OUTPUT: displays history panel in editor
     */
    function renderOutreachHistory() {
      const connections = getConnections();
      const roles = getRoles();

      let allEntries = [];
      connections.forEach(conn => {
        if (conn.outreachLog) {
          conn.outreachLog.forEach(entry => {
            const role = roles.find(r => r.id === entry.roleId);
            allEntries.push({
              ...entry,
              connectionName: conn.name,
              connectionId: conn.id,
              roleTitle: role?.title || 'Unknown Role',
              company: role?.company || 'Unknown Company',
            });
          });
        }
      });

      // Sort by date (newest first)
      allEntries.sort((a, b) => new Date(b.sentDate) - new Date(a.sentDate));

      // Calculate stats
      const totalSent = allEntries.length;
      const responded = allEntries.filter(e => e.responseStatus === 'responded').length;
      const responseRate = totalSent > 0 ? Math.round((responded / totalSent) * 100) : 0;

      const messageTypeStats = {};
      MESSAGE_TYPES.forEach(type => {
        const sent = allEntries.filter(e => e.messageType === type.id).length;
        const resp = allEntries.filter(e => e.messageType === type.id && e.responseStatus === 'responded').length;
        messageTypeStats[type.name] = { sent, responded: resp };
      });

      /* ====== FEATURE 45: Analytics Panel ====== */
      const analyticsHTML = renderAnalyticsPanel();

      const historyHtml = `
        <div class="outreach-history-panel">
          <h2 style="font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-4);">Outreach History</h2>

          <!-- Stats -->
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); margin-bottom: var(--space-6);">
            <div style="background: var(--accent-subtle); padding: var(--space-3); border-radius: var(--radius-md); text-align: center;">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--accent);">${totalSent}</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary);">Total Sent</div>
            </div>
            <div style="background: var(--success-subtle); padding: var(--space-3); border-radius: var(--radius-md); text-align: center;">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--success);">${responded}</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary);">Responded</div>
            </div>
            <div style="background: var(--info-subtle); padding: var(--space-3); border-radius: var(--radius-md); text-align: center;">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--info);">${responseRate}%</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary);">Response Rate</div>
            </div>
          </div>

          <!-- Analytics Section -->
          ${analyticsHTML}

          <!-- Message timeline -->
          <h3 style="font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-3); margin-top: var(--space-6);">Timeline</h3>
          <div style="max-height: 400px; overflow-y: auto;">
            ${allEntries.map(entry => `
              <div class="history-entry">
                <div class="history-entry-header">
                  <div>
                    <div class="history-entry-title">${entry.connectionName} – ${entry.roleTitle}</div>
                    <div class="history-entry-date">${entry.company}</div>
                  </div>
                  <div class="history-entry-date">${new Date(entry.sentDate).toLocaleDateString()}</div>
                </div>
                <div style="font-size: var(--text-xs); color: var(--text-secondary); margin-bottom: var(--space-2);">
                  ${MESSAGE_TYPES.find(t => t.id === entry.messageType)?.name || entry.messageType}
                </div>
                ${entry.responseStatus ? `<span class="history-entry-status status-${entry.responseStatus === 'responded' ? 'responded' : entry.responseStatus === 'no_response' ? 'no-response' : 'sent'}">
                  ${entry.responseStatus === 'responded' ? '✓ Responded' : entry.responseStatus === 'no_response' ? '✗ No Response' : '• Opened'}
                </span>` : ''}
              </div>
            `).join('') || '<p style="color: var(--text-tertiary); text-align: center;">No messages sent yet</p>'}
          </div>
        </div>
      `;

      const panel = document.getElementById('editor-panel');
      panel.innerHTML = historyHtml;
    }

    /**
     * Shows outreach history view
     * INPUT: none
     * OUTPUT: switches to history view
     */
    function showOutreachHistory() {
      renderOutreachHistory();
    }

    function clearMessage() {
      AppState.currentMessage = '';
      updateUI();
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: ${type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#3b82f6'};
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        font-size: 14px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ────────────────────────────────────────────────────────
    // EVENT LISTENERS
    // ────────────────────────────────────────────────────────

    document.getElementById('company-selector').addEventListener('change', e => {
      AppState.selectedCompanyId = e.target.value;
      AppState.selectedRoleId = null;
      AppState.selectedConnectionId = null;
      AppState.currentMessage = '';
      renderSidebar();
      updateUI();
    });

    document.getElementById('role-selector').addEventListener('change', e => {
      AppState.selectedRoleId = e.target.value;
      AppState.currentMessage = '';
      renderContextCard();
      updateUI();
    });

    document.getElementById('connection-selector').addEventListener('change', e => {
      AppState.selectedConnectionId = e.target.value;
      AppState.currentMessage = '';
      renderContextCard();
      updateUI();
    });

    // ────────────────────────────────────────────────────────
    // INITIALIZATION
    // ────────────────────────────────────────────────────────

    function initializeApp() {
      /* ====== FEATURE 44: Restore Edit State ====== */
      restoreEditState();

      /* ====== FEATURE 19: Handle Navigation from Pipeline, Debrief, etc. ====== */
      /* v3.34.5: Accept pre-selection from localStorage nav state OR URL params.
         Sources: Pipeline (Draft Outreach button), Debrief (Thank-You button).
         URL params are the robust fallback when localStorage state is lost. */
      try {
        const navState = safeJsonParse('pf_outreach_nav_state', null);
        const urlParams = new URLSearchParams(window.location.search);

        /* Determine roleId from nav state OR URL param */
        const targetRoleId = navState?.selectedRoleId || urlParams.get('roleId') || null;

        if (targetRoleId) {
          /* Set message type from nav state or default to linkedin-connect for pipeline */
          const source = navState?.source || urlParams.get('source') || 'unknown';
          AppState.selectedMessageType = navState?.selectedMessageType ||
            (source === 'pipeline' ? 'linkedin-connect' : 'thank-you-interview');

          /* Find company for this role and pre-select it */
          const roles = getRoles();
          const targetRole = roles.find(r => r.id === targetRoleId);
          if (targetRole) {
            AppState.selectedCompanyId = targetRole.company || targetRole.companyId;
            AppState.selectedRoleId = targetRoleId;

            /* Try to find and select the first connection for this company */
            const connections = getConnections();
            const companyConnections = connections.filter(c =>
              c.company === AppState.selectedCompanyId || c.companyId === AppState.selectedCompanyId
            );
            if (companyConnections.length > 0) {
              AppState.selectedConnectionId = companyConnections[0].name;
            }
          }

          /* Clean up: remove nav state after consuming, strip URL params */
          localStorage.removeItem('pf_outreach_nav_state');
          if (urlParams.has('roleId')) {
            window.history.replaceState({}, '', window.location.pathname);
          }
        }
      } catch (e) {
        console.warn('Could not parse outreach nav state or URL params:', e);
      }

      renderSidebar();
      renderMessageTabs();
      renderEditorPanel();
    }

    document.addEventListener('DOMContentLoaded', initializeApp);
  </script>
</body>
</html>
