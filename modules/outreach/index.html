<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Outreach Generator</title>
  <meta name="description" content="Generate personalized networking and outreach messages with Claude AI">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js"></script>

  <style>
    /* Main container */
    .outreach-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Left sidebar: selectors and context */
    .sidebar {
      width: 320px;
      background: var(--bg-surface);
      border-right: 1px solid var(--bg-subtle);
      overflow-y: auto;
      padding: var(--space-4);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .sidebar-section-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: var(--space-2);
    }

    .selector-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .selector-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .selector-input:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .selector-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Context card */
    .context-card {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .context-card-empty {
      text-align: center;
      padding: var(--space-4);
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }

    .context-card h3 {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      font-size: var(--text-xs);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--bg-surface);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .detail-value {
      color: var(--text-primary);
      word-break: break-word;
    }

    /* Right workspace */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Message type tabs */
    .message-tabs {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      background: var(--bg-surface);
      overflow-x: auto;
      overflow-y: hidden;
    }

    .message-tab {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .message-tab:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .message-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Editor panel */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-6);
      overflow-y: auto;
      gap: var(--space-4);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
    }

    .editor-meta {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      display: flex;
      gap: var(--space-3);
    }

    /* Message content area */
    .message-content {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-size: var(--text-sm);
      line-height: 1.6;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      text-align: center;
    }

    /* Message textarea */
    .message-textarea {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
      max-height: 400px;
      font-size: var(--text-sm);
      font-family: var(--font-mono);
      color: var(--text-primary);
      line-height: 1.6;
      resize: vertical;
    }

    .message-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Character count */
    .char-count {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-2);
    }

    .char-count.warning {
      color: var(--warning);
    }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid var(--bg-subtle);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .btn:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* API key setup */
    .api-key-setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-6);
    }

    .api-key-setup h2 {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--text-primary);
    }

    .api-key-setup p {
      color: var(--text-secondary);
      text-align: center;
      max-width: 400px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-6);
      color: var(--text-secondary);
      text-align: center;
    }

    .empty-state-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .outreach-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--bg-subtle);
        max-height: 200px;
      }

      .editor-panel {
        padding: var(--space-3);
      }

      .message-tabs {
        padding: var(--space-3);
        gap: var(--space-1);
      }

      .message-tab {
        padding: var(--space-1) var(--space-2);
        font-size: var(--text-xs);
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav">
    <div class="nav-brand"><span>P</span>athfinder</div>
    <div class="nav-links">
      <a href="../dashboard/index.html">Dashboard</a>
      <a href="../pipeline/index.html">Pipeline</a>
      <a href="../research-brief/index.html">Research</a>
      <a href="../resume-tailor/index.html">Resume</a>

      <a href="index.html" class="active">Outreach</a>

      <a href="../debrief/index.html">Debrief</a>
      <a href="../comp-intel/index.html">Comp</a>

    </div>

  <div class="outreach-container" style="margin-top: var(--nav-height);">
    <!-- LEFT SIDEBAR: Context Panel -->
    <div class="sidebar">
      <div>
        <div class="sidebar-section-title">Company & Role</div>
        <div class="selector-group">
          <select id="company-selector" class="selector-input">
            <option value="">Select a company...</option>
          </select>
          <select id="role-selector" class="selector-input" disabled>
            <option value="">Select a role...</option>
          </select>
          <select id="connection-selector" class="selector-input" disabled>
            <option value="">Select a connection...</option>
          </select>
        </div>
      </div>

      <div id="context-card"></div>
    </div>

    <!-- RIGHT WORKSPACE: Message Editor -->
    <div class="workspace">
      <!-- Message Type Tabs -->
      <div id="message-tabs" class="message-tabs"></div>

      <!-- Editor Panel -->
      <div id="editor-panel" class="editor-panel"></div>
    </div>
  </div>

  <script src="../shared/data-switcher.js"></script>
  <script>
    /**
     * ============================================================
     * PATHFINDER OUTREACH MODULE — Real Claude API Integration
     * Version: 2.0 | March 2026
     * ============================================================
     *
     * This module generates personalized outreach messages using
     * real Claude API calls, never templates or generics.
     *
     * Features:
     * - 8 message types with Claude-generated content
     * - Real company, role, and connection data from localStorage
     * - Anti-template system prompts (no generic openers)
     * - Character limits and formatting per message type
     * - Full message editing and history tracking
     */

    const AppState = {
      selectedCompanyId: null,
      selectedRoleId: null,
      selectedConnectionId: null,
      selectedMessageType: 'linkedin-connect',
      currentMessage: '',
      isGenerating: false,
    };

    const MESSAGE_TYPES = [
      {
        id: 'linkedin-connect',
        name: 'LinkedIn Connection',
        description: 'Request to connect',
        charLimit: 300,
      },
      {
        id: 'cold-email',
        name: 'Cold Email',
        description: 'Initial outreach',
        charLimit: 800,
      },
      {
        id: 'cold-email-followup',
        name: 'Follow-Up Email',
        description: 'Gentle reminder after 7+ days',
        charLimit: 500,
      },
      {
        id: 'referral-request',
        name: 'Referral Request',
        description: 'Ask someone to refer you',
        charLimit: 600,
      },
      {
        id: 'thank-you-call',
        name: 'Thank You (Call)',
        description: 'After a networking call',
        charLimit: 400,
      },
      {
        id: 'thank-you-interview',
        name: 'Thank You (Interview)',
        description: 'Post-interview follow-up',
        charLimit: 700,
      },
      {
        id: 'recruiter-response',
        name: 'Recruiter Response',
        description: 'Reply to inbound recruiter',
        charLimit: 600,
      },
      {
        id: 'networking-intro',
        name: 'Networking Intro',
        description: 'Warm introduction request',
        charLimit: 500,
      },
    ];

    // ────────────────────────────────────────────────────────
    // DATA ACCESS FUNCTIONS
    // ────────────────────────────────────────────────────────

    function getCompanies() {
      const data = localStorage.getItem('pf_companies');
      return data ? JSON.parse(data) : [];
    }

    function getRoles() {
      const data = localStorage.getItem('pf_roles');
      return data ? JSON.parse(data) : [];
    }

    function getConnections() {
      const data = localStorage.getItem('pf_connections');
      return data ? JSON.parse(data) : [];
    }

    function getPreferences() {
      const data = localStorage.getItem('pf_preferences');
      return data ? JSON.parse(data) : {};
    }

    function getBulletBank() {
      const data = localStorage.getItem('pf_bullet_bank');
      return data ? JSON.parse(data) : [];
    }

    function getStoryBank() {
      const data = localStorage.getItem('pf_story_bank');
      return data ? JSON.parse(data) : [];
    }

    // ────────────────────────────────────────────────────────
    // CLAUDE PROMPT GENERATION
    // ────────────────────────────────────────────────────────

    function buildOutreachPrompt(messageType, context) {
      const { company, role, connection, userBackground } = context;

      const antiTemplateRules = `
CRITICAL RULES — Must follow these exactly:
1. NEVER use: "I hope this message finds you well"
2. NEVER use: "I'm reaching out because..."
3. NEVER use: "I've followed your profile and was impressed by..."
4. NEVER use: "I think I would be a great fit..."
5. NEVER use: "I'd love to pick your brain..."
6. NEVER use generic openers that could work for 100 different people

REQUIRED:
- Reference SOMETHING SPECIFIC about this company/role/person
- Be direct and concrete, not flowery
- Keep tone professional but casual ("Hi John" not "Dear Mr. Chen")
- Make it sound like a real person wrote it, not a template
- One clear idea or ask, not multiple
- No emojis, no exclamation marks in excess`;

      let typeSpecificGuidance = '';

      switch (messageType) {
        case 'linkedin-connect':
          typeSpecificGuidance = `
PURPOSE: Get on their radar so you can DM later
STRUCTURE:
1. One specific thing about them or their work
2. One concrete reason your background is relevant
3. Soft ask: "I'd love to connect"
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters max`;
          break;

        case 'cold-email':
          typeSpecificGuidance = `
PURPOSE: Introduce yourself and propose a concrete next step
STRUCTURE:
1. Hook: specific thing about them / their work / company moment
2. Your credibility: one concrete sentence about relevant experience
3. Why now: reason this conversation makes sense
4. Soft ask: 15-minute call? Coffee chat?
5. Closing: signature with LinkedIn link
FORMAT: 4-6 sentences, multiple short paragraphs
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'cold-email-followup':
          typeSpecificGuidance = `
PURPOSE: Gentle reminder; assume they're busy
STRUCTURE:
1. Reference the previous email (don't repeat it)
2. New angle or reason to respond now
3. Soft ask: still open? Quick call?
FORMAT: 2-3 sentences only
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'referral-request':
          typeSpecificGuidance = `
PURPOSE: Ask someone to refer you
STRUCTURE:
1. Thank them for being in your network
2. Specific person/role/company you're targeting
3. Why you think you're a good fit (one sentence)
4. Ask: "Would you be willing to intro?"
FORMAT: 3-4 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'thank-you-call':
          typeSpecificGuidance = `
PURPOSE: Follow-up after a call with a potential advisor/mentor
STRUCTURE:
1. Thank them for their time
2. One specific thing you learned or appreciated
3. Concrete next step you'll take
4. Optional: stay in touch / reconnect later
FORMAT: 3-4 sentences, brief and genuine
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'thank-you-interview':
          typeSpecificGuidance = `
PURPOSE: Follow-up after an interview
STRUCTURE:
1. Thank them for their time
2. One specific thing you discussed
3. How you see yourself contributing to that topic
4. Next steps: "Looking forward to hearing from you"
5. Optional: reference a specific question and your research
FORMAT: 4-5 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'recruiter-response':
          typeSpecificGuidance = `
PURPOSE: Reply to a recruiter who reached out
STRUCTURE:
1. Thank them for reaching out
2. Express genuine, specific interest
3. Ask for key info: JD, timeline, process
4. Offer availability: "I'm available Tuesday-Thursday"
FORMAT: 3-5 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'networking-intro':
          typeSpecificGuidance = `
PURPOSE: Warm introduction request
STRUCTURE:
1. Context: how you know this person
2. Why the introduction would be valuable
3. What you're looking for / working on
4. Ask: "Would you be open to an intro?"
FORMAT: 3-4 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;
      }

      const systemPrompt = `You are a personalized message generator for job search outreach. Your job is to create REAL, SPECIFIC messages that sound like they come from a real person, never from a template.

${antiTemplateRules}

${typeSpecificGuidance}

PERSONALIZATION CHECKLIST — Aim for at least 2 of these:
1. Specific product/initiative/news the company is working on
2. Recipient's specific role or scope
3. Concrete, measurable reason your background is relevant
4. Mutual connection or shared history

OUTPUT FORMAT:
- Plain text only, no markdown
- If subject line applicable, start with "Subject: ..."
- No citations or footnotes needed
- Keep it concise and direct`;

      const userPrompt = `Generate a ${MESSAGE_TYPES.find(t => t.id === messageType).name.toLowerCase()} message with these specifics:

RECIPIENT:
- Name: ${connection.name}
- Title: ${connection.title}
- Company: ${company.name}
- Relationship: ${connection.relationship || 'cold'}

COMPANY:
- Name: ${company.name}
- Mission: ${company.mission || 'Not specified'}
- Domain: ${company.domain || 'Not specified'}

ROLE YOU'RE TARGETING:
- Title: ${role.title}
- Description: ${role.description || role.jd || 'See job description'}

YOUR BACKGROUND:
${userBackground.bullets && userBackground.bullets.length > 0
  ? '- ' + userBackground.bullets.slice(0, 3).join('\n- ')
  : '- Not specified'}

Create a compelling, specific message that references at least one concrete detail about the company, role, or person. Make it sound authentic.`;

      return { systemPrompt, userPrompt };
    }

    // ────────────────────────────────────────────────────────
    // MESSAGE GENERATION
    // ────────────────────────────────────────────────────────

    async function generateOutreachMessage(messageType) {
      const companyId = AppState.selectedCompanyId;
      const roleId = AppState.selectedRoleId;
      const connectionId = AppState.selectedConnectionId;

      if (!companyId || !roleId || !connectionId) {
        showToast('Please select a company, role, and connection first', 'error');
        return;
      }

      const companies = getCompanies();
      const roles = getRoles();
      const connections = getConnections();
      const bullets = getBulletBank();

      const company = companies.find(c => c.id === companyId);
      const role = roles.find(r => r.id === roleId);
      const connection = connections.find(c => c.id === connectionId);

      if (!company || !role || !connection) {
        showToast('Invalid selection', 'error');
        return;
      }

      AppState.isGenerating = true;
      updateUI();

      try {
        const context = {
          company,
          role,
          connection,
          userBackground: { bullets: bullets.map(b => b.text).slice(0, 5) },
        };

        const { systemPrompt, userPrompt } = buildOutreachPrompt(messageType, context);

        const result = await PF.claude.generate(systemPrompt, userPrompt, {
          maxTokens: 1500,
          temperature: 0.7,
        });

        AppState.currentMessage = result.content;
        showToast('Message generated successfully!', 'success');
      } catch (error) {
        console.error('Generation error:', error);
        showToast(`Error: ${error.message}`, 'error');
      } finally {
        AppState.isGenerating = false;
        updateUI();
      }
    }

    // ────────────────────────────────────────────────────────
    // UI RENDERING
    // ────────────────────────────────────────────────────────

    function renderSidebar() {
      const companies = getCompanies();
      const roles = getRoles();
      const connections = getConnections();

      // Populate company selector
      const companySelect = document.getElementById('company-selector');
      companySelect.innerHTML = '<option value="">Select a company...</option>';
      companies.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.name;
        companySelect.appendChild(option);
      });

      // Populate role selector (filtered by company)
      const roleSelect = document.getElementById('role-selector');
      if (AppState.selectedCompanyId) {
        const companyRoles = roles.filter(r => r.company === AppState.selectedCompanyId || r.companyId === AppState.selectedCompanyId);
        roleSelect.innerHTML = '<option value="">Select a role...</option>';
        companyRoles.forEach(r => {
          const option = document.createElement('option');
          option.value = r.id;
          option.textContent = r.title;
          roleSelect.appendChild(option);
        });
        roleSelect.disabled = false;
      } else {
        roleSelect.innerHTML = '<option value="">Select a role...</option>';
        roleSelect.disabled = true;
        AppState.selectedRoleId = null;
      }

      // Populate connection selector (filtered by company)
      const connectionSelect = document.getElementById('connection-selector');
      if (AppState.selectedCompanyId) {
        const company = companies.find(c => c.id === AppState.selectedCompanyId);
        const companyConnections = connections.filter(c => c.company === company.name || c.companyId === AppState.selectedCompanyId);
        connectionSelect.innerHTML = '<option value="">Select a connection...</option>';
        companyConnections.forEach(c => {
          const option = document.createElement('option');
          option.value = c.id;
          option.textContent = `${c.name} (${c.title})`;
          connectionSelect.appendChild(option);
        });
        connectionSelect.disabled = false;
      } else {
        connectionSelect.innerHTML = '<option value="">Select a connection...</option>';
        connectionSelect.disabled = true;
        AppState.selectedConnectionId = null;
      }

      // Render context card
      renderContextCard();
    }

    function renderContextCard() {
      const card = document.getElementById('context-card');
      const companies = getCompanies();
      const roles = getRoles();
      const connections = getConnections();

      if (!AppState.selectedCompanyId || !AppState.selectedRoleId || !AppState.selectedConnectionId) {
        card.innerHTML = '<div class="context-card-empty">Select company, role, and connection above</div>';
        return;
      }

      const company = companies.find(c => c.id === AppState.selectedCompanyId);
      const role = roles.find(r => r.id === AppState.selectedRoleId);
      const connection = connections.find(c => c.id === AppState.selectedConnectionId);

      card.innerHTML = `
        <div class="context-card">
          <h3>${connection.name}</h3>
          <div class="detail-row">
            <span class="detail-label">Title:</span>
            <span class="detail-value">${connection.title}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Company:</span>
            <span class="detail-value">${company.name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Relationship:</span>
            <span class="detail-value">${connection.relationship || 'Cold'}</span>
          </div>
          <h3 style="margin-top: var(--space-3);">Role</h3>
          <div class="detail-row">
            <span class="detail-label">Title:</span>
            <span class="detail-value">${role.title}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Stage:</span>
            <span class="detail-value">${role.stage || 'Researching'}</span>
          </div>
        </div>
      `;
    }

    function renderMessageTabs() {
      const container = document.getElementById('message-tabs');
      container.innerHTML = MESSAGE_TYPES
        .map(
          type => `
        <button class="message-tab ${type.id === AppState.selectedMessageType ? 'active' : ''}"
          onclick="selectMessageType('${type.id}')">
          ${type.name}
        </button>
      `
        )
        .join('');
    }

    function renderEditorPanel() {
      const panel = document.getElementById('editor-panel');

      if (!PF.claude.hasApiKey()) {
        panel.innerHTML = `
          <div class="api-key-setup">
            <h2>API Key Required</h2>
            <p>To generate personalized messages, you need to set your Anthropic API key.</p>
            <div style="width: 100%; max-width: 400px;"></div>
          </div>
        `;
        setTimeout(() => PF.claude.renderApiKeyUI(document.querySelector('.api-key-setup > div')), 100);
        return;
      }

      if (!AppState.selectedCompanyId || !AppState.selectedRoleId || !AppState.selectedConnectionId) {
        panel.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <h3>Select Context</h3>
            <p>Choose a company, role, and connection from the sidebar to begin.</p>
          </div>
        `;
        return;
      }

      const messageType = MESSAGE_TYPES.find(t => t.id === AppState.selectedMessageType);
      const charCount = AppState.currentMessage.length;
      const isOverLimit = charCount > messageType.charLimit;

      panel.innerHTML = `
        <div class="editor-header">
          <div>
            <h2 class="editor-title">${messageType.name}</h2>
            <div class="editor-meta">
              <span>${messageType.description}</span>
              <span>${charCount} / ${messageType.charLimit} characters</span>
            </div>
          </div>
        </div>

        <div id="message-display">
          ${
            AppState.isGenerating
              ? `
          <div class="loading">
            <div class="spinner"></div>
            <span>Generating personalized message...</span>
          </div>
          `
              : AppState.currentMessage
              ? `
          <textarea class="message-textarea" id="message-editor" placeholder="Message will appear here...">${AppState.currentMessage}</textarea>
          <div class="char-count ${isOverLimit ? 'warning' : ''}">
            ${isOverLimit ? '⚠️ ' : '✓ '} ${charCount} / ${messageType.charLimit} characters
          </div>
          `
              : `
          <div class="message-content empty">
            <div>
              <p>Click "Generate" to create a personalized message</p>
            </div>
          </div>
          `
          }
        </div>

        <div class="action-buttons">
          ${
            AppState.isGenerating
              ? ''
              : `
          <button class="btn primary" onclick="generateOutreachMessage('${AppState.selectedMessageType}')">
            ${AppState.currentMessage ? 'Regenerate' : 'Generate'}
          </button>
          `
          }
          ${
            AppState.currentMessage
              ? `
          <button class="btn" onclick="copyToClipboard()">
            Copy to Clipboard
          </button>
          <button class="btn" onclick="saveToOutreachLog()">
            Save to Outreach Log
          </button>
          <button class="btn" onclick="clearMessage()">
            Clear
          </button>
          `
              : ''
          }
        </div>
      `;

      // Re-attach textarea listeners
      if (AppState.currentMessage) {
        const textarea = document.getElementById('message-editor');
        if (textarea) {
          textarea.addEventListener('input', e => {
            AppState.currentMessage = e.target.value;
            renderEditorPanel();
          });
        }
      }
    }

    function updateUI() {
      renderMessageTabs();
      renderEditorPanel();
    }

    // ────────────────────────────────────────────────────────
    // EVENT HANDLERS
    // ────────────────────────────────────────────────────────

    function selectMessageType(typeId) {
      AppState.selectedMessageType = typeId;
      AppState.currentMessage = '';
      updateUI();
    }

    function copyToClipboard() {
      navigator.clipboard.writeText(AppState.currentMessage);
      showToast('Copied to clipboard!', 'success');
    }

    function saveToOutreachLog() {
      if (!AppState.selectedConnectionId || !AppState.selectedRoleId) {
        showToast('Select a connection and role first', 'error');
        return;
      }

      const connections = getConnections();
      const selectedConn = connections.find(c => c.id === AppState.selectedConnectionId);

      if (!selectedConn) {
        showToast('Connection not found', 'error');
        return;
      }

      // Initialize outreach log if not present
      if (!selectedConn.outreachLog) {
        selectedConn.outreachLog = [];
      }

      const logEntry = {
        roleId: AppState.selectedRoleId,
        messageType: AppState.selectedMessageType,
        messageSnapshot: AppState.currentMessage,
        sentDate: new Date().toISOString(),
        status: 'draft',
      };

      selectedConn.outreachLog.push(logEntry);
      localStorage.setItem('pf_connections', JSON.stringify(connections));

      showToast('Saved to outreach log!', 'success');
    }

    function clearMessage() {
      AppState.currentMessage = '';
      updateUI();
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: ${type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#3b82f6'};
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        font-size: 14px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ────────────────────────────────────────────────────────
    // EVENT LISTENERS
    // ────────────────────────────────────────────────────────

    document.getElementById('company-selector').addEventListener('change', e => {
      AppState.selectedCompanyId = e.target.value;
      AppState.selectedRoleId = null;
      AppState.selectedConnectionId = null;
      AppState.currentMessage = '';
      renderSidebar();
      updateUI();
    });

    document.getElementById('role-selector').addEventListener('change', e => {
      AppState.selectedRoleId = e.target.value;
      AppState.currentMessage = '';
      renderContextCard();
      updateUI();
    });

    document.getElementById('connection-selector').addEventListener('change', e => {
      AppState.selectedConnectionId = e.target.value;
      AppState.currentMessage = '';
      renderContextCard();
      updateUI();
    });

    // ────────────────────────────────────────────────────────
    // INITIALIZATION
    // ────────────────────────────────────────────────────────

    function initializeApp() {
      renderSidebar();
      renderMessageTabs();
      renderEditorPanel();
    }

    document.addEventListener('DOMContentLoaded', initializeApp);
  </script>
</body>
</html>
