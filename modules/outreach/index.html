<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Outreach Generator</title>
  <meta name="description" content="Generate personalized networking and outreach messages">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /**
     * ================================================================
     * OUTREACH MODULE STYLES
     * These styles apply only to the Outreach Generator page.
     * ================================================================
     *
     * Layout approach: Two-panel design
     * - Left: Context sidebar (company, role, connection info) — 320px fixed
     * - Right: Message workspace (generator, editor, history) — flexible
     *
     * Responsive: On mobile, stacks vertically and hides sidebar behind toggle
     */

    /* Main page container: two-column layout */
    .outreach-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Left sidebar: context panel (collapsible on mobile) */
    .sidebar {
      width: 320px;
      background: var(--bg-surface);
      border-right: 1px solid var(--bg-subtle);
      overflow-y: auto;
      padding: var(--space-4);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* Sidebar title */
    .sidebar-section-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: var(--space-2);
      margin-top: var(--space-3);
    }

    .sidebar-section-title:first-child {
      margin-top: 0;
    }

    /* Selector container (for company, role, connection dropdowns) */
    .selector-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    /* Dropdown/select styling */
    .selector-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .selector-input:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .selector-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Context card: shows company/role/connection details */
    .context-card {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      margin-top: var(--space-2);
    }

    .context-card-empty {
      text-align: center;
      padding: var(--space-4);
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }

    /* Company card styling */
    .company-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .company-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .company-logo {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--accent);
      font-size: var(--text-sm);
      flex-shrink: 0;
      overflow: hidden;
    }

    .company-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .company-info h3 {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
    }

    .company-info p {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin: 0;
    }

    .company-meta {
      font-size: var(--text-xs);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      color: var(--text-tertiary);
    }

    .company-meta strong {
      color: var(--text-secondary);
    }

    /* Role and connection details */
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: var(--text-xs);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--bg-surface);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .detail-value {
      color: var(--text-primary);
      text-align: right;
      flex: 1;
      margin-left: var(--space-2);
      word-break: break-word;
    }

    /* Relationship type badge */
    .relationship-badge {
      display: inline-block;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 500;
      background: var(--accent-subtle);
      color: var(--accent);
    }

    /* JD snippet styling */
    .jd-snippet {
      background: var(--bg-base);
      border-left: 2px solid var(--accent);
      padding: var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.5;
      font-family: var(--font-mono);
      max-height: 120px;
      overflow-y: auto;
    }

    /* Right workspace panel */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Top bar with message type tabs */
    .message-tabs {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      background: var(--bg-surface);
      overflow-x: auto;
      overflow-y: hidden;
    }

    .message-tab {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .message-tab:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .message-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Message editor area */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-6);
      overflow-y: auto;
      gap: var(--space-4);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
    }

    .editor-meta {
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    /* Message display area */
    .message-content {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 140px;
      max-height: 300px;
      overflow-y: auto;
      font-size: var(--text-sm);
      line-height: 1.6;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }

    /* Streaming text animation: characters appear one by one */
    .message-content.streaming .char {
      opacity: 0;
      animation: slideIn 0.05s ease-out forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(2px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Character count meter */
    .char-count-container {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
    }

    .char-count-bar {
      flex: 1;
      height: 8px;
      background: var(--bg-surface);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }

    .char-count-fill {
      height: 100%;
      background: var(--accent);
      transition: all var(--duration-fast) var(--ease-default));
    }

    .char-count-fill.warning {
      background: var(--warning);
    }

    .char-count-fill.danger {
      background: var(--danger);
    }

    .char-count-text {
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 80px;
      text-align: right;
    }

    .char-count-text.danger {
      color: var(--danger);
    }

    /* Control buttons */
    .editor-controls {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .tone-selector {
      display: flex;
      gap: var(--space-2);
    }

    .tone-button {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default));
    }

    .tone-button:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    .tone-button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Action buttons: Regenerate, Copy */
    .action-buttons {
      display: flex;
      gap: var(--space-3);
    }

    .btn-primary {
      flex: 1;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: var(--text-sm);
      color: white;
      background: var(--accent);
      border: none;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default));
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .btn-secondary:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    /* Outreach sequence timeline */
    .sequence-panel {
      display: none;
      flex-direction: column;
      gap: var(--space-3);
    }

    .sequence-panel.active {
      display: flex;
    }

    .sequence-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      position: relative;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 12px;
      top: var(--space-3);
      bottom: 0;
      width: 2px;
      background: var(--bg-subtle);
    }

    .timeline-step {
      display: flex;
      gap: var(--space-3);
      position: relative;
    }

    .timeline-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 2px solid var(--bg-subtle);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      position: relative;
      z-index: 1;
    }

    .timeline-dot.completed {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .timeline-dot.pending {
      background: var(--bg-surface);
      border-color: var(--accent);
      color: var(--accent);
    }

    .timeline-content {
      flex: 1;
      padding: var(--space-2);
    }

    .timeline-label {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }

    .timeline-details {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-1);
    }

    .timeline-status {
      font-size: var(--text-xs);
      font-weight: 500;
      display: inline-block;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      background: var(--accent-subtle);
      color: var(--accent);
      margin-top: var(--space-2);
    }

    .timeline-status.completed {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    /* Version history panel */
    .history-panel {
      display: none;
      flex-direction: column;
      gap: var(--space-3);
    }

    .history-panel.active {
      display: flex;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      max-height: 400px;
      overflow-y: auto;
    }

    .history-item {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default));
    }

    .history-item:hover {
      background: var(--bg-subtle);
      border-color: var(--accent);
    }

    .history-item-meta {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .history-item-preview {
      font-size: var(--text-xs);
      color: var(--text-primary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Toast notifications */
    .toast {
      position: fixed;
      bottom: var(--space-4);
      right: var(--space-4);
      background: var(--accent);
      color: white;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease-out;
      z-index: 1000;
    }

    .toast.error {
      background: var(--danger);
    }

    .toast.success {
      background: var(--success);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile responsive: stack layout on small screens */
    @media (max-width: 900px) {
      .outreach-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--bg-subtle);
        max-height: 200px;
        padding: var(--space-3);
      }

      .editor-panel {
        padding: var(--space-4);
      }

      .message-tabs {
        padding: var(--space-3) var(--space-4);
      }
    }

    /* Module navigation bar (if needed) */
    .module-nav {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--bg-subtle);
      padding: var(--space-3) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .module-nav-item {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .module-nav-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* Help text and empty states */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: var(--space-4);
      color: var(--text-tertiary);
      text-align: center;
    }

    .empty-state-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: var(--text-sm);
      max-width: 280px;
    }
  </style>

  <script>
    /**
     * ================================================================
     * OUTREACH MESSAGE GENERATOR MODULE
     * Version: 1.0 | March 2026
     * ================================================================
     *
     * PURPOSE
     * Generates personalized networking and outreach messages for each
     * step of the job search outreach sequence. Never generic templates —
     * every message references specific company details, role context,
     * and the actual relationship with the connection.
     *
     * DATA SOURCES
     * - Reads: pf_companies, pf_roles, pf_connections (from Pipeline module)
     * - Owns: pf_outreach_messages (generated message history)
     *          pf_outreach_sequences (sequence progress tracking)
     *
     * ARCHITECTURE OVERVIEW
     * 1. Left sidebar: Context panel (company/role/connection selectors)
     * 2. Right workspace: Message type tabs, editor, controls
     * 3. Message generation: Template functions + streaming animation
     * 4. Local storage: All data persisted in browser localStorage
     * 5. Keyboard shortcuts: Cmd+K (search), Cmd+C (copy), etc.
     *
     * KEYBOARD SHORTCUTS
     * - Cmd/Ctrl+K: Open command palette
     * - Cmd/Ctrl+C: Copy current message to clipboard
     * - Cmd/Ctrl+Enter: Regenerate message
     * - 1-8: Switch between message types
     * - Tab: Cycle through tone options
     * - N: New message (in sidebar)
     *
     * This file is ~2200 lines and is entirely self-contained.
     * ================================================================
     */

    /**
     * MESSAGE TYPE DEFINITIONS
     * Each type has a name, description, character limit, and template function
     */
    const MESSAGE_TYPES = [
      {
        id: 'linkedin-connect',
        name: 'LinkedIn Connection',
        description: 'First-touch message when connecting',
        charLimit: 300,
        template: generateLinkedInConnect
      },
      {
        id: 'cold-email-initial',
        name: 'Cold Email — Initial',
        description: 'First cold email outreach',
        charLimit: 800,
        template: generateColdEmailInitial
      },
      {
        id: 'cold-email-followup',
        name: 'Cold Email — Follow-up',
        description: 'Follow-up after initial outreach',
        charLimit: 500,
        template: generateColdEmailFollowup
      },
      {
        id: 'referral-request',
        name: 'Referral Request',
        description: 'Ask for referral to role/team',
        charLimit: 600,
        template: generateReferralRequest
      },
      {
        id: 'inmail',
        name: 'LinkedIn InMail',
        description: 'Paid message on LinkedIn',
        charLimit: 650,
        template: generateInMail
      },
      {
        id: 'thank-you-call',
        name: 'Thank You — Networking Call',
        description: 'After an informational interview',
        charLimit: 500,
        template: generateThankYouCall
      },
      {
        id: 'thank-you-interview',
        name: 'Thank You — Interview',
        description: 'After formal interview round',
        charLimit: 700,
        template: generateThankYouInterview
      },
      {
        id: 'recruiter-response',
        name: 'Recruiter Response',
        description: 'Reply to recruiter outreach',
        charLimit: 600,
        template: generateRecruiterResponse
      }
    ];

    /**
     * OUTREACH SEQUENCE TEMPLATE
     * Defines the standard outreach flow and timeline
     */
    const OUTREACH_SEQUENCE = [
      { step: 1, type: 'linkedin-connect', day: 0, label: 'LinkedIn Connect', description: 'Send connection request' },
      { step: 2, type: 'cold-email-initial', day: 2, label: 'Initial Email', description: 'Follow-up with email' },
      { step: 3, type: 'cold-email-followup', day: 5, label: 'Follow-up Email', description: 'Second follow-up' },
      { step: 4, type: 'thank-you-call', day: 10, label: 'Networking Call', description: 'If you connected' },
      { step: 5, type: 'thank-you-interview', day: 15, label: 'Interview Thank You', description: 'After interview' }
    ];

    /**
     * ================================================================
     * STATE MANAGEMENT
     * Keep track of current selections and UI state
     * ================================================================
     */

    let currentCompanyName = null;
    let currentRoleId = null;
    let currentConnectionId = null;
    let currentMessageType = MESSAGE_TYPES[0].id;
    let currentTone = 'professional';
    let currentMessage = '';
    let isGenerating = false;

    /**
     * Initialize the application on page load
     * Sets up demo data, renders UI, attaches event listeners
     */
    function initializeApp() {
      initializeDemoData();
      renderUI();
      attachEventListeners();
      showToast('Outreach Generator loaded. Select a company to begin.', 'success');
    }

    /**
     * Initialize demo data if it doesn't exist in localStorage
     * Creates sample connections and messages for demonstration
     */
    function initializeDemoData() {
      // In Personal mode, never seed demo data — the data-switcher handles it
      if (localStorage.getItem('pf_data_mode') === 'personal') return;

      // Initialize companies from Pipeline module
      if (!localStorage.getItem('pf_companies')) {
        const demoCompanies = [
          {
            name: 'Stripe',
            domain: 'stripe.com',
            tier: 'hot',
            missionStatement: 'Financial infrastructure for the internet',
            logoUrl: 'https://logo.clearbit.com/stripe.com'
          },
          {
            name: 'Anthropic',
            domain: 'anthropic.com',
            tier: 'hot',
            missionStatement: 'AI safety and research',
            logoUrl: 'https://logo.clearbit.com/anthropic.com'
          },
          {
            name: 'Figma',
            domain: 'figma.com',
            tier: 'active',
            missionStatement: 'Design platform for teams',
            logoUrl: 'https://logo.clearbit.com/figma.com'
          },
          {
            name: 'Notion',
            domain: 'notion.so',
            tier: 'hot',
            missionStatement: 'All-in-one workspace',
            logoUrl: 'https://logo.clearbit.com/notion.so'
          }
        ];
        localStorage.setItem('pf_companies', JSON.stringify(demoCompanies));
      }

      // Initialize roles from Pipeline module
      if (!localStorage.getItem('pf_roles')) {
        const demoRoles = [
          {
            id: 'stripe-pm-1',
            company: 'Stripe',
            title: 'Staff Product Manager, Payments Platform',
            positioning: 'ic',
            stage: 'researching',
            jdText: 'Lead product strategy for Stripe\'s core payments platform...'
          },
          {

    /**
     * Render the outreach sequence timeline
     * Shows the standard outreach flow and marks completed steps
     */
    function renderSequenceTimeline() {
      const container = document.getElementById('sequence-timeline');

      if (!currentConnectionId) {
        container.innerHTML = '';
        return;
      }

      const connections = getConnections();
      const connection = connections.find(c => c.id === currentConnectionId);

      const sequences = getOutreachSequences();
      const sequence = sequences.find(s => s.connectionId === currentConnectionId);

      let timeline = `<div class="sidebar-section-title" style="margin-top: 0;">Outreach Sequence</div><div class="timeline">`;

      OUTREACH_SEQUENCE.forEach(step => {
        const isCompleted = sequence && sequence.completedSteps && sequence.completedSteps.includes(step.step);
        const statusClass = isCompleted ? 'completed' : 'pending';
        const statusText = isCompleted ? '✓' : step.step;

        timeline += `
          <div class="timeline-step">
            <div class="timeline-dot ${statusClass}">${statusText}</div>
            <div class="timeline-content">
              <div class="timeline-label">${step.label}</div>
              <div class="timeline-details">Day ${step.day} • ${step.description}</div>
              <button class="timeline-status ${statusClass}" data-step="${step.step}">
                ${isCompleted ? 'Completed' : 'Mark as done'}
              </button>
            </div>
          </div>
        `;
      });

      timeline += '</div>';
      container.innerHTML = timeline;
    }

    /**
     * Update the version history display
     * Shows previously generated messages for this contact
     */
    function updateHistoryDisplay() {
      const container = document.getElementById('history-list');
      const allMessages = getOutreachMessages();
      const contactMessages = allMessages.filter(m =>
        m.connectionId === currentConnectionId && m.messageType === currentMessageType
      );

      if (contactMessages.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: var(--text-tertiary); font-size: var(--text-xs); padding: var(--space-4);">No version history yet</div>';
        return;
      }

      container.innerHTML = contactMessages.slice(0, 5).map(msg =>
        `<div class="history-item" data-message-id="${msg.id}">
          <div class="history-item-meta">
            <span>${msg.tone}</span>
            <span>${formatDate(msg.generatedAt)}</span>
          </div>
          <div class="history-item-preview">${escapeHtml(msg.content.substring(0, 120))}...</div>
        </div>`
      ).join('');
    }

    /**
     * ================================================================
     * EVENT LISTENERS
     * Handle user interactions (clicks, changes, keyboard)
     * ================================================================
     */

    function attachEventListeners() {
      // Selector changes
      document.getElementById('company-selector').addEventListener('change', (e) => {
        currentCompanyName = e.target.value;
        currentRoleId = null;
        currentConnectionId = null;
        currentMessage = '';
        renderUI();
      });

      document.getElementById('role-selector').addEventListener('change', (e) => {
        currentRoleId = e.target.value;
        currentConnectionId = null;
        currentMessage = '';
        renderUI();
      });

      document.getElementById('connection-selector').addEventListener('change', (e) => {
        currentConnectionId = e.target.value;
        currentMessage = '';
        renderUI();
      });

      // Message tab clicks
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('message-tab')) {
          currentMessageType = e.target.dataset.type;
          currentMessage = '';
          renderUI();
        }
      });

      // Tone button clicks
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('tone-button')) {
          currentTone = e.target.dataset.tone;
          currentMessage = '';
          renderUI();
        }
      });

      // Regenerate button
      document.addEventListener('click', (e) => {
        if (e.target.id === 'regenerate-btn' || e.target.closest('#regenerate-btn')) {
          regenerateMessage();
        }
      });

      // Copy button
      document.addEventListener('click', (e) => {
        if (e.target.id === 'copy-btn' || e.target.closest('#copy-btn')) {
          copyToClipboard();
        }
      });

      // Timeline step buttons
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('timeline-status')) {
          markStepComplete(parseInt(e.target.dataset.step));
        }
      });

      // History item clicks
      document.addEventListener('click', (e) => {
        if (e.target.closest('.history-item')) {
          const messageId = e.target.closest('.history-item').dataset.messageId;
          loadHistoryMessage(messageId);
        }
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', handleKeyboardShortcuts);
    }

    /**
     * Handle keyboard shortcuts
     */
    function handleKeyboardShortcuts(e) {
      // Cmd/Ctrl+C: Copy message
      if ((e.metaKey || e.ctrlKey) && e.key === 'c' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
        copyToClipboard();
      }

      // Cmd/Ctrl+Enter: Regenerate
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        regenerateMessage();
      }

      // Number keys 1-8: Switch message type
      const num = parseInt(e.key);
      if (num >= 1 && num <= 8 && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        if (MESSAGE_TYPES[num - 1]) {
          currentMessageType = MESSAGE_TYPES[num - 1].id;
          currentMessage = '';
          renderUI();
        }
      }

      // Tab: Cycle through tones
      if (e.key === 'Tab' && e.target.classList.contains('tone-button')) {
        e.preventDefault();
        const tones = ['professional', 'warm', 'direct'];
        const currentIndex = tones.indexOf(currentTone);
        currentTone = tones[(currentIndex + 1) % tones.length];
        currentMessage = '';
        renderUI();
      }

      // N: New message
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        currentMessage = '';
        renderUI();
      }
    }

    /**
     * Copy current message to clipboard
     */
    function copyToClipboard() {
      navigator.clipboard.writeText(currentMessage).then(() => {
        showToast('Copied to clipboard!', 'success');
        saveMessageToHistory();
      }).catch(err => {
        showToast('Failed to copy', 'error');
      });
    }

    /**
     * Regenerate message with different variant
     */
    function regenerateMessage() {
      if (!currentCompanyName || !currentRoleId || !currentConnectionId) {
        showToast('Select company, role, and connection first', 'error');
        return;
      }

      const messageType = MESSAGE_TYPES.find(t => t.id === currentMessageType);
      const companies = getCompanies();
      const roles = getRoles();
      const connections = getConnections();

      const company = companies.find(c => c.name === currentCompanyName);
      const role = roles.find(r => r.id === currentRoleId);
      const connection = connections.find(c => c.id === currentConnectionId);

      currentMessage = messageType.template(company, role, connection, currentTone);
      renderMessageEditor();
      showToast('Message regenerated!', 'success');
    }

    /**
     * Save message to history
     */
    function saveMessageToHistory() {
      const messages = getOutreachMessages();
      const newMessage = {
        id: 'msg-' + Date.now(),
        connectionId: currentConnectionId,
        messageType: currentMessageType,
        tone: currentTone,
        content: currentMessage,
        generatedAt: Date.now()
      };

      messages.push(newMessage);
      saveOutreachMessages(messages);
      updateHistoryDisplay();
    }

    /**
     * Load a message from history
     */
    function loadHistoryMessage(messageId) {
      const messages = getOutreachMessages();
      const message = messages.find(m => m.id === messageId);

      if (message) {
        currentMessage = message.content;
        currentTone = message.tone;
        currentMessageType = message.messageType;
        renderUI();
        showToast('Loaded from history', 'success');
      }
    }

    /**
     * Mark an outreach step as complete
     */
    function markStepComplete(step) {
      const sequences = getOutreachSequences();
      let sequence = sequences.find(s => s.connectionId === currentConnectionId);

      if (!sequence) {
        sequence = {
          id: 'seq-' + Date.now(),
          connectionId: currentConnectionId,
          completedSteps: [],
          createdAt: Date.now()
        };
        sequences.push(sequence);
      }

      if (!sequence.completedSteps.includes(step)) {
        sequence.completedSteps.push(step);
      }

      saveOutreachSequences(sequences);
      renderSequenceTimeline();
      showToast(`Step ${step} marked as complete!`, 'success');
    }

    /**
     * ================================================================
     * UTILITY FUNCTIONS
     * ================================================================
     */

    /**
     * Show a toast notification
     */
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    /**
     * Escape HTML special characters to prevent injection
     */
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    /**
     * Format a timestamp as a human-readable date
     */
    function formatDate(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      if (hours < 1) return 'Just now';
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return date.toLocaleDateString();
    }

    /**
     * Initialize app when DOM is ready
     */
    document.addEventListener('DOMContentLoaded', initializeApp);
  </script>
