<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Outreach Generator</title>
  <meta name="description" content="Generate personalized networking and outreach messages with Claude AI">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js"></script>

  <style>
    /* Main container */
    .outreach-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Left sidebar: selectors and context */
    .sidebar {
      width: 320px;
      background: var(--bg-surface);
      border-right: 1px solid var(--bg-subtle);
      overflow-y: auto;
      padding: var(--space-4);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .sidebar-section-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: var(--space-2);
    }

    .selector-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .selector-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .selector-input:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .selector-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Context card */
    .context-card {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .context-card-empty {
      text-align: center;
      padding: var(--space-4);
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }

    .context-card h3 {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      font-size: var(--text-xs);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--bg-surface);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .detail-value {
      color: var(--text-primary);
      word-break: break-word;
    }

    /* Right workspace */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      overflow: hidden;
    }

    /* Message type tabs */
    .message-tabs {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      background: var(--bg-surface);
      overflow-x: auto;
      overflow-y: hidden;
    }

    .message-tab {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .message-tab:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .message-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Editor panel */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-6);
      overflow-y: auto;
      gap: var(--space-4);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
    }

    .editor-meta {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      display: flex;
      gap: var(--space-3);
    }

    /* Message content area */
    .message-content {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-size: var(--text-sm);
      line-height: 1.6;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      text-align: center;
    }

    /* Message textarea */
    .message-textarea {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      min-height: 200px;
      max-height: 400px;
      font-size: var(--text-sm);
      font-family: var(--font-mono);
      color: var(--text-primary);
      line-height: 1.6;
      resize: vertical;
    }

    .message-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Character count */
    .char-count {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: var(--space-2);
    }

    .char-count.warning {
      color: var(--warning);
    }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid var(--bg-subtle);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .btn:hover {
      border-color: var(--accent);
      background: var(--bg-base);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* API key setup */
    .api-key-setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-6);
    }

    .api-key-setup h2 {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--text-primary);
    }

    .api-key-setup p {
      color: var(--text-secondary);
      text-align: center;
      max-width: 400px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-6);
      color: var(--text-secondary);
      text-align: center;
    }

    .empty-state-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    /* Message tracking and response status */
    .response-status {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      margin-top: var(--space-2);
    }

    .response-status.sent {
      background: var(--info-subtle);
      color: var(--info);
    }

    .response-status.responded {
      background: var(--success-subtle);
      color: var(--success);
    }

    .response-status.no_response {
      background: var(--warning-subtle);
      color: var(--warning);
    }

    .response-status.opened {
      background: var(--info-subtle);
      color: var(--info);
    }

    /* Templates section */
    .templates-section {
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--bg-subtle);
    }

    .templates-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .template-item {
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: var(--text-xs);
      margin-bottom: var(--space-2);
      transition: all var(--duration-fast) var(--ease-default);
    }

    .template-item:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    /* Outreach history */
    .outreach-history-panel {
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--bg-subtle);
    }

    .history-entry {
      padding: var(--space-3);
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-3);
    }

    .history-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-2);
    }

    .history-entry-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .history-entry-date {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    .history-entry-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
      margin-top: var(--space-2);
    }

    .status-sent {
      background: var(--info-subtle);
      color: var(--info);
    }

    .status-responded {
      background: var(--success-subtle);
      color: var(--success);
    }

    .status-no-response {
      background: var(--warning-subtle);
      color: var(--warning);
    }

    /* Schedule follow-up dialog */
    .schedule-dialog {
      padding: var(--space-4);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      margin-top: var(--space-3);
    }

    .schedule-dialog input {
      width: 100%;
      padding: var(--space-2);
      margin: var(--space-2) 0;
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
    }

    @media (max-width: 768px) {
      .outreach-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--bg-subtle);
        max-height: 200px;
      }

      .editor-panel {
        padding: var(--space-3);
      }

      .message-tabs {
        padding: var(--space-3);
        gap: var(--space-1);
      }

      .message-tab {
        padding: var(--space-1) var(--space-2);
        font-size: var(--text-xs);
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav">
    <div class="nav-brand"><span>P</span>athfinder</div>

  <div class="outreach-container" style="margin-top: var(--nav-height);">
    <!-- LEFT SIDEBAR: Context Panel -->
    <div class="sidebar">
      <div>
        <div class="sidebar-section-title">Company & Role</div>
        <div class="selector-group">
          <select id="company-selector" class="selector-input">
            <option value="">Select a company...</option>
          </select>
          <select id="role-selector" class="selector-input" disabled>
            <option value="">Select a role...</option>
          </select>
          <select id="connection-selector" class="selector-input" disabled>
            <option value="">Select a connection...</option>
          </select>
        </div>
      </div>

      <div id="context-card"></div>
    </div>

    <!-- RIGHT WORKSPACE: Message Editor -->
    <div class="workspace">
      <!-- Message Type Tabs -->
      <div id="message-tabs" class="message-tabs"></div>

      <!-- Editor Panel -->
      <div id="editor-panel" class="editor-panel"></div>
    </div>
  </div>

  <script src="../shared/data-switcher.js"></script>
  <script>
    /**
     * ============================================================
     * PATHFINDER OUTREACH MODULE — Real Claude API Integration
     * Version: 2.0 | March 2026
     * ============================================================
     *
     * This module generates personalized outreach messages using
     * real Claude API calls, never templates or generics.
     *
     * Features:
     * - 8 message types with Claude-generated content
     * - Real company, role, and connection data from localStorage
     * - Anti-template system prompts (no generic openers)
     * - Character limits and formatting per message type
     * - Full message editing and history tracking
     */

    const AppState = {
      selectedCompanyId: null,
      selectedRoleId: null,
      selectedConnectionId: null,
      selectedMessageType: 'linkedin-connect',
      currentMessage: '',
      isGenerating: false,
    };

    const MESSAGE_TYPES = [
      {
        id: 'linkedin-connect',
        name: 'LinkedIn Connection',
        description: 'Request to connect',
        charLimit: 300,
      },
      {
        id: 'cold-email',
        name: 'Cold Email',
        description: 'Initial outreach',
        charLimit: 800,
      },
      {
        id: 'cold-email-followup',
        name: 'Follow-Up Email',
        description: 'Gentle reminder after 7+ days',
        charLimit: 500,
      },
      {
        id: 'referral-request',
        name: 'Referral Request',
        description: 'Ask someone to refer you',
        charLimit: 600,
      },
      {
        id: 'thank-you-call',
        name: 'Thank You (Call)',
        description: 'After a networking call',
        charLimit: 400,
      },
      {
        id: 'thank-you-interview',
        name: 'Thank You (Interview)',
        description: 'Post-interview follow-up',
        charLimit: 700,
      },
      {
        id: 'recruiter-response',
        name: 'Recruiter Response',
        description: 'Reply to inbound recruiter',
        charLimit: 600,
      },
      {
        id: 'networking-intro',
        name: 'Networking Intro',
        description: 'Warm introduction request',
        charLimit: 500,
      },
    ];

    // ────────────────────────────────────────────────────────
    // DATA ACCESS FUNCTIONS
    // ────────────────────────────────────────────────────────

    function getCompanies() {
      const data = localStorage.getItem('pf_companies');
      return data ? JSON.parse(data) : [];
    }

    function getRoles() {
      const data = localStorage.getItem('pf_roles');
      return data ? JSON.parse(data) : [];
    }

    function getConnections() {
      const data = localStorage.getItem('pf_connections');
      return data ? JSON.parse(data) : [];
    }

    function getPreferences() {
      const data = localStorage.getItem('pf_preferences');
      return data ? JSON.parse(data) : {};
    }

    function getBulletBank() {
      const data = localStorage.getItem('pf_bullet_bank');
      return data ? JSON.parse(data) : [];
    }

    function getStoryBank() {
      const data = localStorage.getItem('pf_story_bank');
      return data ? JSON.parse(data) : [];
    }

    // ────────────────────────────────────────────────────────
    // CLAUDE PROMPT GENERATION
    // ────────────────────────────────────────────────────────

    function buildOutreachPrompt(messageType, context) {
      const { company, role, connection, userBackground } = context;

      const antiTemplateRules = `
CRITICAL RULES — Must follow these exactly:
1. NEVER use: "I hope this message finds you well"
2. NEVER use: "I'm reaching out because..."
3. NEVER use: "I've followed your profile and was impressed by..."
4. NEVER use: "I think I would be a great fit..."
5. NEVER use: "I'd love to pick your brain..."
6. NEVER use generic openers that could work for 100 different people

REQUIRED:
- Reference SOMETHING SPECIFIC about this company/role/person
- Be direct and concrete, not flowery
- Keep tone professional but casual ("Hi John" not "Dear Mr. Chen")
- Make it sound like a real person wrote it, not a template
- One clear idea or ask, not multiple
- No emojis, no exclamation marks in excess`;

      let typeSpecificGuidance = '';

      switch (messageType) {
        case 'linkedin-connect':
          typeSpecificGuidance = `
PURPOSE: Get on their radar so you can DM later
STRUCTURE:
1. One specific thing about them or their work
2. One concrete reason your background is relevant
3. Soft ask: "I'd love to connect"
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters max`;
          break;

        case 'cold-email':
          typeSpecificGuidance = `
PURPOSE: Introduce yourself and propose a concrete next step
STRUCTURE:
1. Hook: specific thing about them / their work / company moment
2. Your credibility: one concrete sentence about relevant experience
3. Why now: reason this conversation makes sense
4. Soft ask: 15-minute call? Coffee chat?
5. Closing: signature with LinkedIn link
FORMAT: 4-6 sentences, multiple short paragraphs
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'cold-email-followup':
          typeSpecificGuidance = `
PURPOSE: Gentle reminder; assume they're busy
STRUCTURE:
1. Reference the previous email (don't repeat it)
2. New angle or reason to respond now
3. Soft ask: still open? Quick call?
FORMAT: 2-3 sentences only
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'referral-request':
          typeSpecificGuidance = `
PURPOSE: Ask someone to refer you
STRUCTURE:
1. Thank them for being in your network
2. Specific person/role/company you're targeting
3. Why you think you're a good fit (one sentence)
4. Ask: "Would you be willing to intro?"
FORMAT: 3-4 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'thank-you-call':
          typeSpecificGuidance = `
PURPOSE: Follow-up after a call with a potential advisor/mentor
STRUCTURE:
1. Thank them for their time
2. One specific thing you learned or appreciated
3. Concrete next step you'll take
4. Optional: stay in touch / reconnect later
FORMAT: 3-4 sentences, brief and genuine
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'thank-you-interview':
          typeSpecificGuidance = `
PURPOSE: Follow-up after an interview
STRUCTURE:
1. Thank them for their time
2. One specific thing you discussed
3. How you see yourself contributing to that topic
4. Next steps: "Looking forward to hearing from you"
5. Optional: reference a specific question and your research
FORMAT: 4-5 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'recruiter-response':
          typeSpecificGuidance = `
PURPOSE: Reply to a recruiter who reached out
STRUCTURE:
1. Thank them for reaching out
2. Express genuine, specific interest
3. Ask for key info: JD, timeline, process
4. Offer availability: "I'm available Tuesday-Thursday"
FORMAT: 3-5 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;

        case 'networking-intro':
          typeSpecificGuidance = `
PURPOSE: Warm introduction request
STRUCTURE:
1. Context: how you know this person
2. Why the introduction would be valuable
3. What you're looking for / working on
4. Ask: "Would you be open to an intro?"
FORMAT: 3-4 sentences
STRICT LIMIT: ${MESSAGE_TYPES.find(t => t.id === messageType).charLimit} characters`;
          break;
      }

      const systemPrompt = `You are a personalized message generator for job search outreach. Your job is to create REAL, SPECIFIC messages that sound like they come from a real person, never from a template.

${antiTemplateRules}

${typeSpecificGuidance}

PERSONALIZATION CHECKLIST — Aim for at least 2 of these:
1. Specific product/initiative/news the company is working on
2. Recipient's specific role or scope
3. Concrete, measurable reason your background is relevant
4. Mutual connection or shared history

OUTPUT FORMAT:
- Plain text only, no markdown
- If subject line applicable, start with "Subject: ..."
- No citations or footnotes needed
- Keep it concise and direct`;

      const userPrompt = `Generate a ${MESSAGE_TYPES.find(t => t.id === messageType).name.toLowerCase()} message with these specifics:

RECIPIENT:
- Name: ${connection.name}
- Title: ${connection.title}
- Company: ${company.name}
- Relationship: ${connection.relationship || 'cold'}

COMPANY:
- Name: ${company.name}
- Mission: ${company.mission || 'Not specified'}
- Domain: ${company.domain || 'Not specified'}

ROLE YOU'RE TARGETING:
- Title: ${role.title}
- Description: ${role.description || role.jd || 'See job description'}

YOUR BACKGROUND:
${userBackground.bullets && userBackground.bullets.length > 0
  ? '- ' + userBackground.bullets.slice(0, 3).join('\n- ')
  : '- Not specified'}

Create a compelling, specific message that references at least one concrete detail about the company, role, or person. Make it sound authentic.`;

      return { systemPrompt, userPrompt };
    }

    // ────────────────────────────────────────────────────────
    // MESSAGE GENERATION
    // ────────────────────────────────────────────────────────

    async function generateOutreachMessage(messageType) {
      const companyId = AppState.selectedCompanyId;
      const roleId = AppState.selectedRoleId;
      const connectionId = AppState.selectedConnectionId;

      if (!companyId || !roleId || !connectionId) {
        showToast('Please select a company, role, and connection first', 'error');
        return;
      }

      const companies = getCompanies();
      const roles = getRoles();
      const connections = getConnections();
      const bullets = getBulletBank();

      const company = companies.find(c => c.id === companyId);
      const role = roles.find(r => r.id === roleId);
      const connection = connections.find(c => c.id === connectionId);

      if (!company || !role || !connection) {
        showToast('Invalid selection', 'error');
        return;
      }

      AppState.isGenerating = true;
      updateUI();

      try {
        const context = {
          company,
          role,
          connection,
          userBackground: { bullets: bullets.map(b => b.text).slice(0, 5) },
        };

        const { systemPrompt, userPrompt } = buildOutreachPrompt(messageType, context);

        const result = await PF.claude.generate(systemPrompt, userPrompt, {
          maxTokens: 1500,
          temperature: 0.7,
        });

        AppState.currentMessage = result.content;
        showToast('Message generated successfully!', 'success');
      } catch (error) {
        console.error('Generation error:', error);
        showToast(`Error: ${error.message}`, 'error');
      } finally {
        AppState.isGenerating = false;
        updateUI();
      }
    }

    function saveToOutreachLog() {

    /* ================================================================
       FEATURE 1: MESSAGE SEQUENCE SCHEDULING
       Schedule follow-ups with automatic timing
       ================================================================ */

    /**
     * Creates or updates an outreach sequence for a connection-role pair
     * INPUT: connectionId, roleId, currentMessageType
     * RETURNS: sequence object with follow-up dates
     */
    function createOutreachSequence(connectionId, roleId, currentMessageType) {
      let sequences = JSON.parse(localStorage.getItem('pf_outreach_sequences') || '[]');

      let sequence = sequences.find(s => s.connectionId === connectionId && s.roleId === roleId);
      if (!sequence) {
        sequence = {
          id: `seq-${Date.now()}`,
          connectionId,
          roleId,
          currentStep: currentMessageType,
          completedSteps: [],
          sentMessages: [],
          nextFollowUpDate: null,
          createdAt: new Date().toISOString(),
        };
        sequences.push(sequence);
      }

      // Mark current step as completed and set next follow-up
      if (!sequence.completedSteps.includes(currentMessageType)) {
        sequence.completedSteps.push(currentMessageType);
        sequence.sentMessages.push({
          type: currentMessageType,
          sentDate: new Date().toISOString(),
          messageSnapshot: AppState.currentMessage,
        });

        // Calculate follow-up dates based on message type
        const followUpDates = {
          'cold-email': 7, // 7 days
          'cold-email-followup': 10, // 10 days
          'thank-you-call': 1, // 1 day
          'thank-you-interview': 1, // 1 day
          'recruiter-response': 2, // 2 days
        };

        const daysUntilFollowUp = followUpDates[currentMessageType] || 7;
        const nextDate = new Date();
        nextDate.setDate(nextDate.getDate() + daysUntilFollowUp);
        sequence.nextFollowUpDate = nextDate.toISOString();
      }

      localStorage.setItem('pf_outreach_sequences', JSON.stringify(sequences));
      return sequence;
    }

    /**
     * Shows schedule follow-up dialog
     * INPUT: none
     * OUTPUT: displays date picker and saves schedule
     */
    function scheduleFollowUp() {
      if (!AppState.selectedConnectionId || !AppState.selectedRoleId) {
        showToast('Select connection and role first', 'error');
        return;
      }

      const today = new Date().toISOString().split('T')[0];
      let scheduledDate = today;

      const html = `
        <div class="schedule-dialog">
          <h3 style="font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-2);">Schedule Follow-Up</h3>
          <label style="font-size: var(--text-xs); color: var(--text-secondary);">Follow-up date:</label>
          <input type="date" id="followup-date" value="${today}" min="${today}" onchange="scheduledDate = this.value">
          <button class="btn primary" style="width: 100%; margin-top: var(--space-2);" onclick="confirmScheduleFollowUp('${AppState.selectedConnectionId}', '${AppState.selectedRoleId}', document.getElementById('followup-date').value)">
            Schedule Follow-Up
          </button>
        </div>
      `;

      const panel = document.getElementById('editor-panel');
      const existingDialog = panel.querySelector('.schedule-dialog');
      if (existingDialog) existingDialog.remove();

      const dialogEl = document.createElement('div');
      dialogEl.innerHTML = html;
      panel.appendChild(dialogEl.firstElementChild);
    }

    /**
     * Confirms and saves the scheduled follow-up
     * INPUT: connectionId, roleId, dateString
     * OUTPUT: sequence updated with follow-up scheduled
     */
    function confirmScheduleFollowUp(connectionId, roleId, dateString) {
      const sequence = createOutreachSequence(connectionId, roleId, AppState.selectedMessageType);

      const followUpDate = new Date(dateString);
      sequence.nextFollowUpDate = followUpDate.toISOString();
      sequence.followUpScheduled = true;

      const sequences = JSON.parse(localStorage.getItem('pf_outreach_sequences') || '[]');
      const idx = sequences.findIndex(s => s.id === sequence.id);
      if (idx >= 0) sequences[idx] = sequence;
      localStorage.setItem('pf_outreach_sequences', JSON.stringify(sequences));

      showToast(`Follow-up scheduled for ${followUpDate.toLocaleDateString()}`, 'success');

      // Remove dialog
      const dialog = document.querySelector('.schedule-dialog');
      if (dialog) dialog.remove();
    }

    /* ================================================================
       FEATURE 2: RESPONSE TRACKING
       Track message opens, responses, and response times
       ================================================================ */

    /**
     * Marks a message as responded and tracks response status
     * INPUT: messageId = ID of the message to mark
     * OUTPUT: updates connection outreach log with response status
     */
    function markAsResponded(messageId) {
      const connections = getConnections();
      let found = false;

      connections.forEach(conn => {
        if (conn.outreachLog) {
          const entry = conn.outreachLog.find(e => e.id === messageId);
          if (entry) {
            entry.responseStatus = 'responded';
            entry.responseDate = new Date().toISOString();
            found = true;
          }
        }
      });

      if (found) {
        localStorage.setItem('pf_connections', JSON.stringify(connections));
        showToast('Message marked as responded', 'success');
        renderOutreachHistory();
      }
    }

    /**
     * Marks a message as opened (tracking)
     * INPUT: messageId = ID of message
     * OUTPUT: updates message status
     */
    function markAsOpened(messageId) {
      const connections = getConnections();
      let found = false;

      connections.forEach(conn => {
        if (conn.outreachLog) {
          const entry = conn.outreachLog.find(e => e.id === messageId);
          if (entry && entry.responseStatus !== 'responded') {
            entry.responseStatus = 'opened';
            entry.openedDate = new Date().toISOString();
            found = true;
          }
        }
      });

      if (found) {
        localStorage.setItem('pf_connections', JSON.stringify(connections));
        showToast('Message marked as opened', 'info');
      }
    }

    /**
     * Marks a message as no response received
     * INPUT: messageId = ID of message
     * OUTPUT: updates response status
     */
    function markAsNoResponse(messageId) {
      const connections = getConnections();
      let found = false;

      connections.forEach(conn => {
        if (conn.outreachLog) {
          const entry = conn.outreachLog.find(e => e.id === messageId);
          if (entry) {
            entry.responseStatus = 'no_response';
            entry.noResponseMarkedAt = new Date().toISOString();
            found = true;
          }
        }
      });

      if (found) {
        localStorage.setItem('pf_connections', JSON.stringify(connections));
        showToast('Message marked as no response', 'info');
        renderOutreachHistory();
      }
    }

    /* ================================================================
       FEATURE 3: MESSAGE TEMPLATES
       Save and load message templates by type

    /**
     * Saves current message as a template
     * INPUT: none
     * OUTPUT: template stored in pf_outreach_templates
     */
    function saveAsTemplate() {
      if (!AppState.currentMessage) {
        showToast('No message to save as template', 'error');
        return;
      }

      let templates = JSON.parse(localStorage.getItem('pf_outreach_templates') || '[]');

      const template = {
        id: `template-${Date.now()}`,
        name: `${MESSAGE_TYPES.find(t => t.id === AppState.selectedMessageType)?.name || 'Message'} Template`,
        messageType: AppState.selectedMessageType,
        content: AppState.currentMessage,
        createdAt: new Date().toISOString(),
      };

      templates.push(template);
      localStorage.setItem('pf_outreach_templates', JSON.stringify(templates));

      showToast('Template saved!', 'success');
      renderTemplatesList();
    }

    /**
     * Loads a template into the editor
     * INPUT: templateId = ID of template to load
     * OUTPUT: message textarea populated with template content
     */
    function loadTemplate(templateId) {
      const templates = JSON.parse(localStorage.getItem('pf_outreach_templates') || '[]');
      const template = templates.find(t => t.id === templateId);

      if (!template) {
        showToast('Template not found', 'error');
        return;
      }

      AppState.currentMessage = template.content;
      AppState.selectedMessageType = template.messageType;
      updateUI();

      showToast(`Loaded "${template.name}"`, 'success');
    }

    /**
     * Deletes a saved template
     * INPUT: templateId = ID of template to delete
     * OUTPUT: template removed from storage
     */
    function deleteTemplate(templateId) {
      if (!confirm('Delete this template?')) return;

      let templates = JSON.parse(localStorage.getItem('pf_outreach_templates') || '[]');
      templates = templates.filter(t => t.id !== templateId);
      localStorage.setItem('pf_outreach_templates', JSON.stringify(templates));

      showToast('Template deleted', 'success');
      renderTemplatesList();
    }

    /**
     * Renders the templates list in the sidebar
     * INPUT: none
     * OUTPUT: displays saved templates
     */
    function renderTemplatesList() {
      const templates = JSON.parse(localStorage.getItem('pf_outreach_templates') || '[]');

      if (templates.length === 0) return;

      const html = `
        <div class="templates-section">
          <div class="templates-title">Saved Templates</div>
          ${templates.map(t => `
            <div class="template-item">

    /* ================================================================
       FEATURE 4: OUTREACH HISTORY & ANALYTICS
       View all messages, timeline, and response rates
       ================================================================ */

    /**
     * Renders complete outreach history with timeline and stats
     * INPUT: none
     * OUTPUT: displays history panel in editor
     */
    function renderOutreachHistory() {
      const connections = getConnections();
      const roles = getRoles();

      let allEntries = [];
      connections.forEach(conn => {
        if (conn.outreachLog) {
          conn.outreachLog.forEach(entry => {
            const role = roles.find(r => r.id === entry.roleId);
            allEntries.push({
              ...entry,
              connectionName: conn.name,
              connectionId: conn.id,
              roleTitle: role?.title || 'Unknown Role',
              company: role?.company || 'Unknown Company',
            });
          });
        }
      });

      // Sort by date (newest first)
      allEntries.sort((a, b) => new Date(b.sentDate) - new Date(a.sentDate));

      // Calculate stats
      const totalSent = allEntries.length;
      const responded = allEntries.filter(e => e.responseStatus === 'responded').length;
      const responseRate = totalSent > 0 ? Math.round((responded / totalSent) * 100) : 0;

      const messageTypeStats = {};
      MESSAGE_TYPES.forEach(type => {
        const sent = allEntries.filter(e => e.messageType === type.id).length;
        const resp = allEntries.filter(e => e.messageType === type.id && e.responseStatus === 'responded').length;
        messageTypeStats[type.name] = { sent, responded: resp };
      });

      const historyHtml = `
        <div class="outreach-history-panel">
          <h2 style="font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-4);">Outreach History</h2>

          <!-- Stats -->
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); margin-bottom: var(--space-6);">
            <div style="background: var(--accent-subtle); padding: var(--space-3); border-radius: var(--radius-md); text-align: center;">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--accent);">${totalSent}</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary);">Total Sent</div>
            </div>
            <div style="background: var(--success-subtle); padding: var(--space-3); border-radius: var(--radius-md); text-align: center;">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--success);">${responded}</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary);">Responded</div>
            </div>
            <div style="background: var(--info-subtle); padding: var(--space-3); border-radius: var(--radius-md); text-align: center;">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--info);">${responseRate}%</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary);">Response Rate</div>
            </div>
          </div>

          <!-- Message timeline -->
          <h3 style="font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-3);">Timeline</h3>
          <div style="max-height: 400px; overflow-y: auto;">
            ${allEntries.map(entry => `
              <div class="history-entry">
                <div class="history-entry-header">
                  <div>
                    <div class="history-entry-title">${entry.connectionName} – ${entry.roleTitle}</div>
                    <div class="history-entry-date">${entry.company}</div>
                  </div>
                  <div class="history-entry-date">${new Date(entry.sentDate).toLocaleDateString()}</div>
                </div>
                <div style="font-size: var(--text-xs); color: var(--text-secondary); margin-bottom: var(--space-2);">
                  ${MESSAGE_TYPES.find(t => t.id === entry.messageType)?.name || entry.messageType}
                </div>
                ${entry.responseStatus ? `<span class="history-entry-status status-${entry.responseStatus === 'responded' ? 'responded' : entry.responseStatus === 'no_response' ? 'no-response' : 'sent'}">
                  ${entry.responseStatus === 'responded' ? '✓ Responded' : entry.responseStatus === 'no_response' ? '✗ No Response' : '• Opened'}
                </span>` : ''}
              </div>
            `).join('') || '<p style="color: var(--text-tertiary); text-align: center;">No messages sent yet</p>'}
          </div>
        </div>
      `;

      const panel = document.getElementById('editor-panel');
      panel.innerHTML = historyHtml;
    }

    /**
     * Shows outreach history view
     * INPUT: none
     * OUTPUT: switches to history view
     */
    function showOutreachHistory() {
      renderOutreachHistory();
    }

    function clearMessage() {
      AppState.currentMessage = '';
      updateUI();
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: ${type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#3b82f6'};
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        font-size: 14px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ────────────────────────────────────────────────────────
    // EVENT LISTENERS
    // ────────────────────────────────────────────────────────

    document.getElementById('company-selector').addEventListener('change', e => {
      AppState.selectedCompanyId = e.target.value;
      AppState.selectedRoleId = null;
      AppState.selectedConnectionId = null;
      AppState.currentMessage = '';
      renderSidebar();
      updateUI();
    });

    document.getElementById('role-selector').addEventListener('change', e => {
      AppState.selectedRoleId = e.target.value;
      AppState.currentMessage = '';
      renderContextCard();
      updateUI();
    });

    document.getElementById('connection-selector').addEventListener('change', e => {
      AppState.selectedConnectionId = e.target.value;
      AppState.currentMessage = '';
      renderContextCard();
      updateUI();
    });

    // ────────────────────────────────────────────────────────
    // INITIALIZATION
    // ────────────────────────────────────────────────────────

    function initializeApp() {
      renderSidebar();
      renderMessageTabs();
      renderEditorPanel();
    }

    document.addEventListener('DOMContentLoaded', initializeApp);
  </script>
</body>
</html>
