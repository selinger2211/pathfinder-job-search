<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Comp Intelligence</title>
  <meta name="description" content="Market compensation data and benchmarking for job search decisions">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js"></script>

  <style>
    /* ================================================================
       COMP INTELLIGENCE AGENT — MODULE-SPECIFIC STYLES
       ================================================================ */

    .comp-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
      background: var(--bg-base);
    }

    /* Left sidebar: role selector */
    .comp-sidebar {
      width: 320px;
      background: var(--bg-elevated);
      border-right: 1px solid var(--bg-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: var(--space-4);
      border-bottom: 1px solid var(--bg-subtle);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .sidebar-search {
      position: relative;
    }

    .sidebar-search input {
      width: 100%;
      padding: var(--space-2) var(--space-3) var(--space-2) var(--space-4);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .sidebar-search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .sidebar-search svg {
      position: absolute;
      right: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .roles-list {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-3);
    }

    .role-group {
      margin-bottom: var(--space-4);
    }

    .role-group-label {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .role-item {
      padding: var(--space-3);
      margin-bottom: var(--space-2);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .role-item:hover {
      background: var(--bg-subtle);
      border-color: var(--accent);
    }

    .role-item.active {
      background: var(--accent-subtle);
      border-color: var(--accent);
    }

    .role-item-company {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-bottom: var(--space-1);
    }

    .role-item-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
    }

    .role-item-level {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    /* Main comp analysis panel */
    .comp-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .comp-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      flex-shrink: 0;
    }

    .comp-toolbar-title {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--text-primary);
    }

    .comp-toolbar-actions {
      display: flex;
      gap: var(--space-2);
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .action-button:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .action-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .comp-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }

    .comp-tabs {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      padding-bottom: var(--space-3);
    }

    .comp-tab {
      padding: var(--space-2) 0;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      border-bottom: 2px solid transparent;
      margin-bottom: calc(var(--space-3) * -1);
    }

    .comp-tab:hover {
      color: var(--text-primary);
    }

    .comp-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .comp-tab-content {
      display: none;
    }

    .comp-tab-content.active {
      display: block;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-tertiary);
      text-align: center;
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin-bottom: var(--space-4);
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: var(--text-sm);
      margin-bottom: var(--space-3);
    }

    /* Comp data cards */
    .comp-card {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .comp-card-header {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-3);
    }

    .comp-card-title {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    /* Form styles */
    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-base);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    /* Comp range display */
    .comp-range {
      background: var(--bg-base);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .comp-range-label {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-2);
    }

    .comp-range-display {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .comp-range-display .separator {
      color: var(--text-tertiary);
    }

    /* Status indicators */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 600;
    }

    .status-badge.good {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }

    .status-badge.neutral {
      background: rgba(107, 114, 128, 0.1);
      color: #6b7280;
    }

    .status-badge.warning {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    /* Table styles */
    .comp-table {
      width: 100%;
      border-collapse: collapse;
    }

    .comp-table th {
      background: var(--bg-elevated);
      padding: var(--space-3);
      text-align: left;
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--bg-subtle);
    }

    .comp-table td {
      padding: var(--space-3);
      border-bottom: 1px solid var(--bg-subtle);
      font-size: var(--text-sm);
      color: var(--text-primary);
    }

    .comp-table tr:hover {
      background: var(--bg-elevated);
    }

    /* Quick stats */
    .quick-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .stat-box {
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-3);
    }

    .stat-label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-1);
    }

    .stat-value {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Modal/panel styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: var(--space-4) var(--space-6);
    }

    .modal-footer {
      padding: var(--space-4) var(--space-6);
      border-top: 1px solid var(--bg-subtle);
      display: flex;
      gap: var(--space-3);
      justify-content: flex-end;
    }

    .negotiation-strategy {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .negotiation-strategy h4 {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .negotiation-strategy ul {
      margin-left: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .negotiation-strategy li {
      margin-bottom: var(--space-1);
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }
  </style>
</head>
<body>
  <div class="comp-container">
    <!-- Left Sidebar: Role List -->
    <div class="comp-sidebar">
      <div class="sidebar-header">
        <h2>Roles with Comp Data</h2>
        <div class="sidebar-search">
          <input type="text" id="roleSearch" placeholder="Search roles...">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
      </div>

      <div class="roles-list" id="rolesList">
        <div class="empty-state" style="height: auto; padding: var(--space-4); color: var(--text-tertiary); text-align: center;">
          <p style="font-size: var(--text-sm); margin: 0;">No roles found. Add compensation data to get started.</p>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="comp-main">
      <div class="comp-toolbar">
        <h1 class="comp-toolbar-title">Compensation Intelligence</h1>
        <div class="comp-toolbar-actions">
          <button class="action-button" id="addCompDataBtn">
            <span>+</span> Add Comp Data
          </button>
          <button class="action-button" id="addBenchmarkBtn">
            <span>+</span> Add Benchmark
          </button>
        </div>
      </div>

      <div class="comp-content" id="compContent">
        <div class="empty-state">
          <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <p class="empty-state-text">No role selected. Choose a role from the list or add compensation data.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Comp Data Modal -->
  <div class="modal-overlay" id="addCompDataModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Compensation Data</h3>
        <button class="modal-close" data-modal-close="addCompDataModal"></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select id="compDataRole" class="form-input">
            <option value="">Select a role...</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Base Salary Min ($)</label>
            <input type="number" id="compDataBaseMin" class="form-input" placeholder="e.g. 200000">
          </div>
          <div class="form-group">
            <label class="form-label">Base Salary Max ($)</label>
            <input type="number" id="compDataBaseMax" class="form-input" placeholder="e.g. 250000">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Bonus Target (%)</label>
            <input type="number" id="compDataBonus" class="form-input" step="0.1" placeholder="e.g. 20">
          </div>
          <div class="form-group">
            <label class="form-label">Signing Bonus ($)</label>
            <input type="number" id="compDataSigning" class="form-input" placeholder="e.g. 50000">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Equity / Grants (description)</label>
          <input type="text" id="compDataEquity" class="form-input" placeholder="e.g. $200K RSU/4yr or 0.5% options">
        </div>

        <div class="form-group">
          <label class="form-label">Other Benefits</label>
          <input type="text" id="compDataBenefits" class="form-input" placeholder="e.g. health insurance, 401k matching, etc.">
        </div>

        <div class="form-group">
          <label class="form-label">Source</label>
          <select id="compDataSource" class="form-input">
            <option value="">Select source...</option>
            <option value="recruiter">Recruiter</option>
            <option value="posting">Job Posting</option>
            <option value="levels.fyi">Levels.fyi</option>
            <option value="glassdoor">Glassdoor</option>
            <option value="personal">Personal Offer</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-button" style="background: var(--bg-subtle); color: var(--text-primary);" data-modal-close="addCompDataModal">Cancel</button>
        <button class="action-button" id="saveCompDataBtn">Save Comp Data</button>
      </div>
    </div>
  </div>

  <!-- Add Benchmark Modal -->
  <div class="modal-overlay" id="addBenchmarkModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Market Benchmark</h3>
        <button class="modal-close" data-modal-close="addBenchmarkModal"></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Company *</label>
            <input type="text" id="benchmarkCompany" class="form-input" placeholder="e.g. Stripe">
          </div>
          <div class="form-group">
            <label class="form-label">Title *</label>
            <input type="text" id="benchmarkTitle" class="form-input" placeholder="e.g. Senior PM">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Level</label>
            <input type="text" id="benchmarkLevel" class="form-input" placeholder="e.g. L5">
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" id="benchmarkLocation" class="form-input" placeholder="e.g. San Francisco">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Base Salary ($)</label>
            <input type="number" id="benchmarkBase" class="form-input" placeholder="200000">
          </div>
          <div class="form-group">
            <label class="form-label">Equity (annual, $)</label>
            <input type="number" id="benchmarkEquity" class="form-input" placeholder="200000">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Bonus ($)</label>
            <input type="number" id="benchmarkBonus" class="form-input" placeholder="40000">
          </div>
          <div class="form-group">
            <label class="form-label">Total Comp ($)</label>
            <input type="number" id="benchmarkTotal" class="form-input" placeholder="440000">
          </div>
        </div>

        <div class="form-group form-row full">
          <div class="form-group">
            <label class="form-label">Source URL (optional)</label>
            <input type="url" id="benchmarkSourceUrl" class="form-input" placeholder="https://levels.fyi/...">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-button" style="background: var(--bg-subtle); color: var(--text-primary);" data-modal-close="addBenchmarkModal">Cancel</button>
        <button class="action-button" id="saveBenchmarkBtn">Save Benchmark</button>
      </div>
    </div>
  </div>

  <script>
    // ================================================================
    // DATA MANAGEMENT
    // ================================================================

    // Get or initialize data
    function getCompData() {
      return JSON.parse(localStorage.getItem('pf_comp_data') || '{}');
    }

    function saveCompData(data) {
      localStorage.setItem('pf_comp_data', JSON.stringify(data));
    }

    function getCompBenchmarks() {
      return JSON.parse(localStorage.getItem('pf_comp_benchmarks') || '[]');
    }

    function saveCompBenchmarks(data) {
      localStorage.setItem('pf_comp_benchmarks', JSON.stringify(data));
    }

    function getPipelineRoles() {
      return JSON.parse(localStorage.getItem('pf_roles') || '[]');
    }

    function getPipelineCompanies() {
      return JSON.parse(localStorage.getItem('pf_companies') || '{}');
    }

    function getPreferences() {
      return JSON.parse(localStorage.getItem('pf_preferences') || '{}');
    }

    // ================================================================
    // UI RENDERING
    // ================================================================

    function formatCurrency(value) {
      if (!value) return '$0';
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(value);
    }

    function renderRolesList() {
      const roles = getPipelineRoles();
      const compData = getCompData();
      const rolesContainer = document.getElementById('rolesList');

      if (roles.length === 0) {
        rolesContainer.innerHTML = '<div class="empty-state" style="height: auto; padding: var(--space-4); color: var(--text-tertiary); text-align: center;"><p style="font-size: var(--text-sm); margin: 0;">No roles in your pipeline.</p></div>';
        return;
      }

      const rolesWithData = roles.filter(r => compData[r.id]);

      if (rolesWithData.length === 0) {
        rolesContainer.innerHTML = '<div class="empty-state" style="height: auto; padding: var(--space-4); color: var(--text-tertiary); text-align: center;"><p style="font-size: var(--text-sm); margin: 0;">No roles have comp data yet.</p></div>';
        return;
      }

      rolesContainer.innerHTML = rolesWithData.map(role => `
        <div class="role-item" data-role-id="${role.id}" onclick="selectRole('${role.id}')">
          <div class="role-item-company">${role.company || 'Unknown'}</div>
          <div class="role-item-title">${role.title || 'Untitled'}</div>
          <div class="role-item-level">${role.level || 'No level'}</div>
        </div>
      `).join('');

      // Restore active state if a role was previously selected
      const lastSelectedId = sessionStorage.getItem('pf_selectedRoleId');
      if (lastSelectedId) {
        const elem = document.querySelector(`[data-role-id="${lastSelectedId}"]`);
        if (elem) {
          elem.classList.add('active');
        }
      }
    }

    /**
     * COMP VISUALIZATION TAB
     * CSS-based bar charts comparing base, bonus, equity across roles
     */
    function renderCompVisualization(roles, compData, prefs) {
      const rolesWithComp = roles.filter(r => compData[r.id]);

      if (rolesWithComp.length === 0) {
        return `
          <div class="empty-state">
            <p class="empty-state-text">No comp data available to visualize. Add compensation data to roles first.</p>
          </div>
        `;
      }

      let html = `<div style="padding: var(--space-4);">
        <h3 style="font-weight: 600; margin-bottom: var(--space-4); color: var(--text-primary);">Compensation Comparison</h3>
        <div style="display: flex; flex-direction: column; gap: var(--space-6);">
      `;

      const maxComp = Math.max(...rolesWithComp.map(r => {
        const d = compData[r.id];
        return (d.baseMax || 0) + (d.signingBonus || 0) + (d.bonusTarget ? (d.baseMax || 0) * d.bonusTarget / 100 : 0);
      }));

      rolesWithComp.forEach(role => {
        const d = compData[role.id];
        const base = d.baseMax || 0;
        const bonus = d.bonusTarget ? (d.baseMax * d.bonusTarget / 100) : 0;
        const signing = d.signingBonus || 0;
        const total = base + bonus + signing;
        const percentage = (total / maxComp) * 100;

        html += `
          <div>
            <div style="font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-2); color: var(--text-primary);">
              ${role.company} - ${role.title}
            </div>
            <div style="background: var(--bg-surface); border-radius: var(--radius-md); height: 60px; display: flex; overflow: hidden;">
              <div style="background: #3b82f6; width: ${(base/maxComp)*100}%; display: flex; align-items: center; justify-content: center; color: white; font-size: var(--text-xs); font-weight: 600;">
                ${base > 0 ? formatCurrency(base) : ''}
              </div>
              <div style="background: #10b981; width: ${(bonus/maxComp)*100}%; display: flex; align-items: center; justify-content: center; color: white; font-size: var(--text-xs); font-weight: 600;">
                ${bonus > 0 ? '$' + Math.round(bonus/1000) + 'K' : ''}
              </div>
              <div style="background: #a855f7; width: ${(signing/maxComp)*100}%; display: flex; align-items: center; justify-content: center; color: white; font-size: var(--text-xs); font-weight: 600;">
                ${signing > 0 ? '$' + Math.round(signing/1000) + 'K' : ''}
              </div>
            </div>
            <div style="font-size: var(--text-xs); color: var(--text-secondary); margin-top: var(--space-2);">
              Base: ${formatCurrency(base)} | Bonus: ${formatCurrency(bonus)} | Signing: ${formatCurrency(signing)} | <strong>Total: ${formatCurrency(total)}</strong>
            </div>
          </div>
        `;
      });

      html += `
        </div>
        <div style="display: flex; gap: var(--space-6); margin-top: var(--space-6); padding-top: var(--space-4); border-top: 1px solid var(--border-color);">
          <div style="display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs);">
            <div style="width: 16px; height: 16px; background: #3b82f6; border-radius: 2px;"></div>
            <span>Base Salary</span>
          </div>
          <div style="display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs);">
            <div style="width: 16px; height: 16px; background: #10b981; border-radius: 2px;"></div>
            <span>Bonus</span>
          </div>
          <div style="display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-xs);">
            <div style="width: 16px; height: 16px; background: #a855f7; border-radius: 2px;"></div>
            <span>Signing Bonus</span>
          </div>
        </div>
      </div>`;

      return html;
    }

    /**
     * COMPARISON TABLE TAB
     * Sortable table with all roles and comp data
     */
    function renderComparisonTable(roles, compData, prefs) {
      const rolesWithComp = roles.filter(r => compData[r.id]);

      if (rolesWithComp.length === 0) {
        return `
          <div class="empty-state">
            <p class="empty-state-text">No comp data available. Add compensation data to roles first.</p>
          </div>
        `;
      }

      let html = `<div style="padding: var(--space-4); overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: var(--text-sm);">
          <thead>
            <tr style="border-bottom: 2px solid var(--border-color);">
              <th style="text-align: left; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">Company</th>
              <th style="text-align: left; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">Role</th>
              <th style="text-align: right; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">Base</th>
              <th style="text-align: right; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">Bonus</th>
              <th style="text-align: right; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">Equity</th>
              <th style="text-align: right; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">Total</th>
              <th style="text-align: center; padding: var(--space-3); color: var(--text-primary); font-weight: 600;">vs Target</th>
            </tr>
          </thead>
          <tbody>
      `;

      rolesWithComp.forEach(role => {
        const d = compData[role.id];
        const base = d.baseMax || 0;
        const bonus = d.bonusTarget ? (d.baseMax * d.bonusTarget / 100) : 0;
        const signing = d.signingBonus || 0;
        const total = base + bonus + signing;
        const target = prefs.compRange?.targetBase || 0;
        const vsTarget = target > 0 ? Math.round(((total - target) / target) * 100) : 0;
        const vsTargetColor = vsTarget >= 0 ? 'var(--success-color)' : 'var(--danger)';

        html += `
          <tr style="border-bottom: 1px solid var(--border-color);">
            <td style="padding: var(--space-3); color: var(--text-primary);">${role.company}</td>
            <td style="padding: var(--space-3); color: var(--text-primary);">${role.title}</td>
            <td style="padding: var(--space-3); text-align: right; color: var(--text-secondary);">${formatCurrency(base)}</td>
            <td style="padding: var(--space-3); text-align: right; color: var(--text-secondary);">${formatCurrency(bonus)}</td>
            <td style="padding: var(--space-3); text-align: right; color: var(--text-secondary);">${d.equity || '—'}</td>
            <td style="padding: var(--space-3); text-align: right; color: var(--text-primary); font-weight: 600;">${formatCurrency(total)}</td>
            <td style="padding: var(--space-3); text-align: center; color: ${vsTargetColor}; font-weight: 600;">${vsTarget > 0 ? '+' : ''}${vsTarget}%</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      </div>`;

      return html;
    }

    /**
     * AGGREGATE STATS TAB
     * Summary statistics: median, average, best/worst offers
     */
    function renderAggregateStats(roles, compData, prefs) {
      const rolesWithComp = roles.filter(r => compData[r.id]);

      if (rolesWithComp.length === 0) {
        return `
          <div class="empty-state">
            <p class="empty-state-text">No comp data available. Add compensation data to roles first.</p>
          </div>
        `;
      }

      const baseValues = rolesWithComp.map(r => compData[r.id].baseMax || 0).sort((a, b) => a - b);
      const totalValues = rolesWithComp.map(r => {
        const d = compData[r.id];
        return (d.baseMax || 0) + (d.bonusTarget ? (d.baseMax * d.bonusTarget / 100) : 0) + (d.signingBonus || 0);
      }).sort((a, b) => a - b);

      const medianBase = baseValues[Math.floor(baseValues.length / 2)];
      const avgBase = Math.round(baseValues.reduce((a, b) => a + b, 0) / baseValues.length);
      const medianTotal = totalValues[Math.floor(totalValues.length / 2)];
      const avgTotal = Math.round(totalValues.reduce((a, b) => a + b, 0) / totalValues.length);

      let bestOffer = { role: null, total: 0 };
      let worstOffer = { role: null, total: Infinity };

      rolesWithComp.forEach(role => {
        const d = compData[role.id];
        const total = (d.baseMax || 0) + (d.bonusTarget ? (d.baseMax * d.bonusTarget / 100) : 0) + (d.signingBonus || 0);
        if (total > bestOffer.total) bestOffer = { role: role.company + ' - ' + role.title, total };
        if (total < worstOffer.total) worstOffer = { role: role.company + ' - ' + role.title, total };
      });

      const disclosed = rolesWithComp.filter(r => compData[r.id].baseMax > 0).length;
      const unknown = rolesWithComp.length - disclosed;

      return `
        <div style="padding: var(--space-4);">
          <h3 style="font-weight: 600; margin-bottom: var(--space-4); color: var(--text-primary);">Summary Statistics</h3>

          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4); margin-bottom: var(--space-6);">
            <div class="comp-card">
              <div class="comp-card-header">Median Base Salary</div>
              <div style="font-size: var(--text-2xl); font-weight: 700; color: var(--accent); margin-top: var(--space-2);">${formatCurrency(medianBase)}</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary); margin-top: var(--space-2);">Based on ${rolesWithComp.length} roles</div>
            </div>

            <div class="comp-card">
              <div class="comp-card-header">Average Total Comp</div>
              <div style="font-size: var(--text-2xl); font-weight: 700; color: var(--accent); margin-top: var(--space-2);">${formatCurrency(avgTotal)}</div>
              <div style="font-size: var(--text-xs); color: var(--text-secondary); margin-top: var(--space-2);">Across all dimensions</div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4); margin-bottom: var(--space-6);">
            <div class="comp-card">
              <div class="comp-card-header">Best Offer</div>
              <div style="font-size: var(--text-lg); font-weight: 600; color: var(--success-color); margin-top: var(--space-2);">${bestOffer.role}</div>
              <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-top: var(--space-1);">${formatCurrency(bestOffer.total)} total</div>
            </div>

            <div class="comp-card">
              <div class="comp-card-header">Worst Offer</div>
              <div style="font-size: var(--text-lg); font-weight: 600; color: var(--danger); margin-top: var(--space-2);">${worstOffer.role}</div>
              <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-top: var(--space-1);">${formatCurrency(worstOffer.total)} total</div>
            </div>
          </div>

          <div class="comp-card">
            <div class="comp-card-header">Disclosure Status</div>
            <div style="display: flex; gap: var(--space-6); margin-top: var(--space-3);">
              <div>
                <div style="font-size: var(--text-xl); font-weight: 700; color: var(--success-color);">${disclosed}</div>
                <div style="font-size: var(--text-xs); color: var(--text-secondary);">Disclosed</div>
              </div>
              <div>
                <div style="font-size: var(--text-xl); font-weight: 700; color: var(--text-secondary);">${unknown}</div>
                <div style="font-size: var(--text-xs); color: var(--text-secondary);">Unknown</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    /**
     * NEGOTIATION SCORECARD TAB
     * 25-point system scoring negotiating power for current role
     */
    function renderNegotiationScorecard(role, data, benchmarks, prefs) {
      if (!data || !role) {
        return `
          <div class="empty-state">
            <p class="empty-state-text">Select a role in offer stage to generate negotiation scorecard.</p>
          </div>
        `;
      }

      // Calculate 25-point scores for 5 dimensions
      const baseMax = data.baseMax || 0;
      const bonus = data.bonusTarget || 0;
      const avgBenchmarkBase = benchmarks.length > 0 ? Math.round(benchmarks.reduce((s, b) => s + (b.base || 0), 0) / benchmarks.length) : 0;

      // Comp percentile
      const basePercentile = avgBenchmarkBase > 0 ? Math.round((baseMax - avgBenchmarkBase) / avgBenchmarkBase * 100) : 50;
      let compScore = 5;
      if (basePercentile >= 75) compScore = 25;
      else if (basePercentile >= 60) compScore = 20;
      else if (basePercentile >= 50) compScore = 15;
      else if (basePercentile >= 40) compScore = 10;

      // Scope (placeholder - assume moderate)
      let scopeScore = 15;

      // Growth potential (estimate based on company stage)
      let growthScore = 12;

      // Culture fit (neutral start)
      let cultureScore = 10;

      // Risk factors (assume moderate risk)
      let riskScore = 12;

      const totalScore = compScore + scopeScore + growthScore + cultureScore + riskScore;
      const totalPossible = 125;

      return `
        <div style="padding: var(--space-4);">
          <h3 style="font-weight: 600; margin-bottom: var(--space-4); color: var(--text-primary);">Negotiation Strength Scorecard</h3>

          <div class="comp-card" style="margin-bottom: var(--space-6);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
              <div style="font-size: var(--text-xl); font-weight: 700; color: var(--accent);">${totalScore} / ${totalPossible} points</div>
              <div style="font-size: var(--text-sm); color: var(--text-secondary);">
                ${totalScore >= 100 ? 'Very Strong' : totalScore >= 75 ? 'Strong' : totalScore >= 50 ? 'Moderate' : 'Weak'}
              </div>
            </div>
            <div style="background: var(--bg-surface); border-radius: var(--radius-sm); height: 12px; overflow: hidden;">
              <div style="background: var(--accent); height: 100%; width: ${(totalScore/totalPossible)*100}%;"></div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
            <div class="comp-card">
              <div class="comp-card-header">Compensation (${compScore}/25)</div>
              <div style="margin-top: var(--space-3); font-size: var(--text-sm); color: var(--text-secondary);">
                <div style="margin-bottom: var(--space-1);">Base Percentile: <strong>${basePercentile}%</strong></div>
                <div>Market Avg: ${formatCurrency(avgBenchmarkBase)}</div>
              </div>
            </div>

            <div class="comp-card">
              <div class="comp-card-header">Scope (${scopeScore}/25)</div>
              <div style="margin-top: var(--space-3); font-size: var(--text-sm); color: var(--text-secondary);">
                <div>Team size, reporting level, org impact</div>
              </div>
            </div>

            <div class="comp-card">
              <div class="comp-card-header">Growth (${growthScore}/25)</div>
              <div style="margin-top: var(--space-3); font-size: var(--text-sm); color: var(--text-secondary);">
                <div>Career path, skill development, visibility</div>
              </div>
            </div>

            <div class="comp-card">
              <div class="comp-card-header">Culture (${cultureScore}/25)</div>
              <div style="margin-top: var(--space-3); font-size: var(--text-sm); color: var(--text-secondary);">
                <div>Team dynamics, mission alignment, work-life</div>
              </div>
            </div>

            <div class="comp-card">
              <div class="comp-card-header">Risk (${riskScore}/25)</div>
              <div style="margin-top: var(--space-3); font-size: var(--text-sm); color: var(--text-secondary);">
                <div>Stability, equity value, restructure risk</div>
              </div>
            </div>
          </div>

          <div class="comp-card" style="margin-top: var(--space-6); background: rgba(99, 102, 241, 0.1);">
            <div class="comp-card-header">Recommendation</div>
            <div style="margin-top: var(--space-3); color: var(--text-secondary); font-size: var(--text-sm); line-height: 1.6;">
              ${totalScore >= 100
                ? '✓ Strong position for aggressive negotiation. Counter on base, benefits, and timeline.'
                : totalScore >= 75
                ? '✓ Good position. Focus counter on 1-2 dimensions (base or equity acceleration).'
                : totalScore >= 50
                ? '○ Moderate position. Limited negotiating room. Accept or request timeline extension.'
                : '✗ Weak position. Accept offer or request for specific improvements only.'}
            </div>
          </div>
        </div>
      `;
    }

    function selectRole(roleId) {
      sessionStorage.setItem('pf_selectedRoleId', roleId);
      document.querySelectorAll('.role-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-role-id="${roleId}"]`)?.classList.add('active');

      renderCompContent(roleId);
    }

    function renderCompContent(roleId) {
      const roles = getPipelineRoles();
      const role = roles.find(r => r.id === roleId);
      const compData = getCompData();
      const benchmarks = getCompBenchmarks();
      const prefs = getPreferences();

      if (!role) return;

      const data = compData[roleId];
      const roleBenchmarks = benchmarks.filter(b => b.company === role.company);

      let html = `
        <div class="comp-tabs">
          <button class="comp-tab active" data-tab="dashboard">Dashboard</button>
          <button class="comp-tab" data-tab="visualization">Visualization</button>
          <button class="comp-tab" data-tab="comparison">Comparison</button>
          <button class="comp-tab" data-tab="aggregate">Aggregate</button>
          <button class="comp-tab" data-tab="scorecard">Scorecard</button>
          <button class="comp-tab" data-tab="entry">Edit Comp Data</button>
          <button class="comp-tab" data-tab="benchmarks">Benchmarks</button>
          <button class="comp-tab" data-tab="negotiation">Negotiation</button>
        </div>

        <!-- Dashboard Tab -->
        <div class="comp-tab-content active" data-tab="dashboard">
          ${renderDashboard(role, data, roleBenchmarks, prefs)}
        </div>

        <div class="comp-tab-content" data-tab="visualization">
          ${renderCompVisualization(getPipelineRoles(), getCompData(), prefs)}

          ${renderComparisonTable(getPipelineRoles(), getCompData(), prefs)}
        </div>

        <!-- Aggregate Tab: Stats -->
        <div class="comp-tab-content" data-tab="aggregate">
          ${renderAggregateStats(getPipelineRoles(), getCompData(), prefs)}
        </div>

        <!-- Scorecard Tab: Negotiation 25-point system -->
        <div class="comp-tab-content" data-tab="scorecard">
          ${renderNegotiationScorecard(role, data, roleBenchmarks, prefs)}
        </div>

        <!-- Edit Comp Data Tab -->

          ${renderCompEntry(role, data)}
        </div>

        <!-- Negotiation Tab -->
        <div class="comp-tab-content" data-tab="negotiation">
          ${renderNegotiationTab(role, data, roleBenchmarks, prefs)}
        </div>
      `;

      document.getElementById('compContent').innerHTML = html;

      // Add event listeners for tabs
      document.querySelectorAll('.comp-tab').forEach(tab => {

          const tabName = this.getAttribute('data-tab');
          document.querySelectorAll('.comp-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          document.querySelector(`[data-tab="${tabName}"].comp-tab-content`).classList.add('active');
        });
      });
    }

    function renderDashboard(role, data, benchmarks, prefs) {
      if (!data) {
        return `
          <div class="empty-state">
            <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="empty-state-text">No compensation data for this role.</p>
            <button class="action-button" onclick="openModal('addCompDataModal')">Add Comp Data</button>
          </div>
        `;
      }

      const totalComp = (data.baseMax || 0) + (data.bonusTarget ? (data.baseMax || 0) * data.bonusTarget / 100 : 0) + (data.signingBonus || 0);
      const baseMin = data.baseMin || 0;
      const baseMax = data.baseMax || 0;
      const bonusAmount = (data.baseMax || 0) * (data.bonusTarget || 0) / 100;

      let comparisonHtml = '';
      if (benchmarks.length > 0) {
        const avgBase = Math.round(benchmarks.reduce((sum, b) => sum + (b.base || 0), 0) / benchmarks.length);
        const avgTotal = Math.round(benchmarks.reduce((sum, b) => sum + (b.total || 0), 0) / benchmarks.length);
        const percentile = baseMax > 0 ? Math.round((baseMax - avgBase) / avgBase * 100 * 100) / 100 : 0;

        comparisonHtml = `
          <div class="comp-card">
            <div class="comp-card-header">Market Comparison</div>
            <div style="margin-bottom: var(--space-3);">
              <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-2);">
                Based on ${benchmarks.length} benchmark${benchmarks.length !== 1 ? 's' : ''}
              </p>
            </div>
            <div class="form-row">
              <div>
                <p style="font-size: var(--text-xs); color: var(--text-tertiary); margin-bottom: var(--space-1);">Your Base Max vs Market Avg</p>
                <p style="font-size: var(--text-lg); font-weight: 700; color: var(--text-primary);">${percentile > 0 ? '+' : ''}${percentile}%</p>
              </div>
              <div>
                <p style="font-size: var(--text-xs); color: var(--text-tertiary); margin-bottom: var(--space-1);">Market Average (Total)</p>
                <p style="font-size: var(--text-lg); font-weight: 700; color: var(--text-primary);">${formatCurrency(avgTotal)}</p>

            </div>

      return `
        <div class="quick-stats">

          </div>
          <div class="stat-box">
            <div class="stat-label">Bonus Target</div>
            <div class="stat-value">${data.bonusTarget || 0}%</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Equity / Grants</div>
            <div class="stat-value" style="font-size: var(--text-sm);">${data.equity || 'Not specified'}</div>
          </div>
        </div>

        <div class="comp-card">
          <div class="comp-card-header">Offer Details</div>
          <div style="margin-bottom: var(--space-3);">
            <p style="font-size: var(--text-xs); color: var(--text-tertiary); margin-bottom: var(--space-2); text-transform: uppercase; letter-spacing: 0.05em;">Source: ${data.source || 'Unknown'}</p>
          </div>
          ${data.benefits ? `<p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-2);">Benefits: ${data.benefits}</p>` : ''}
          <button class="action-button" onclick="setCompEntryValues('${role.id}')">Edit Details</button>
        </div>

        ${comparisonHtml}

        ${prefs.compRange ? `
          <div class="comp-card">
            <div class="comp-card-header">Your Target Range</div>
            <div style="font-size: var(--text-sm); color: var(--text-secondary);">
              ${formatCurrency(prefs.compRange.min)} – ${formatCurrency(prefs.compRange.max)} annually
            </div>
          </div>
        ` : ''}
      `;
    }

    function renderCompEntry(role, data) {
      const baseMin = data?.baseMin || '';
      const baseMax = data?.baseMax || '';
      const bonus = data?.bonusTarget || '';
      const signing = data?.signingBonus || '';
      const equity = data?.equity || '';
      const benefits = data?.benefits || '';
      const source = data?.source || '';

      return `
        <div class="comp-card">
          <div class="comp-card-title">Compensation Details for ${role.title}</div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Base Salary Min ($)</label>
              <input type="number" class="form-input comp-entry-field" data-field="baseMin" value="${baseMin}">
            </div>
            <div class="form-group">
              <label class="form-label">Base Salary Max ($)</label>
              <input type="number" class="form-input comp-entry-field" data-field="baseMax" value="${baseMax}">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Bonus Target (%)</label>
              <input type="number" class="form-input comp-entry-field" data-field="bonusTarget" step="0.1" value="${bonus}">
            </div>
            <div class="form-group">
              <label class="form-label">Signing Bonus ($)</label>
              <input type="number" class="form-input comp-entry-field" data-field="signingBonus" value="${signing}">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Equity / Grants</label>
            <input type="text" class="form-input comp-entry-field" data-field="equity" value="${equity}" placeholder="e.g. $200K RSU/4yr">
          </div>

          <div class="form-group">
            <label class="form-label">Other Benefits</label>
            <input type="text" class="form-input comp-entry-field" data-field="benefits" value="${benefits}">
          </div>

          <div class="form-group">
            <label class="form-label">Source</label>
            <select class="form-input comp-entry-field" data-field="source">
              <option value="">Select source...</option>
              <option value="recruiter" ${source === 'recruiter' ? 'selected' : ''}>Recruiter</option>
              <option value="posting" ${source === 'posting' ? 'selected' : ''}>Job Posting</option>
              <option value="levels.fyi" ${source === 'levels.fyi' ? 'selected' : ''}>Levels.fyi</option>
              <option value="glassdoor" ${source === 'glassdoor' ? 'selected' : ''}>Glassdoor</option>
              <option value="personal" ${source === 'personal' ? 'selected' : ''}>Personal Offer</option>
              <option value="other" ${source === 'other' ? 'selected' : ''}>Other</option>
            </select>
          </div>

          <div style="display: flex; gap: var(--space-3);">
            <button class="action-button" onclick="saveCompEntry('${role.id}')">Save Changes</button>
            <button class="action-button" style="background: var(--bg-subtle); color: var(--text-primary);" onclick="deleteCompData('${role.id}')">Delete Comp Data</button>
          </div>
        </div>
      `;
    }

    function renderBenchmarksTab(benchmarks, prefs) {
      if (benchmarks.length === 0) {
        return `
          <div class="empty-state">
            <p class="empty-state-text">No market benchmarks for this company yet.</p>
            <button class="action-button" onclick="openModal('addBenchmarkModal')">Add Benchmark Data</button>
          </div>
        `;
      }

      const tableHtml = `
        <table class="comp-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Level</th>
              <th>Base</th>
              <th>Equity</th>
              <th>Bonus</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            ${benchmarks.map(b => `
              <tr>
                <td>${b.title}</td>
                <td>${b.level || '—'}</td>
                <td>${formatCurrency(b.base)}</td>
                <td>${formatCurrency(b.equity)}</td>
                <td>${formatCurrency(b.bonus)}</td>
                <td><strong>${formatCurrency(b.total)}</strong></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      return `
        <div class="comp-card">
          <div class="comp-card-header">Market Benchmarks (${benchmarks.length})</div>
          ${tableHtml}
          <div style="margin-top: var(--space-4);">
            <button class="action-button" onclick="openModal('addBenchmarkModal')">Add Another Benchmark</button>
          </div>
        </div>
      `;
    }

    function renderNegotiationTab(role, data, benchmarks, prefs) {
      if (!data) {
        return `
          <div class="empty-state">
            <p class="empty-state-text">Add compensation data to generate negotiation strategy.</p>
          </div>
        `;
      }

      return `
        <div class="comp-card">
          <div class="comp-card-title">Negotiation Strategy</div>
          <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-4);">
            Generate AI-powered negotiation advice based on your offer and market data.
          </p>
          <button class="action-button" id="generateNegotiationBtn" onclick="generateNegotiationStrategy('${role.id}')">
            Generate Strategy with Claude AI
          </button>
          <div id="negotiationOutput" style="margin-top: var(--space-4);"></div>
        </div>
      `;
    }

    // ================================================================
    // MODAL MANAGEMENT
    // ================================================================

    function openModal(modalId) {
      document.getElementById(modalId).classList.add('active');
      if (modalId === 'addCompDataModal') {
        populateRoleSelect();
      }
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    function populateRoleSelect() {
      const roles = getPipelineRoles();
      const select = document.getElementById('compDataRole');
      select.innerHTML = '<option value="">Select a role...</option>' + roles.map(r =>
        `<option value="${r.id}">${r.company} – ${r.title}</option>`
      ).join('');
    }

    // ================================================================
    // COMP DATA MANAGEMENT
    // ================================================================

    function saveCompEntry(roleId) {
      const compData = getCompData();
      const fields = document.querySelectorAll('.comp-entry-field');

      const data = {};
      fields.forEach(field => {
        const key = field.getAttribute('data-field');
        const value = field.value;
        if (value) {
          if (key === 'baseMin' || key === 'baseMax' || key === 'signingBonus' || key === 'bonusTarget') {
            data[key] = parseFloat(value);
          } else {
            data[key] = value;
          }
        }
      });

      compData[roleId] = data;
      saveCompData(compData);

      alert('Compensation data saved!');
      renderRolesList();
      selectRole(roleId);
    }

    function setCompEntryValues(roleId) {
      document.querySelector('[data-tab="entry"]').click();
    }

    function deleteCompData(roleId) {
      if (confirm('Delete compensation data for this role? This cannot be undone.')) {
        const compData = getCompData();
        delete compData[roleId];
        saveCompData(compData);
        sessionStorage.removeItem('pf_selectedRoleId');
        document.getElementById('compContent').innerHTML = `
          <div class="empty-state">
            <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="empty-state-text">No role selected. Choose a role from the list or add compensation data.</p>
          </div>
        `;
        renderRolesList();
      }
    }

    // ================================================================
    // BENCHMARK MANAGEMENT
    // ================================================================

    function saveBenchmark() {
      const benchmarks = getCompBenchmarks();

      const data = {
        company: document.getElementById('benchmarkCompany').value,
        title: document.getElementById('benchmarkTitle').value,
        level: document.getElementById('benchmarkLevel').value,
        location: document.getElementById('benchmarkLocation').value,
        base: parseFloat(document.getElementById('benchmarkBase').value) || 0,
        equity: parseFloat(document.getElementById('benchmarkEquity').value) || 0,
        bonus: parseFloat(document.getElementById('benchmarkBonus').value) || 0,
        total: parseFloat(document.getElementById('benchmarkTotal').value) || 0,
        sourceUrl: document.getElementById('benchmarkSourceUrl').value,
        dateAdded: new Date().toISOString()
      };

      if (!data.company || !data.title) {
        alert('Company and Title are required.');
        return;
      }

      benchmarks.push(data);
      saveCompBenchmarks(benchmarks);

      alert('Benchmark saved!');
      closeModal('addBenchmarkModal');

      // Clear form
      document.getElementById('benchmarkCompany').value = '';
      document.getElementById('benchmarkTitle').value = '';
      document.getElementById('benchmarkLevel').value = '';
      document.getElementById('benchmarkLocation').value = '';
      document.getElementById('benchmarkBase').value = '';
      document.getElementById('benchmarkEquity').value = '';
      document.getElementById('benchmarkBonus').value = '';
      document.getElementById('benchmarkTotal').value = '';
      document.getElementById('benchmarkSourceUrl').value = '';

      const selectedId = sessionStorage.getItem('pf_selectedRoleId');
      if (selectedId) {
        selectRole(selectedId);
      }
    }

    // ================================================================
    // NEGOTIATION STRATEGY
    // ================================================================

    async function generateNegotiationStrategy(roleId) {
      const roles = getPipelineRoles();
      const role = roles.find(r => r.id === roleId);
      const compData = getCompData();
      const benchmarks = getCompBenchmarks();
      const prefs = getPreferences();
      const data = compData[roleId];

      if (!role || !data) {
        alert('Missing role or compensation data.');
        return;
      }

      const btn = document.getElementById('generateNegotiationBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        const baseMax = data.baseMax || 0;
        const bonus = data.bonusTarget || 0;
        const equity = data.equity || 'Not specified';

        const roleBenchmarks = benchmarks.filter(b => b.company === role.company);
        const marketBase = roleBenchmarks.length > 0
          ? Math.round(roleBenchmarks.reduce((sum, b) => sum + (b.base || 0), 0) / roleBenchmarks.length)
          : baseMax;

        const userPrompt = `
Generate a negotiation strategy for the following compensation offer:

Role: ${role.title} at ${role.company}
Company Stage: ${role.funding || 'Unknown'}
Level: ${role.level || 'Unknown'}

Offer Details:
- Base Salary: ${formatCurrency(baseMax)}
- Bonus Target: ${bonus}%
- Equity: ${equity}
- Total Comp (estimated): ${formatCurrency(baseMax + (baseMax * bonus / 100))}

Market Context:
- Market average base for similar role: ${formatCurrency(marketBase)}
- Your target comp range: ${prefs.compRange ? formatCurrency(prefs.compRange.min) + ' – ' + formatCurrency(prefs.compRange.max) : 'Not set'}
- Benchmarks available: ${roleBenchmarks.length}

Please provide:
1. Strengths of this offer (what's good about it)
2. Weaknesses / negotiation points (what's below market)
3. Specific counter-offer suggestions with numbers
4. Talking points for the negotiation call
5. Risk assessment (likelihood of success for each negotiation point)

Format the response as clear, actionable HTML with headings and lists.
        `;

        const systemPrompt = `You are an expert compensation negotiation advisor. Provide specific, data-driven advice for negotiating job offers. Be direct and actionable. Focus on what can realistically be negotiated at this stage.`;

        const result = await PF.claude.generateHTML(systemPrompt, userPrompt);

        document.getElementById('negotiationOutput').innerHTML = `
          <div class="negotiation-strategy">
            ${result}
          </div>
        `;
      } catch (error) {
        alert('Error generating strategy: ' + error.message);
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Strategy with Claude AI';
      }
    }

    // ================================================================
    // EVENT LISTENERS & INITIALIZATION
    // ================================================================

    document.addEventListener('DOMContentLoaded', () => {
      // Add comp data button
      document.getElementById('addCompDataBtn').addEventListener('click', () => {
        openModal('addCompDataModal');
      });

      // Save comp data
      document.getElementById('saveCompDataBtn').addEventListener('click', () => {
        const roleId = document.getElementById('compDataRole').value;
        if (!roleId) {
          alert('Please select a role.');
          return;
        }

        const compData = getCompData();
        compData[roleId] = {
          baseMin: parseFloat(document.getElementById('compDataBaseMin').value) || 0,
          baseMax: parseFloat(document.getElementById('compDataBaseMax').value) || 0,
          bonusTarget: parseFloat(document.getElementById('compDataBonus').value) || 0,
          signingBonus: parseFloat(document.getElementById('compDataSigning').value) || 0,
          equity: document.getElementById('compDataEquity').value,
          benefits: document.getElementById('compDataBenefits').value,
          source: document.getElementById('compDataSource').value,
          dateAdded: new Date().toISOString()
        };

        saveCompData(compData);
        alert('Compensation data saved!');
        closeModal('addCompDataModal');

        // Clear form
        document.getElementById('compDataRole').value = '';
        document.getElementById('compDataBaseMin').value = '';
        document.getElementById('compDataBaseMax').value = '';
        document.getElementById('compDataBonus').value = '';
        document.getElementById('compDataSigning').value = '';
        document.getElementById('compDataEquity').value = '';
        document.getElementById('compDataBenefits').value = '';
        document.getElementById('compDataSource').value = '';

        renderRolesList();
        selectRole(roleId);
      });

      // Add benchmark button
      document.getElementById('addBenchmarkBtn').addEventListener('click', () => {
        openModal('addBenchmarkModal');
      });

      // Save benchmark
      document.getElementById('saveBenchmarkBtn').addEventListener('click', saveBenchmark);

      // Modal close buttons
      document.querySelectorAll('[data-modal-close]').forEach(btn => {
        btn.addEventListener('click', function() {
          const modalId = this.getAttribute('data-modal-close');
          closeModal(modalId);
        });
      });

      // Close modal when clicking overlay
      document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
          if (e.target === this) {
            this.classList.remove('active');
          }
        });
      });

      // Role search
      document.getElementById('roleSearch').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        const items = document.querySelectorAll('.role-item');
        items.forEach(item => {
          const text = item.textContent.toLowerCase();
          item.style.display = text.includes(query) ? '' : 'none';
        });
      });

      // Initialize
      renderRolesList();
    });
  </script>
</body>
</html>
