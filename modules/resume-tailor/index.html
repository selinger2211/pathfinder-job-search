<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinder — Resume Tailor</title>
  <meta name="description" content="Tailor resumes for specific job applications">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <link rel="stylesheet" href="../shared/pathfinder.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../shared/claude-api.js"></script>

  <!-- ====== EXPORT LIBRARIES ====== -->
  <!-- docx: JavaScript library for creating Word documents in the browser -->
  <script src="https://unpkg.com/docx@8.2.3/build/index.umd.js"></script>
  <!-- html2pdf.js: Converts HTML to PDF using client-side rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* ================================================================
       RESUME TAILOR SPECIFIC STYLES
       Customizes the two-panel layout, sidebar, and workspace components
       ================================================================ */

    /* Main container: holds sidebar + workspace side by side */
    .resume-tailor-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
      margin-top: var(--nav-height);
    }

    /* Left sidebar: context panel with role selector and job details */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-surface);
      border-right: 1px solid var(--bg-subtle);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform var(--duration-normal) var(--ease-default);
      z-index: 50;
    }

    /* Sidebar is hidden (pushed off-screen) when in mobile/collapsed mode */
    .sidebar.collapsed {
      transform: translateX(-100%);
      position: absolute;
      height: 100%;
    }

    /* Sidebar header: contains close button and title */
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--bg-subtle);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .sidebar-toggle:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    /* Sidebar content: scrollable area below header */
    .sidebar-content {
      flex: 1;
      padding: var(--space-4);
      overflow-y: auto;
    }

    /* Role selector dropdown at top of sidebar */
    .role-selector {
      margin-bottom: var(--space-6);
    }

    .role-selector label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .role-selector select {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .role-selector select:hover {
      border-color: var(--accent);
    }

    .role-selector select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Company card in the sidebar showing details */
    .company-card {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .company-card-logo {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      object-fit: contain;
      margin-bottom: var(--space-3);
    }

    .company-card-name {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-1);
    }

    .company-card-domain {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-bottom: var(--space-3);
      font-family: var(--font-mono);
    }

    .company-card-tier {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent-subtle);
      color: var(--accent);
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 500;
    }

    /* Role details section in sidebar */
    .role-details {
      margin-bottom: var(--space-6);
    }

    .role-details-item {
      margin-bottom: var(--space-3);
    }

    .role-details-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-1);
    }

    .role-details-value {
      font-size: var(--text-sm);
      color: var(--text-primary);
    }

    .role-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent-subtle);
      color: var(--accent);
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 500;
      margin-right: var(--space-2);
    }

    /* JD textarea for pasting job description */
    .jd-area {
      margin-bottom: var(--space-6);
    }

    .jd-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-2);
      display: block;
    }

    .jd-textarea {
      width: 100%;
      min-height: 120px;
      padding: var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      resize: vertical;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .jd-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .jd-text-display {
      width: 100%;
      min-height: 120px;
      padding: var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Analyze button */
    .analyze-btn {
      width: 100%;
      padding: var(--space-3);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .analyze-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Fit assessment display */
    .fit-assessment {
      background: var(--bg-elevated);
      border-left: 3px solid var(--info);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .fit-assessment-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .fit-assessment-text {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ================================================================
       WORKSPACE STYLES (right panel)
       ================================================================ */

    /* Workspace: the right panel where user builds resumes */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Workspace header: tabs and action buttons */
    .workspace-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      flex-shrink: 0;
      background: var(--bg-surface);
    }

    /* Tab buttons for switching between phases */
    .tab-buttons {
      display: flex;
      gap: var(--space-2);
    }

    .tab-button {
      padding: var(--space-2) var(--space-4);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .tab-button:hover {
      color: var(--text-primary);
    }

    .tab-button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Header actions (buttons on the right side) */
    .workspace-actions {
      display: flex;
      gap: var(--space-2);
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .action-button:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    /* Workspace content: scrollable area for phases */
    .workspace-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }

    /* Empty state when no role is selected */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      text-align: center;
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      color: var(--text-tertiary);
      margin-bottom: var(--space-4);
    }

    .empty-state-text {
      font-size: var(--text-lg);
      font-weight: 500;
      margin-bottom: var(--space-2);
    }

    /* ================================================================
       PHASE 1: JD ANALYSIS
       ================================================================ */

    .analysis-panel {
      max-width: 800px;
    }

    .analysis-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-6);
    }

    /* Analysis section: a group of related fields */
    .analysis-section {
      background: var(--bg-surface);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }

    .analysis-section-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-4);
    }

    /* Row of analysis fields */
    .analysis-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .analysis-row.full {
      grid-template-columns: 1fr;
    }

    /* Single analysis field */
    .analysis-field {
      display: flex;
      flex-direction: column;
    }

    .analysis-field-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .analysis-field-value {
      font-size: var(--text-sm);
      color: var(--text-primary);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
    }

    .analysis-field input,
    .analysis-field select {
      font-size: var(--text-sm);
      color: var(--text-primary);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      transition: all var(--duration-fast) var(--ease-default);
    }

    .analysis-field input:focus,
    .analysis-field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Keywords section with checkboxes */
    .keywords-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .keyword-chip {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .keyword-chip:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .keyword-chip input {
      cursor: pointer;
    }

    .keyword-chip label {
      cursor: pointer;
      font-size: var(--text-sm);
      color: var(--text-primary);
      flex: 1;
    }

    /* Fit assessment in analysis */
    .fit-summary {
      background: var(--bg-elevated);
      border-left: 3px solid var(--success);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .fit-summary-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-2);
    }

    .fit-items {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .fit-item {
      font-size: var(--text-sm);
      color: var(--text-primary);
      display: flex;
      gap: var(--space-2);
    }

    .fit-item strong {
      color: var(--success);
      min-width: 80px;
    }

    /* Proceed button */
    .proceed-btn {
      margin-top: var(--space-6);
      padding: var(--space-3) var(--space-6);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .proceed-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ================================================================
       COVER LETTER PANEL
       ================================================================ */

    .cover-letter-panel {
      background: var(--bg-surface);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      margin-top: var(--space-6);
    }

    .cover-letter-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .cover-letter-textarea {
      width: 100%;
      min-height: 200px;
      padding: var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-family: 'Calibri', 'Arial', sans-serif;
      resize: vertical;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .cover-letter-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .generate-cover-letter-btn {
      width: 100%;
      padding: var(--space-3);
      margin-top: var(--space-3);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }

    .generate-cover-letter-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .generate-cover-letter-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ================================================================
       BULLET BANK SIDEBAR ENHANCEMENTS
       ================================================================ */

    .bullet-bank-sidebar {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .bullet-bank-header-sidebar {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .bullet-list-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      max-height: 300px;
      overflow-y: auto;
    }

    .bullet-item-sidebar {
      padding: var(--space-2);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .bullet-item-sidebar:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .bullet-item-sidebar.selected {
      background: var(--accent-subtle);
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ================================================================
       KEYWORD GAP DETECTION
       ================================================================ */

    .keyword-gap-section {
      background: var(--bg-surface);
      border-left: 3px solid var(--warning);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-top: var(--space-4);
    }

    .keyword-gap-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .keyword-covered {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      background: var(--success-subtle);
      color: var(--success);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      margin-right: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .keyword-gap {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      background: var(--error-subtle);
      color: var(--error);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      margin-right: var(--space-2);
      margin-bottom: var(--space-2);
    }

    /* ================================================================
       VERSION HISTORY SIDEBAR
       ================================================================ */

    .version-history-sidebar {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .version-history-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .version-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      max-height: 250px;
      overflow-y: auto;
    }

    .version-item {
      padding: var(--space-2) var(--space-3);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .version-item:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .version-item-label {
      font-weight: 600;
      color: var(--text-primary);
    }

    .version-item-date {
      color: var(--text-tertiary);
      font-size: var(--text-2xs);
      margin-top: var(--space-1);
    }

    /* ================================================================
       PHASE 2: RESUME BUILDER
       ================================================================ */

    .builder-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      max-width: 1400px;
    }

    /* Left side: editor with sections */
    .builder-editor {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    /* Section: summary */
    .builder-section {
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      border-left: 3px solid var(--accent);
    }

    .builder-section-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
    }

    .summary-textarea {
      width: 100%;
      min-height: 100px;
      padding: var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: var(--text-sm);
      resize: vertical;
      transition: all var(--duration-fast) var(--ease-default);
    }

    .summary-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Skills section */
    .skills-container {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .skill-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--accent-subtle);
      color: var(--accent);
      border-radius: var(--radius-pill);
      font-size: var(--text-sm);
      cursor: move;
      user-select: none;

  <script>
    /* ================================================================
       ARCHITECTURE OVERVIEW

       Resume Tailor manages two phases of resume tailoring:

       1. ANALYSIS PHASE: User pastes a job description, which is analyzed
          to extract keywords, seniority level, role type, and creates a
          fit assessment comparing the job to the user's background.

       2. BUILDER PHASE: User selects skills and experience bullets from
          a pre-built bank, customizes a summary, and previews the tailored
          resume in real-time.

       DATA SOURCES:
       - pf_companies: read from Pipeline Tracker
       - pf_roles: read from Pipeline Tracker
       - pf_bullet_bank: owned by this module (array of bullet objects)
       - pf_resume_log: owned by this module (array of saved resumes)
       - resume_{companySlug}_{roleId}: caches work-in-progress

       The module uses localStorage as its persistent store and renders
       the UI by manipulating the DOM directly.
       ================================================================ */

    /* ================================================================
       CONSTANTS AND CONFIG
       ================================================================ */

    /**
     * Detects seniority level from JD text using pattern matching
     * INPUT: jdText = job description string
     * RETURNS: detected seniority level as string
     */
    function detectSeniority(jdText) {
      const text = jdText.toLowerCase();
      for (const [level, patterns] of Object.entries(SENIORITY_PATTERNS)) {
        if (patterns.some(p => text.includes(p))) {
          return level;
        }
      }
      return 'mid';
    }

    /**
     * Extracts top keywords from JD using frequency analysis
     * INPUT: jdText = job description string
     * RETURNS: array of top 5-7 keyword strings
     */
    function extractKeywords(jdText) {
      const text = jdText.toLowerCase();
      const keywords = new Map();

      // Count occurrences of each PM keyword
      PM_KEYWORDS.forEach(keyword => {
        const regex = new RegExp(`\\b${keyword}\\b`, 'gi');
        const matches = text.match(regex);
        if (matches) {
          keywords.set(keyword, (keywords.get(keyword) || 0) + matches.length);
        }
      });

      // Return top 7 by frequency
      return Array.from(keywords.entries())
        .sort((a, b) => b[1] - a[1])
        .slice(0, 7)
        .map(([kw]) => kw);
    }

    /**
     * Analyzes a job description and extracts structured data
     * INPUT: jdText = job description string
     * RETURNS: object with seniority, keywords, domain, roleType, fit assessment
     */
    function analyzeJD(jdText) {
      if (!jdText || jdText.trim().length === 0) {
        return null;
      }

      const seniority = detectSeniority(jdText);
      const keywords = extractKeywords(jdText);
      const text = jdText.toLowerCase();

      // Detect domain
      let domain = 'general';
      if (text.includes('saa') || text.includes('b2b')) domain = 'B2B SaaS';
      else if (text.includes('consumer') || text.includes('b2c')) domain = 'B2C/Consumer';
      else if (text.includes('marketplace')) domain = 'Marketplace';
      else if (text.includes('fintech') || text.includes('finance')) domain = 'Fintech';

      // Detect role type
      let roleType = 'Product Manager';
      if (text.includes('director')) roleType = 'Director of Product';
      else if (text.includes('principal')) roleType = 'Principal PM';
      else if (text.includes('staff')) roleType = 'Staff PM';

      // Simple fit assessment
      const backgroundKeywords = ['roadmap', 'strategy', 'users', 'data', 'team'];
      const matchedKeywords = backgroundKeywords.filter(k =>
        text.includes(k)
      );

      return {
        seniority,
        keywords,
        domain,
        roleType,
        stakeholderEnv: text.includes('cross-functional') ? 'Cross-Functional' : 'Mixed',
        fit: {
          strong: matchedKeywords.length >= 3,
          gaps: matchedKeywords.length === 0,
          borderline: matchedKeywords.length === 1
        }
      };
    }

    /* ====== DOCX EXPORT ====== */
    /**
     * Extracts text and structure from generated resume HTML and converts to DOCX
     * INPUT: resumeHTML = HTML string from the resume container
     * OUTPUT: JavaScript Document object for Word format
     */
    function convertResumeHTMLToDocument(resumeHTML) {
      // Create a temporary container to parse the HTML
      const temp = document.createElement('div');
      temp.innerHTML = resumeHTML;

      // Initialize the document children array (will hold all paragraphs)
      const children = [];

      // Helper function to parse HTML nodes and convert to docx elements
      function parseElement(element) {
        // Skip empty text nodes
        if (element.nodeType === 3) {
          const text = element.textContent.trim();
          if (text) {
            children.push(
              new docx.Paragraph({
                children: [new docx.TextRun(text)]
              })
            );
          }
          return;
        }

        if (element.nodeType !== 1) return;

        const tagName = element.tagName.toLowerCase();
        const text = element.textContent.trim();

        // Handle different HTML tags and convert to Word formatting
        if (tagName === 'h1' || tagName === 'h2') {
          // Section headings - bold and larger
          children.push(
            new docx.Paragraph({
              style: 'Heading1',
              children: [
                new docx.TextRun({
                  text: text,
                  bold: true,
                  size: 28,
                  font: 'Arial'
                })
              ],
              spacing: { before: 200, after: 100 },
              border: {
                bottom: {
                  color: '000000',
                  space: 1,
                  style: docx.BorderStyle.single,
                  size: 6
                }
              }
            })
          );
        } else if (tagName === 'h3') {
          // Subsection headings - bold, smaller than h2
          children.push(
            new docx.Paragraph({
              children: [
                new docx.TextRun({
                  text: text,
                  bold: true,
                  size: 24,
                  font: 'Arial'
                })
              ],
              spacing: { before: 120, after: 80 }
            })
          );
        } else if (tagName === 'h4') {
          // Minor headings
          children.push(
            new docx.Paragraph({
              children: [
                new docx.TextRun({
                  text: text,
                  bold: true,
                  size: 22,
                  font: 'Arial'
                })
              ],
              spacing: { before: 80, after: 40 }
            })
          );
        } else if (tagName === 'ul' || tagName === 'ol') {
          // Bullet or numbered lists
          const items = element.querySelectorAll(':scope > li');
          const isBullet = tagName === 'ul';

          items.forEach((li) => {
            children.push(
              new docx.Paragraph({
                numbering: {
                  reference: isBullet ? 'bullets' : 'numbers',
                  level: 0
                },
                children: [
                  new docx.TextRun({
                    text: li.textContent.trim(),
                    font: 'Arial',
                    size: 22
                  })
                ]
              })
            );
          });
        } else if (tagName === 'p') {
          // Regular paragraphs
          if (text) {
            children.push(
              new docx.Paragraph({
                children: [
                  new docx.TextRun({
                    text: text,
                    font: 'Arial',
                    size: 22
                  })
                ],
                spacing: { after: 80 }
              })
            );
          }
        } else if (tagName === 'strong' || tagName === 'b') {
          // Bold text
          if (text) {
            children.push(
              new docx.Paragraph({
                children: [
                  new docx.TextRun({
                    text: text,
                    bold: true,
                    font: 'Arial',
                    size: 22
                  })
                ]
              })
            );
          }
        } else {
          // For unknown tags, recursively process children
          Array.from(element.childNodes).forEach(parseElement);
        }
      }

      // Parse all child nodes from the resume
      Array.from(temp.childNodes).forEach(parseElement);

      // Create and return the Word document with US Letter page size
      const doc = new docx.Document({
        numbering: {
          config: [
            {
              reference: 'bullets',
              levels: [
                {
                  level: 0,
                  format: docx.LevelFormat.BULLET,
                  text: '•',
                  alignment: docx.AlignmentType.LEFT,
                  style: {
                    paragraph: {
                      indent: { left: 720, hanging: 360 }
                    }
                  }
                }
              ]
            },
            {
              reference: 'numbers',
              levels: [
                {
                  level: 0,
                  format: docx.LevelFormat.DECIMAL,
                  text: '%1.',
                  alignment: docx.AlignmentType.LEFT,
                  style: {
                    paragraph: {
                      indent: { left: 720, hanging: 360 }
                    }
                  }
                }
              ]
            }
          ]
        },
        styles: {
          default: {
            document: {
              run: { font: 'Arial', size: 22 }
            }
          },
          paragraphStyles: [
            {
              id: 'Heading1',
              name: 'Heading 1',
              basedOn: 'Normal',
              next: 'Normal',
              quickFormat: true,
              run: { size: 28, bold: true, font: 'Arial' },
              paragraph: { spacing: { before: 240, after: 120 } }
            }
          ]
        },
        sections: [
          {
            properties: {
              page: {
                size: {
                  width: 12240,
                  height: 15840
                },
                margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
              }
            },
            children: children
          }
        ]
      });

      return doc;
    }

    /**
     * Downloads the generated resume as a Word document (.docx)
     * INPUT: none (uses currentRole for filename, reads generated-resume from DOM)
     * OUTPUT: .docx file downloaded to user's device, error message if export fails
     */
    function downloadResumeAsDOCX() {
      const resumeContainer = document.getElementById('generated-resume');
      if (!resumeContainer || !resumeContainer.textContent.trim()) {
        showToast('No resume content to export', 'error');
        return;
      }

      // Check if docx library is available
      if (typeof docx === 'undefined') {
        showToast('DOCX library not loaded. Please refresh the page.', 'error');
        return;
      }

      try {
        // Get the HTML content from the resume container
        const resumeHTML = resumeContainer.innerHTML;

        // Convert HTML to Word document
        const doc = convertResumeHTMLToDocument(resumeHTML);

        // Generate filename from company and role
        const filename = `Resume_${currentRole.company.replace(/\s+/g, '_')}_${currentRole.title.replace(/\s+/g, '_')}.docx`;

        // Use the docx library's Packer to convert document to binary
        docx.Packer.toBlob(doc).then((blob) => {
          // Create a temporary download link
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          showToast(`Resume downloaded as ${filename}`, 'success');
        }).catch(error => {
          console.warn('Error generating DOCX blob:', error);
          showToast('Failed to generate DOCX file: ' + error.message, 'error');
        });
      } catch (error) {
        console.warn('Error exporting to DOCX:', error);
        showToast('Failed to export as DOCX: ' + error.message, 'error');
      }
    }

    /* ================================================================
       FEATURE 1: COVER LETTER GENERATION
       Generate cover letters using Claude API with streaming
       ================================================================ */

    /**
     * Generates a cover letter using Claude API with streaming
     * INPUT: none (uses currentRole, currentAnalysis)
     * OUTPUT: displays streaming cover letter in panel below resume
     */
    async function generateCoverLetter() {
      if (!currentRole || !currentAnalysis) {
        showToast('Role and analysis required to generate cover letter', 'error');
        return;
      }

      if (!PF.claude.hasApiKey()) {
        showToast('Anthropic API key required', 'error');
        return;
      }

      const cached = getCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id
      ) || {};

      const jdText = cached.jdText || currentRole.jdText || '';
      const bulletBank = getBulletBank();

      const systemPrompt = `You are an expert cover letter writer for product managers. Generate a persuasive, concise cover letter that complements the tailored resume.

POSITIONING: ${currentRole.positioning === 'ic' ? 'Individual Contributor' : 'Management'}
TARGET ROLE: ${currentRole.title} at ${currentRole.company}

KEY REQUIREMENTS FROM JD ANALYSIS:
- Seniority: ${currentAnalysis.seniority}
- Keywords to emphasize: ${currentAnalysis.keywords.slice(0, 5).join(', ')}
- Domain: ${currentAnalysis.domain}

COVER LETTER RULES:
- Output ONLY plain text (no markdown, no HTML)
- 3-4 paragraphs maximum, no more than half a page
- Paragraph 1: Why this role at this company specifically - reference something concrete from JD or company
- Paragraph 2: 1-2 most relevant proof points from background in plain language
- Paragraph 3: Short, direct close - no filler phrases
- Tone: Confident, direct, no fluff
- NO "I am excited to apply" or "I believe I would be a great fit"
- NO em dashes — use spaced en dash (–) instead
- Sign with first name only

HONEST FRAMING:
- Only reference products/features the candidate genuinely has experience with
- Use honest alternatives for specific vendor products not directly used`;

      const userPrompt = `Here is the job description:

${jdText}

${bulletBank && bulletBank.length > 0 ? `
Here are the candidate's strongest achievement bullets:

${bulletBank.slice(0, 5).map((b, i) => `${i + 1}. ${b.text}`).join('\n')}
` : ''}

Generate a compelling cover letter that:
1. Opens with a specific, concrete detail about the company/role (not generic)
2. References 1-2 of the candidate's achievements that directly apply
3. Shows genuine interest in THIS company's work
4. Closes with a direct call to action

Keep it to 3-4 short paragraphs. No templates, no fluff.`;

      // Show cover letter panel
      const coverLetterPanel = document.querySelector('.cover-letter-panel') || createCoverLetterPanel();
      const textarea = coverLetterPanel.querySelector('.cover-letter-textarea');

      textarea.style.opacity = '0.5';
      const btn = coverLetterPanel.querySelector('.generate-cover-letter-btn');
      btn.disabled = true;

      let fullText = '';

      try {
        await PF.claude.stream(systemPrompt, userPrompt, (chunk, text) => {
          fullText = text;
          textarea.value = chunk || '';
          textarea.scrollTop = textarea.scrollHeight;
        }, {
          maxTokens: 1000,
          temperature: 0.7
        });

        textarea.style.opacity = '1';

        // Cache the generated cover letter
        cached.generatedCoverLetter = fullText;
        cached.coverLetterGeneratedAt = new Date().toISOString();
        saveCachedResume(
          currentRole.company.toLowerCase().replace(/\s+/g, '-'),
          currentRole.id,
          cached
        );

        showToast('Cover letter generated successfully', 'success');
      } catch (error) {
        console.error('Cover letter generation failed:', error);
        textarea.value = `Error generating cover letter: ${error.message}`;
        showToast('Failed to generate cover letter: ' + error.message, 'error');
      } finally {
        textarea.style.opacity = '1';
        btn.disabled = false;
      }
    }

    function renderBulletBankSidebar(container) {
      const bullets = getBulletBank();

        grouped[bullet.theme].push(bullet);
      });

      let html = `

    function selectBulletForResume(bulletId) {
      const items = document.querySelectorAll('.bullet-item-sidebar');
      items.forEach(item => item.classList.remove('selected'));

      const selected = document.querySelector(`[onclick*="${bulletId}"]`);
      if (selected) selected.classList.add('selected');

      // Cache preference
      const cached = getCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),

      cached.mustIncludeBullets = cached.mustIncludeBullets || [];

    /* ================================================================
       FEATURE 3: KEYWORD GAP DETECTION
       Analyze JD keywords against bullet bank coverage
       ================================================================ */

    /**
     * Analyzes keyword gaps between JD and bullet bank
     * INPUT: none (uses currentAnalysis and bullet bank)
     * RETURNS: object with covered and gap keywords
     */
    function analyzeKeywordGaps() {
      if (!currentAnalysis) return { covered: [], gaps: [] };

      const jdKeywords = currentAnalysis.keywords;
      const bulletBank = getBulletBank();
      const allBulletText = bulletBank.map(b => b.text.toLowerCase()).join(' ');

      const covered = [];
      const gaps = [];

      jdKeywords.forEach(keyword => {
        if (allBulletText.includes(keyword.toLowerCase())) {
          covered.push(keyword);
        } else {
          gaps.push(keyword);
        }
      });

      return { covered, gaps };
    }

    /**
     * Renders keyword gap detection panel in analysis phase
     * INPUT: none
     * RETURNS: HTML string for gap analysis section
     */
    function renderKeywordGapPanel() {
      const gaps = analyzeKeywordGaps();

      let html = `
        <div class="keyword-gap-section">
          <div class="keyword-gap-title">Keyword Gap Analysis</div>
          <div style="margin-bottom: var(--space-3);">
            <div style="font-size: var(--text-xs); font-weight: 600; margin-bottom: var(--space-2); color: var(--text-secondary);">Covered Keywords (Found in Bullet Bank)</div>
            <div>
              ${gaps.covered.length > 0
                ? gaps.covered.map(kw => `<span class="keyword-covered">✓ ${kw}</span>`).join('')
                : '<span style="color: var(--text-tertiary); font-size: var(--text-xs);">No keywords covered yet</span>'
              }
            </div>
          </div>
          <div>
            <div style="font-size: var(--text-xs); font-weight: 600; margin-bottom: var(--space-2); color: var(--text-secondary);">Gap Keywords (Add to Bullet Bank)</div>
            <div>
              ${gaps.gaps.length > 0
                ? gaps.gaps.map(kw => `
                  <span class="keyword-gap">
                    ⚠ ${kw}
                    <button style="background: none; border: none; color: inherit; cursor: pointer; padding: 0; margin-left: var(--space-1); font-weight: bold;" onclick="suggestBulletForKeyword('${kw}')">+</button>
                  </span>
                `).join('')
                : '<span style="color: var(--text-tertiary); font-size: var(--text-xs);">All keywords are covered!</span>'
              }
            </div>
          </div>
        </div>
      `;

      return html;
    }

    /**
     * Suggests adding a bullet for an uncovered keyword
     * INPUT: keyword = keyword string
     * OUTPUT: shows prompt to add bullet
     */
    function suggestBulletForKeyword(keyword) {
      const bulletText = prompt(`Describe an accomplishment related to "${keyword}":`);
      if (!bulletText) return;

      const bullets = getBulletBank();
      bullets.push({
        id: `bullet-${Date.now()}`,
        role: 'general',
        theme: 'Suggested',
        text: `**${keyword}** – ${bulletText}`,
        keywords: [keyword],
        metrics: '',
        dateAdded: Date.now(),
        usageCount: 0,
        lastUsed: null
      });

      saveBulletBank(bullets);
      showToast(`Bullet added for "${keyword}"`, 'success');
    }

    /* ================================================================
       FEATURE 4: VERSION HISTORY TRACKING
       Track and compare resume versions per role
       ================================================================ */

    /**
     * Gets version history for the current role from localStorage
     * INPUT: none (uses currentRole)
     * RETURNS: array of version objects
     */
    function getResumeVersions() {
      if (!currentRole) return [];

      const key = `pf_resume_versions_${currentRole.id}`;
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : [];
    }

    /**
     * Saves current resume as a new version
     * INPUT: none (uses currentRole and current resume state)
     * OUTPUT: version stored in localStorage
     */
    function saveResumeVersion() {
      if (!currentRole) return;

      const versions = getResumeVersions();
      const versionNumber = versions.length + 1;

      const newVersion = {
        id: `v${versionNumber}-${Date.now()}`,
        versionNumber,
        timestamp: new Date().toISOString(),
        roleId: currentRole.id,
        company: currentRole.company,
        roleName: currentRole.title,
        analysis: currentAnalysis,
        cached: getCachedResume(
          currentRole.company.toLowerCase().replace(/\s+/g, '-'),
          currentRole.id
        )
      };

      versions.push(newVersion);
      const key = `pf_resume_versions_${currentRole.id}`;
      localStorage.setItem(key, JSON.stringify(versions));

      showToast(`Version ${versionNumber} saved – ${new Date().toLocaleTimeString()}`, 'success');
    }

    /**
     * Renders version history in sidebar
     * INPUT: container = sidebar element
     * RETURNS: HTML string for version history
     */
    function renderVersionHistorySidebar() {
      const versions = getResumeVersions();

      let html = `
        <div class="version-history-sidebar">
          <div class="version-history-title">Version History</div>
          <div class="version-list">
      `;

      if (versions.length === 0) {
        html += '<div style="color: var(--text-tertiary); font-size: var(--text-xs);">No versions saved yet</div>';
      } else {
        versions.slice().reverse().forEach((version, idx) => {
          const date = new Date(version.timestamp);
          const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          const dateStr = date.toLocaleDateString();
          html += `
            <div class="version-item" onclick="loadResumeVersion('${version.id}')">
              <div class="version-item-label">v${version.versionNumber}</div>
              <div class="version-item-date">${dateStr} ${timeStr}</div>
            </div>
          `;
        });
      }

      html += `
          </div>
          <button onclick="saveResumeVersion()" style="width: 100%; margin-top: var(--space-3); padding: var(--space-2); background: var(--accent-subtle); border: 1px solid var(--accent); border-radius: var(--radius-sm); color: var(--accent); font-size: var(--text-xs); font-weight: 600; cursor: pointer;">Save Current Version</button>
        </div>
      `;

      return html;
    }

    /**
     * Loads a saved resume version
     * INPUT: versionId = ID of version to load
     * OUTPUT: cached state updated, UI refreshed
     */
    function loadResumeVersion(versionId) {
      if (!currentRole) return;

      const versions = getResumeVersions();
      const version = versions.find(v => v.id === versionId);

      if (!version) {
        showToast('Version not found', 'error');
        return;
      }

      // Restore analysis and cached data
      currentAnalysis = version.analysis;

      const key = `resume_${currentRole.company.toLowerCase().replace(/\s+/g, '-')}_${currentRole.id}`;
      localStorage.setItem(key, JSON.stringify(version.cached));

      currentPhase = 'builder';
      renderWorkspace();
      showToast(`Loaded v${version.versionNumber} from ${new Date(version.timestamp).toLocaleTimeString()}`, 'info');
    }

    /**
     * Compares two resume versions (side-by-side)
     * INPUT: versionId1, versionId2 = IDs of versions to compare
     * OUTPUT: shows comparison modal
     */
    function compareResumeVersions(versionId1, versionId2) {
      const versions = getResumeVersions();
      const v1 = versions.find(v => v.id === versionId1);
      const v2 = versions.find(v => v.id === versionId2);

      if (!v1 || !v2) {
        showToast('One or both versions not found', 'error');
        return;
      }

      const changes = [];

      // Compare keywords
      const kw1 = v1.analysis?.keywords || [];
      const kw2 = v2.analysis?.keywords || [];
      if (JSON.stringify(kw1) !== JSON.stringify(kw2)) {
        changes.push(`Keywords changed: ${kw1.join(', ')} → ${kw2.join(', ')}`);
      }

      // Compare summary
      const sum1 = v1.cached?.builderData?.summary || '';
      const sum2 = v2.cached?.builderData?.summary || '';
      if (sum1 !== sum2) {
        changes.push('Summary was updated');
      }

      alert(`Version ${v1.versionNumber} → ${v2.versionNumber}\n\nChanges:\n${changes.join('\n') || 'No changes'}`);
    }

    /**
     * Renders the role selector dropdown with all available roles
     * INPUT: none
     * OUTPUT: updates the role-select element with options
     */
    function renderRoleSelector() {
      const select = document.getElementById('role-select');
      const roles = getRoles();
      const companies = getCompanies();

      let html = '<option value="">Choose a role from your pipeline...</option>';

      // Group roles by stage (with fallback for roles without a known stage)
      const stages = ['discovered', 'researching', 'outreach', 'applied', 'screen', 'interviewing', 'offer'];
      const groupedByStage = {};

      roles.forEach(role => {
        const stage = (role.stage || 'other').toLowerCase();
        if (!groupedByStage[stage]) groupedByStage[stage] = [];
        groupedByStage[stage].push(role);
      });

      // Render known stages first, then any extras
      const allStages = [...stages, ...Object.keys(groupedByStage).filter(s => !stages.includes(s))];
      allStages.forEach(stage => {
        const rolesInStage = groupedByStage[stage];
        if (rolesInStage && rolesInStage.length > 0) {
          const label = stage === 'other' ? 'PIPELINE' : stage.toUpperCase();
          html += `<optgroup label="${label}">`;
          rolesInStage.forEach(role => {
            const company = companies.find(c => c.name === role.company);
            html += `<option value="${role.id}">${company?.name || role.company || 'Unknown'} — ${role.title}</option>`;
          });
          html += '</optgroup>';
        }
      });

      select.innerHTML = html;
      select.addEventListener('change', (e) => {
        const roleId = e.target.value;
        if (roleId) {
          selectRole(roleId);
        } else {
          currentRole = null;
          renderSidebar();
          renderWorkspace();
        }
      });
    }

    /**
     * Loads and displays a selected role's details in the sidebar
     * INPUT: roleId = ID of the role to load
     * OUTPUT: sidebar updated with company card, role details, JD area
     */
    function selectRole(roleId) {
      const roles = getRoles();
      const companies = getCompanies();
      const role = roles.find(r => r.id === roleId);

      if (!role) return;

      currentRole = role;
      const company = companies.find(c => c.name === role.company);

      // Load cached resume if it exists
      const cached = getCachedResume(
        role.company.toLowerCase().replace(/\s+/g, '-'),
        role.id
      );

      // Restore cached analysis, or auto-analyze if JD exists
      if (cached?.analysis) {
        currentAnalysis = cached.analysis;
      } else {
        const jdText = cached?.jdText || role.jdText || '';
        if (jdText) {
          currentAnalysis = analyzeJD(jdText);
          // Cache the analysis for next time
          const toCache = cached || {};
          toCache.analysis = currentAnalysis;
          toCache.jdText = jdText;
          saveCachedResume(
            role.company.toLowerCase().replace(/\s+/g, '-'),
            role.id,
            toCache
          );
        } else {
          currentAnalysis = null;
        }
      }

      renderSidebar();
      renderWorkspace();
    }

    /**
     * Performs JD analysis when user clicks "Analyze JD" button
     * INPUT: none
     * OUTPUT: updates currentAnalysis, renders analysis panel
     */
    function performAnalysis() {
      if (!currentRole) return;

      const textarea = document.getElementById('jd-textarea');
      const jdText = textarea.value.trim();

      if (!jdText) {
        showToast('Please paste a job description first', 'error');
        return;
      }

      // Cache the JD
      const cached = getCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id
      ) || {};
      cached.jdText = jdText;
      saveCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id,
        cached
      );

      // Analyze the JD
      currentAnalysis = analyzeJD(jdText);

      // Store analysis in cache
      cached.analysis = currentAnalysis;
      saveCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id,
        cached
      );

      // Switch to analysis phase and render
      currentPhase = 'analysis';
      renderSidebar();
      renderWorkspace();
      showToast('Job description analyzed', 'success');
    }

    /**

     * INPUT: none
     * RETURNS: summary text string
     */
    function generateSummary() {
      if (!currentAnalysis) {
        return 'Experienced product manager with expertise in product strategy, user research, and cross-functional leadership.';
      }

      const seniority = currentAnalysis.seniority;
      const keywords = currentAnalysis.keywords.slice(0, 3).join(', ');

      const templates = {
        'principal': `Visionary Principal Product Manager with 12+ years of experience building and scaling innovative products. Expertise in ${keywords}. Proven track record of leading teams through 0-to-1 launches and defining product strategy for high-impact initiatives.`,
        'staff': `Strategic Staff Product Manager with 10+ years of experience. Skilled in ${keywords} and cross-functional leadership. Proven ability to align complex organizations around product vision and drive measurable business outcomes.`,
        'senior': `Results-driven Senior Product Manager with 6+ years of experience. Expertise in ${keywords}. Track record of shipping products that drive revenue growth and user engagement at scale.`,
        'mid': `Product Manager with 3+ years of experience. Skilled in ${keywords} and translating user needs into product solutions. Passionate about building products that solve real problems.`,
        'junior': `Associate Product Manager with strong foundation in ${keywords}. Driven to learn and grow as a PM while contributing to cross-functional product initiatives.`
      };

      return templates[seniority] || templates['mid'];
    }

    /**
     * Updates the cached builder data when user makes changes
     * INPUT: none
     * OUTPUT: saves current builder state to cache
     */
    function updateBuilderData() {
      const summaryText = document.getElementById('summary-textarea').value;
      const skillPills = Array.from(document.querySelectorAll('.skill-pill')).map(pill => pill.textContent.trim());

      const cached = getCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id
      ) || {};

      cached.builderData = {
        summary: summaryText,
        selectedSkills: skillPills,
        experience: cached.builderData?.experience || DEMO_BACKGROUND_ROLES.map((role, i) => ({
          ...role,
          bullets: getBulletBank().slice(i * 3, i * 3 + 3).map((b, j) => ({
            bulletId: b.id,
            included: j < 2
          }))
        }))
      };

      saveCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id,
        cached
      );

      // Update preview
      const preview = document.getElementById('preview-pane');
      if (preview) {
        preview.innerHTML = renderPreview(cached.builderData);
      }
    }

    /**
     * Updates whether a bullet is included in the resume
     * INPUT: expIdx, bulletIdx, included = boolean
     * OUTPUT: updates cache and refreshes preview
     */
    function updateBulletIncluded(expIdx, bulletIdx, included) {
      const cached = getCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id
      ) || {};

      if (cached.builderData?.experience?.[expIdx]?.bullets?.[bulletIdx]) {
        cached.builderData.experience[expIdx].bullets[bulletIdx].included = included;
        saveCachedResume(
          currentRole.company.toLowerCase().replace(/\s+/g, '-'),
          currentRole.id,
          cached
        );

        updateBuilderData();
      }
    }

    /**
     * Adds a new custom bullet to an experience section
     * INPUT: expIdx = experience index
     * OUTPUT: shows inline editor for creating new bullet
     */
    function addNewBullet(expIdx) {
      showToast('Custom bullet creation coming soon', 'info');
    }

    /**
     * Sets up drag-and-drop for reordering skills
     * INPUT: none
     * OUTPUT: attaches drag event handlers to skill pills
     */
    function setupSkillDragHandlers() {
      const skillPills = document.querySelectorAll('.skill-pill');

      skillPills.forEach((pill, index) => {
        pill.addEventListener('dragstart', (e) => {
          isDraggingSkill = true;
          draggedSkillIndex = index;
          pill.style.opacity = '0.5';
        });

        pill.addEventListener('dragend', (e) => {
          pill.style.opacity = '1';
          isDraggingSkill = false;
        });

        pill.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (isDraggingSkill && draggedSkillIndex !== index) {
            const allPills = Array.from(skillPills);
            const draggedPill = allPills[draggedSkillIndex];
            const targetPill = pill;

            if (draggedSkillIndex < index) {
              targetPill.parentNode.insertBefore(draggedPill, targetPill.nextSibling);
            } else {
              targetPill.parentNode.insertBefore(draggedPill, targetPill);
            }

            draggedSkillIndex = index;
          }
        });
      });

      // Save order after dragging
      document.getElementById('skills-container').addEventListener('dragend', updateBuilderData);
    }

    /**
     * Renders the live preview of the resume
     * INPUT: builderData = object with summary, skills, experience
     * RETURNS: HTML string for preview pane
     */
    function renderPreview(builderData) {
      const bulletBank = getBulletBank();

      const experienceHtml = builderData.experience.map(exp => {
        const includedBullets = (exp.bullets || [])
          .filter(b => b.included)
          .map(b => bulletBank.find(bullet => bullet.id === b.bulletId))
          .filter(b => b);

        return `
          <div class="preview-role">
            <div class="preview-role-header">
              <span class="preview-role-company">${exp.title}</span>
              <span class="preview-role-dates">${exp.startDate} – ${exp.endDate}</span>
            </div>
            <div style="color: #666; font-size: 9pt; margin-bottom: 4px;">${exp.company}</div>
            <div class="preview-bullets">
              ${includedBullets.map(bullet => `
                <div class="preview-bullet">• ${bullet.text.replace(/\*\*/g, '')}</div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="preview-header">
          <div class="preview-name">Your Name</div>
          <div style="font-size: 9pt; color: #666;">Product Manager | San Francisco, CA | (555) 123-4567</div>
        </div>

        <div class="preview-summary">${builderData.summary}</div>

        <div class="preview-section">
          <div class="preview-section-title">Experience</div>
          ${experienceHtml}
        </div>

        <div class="preview-skills">
          <span class="preview-skills-label">Skills:</span>
          ${builderData.selectedSkills.join(', ')}
        </div>
      `;
    }

    /**
     * Copies the resume preview to clipboard as text
     * INPUT: none
     * OUTPUT: text copied to clipboard, toast notification shown
     */
    function copyToClipboard() {
      const previewPane = document.getElementById('preview-pane');
      if (!previewPane) return;

      const text = previewPane.innerText;
      navigator.clipboard.writeText(text).then(() => {
        showToast('Resume copied to clipboard', 'success');
      }).catch(() => {
        showToast('Failed to copy to clipboard', 'error');
      });
    }

    /**
     * Saves the current resume version to the log
     * INPUT: none
     * OUTPUT: adds entry to pf_resume_log and shows toast
     */
    function saveVersion() {
      const cached = getCachedResume(
        currentRole.company.toLowerCase().replace(/\s+/g, '-'),
        currentRole.id
      ) || {};

      addResumeLogEntry({
        company: currentRole.company,
        role: currentRole.title,
        keywords: currentAnalysis?.keywords || [],
        fitScore: 0.85,
        filename: `Resume_${currentRole.company}_${currentRole.title.replace(/\s+/g, '_')}.pdf`,
        customizations: 'Resume tailored with selected bullets and skills'
      });

      showToast(`Resume version saved for ${currentRole.company}`, 'success');
    }

    /**
     * Renders the Bullet Bank tab showing all available bullets
     * INPUT: container = DOM element to render into
     * OUTPUT: bullet bank with list of all bullets and add form
     */
    function renderBulletBankPhase(container) {
      const bullets = getBulletBank();

      const html = `
        <div class="bullet-bank">
          <div class="bullet-bank-header">
            <h2 class="bullet-bank-title">Bullet Bank</h2>
            <div class="bullet-bank-actions">
              <button class="action-button" onclick="exportBulletBank()">Export</button>
              <button class="action-button" onclick="importBulletBank()">Import</button>
            </div>
          </div>

          <!-- Add Bullet Form -->
          <div class="add-bullet-form">
            <h3 style="font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-3);">Add New Bullet</h3>
            <input type="text" id="bullet-text-input" placeholder="Bullet text..." style="font-size: var(--text-sm);">
            <select id="bullet-theme-select" style="font-size: var(--text-sm);">
              <option value="">Select theme...</option>
              ${BULLET_THEMES.map(theme => `<option value="${theme}">${theme}</option>`).join('')}
            </select>
            <input type="text" id="bullet-keywords-input" placeholder="Keywords (comma-separated)..." style="font-size: var(--text-sm);">
            <button onclick="addBulletToBulletBank()" style="background: var(--accent); color: white; padding: var(--space-2) var(--space-4); border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 600; width: 100%;">Add to Bank</button>
          </div>

          <!-- Bullets List -->
          <div class="bullets-list">
            ${bullets.map(bullet => `
              <div class="bullet-card">
                <div class="bullet-card-text">${mdBold(bullet.text)}</div>
                <div class="bullet-card-meta">
                  <div class="bullet-card-tags">
                    <span class="bullet-tag">${bullet.theme}</span>
                    <span class="bullet-tag" style="background: var(--info-subtle); color: var(--info);">Used ${bullet.usageCount} times</span>
                  </div>
                  <div>${bullet.metrics}</div>
                </div>
                <div class="bullet-card-actions">
                  <button class="bullet-card-btn" onclick="editBullet('${bullet.id}')">Edit</button>
                  <button class="bullet-card-btn" onclick="deleteBullet('${bullet.id}')" style="color: var(--danger); border-color: var(--danger);">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    /**
     * Adds a new bullet to the bullet bank from form inputs
     * INPUT: none
     * OUTPUT: new bullet added to pf_bullet_bank
     */
    function addBulletToBulletBank() {
      const text = document.getElementById('bullet-text-input').value.trim();
      const theme = document.getElementById('bullet-theme-select').value;
      const keywords = document.getElementById('bullet-keywords-input').value
        .split(',')
        .map(k => k.trim())
        .filter(k => k);

      if (!text || !theme) {
        showToast('Please fill in bullet text and select a theme', 'error');
        return;
      }

      const bullets = getBulletBank();
      bullets.push({
        id: `bullet-${Date.now()}`,
        role: 'general',
        theme,
        text,
        metrics: '',
        keywords,
        dateAdded: Date.now(),
        usageCount: 0,
        lastUsed: null
      });

      saveBulletBank(bullets);

      // Clear form
      document.getElementById('bullet-text-input').value = '';
      document.getElementById('bullet-theme-select').value = '';
      document.getElementById('bullet-keywords-input').value = '';

      renderBulletBankPhase(document.getElementById('workspace-content'));
      showToast('Bullet added to bank', 'success');
    }

    /**
     * Deletes a bullet from the bank
     * INPUT: bulletId = ID of bullet to delete
     * OUTPUT: bullet removed from pf_bullet_bank
     */
    function deleteBullet(bulletId) {
      if (!confirm('Delete this bullet? This action cannot be undone.')) return;

      let bullets = getBulletBank();
      bullets = bullets.filter(b => b.id !== bulletId);
      saveBulletBank(bullets);

      renderBulletBankPhase(document.getElementById('workspace-content'));
      showToast('Bullet deleted', 'success');
    }

    /**
     * Exports bullet bank as JSON
     * INPUT: none
     * OUTPUT: JSON file downloaded
     */
    function exportBulletBank() {
      const bullets = getBulletBank();
      const json = JSON.stringify(bullets, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bullet-bank-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Bullet bank exported', 'success');
    }

    /**
     * Imports bullet bank from JSON file (placeholder)
     * INPUT: none
     * OUTPUT: shows toast with info about import
     */
    function importBulletBank() {
      showToast('Import feature coming soon', 'info');
    }

    /**
     * Edits an existing bullet (placeholder)
     * INPUT: bulletId = ID of bullet to edit
     * OUTPUT: shows edit form
     */
    function editBullet(bulletId) {
      showToast('Inline editing coming soon', 'info');
    }

    /**
     * Renders the History tab showing all saved resume versions
     * INPUT: container = DOM element to render into
     * OUTPUT: list of saved resumes with metadata
     */
    function renderHistoryPhase(container) {
      const log = getResumeLog();

      const html = `
        <div class="resume-history">
          <h2 class="history-title">Resume History</h2>

          <div class="history-list">
            ${log.length === 0 ? '<p style="color: var(--text-secondary);">No resume versions saved yet.</p>' : ''}
            ${log.map(entry => `
              <div class="history-item">
                <div class="history-item-header">
                  <div>
                    <div class="history-item-title">${entry.company} — ${entry.role}</div>
                    <div style="font-size: var(--text-xs); color: var(--text-tertiary);">${entry.filename}</div>
                  </div>
                  <div class="history-item-date">${new Date(entry.date).toLocaleDateString()}</div>
                </div>
                <div class="history-item-details">
                  <strong>Keywords:</strong> ${entry.keywords.join(', ') || '—'}<br>
                  <strong>Customizations:</strong> ${entry.customizations || '—'}
                </div>
                <div class="history-item-actions">
                  <button class="history-btn" onclick="loadResumeVersion('${entry.id}')">Load</button>
                  <button class="history-btn" onclick="deleteResumeVersion('${entry.id}')" style="color: var(--danger);">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    /**
     * Loads a saved resume version (placeholder)
     * INPUT: entryId = ID of resume log entry
     * OUTPUT: shows toast about loading
     */
    function loadResumeVersion(entryId) {
      showToast('Loading resume version...', 'info');
    }

    /**
     * Deletes a resume version from history
     * INPUT: entryId = ID of resume log entry
     * OUTPUT: entry removed from log
     */
    function deleteResumeVersion(entryId) {
      if (!confirm('Delete this resume version?')) return;

      let log = getResumeLog();
      log = log.filter(e => e.id !== entryId);
      localStorage.setItem('pf_resume_log', JSON.stringify(log));

      renderHistoryPhase(document.getElementById('workspace-content'));
      showToast('Resume version deleted', 'success');
    }

    /* ================================================================
       UTILITY FUNCTIONS
       ================================================================ */

    /**
     * Shows a toast notification in the bottom-right corner
     * INPUT: message = notification text, type = 'success' | 'error' | 'info'
     * OUTPUT: toast element added to page, auto-removes after 3 seconds
     */
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    /* ================================================================
       EVENT HANDLERS & INITIALIZATION
       ================================================================ */

    // Tab button clicks
    document.querySelectorAll('.tab-button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        currentPhase = e.target.dataset.tab;
        renderWorkspace();
      });
    });

    // Collapse sidebar button
    document.getElementById('collapse-btn').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
    });

    // Sidebar toggle button
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (currentPhase === 'builder' && currentRole) {
          saveVersion();
        }
      }

      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        // Command palette would go here
      }
    });

    // Initialize the module
    window.addEventListener('DOMContentLoaded', () => {
      initializeDemoData();
      renderRoleSelector();
      renderSidebar();
      renderWorkspace();
    });
  </script>
  <script src="../shared/data-switcher.js"></script>
</body>
</html>
